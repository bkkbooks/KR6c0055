body:
  text: 姚秦三藏法師鳩摩羅什譯隆興府百福院宗鏡禪師述曹洞正宗嗣祖沙門覺連重集依法出生法法皆真元從一法生四生六道情與無情此科昭明太子判此一段經文為依法出生分第八蓋一切諸佛及阿耨菩提皆從般若經大智理中出生故云依法出生也法法皆真者既從真如理中流出佛果菩提則一切有情無情法法具真理言諸法攬理而成故法法皆是真理可謂出真理之外無片事可得也元從一法生者言諸佛法身及所證菩提無不從此般若一理而生故般若稱為諸佛之母皆依般若而修乃得成佛也四生六道者此釋上文法法皆真從一法而生之義言四生六道即六凡也四聖含於其間情與無情即三世間也山河大地體露分明泥牛吸水黃河徹底清山河大地體露分明者呈前法法皆真之義即總含四法界也可謂若人欲識真空理心內真如還遍外情與無情共一體處處皆同真法界也泥牛吸水者前文依教而説此中教外別談宗門以泥牛木馬表正位中事此言泥牛吸水顯正中有偏從體起用以無説中而有説也黃河徹底清者此水本渾却言能清表偏中有正攝用歸體以有語中而無語妙在體前可謂海底泥牛銜月走岩前石虎抱兒眠山河如掌平無壞亦無成千差與萬別金剛界內生此四句言經中一切諸佛及阿耨菩提法皆從此經流出所以初二句言無情世界雖有山高河下之異於般若理上無一無別故云如掌平也縱山有崩裂水有枯竭於般若理上亦無成壞也後二句呈前之義總言十法界之相雖有千差萬別不同其實從一法界真心建立故云金剛界內生可謂衆生見劫盡大火所燒時我此土安隱天人常充滿此言金剛界內無有成壞之相也依法出生分第八經須菩提於意云何至所謂佛法者即非佛法注曰此分名依法出生分然依般若法出生佛果菩提也如來於此招告當機須菩提於意云何佛意欲顯無為之福先將有漏之福問於善現若人以滿三千世界盡是七寶以用布施所作得之福德其福德寧為多不下文須菩提乃答云甚多世尊善現謂大千七寶寶多福勝故曰甚多也何以故者自徵問甚多之義是福德者即事福也即非福德性者非般若福德種性不能成就菩提此但住相布施唯成有漏之因只得人天福報也是故如來説福德多者於世間事福乃云多也佛又招告須菩提言若復有人於此經中此經者指此般若人人俱有箇箇周圓上至諸佛下及螻蟻亦具此經即妙圓覺心是也無物堪比有人於此經中受持四句偈等受者直下承受持者時時行持更為他人分別解説其福勝彼七寶布施之福只得人天有漏之報此言四句之偈以少況多四句功德既云無邊況一經功德豈可思議者哉言其因經悟性四句現前福等太虗歷劫不壞只至成佛永無退轉故云其福勝彼可謂爭似無為實相門一超直入如來地是也古今論四句偈者不一各執己見初無定論但依銅記云天親菩薩升兜率宮請益彌勒如何是四句偈彌勒云無我相無人相無衆生相無壽者相是也何以故者佛意自徵自釋招告善現何故於此經受持四句為人講説所得福德勝於大千世界七寶布施也佛乃自答云一切諸佛及所證菩提等法皆從此經出言此經之功極大無窮非指此一經文字語言乃指實相般若之心也所謂佛法者佛於此再呼須菩提而告之所謂佛法者乃指上文所謂阿耨菩提法也佛恐人泥著此佛法故云即非佛法也非是真實有此佛法乃假名為佛法而已蓋謂佛法本來無有唯假此法以開悟衆生耳如來所説佛者令人覺也所説法者令人悟也若不覺不悟執取心外佛法者即非佛法也傅大士頌曰寶滿三千界賫持作福田唯成有漏業終不離人天持經取四句與聖作良緣欲入無為海須乘般若船寶滿三千財施有盡偈宣四句法施無窮發生智慧光明流出真如妙道寶滿三千者言財施潤衆生之身無飢寒苦得歡喜樂只是人間天上之福為有漏之果福盡墮落依舊沉淪故云有盡可謂住相布施生天福猶如仰箭射虗空也偈宣四句者言法施潤衆生之心令聞法者心生歡喜見性明心超凡入聖得證菩提聽者既證菩提説者豈不成道故云法施無窮也發生智慧光明者此釋呈上文法施無窮所以言聞法之人發生本有智慧光明又能向自性中流出真如妙道故經云一切諸佛及阿耨菩提皆從此經出也所以稱揚德勝了達性空徹諸佛之本源豁一經之眼目還見四句親切麼處所以稱揚者言佛告須菩提稱揚能持四句功德勝彼七寶布施之福言持經得見自性聞法乃證菩提發生智慧光明流出真如妙道又能了達自性本空真心清淨爾得洞徹十方諸佛根本之源豁開一經之眼目即指經中般若智為眼目也還見四句者此是科家徵問之辭發明四句親切之義此中自問下文自答也真性洞明依般若不勞彈指證菩提此是科家答上親切之義也言真性洞明者行人果能洞達明了真性必依般若大智修持速證菩提此言不勞彈指者般若即一心也豈心外又有菩提可證故云不勞彈指證菩提可謂彈指圓成八萬門剎那滅却三祗劫徒將七寶施三千四句親聞了上根無量劫來諸佛祖從茲超出涅槃門初句頌財施有盡以七寶布施人天受福還有墮落也次句頌法施無窮上根之人聞四句義心離四相證我空理直至成佛永無退轉故云四句親聞了上根也後二句呈前法施無窮從上佛佛祖祖見性得道皆因法施證入涅槃可謂十方薄伽梵一路涅槃門慧燈不滅魔難入智鏡常明夢不侵堪嘆浮生瞌睡漢從他萬劫恣昏沉前二句警行人以智慧破內外惑也言慧燈不滅者以法相宗中因位名慧言慧能揀擇故於地位中善能揀擇大小性相邪正真妄諸法一一揀擇分明以慧治內惑以燈能破外暗使外魔不能入內魔不能侵可謂慧燈不滅也智鏡常明者法相宗中果位名智以智能決定故法身本智如大圓鏡內外洞明無不照徹故云智鏡常明幻妄之夢不侵也後二句讚歎一切衆生不悟本有智慧被無明煩惱蓋覆終日冥冥不覺不知故云瞌睡漢也從他萬劫者既不明此智慧從劫至劫生死永沉往來六道流轉無窮何止萬劫而已哉故云從他萬劫恣昏沉也頭髮焦然乾竹叉兩肩擔水又擔柴一生貧賤多辛苦厭惡女身歸去來此四句行容女人身為苦器蓋有三監五障不得自在又有如此貧窮下賤逼迫身心何不早念彌陀捨此貧窮困苦之身生於淨土極樂之界此娑婆世界不但女人有如此苦盡三界二十五有六道衆生天有五衰之苦人有八苦交煎何啻兩肩擔水擔柴之苦耶若生西方永離八苦無諸惡道但受諸樂直至成佛永無退轉者矣一相無相本自如然不在口宣傳五果四向誰後誰先此科昭明太子判此一段經文名為一相無相分第九蓋四果人雖有差別不同同證一實相之理實相者無相也本自如然者本來自具真如妙理也不在口宣傳者其實此真如妙理口欲談而詞喪心欲緣而慮忘理圓言偏言生理喪也五果四向者即五不還果也是第三果阿那含人居五淨居天斷惑有五種那含果也四向者即第四果人離四向證四果也誰後誰先者言五果四向人有利鈍不同斷惑出三界利根者先斷先證鈍根者後斷後證也絲毫不挂萬法周圓圓明彌滿無心照大千此論前來五果四句有先後有利鈍斷惑出三界證四果差別不同也今言絲毫不挂似最上頓宗了萬法本空真心本淨無惑可斷無果可證故云萬法周圓似真如遍於萬法故法法周備圓滿具足也圓明彌滿者此喻本有真心靈光獨耀如中秋月普照十方可謂一點靈明通宇宙那分西竺與曹溪五果并四向本體元無相兩目不相似鼻孔都一樣五果者即五種那含果也四向者即四果阿羅漢向向者往也將往四果出三界也本體元無相者雖五果四向差別不同以真如本體理上元來無相也兩目不相似者呈前五果四向從凡至聖修證階級各各不同如人兩目左右必不相似一般也鼻孔一樣者言所悟真理實然不異故云鼻孔都一樣也一相無相分第九經須菩提於意云何至色聲香味觸法是名須陀洹注曰此分之義敘得果之疑因也從上無為法不可取説而來論云向説無為法不可取説云何聲聞各取自果如證而説也此下顯斷疑之義蓋四果雖差別不同同證一實相理故云一相無相也梵語須陀洹華言入流佛於此招告當機須菩提於意云何佛恐四種羅漢不知以無念為宗尚萌所得之念故設問告之云須陀洹能作是念我得須陀洹果不意云汝能作得果得道之念不須菩提答之云不也言不作得果之念也須菩提復向佛説須陀洹人所得之實故稱世尊何以故者乃徵問之辭以何意故名須陀洹此人名為入流言得入聖人之流斷三界八十八使見惑離四趣生證初果位故云入流也而無所入者言此人心無所得之念不入六塵境界斷除人我執著之相以無取心契無得理故名須陀洹也傅大士頌曰捨凡初入聖煩惱漸輕微斷除人我執創始證無為緣塵及身見今者乃知非七返人天後趣寂不知歸經須菩提於意云何至而實無往來是名斯陀含梵語斯陀含此云一來即第二果阿羅漢也佛於此招告當機須菩提於意云何佛恐於所得果上心有所得之念故設問告之於汝心意云何斯陀含能作是念我得斯陀含果不佛意云汝能作得果得道之念不須菩提答之云不也言我不作得果之念須菩提復向佛説斯陀含人所得之實故再稱世尊何以故者徵問義以何意故名斯陀含此斯陀含者名一往來蓋以欲界有九品思惑前六品已斷後三品未斷更須於欲界一往天上受生一來人間受生不復再來人間也而實無往來者此人證無為果時而心無所得不見有往來之相故名斯陀含也經須菩提於意云何至而實無不來是故名阿那含梵語阿那含此云不來即第三果阿羅漢也佛於此招告當機須菩提於意云何佛恐此人於所得所證心有執取之念故設問告之云阿那含能作是念我得阿那含果不佛意云汝能作得果得道之念不須菩提答之云不也意云我不作所得之念須菩提得向佛言阿那含人所得之實故稱世尊何以故者自徵問義以何意故名阿那含此阿那含名為不來蓋此人於欲界思惑已斷更不來欲界受生故名不來也而實無不來者此人已悟人法俱空心無所得而實無不來之相故名阿那含也經須菩提於意云何至即為著我人衆生壽者梵語阿羅漢華言殺賊名含三義其一殺煩惱惑使其二後報不來其三應受人天供養又名無學以三界內見思煩惱已盡究竟真理無法可學故名無學即第四果阿羅漢也佛於此招告當機須菩提於意云何此阿羅漢能作是念我得阿羅漢道不佛恐此人心有所得之念故問云汝能作得道得果之念不須菩提答之云不也意云我不作得道之念須菩提復向世尊説無所得之實故再稱世尊何以故者自徵問義以何意故名阿羅漢此阿羅漢實無有法名阿羅漢此人自初果至四果皆因證此無為之體實無有法可取可捨既無取捨境智俱亡豈有得果之心我心既空無得道念故名阿羅漢須菩提又稱世尊若阿羅漢作是念我得阿羅漢道即著我人衆生壽者意云若阿羅漢於道有得於法有取作得道之念有所得之心即我相未除是凡夫行則著我人衆生壽者也經世尊佛説我得無諍三昧至我是離欲阿羅漢此言須菩提再稱世尊云佛説我得無諍三昧人中最為第一是第一離欲阿羅漢者乃是善現明佛先許我得無諍三昧言無諍者一念不生諸法無諍也梵語三昧此云正定離諸邪定故也人中第一者言得此無諍精妙之處於諸弟子中最為第一也然善現所證之果不過無學而世尊獨稱第一者以無諍故也第一離欲者以三界煩惱貪心即名為欲以善現微細四相皆以滅盡愛染不生故云離欲阿羅漢也世尊我不作是念者須菩提復向佛説無所得之念故再稱世尊我不作是念我是離欲得道果者以須菩提外不取離欲之名內不執所得之果也經世尊我若作是念至而名須菩提是樂阿蘭那行此明須菩提恐大衆不知去所得心是以啓咨世尊至於再四我者即須菩提自稱也我若作是念我是得道得果阿羅漢世尊則不説我須菩提是樂阿蘭那行者梵語阿蘭那此云無諍我若作是念世尊則不應記我無諍之行最為第一以我須菩提實無所行蓋以心無所得離三界欲證四果法得無諍三昧方受須菩提名所以佛許須菩提是樂阿蘭那行者傅大士頌曰無生即無滅無我復無人永除煩惱障長辭後有身境亡心亦滅無復起貪瞋無悲空有智翛然獨任真人天往返諸漏未除道果雙忘無諍第一超凡入聖從頭勘證將來轉位回機透底盡令徹去委悉麼人天往返者言初果人七生天上七生人間斷三界八十八使見惑盡方證初果言二果人一生天上一生人間斷欲界五趣雜居地中前六品思惑盡方證二果言三果人一往天上斷欲界後三品思惑盡方出欲界再不來欲界受生方證三果居五不還天斷後八地中七十二品思惑盡方出三界故云人天往返也諸漏未除者言六根發識六塵牽引皆為漏也凡夫漏於有為二乘漏於無為菩薩漏於中道今正言初果二果三果及四果阿羅漢雖斷三界內見思二惑得出三界已是漏在界外尚滯偏空墮於無為故云諸漏未除也道果雙忘者言阿羅漢已斷見思二惑證無為理遣去得道得果之執方稱無諍第一之行故云道果雙忘無諍第一也可謂迷悟到頭俱莫戀眼中金屑無難留超凡入聖者言初果至於四果無諍三昧阿蘭那行謂之從頭勘驗次第皆是斷惑證果而來也轉位回機者此科家拈情意云阿羅漢雖是從凡入聖得證無為住在二乘灰心泯智捨有趣無精進研窮滅受想定須要轉去二乘之位回滯小乘之機於此發菩提心修菩薩行謂之轉位回機將前滯小之意盡令透底徹去纖毫不存可謂眼中撥盡黃余屑觸處縱橫鳥道玄還委悉麼者乃科家審問之辭要人著眼也似我如上所説汝諸人會麼下文伸答是也勿謂無心云是道無心猶隔一重關此二句是同安察禪師頌心印偈中末後兩句科家引來比無心之義言初果不入六塵不著聖流無心也二果不著往來之相無心也三果不著不來之相無心也四果不著有無之相無心也涅槃經云阿羅漢已離子縛以因中為子即八十一品思惑故得無心也無心猶隔者此阿羅漢果縛猶存執涅槃果有苦依身在有説涅槃之苦依著法身故隔一重關也故大論云二乘雖破三毒煩惱不了了盡如香在器中香雖去而餘氣猶存若乳母衣久故垢著以淳灰水洗淨雖無有垢而垢氣猶存此喻二乘既有餘習故謂之隔關也果位聲聞獨善身寂然常定本非真回心頓入如來海倒駕慈航逆渡人前二句行容二乘行相如獐獨跳不顧本羣唯能自利不能利人所以獨善其身也雖是寂然常在定中非是大乘真實之道無餘涅槃故云非真也後二句指示大乘真實之道謂二乘人回小向大發菩提心行菩薩行回二乘人趣寂之心頓入如來妙覺果海也從妙覺海倒駕慈航逆流而出即返入塵勞分身九界興慈運悲廣利有情故云逆渡人也樓頭畫鼓五更闌爭奈衆生被眼瞞不見性天光燦燦但於夜後黑漫漫此四句明大地衆生從晝至夜只貪世事不明真性眼被色牽耳隨聲轉鼻舌身意亦復如是闌者盡也言五更之闌謂五更將盡而天明也衆生被眼瞞者言衆生盡此一夜只貪睡眠及至日間又被色轉不知日用見聞皆是當人自性所以被眼瞞也後二句謂被眼瞞之義不見性天者言世人只知貪眠見色被物所迷不知見色即是見心聞聲即是聞性所以不見性天之道也但於夜後者既不明性天之道只管向外馳求迷頭認影如處長夜夢寐莫曉故云夜後黑者矣極樂國中真快樂永無八難及三災常聞天樂空中響敢勸衆生歸去來此四句歎西方境勝令人歸向也初句言生西方人蓮華化生思衣得衣思食得食無生死苦無憂悲苦故曰快樂可謂稱身瓔珞隨心現盈器酥酡逐念來也次句言彼國衆生無諸衆苦即八難三災也八難者一地獄難二餓鬼難三傍生難四盲聾瘖啞難五世智辨聰難六佛前佛後難七北拘盧洲難八無想天難故云八難也三災者大三災即水火風也小三災即刀兵疫病飢饉也淨土無有此苦故云永無八難三災也三句言彼佛國土常作天樂又云彼佛國土微風吹動諸寶行樹及寶羅網譬如百千種樂同時俱作故云天樂空中響也四句結頌乃是科家慈心太切既是淨土如此之樂娑婆如此之苦我今普勸汝等衆生急早念佛同歸淨土優曇頌曰老來死至怎生醫樂土風光誰得知到者同名無量壽因從此界念阿彌故云敢勸衆生歸去來也莊嚴淨土錦上添花徒勞任算沙然燈昔日授記無差此科昭明太子判此一段經文為莊嚴淨土分第十蓋菩薩以清淨心不住六塵均修萬行莊嚴法身淨土故名莊嚴淨土也錦上添花者言此法身淨土人人本有如錦相似菩薩復假萬行莊嚴如錦上添花乃是稱性莊嚴淨土也徒勞任算沙者此是科家與人拈情恐人向莊嚴處認著既是法性本有淨土何假莊嚴故云徒勞任算沙也然燈昔日者如佛問須菩提如來昔在然燈佛所於法有所得不須菩提答云於法實無所得佛言如是如是以實無有法可得是故然燈於我授記汝於來世當得作佛科家意謂似此實無有法可得方是於理無有差錯也可謂分明不受然燈記自有靈光耀古今因風吹火末後拈華誰人會得迦葉便笑他此科因然燈授記而言無法可得故云因風吹火所以世尊末後拈華倣效成風也誰人會得者此言世尊既因然燈授記無法可得所以末後拈華誰人會得唯有迦葉破顏微笑會得無説無傳本有之道所以便笑他也莊嚴生淨土金粟眼中沙初生全泄漏末後又拈華前二句拈情也莊嚴生淨土者前來有為教中菩薩以六度萬行為莊嚴法身淨土佛恐須菩提執著實有莊嚴故問云菩薩莊嚴佛土不此須菩提即以大乘理答之云莊嚴淨土者即非莊嚴是名莊嚴此明自性之土不在莊嚴自性無相量等虗空如何莊嚴也佛又云菩薩生清淨心不著六塵應無所住而生其心方是莊嚴淨土科家意云須菩提雖然稱理莊嚴還有此莊嚴之念所以云金屑雖貴落眼成塵故云金粟眼中沙也初生全泄漏者此是科家把住世尊之義言真淨界中本無諸佛出世今生梵宮已是漏泄真機謂初生時周行七步目顧四方一手指天一手指地天上天下唯吾獨尊古德云指天指地語朗朗送語傳言出畫堂使者尚能多意氣主人應是不尋常此貶傳言送語漏泄真機故云初生泄漏也末後拈華者言佛住世四十九年談經三百餘會即是應機而説至理本來無言所以末後拈華迦葉微笑世尊云吾有正法眼藏涅槃妙心付囑迦葉汝善流布勿令斷絶此明拈華雖顯無言之道爭奈付囑已落第二門頭豈非漏泄也莊嚴淨土分第十經佛告須菩提於意云何至於法實無所得注曰此分之名為莊嚴淨土分者以菩薩修六度萬行布施戒定慧等一切善法皆名莊嚴外不染六塵內無我人相不著斷滅故名淨土也時佛於此招告當機須菩提於意云何於汝心意如何又云如來昔在然燈佛所於法有所得不此乃佛恐須菩提疑佛因中昔受然燈之記於法實有佛果菩提所得故興此問也須菩提向佛答云不也世尊如來在然燈佛所於法實無所得意云於般若真空理上實無所得之法也傅大士頌曰昔時成善慧今日號能仁看緣緣是妄識體體非真法性非因果如理不從因謂得然燈記寧知是舊身經須菩提於意云何至即非莊嚴是名莊嚴佛於此招告當機須菩提於意云何菩薩莊嚴佛土不佛意恐須菩提起疑前來既言法不可取云何諸菩薩以修六度萬行取莊嚴淨土耶故佛問之汝謂菩薩修行六度莊嚴欲取佛淨土不須菩提自答云不也世尊意云不取相莊嚴佛土故稱世尊也何以故者乃是自徵之義以何意故菩薩不取相莊嚴佛土又答云莊嚴佛土者即非莊嚴是名莊嚴須菩提意云此莊嚴佛土者謂菩薩修六度萬行造寺寫經布施供養此是著相有為莊嚴故云即非莊嚴也若菩薩心常清淨不向外求任運隨緣一無所得行住坐臥於道相應故云是名莊嚴佛土也傅大士頌曰掃除心意地名為淨土因無論福與智先且離貪瞋莊嚴絶能所無我亦無人斷常俱不染頴脫出囂塵經是故須菩提諸菩薩至應無所住而生其心是故者乃結上起下之辭也以前文云菩薩於法實無所得又不取相莊嚴佛土以是之故佛再告須菩提諸菩薩摩訶薩應如是生清淨心佛意勸勉菩薩應當如是生真如無染清淨之心也下文顯生清淨心所以不應住色者即不住六塵境是生清淨心也應無所住者即不住六塵不住善惡不住凡聖不住生死涅槃等也而生其心者即是諸佛清淨心體不生不滅不增不減盡十方世界獨露此一箇真心也經須菩提譬如有人至佛説非身是名大身梵語須彌盧此云妙高以此山四寶所成曰妙獨出衆山曰高又名山王者謂在衆山之中故稱王也佛以此為喻故招告須菩提言譬如有人身如須彌山王於意云何是身為大不佛意以人身高大如須彌山實無此理謂之非喻而喻比況真性無相色褁太虗雖須彌山不足比其高大故託大身所以為問故云是身為大不須菩提答之云甚大以須菩提深悟佛義遂有甚大之對故再稱世尊也何以故者乃自徵之義以何意故名之為大又恐大衆未曉重為辨之曰佛説非身是名大身言非身者即法身也真心也以謂法身心量廣大等虗空界無形無相無可比類方名大身傅大士頌曰須彌高且大將喻法王身七寶齊圍繞六度次相鄰四色成山相慈悲作佛因有形終不大無相乃為真如來續焰然燈實無可得之法菩薩莊嚴佛土應無所住之心諸妄消亡一真清淨如來續焰者即釋迦因中為善慧仙人獻華於然燈佛證無所得法然燈佛授記云汝於來世當得作佛號曰釋迦故云續焰然燈實無所得之法也菩薩莊嚴者菩薩以無所住心不住六塵生清淨心莊嚴法身淨土也諸妄消亡者即不染六塵諸妄消亡唯顯一真清淨無染之道也昔究法華妙旨親感普賢誨言清淨身心安居求實冥符奧義豁悟前因直得心法兩忘根塵俱泯且道莊嚴箇什麼此是科家舉自證驗他也言我昔究法華妙旨至八百身功德處經云得清淨身如淨琉璃衆生喜見其身淨故三千大千世界衆生生時死時上下好醜生善處惡處悉於中現於此有疑然後作觀思惟親感普賢菩薩誨語云汝有身心在未得身根清淨科主於是清淨身心安居靜室復起觀智以求實相忽然有省冥符經中奧義也豁悟前因者即科主自悟前世之因也心法兩忘者此明豁悟前因所以也直得心忘四相法忘二執內根不生外塵自泯也可謂心是根法是塵兩種猶如鏡上痕痕垢盡時光始現心法雙忘性即真也且道莊嚴者乃科主徵問之義竟云既是心法兩忘又莊嚴箇什麼可謂虗空無面目何用巧粧眉也彈指圓成八萬門剎那滅却三祇劫此二句以顯大乘圓頓境界初發心時便成正覺於一念之間頓成佛道不經三阿僧祇劫而修當下圓成八萬法門佛事可謂爭似無為實相門一超直入如來地矣正法眼中無所得涅槃心外謾莊嚴六座空寂無人會推倒須彌浸玉蟾前二句頌如來受記然燈以正法眼藏涅槃妙心佛佛授受祖祖相傳不立文字名為教外別傳雖有傳而無法可傳雖有授而無法可受故云正法眼中無所得也既是正法眼中無有所得之法即今涅槃心外謾説莊嚴淨土也此言即心之道心外無法可謂有燈堪照世無法可傳人也後二句牒經文義經云應如是生清淨心不應住色聲香味觸法生心既是不住六塵却是六塵空寂顯出涅槃妙心爭奈無人領會如推倒須彌相似玉蟾即月之別名以日月繞須彌行故有晝夜之隔今言推倒須彌日月同處不分晝夜亘古常明既是天上之月常明水中玉蟾亦常浸也境喻六塵既是空寂涅槃妙心常顯即心即境寂照不分故云推倒須彌浸玉蟾也百歲光陰一剎那凌晨淨口念彌陀看經讀誦無休歇必免當來過奈河此四句歎時光易度剎那不停何不念佛看經禮佛行道堅持一念之真勿逐六根之妄必免當來不墮三途可謂誦一卷經通身慶快念千聲佛滿口光明造論弘經大辨才馬鳴龍樹及天台圭峰乃至清涼老總勸西方歸去來造論弘經者即馬鳴龍樹各造諸部之論弘大乘經也天台圭峰清涼弘宣大乘諸部經典也皆具戒定慧有大辨才也馬鳴菩薩依楞伽經勝鬘經密嚴等經而造起信論佛性論寶性論以弘諸大乘經而起信論中其末結歸曰復次衆生初學是法欲求正信其心怯弱以住於此娑婆世界自謂不能常值諸佛懼謂信心難可成就意恐退者當知如來有勝方便攝護信心謂以專意念佛因緣隨願得生他方佛土常見於佛永離惡道大論云此菩薩道成劫號大光明佛今乃助化示居八地父名盧伽母名瞿耶又名功德日菩薩也龍樹菩薩乃依八部般若及諸空宗經典而造大智度論一百卷中論四卷十二門論一卷亦弘大乘經也入楞伽經佛告大慧汝當知善遊涅槃後未來世當有持於我法者南天國土中大明德比丘厥號為龍樹能破有無宗世間中顯我無上大法寶得初歡喜地往生安樂國後造大智度論中云佛是無上法王諸大菩薩為法王臣諸臣所尊者唯佛法王是故菩薩應當念佛也後曇鸞法師一夕室中見梵僧謂曰吾龍樹也居淨土久矣以汝同志故來相見鸞曰何以見教樹曰已去不可及未來未可追現在今何在白駒難以回言訖不見曇集衆念佛而終也天台智者大師製造法華玄義二十卷涅槃疏金光明疏天台止觀及四教儀淨土十疑折攝二門師於新昌大石像前告滅弟子請問生方曰吾諸善友皆從觀音而來迎我及夜見有佛至臨終説諸法門令唱無量壽經及觀經題目及顧大衆合掌讚曰四十八願莊嚴淨土華池寶樹易往罪人火車相視一念改悔尚得往生況戒定慧熏修聖行道力實不唐捐言訖稱三寶名安然而滅後有僧求知生方乃夢觀音金容數丈智者從後而告僧曰汝心有疑決不得生故知智者已生西方決矣信不誣哉圭峯釋經造疏鈔亦勉入念佛求生西方清涼國師製造華嚴疏鈔百有餘卷普賢菩薩教善財發十大願清涼曰若有行人於此大願受持讀誦是人命終一切諸根悉皆壞散一切親眷悉皆捨離一切威勢悉皆是失唯此願王不相捨離於一切時引導其前一剎那中即得往生極樂世界到已即見阿彌陀佛生蓮華中蒙佛授記言於十方世界以智慧力隨衆生心而為利益不久當坐菩提道場成等正覺拔彼衆生得生彼國總十有四頌皆勸念佛往生淨土也無為福勝四句堪誇如塵比數沙住相布施凡聖皆差無為福勝者此科昭明太子判此一段經文為無為福勝分第十一以持經功德顯般若智能出生佛果菩提之法故名無為得福勝也四句堪誇者以持經四句功德勝前七寶布施功德故云堪誇也如塵比數沙者此科如恆河中所有沙數寧為多不須菩提答言甚多以此喻有為布施福多也住相布施者此科佛説以沙數七寶布施於人得福雖多乃是住相有為人天之福未出有為福盡墮落不免輪回故云凡聖差也無來無去月照簾下無根樹子常開四季華此科若人於此經中受持四句偈為他人説而此福德勝前大千世界七寶布施之福以持經見性成佛永無退轉所以無來無去無生無滅此顯般若真空無為之道如月當天光通玉戶千江普應一月無虧故云無來無去月照簾下可謂家家門掩蟾蜍月處處鶯啼楊柳風也無根樹子者此明般若真智無形無相如無根樹子常開四季之華可謂枯木花開漏出先天境界冷灰豆𪹼衝開鼻祖玄關也四句絶堪誇河沙數漸多算來無一法靜處娑婆訶前二句牒持經功德最勝故云四句絶堪誇也若人能持四句之功德勝過恆河沙布施之福德故云河沙數漸多也後二句科家恐人聞四句福勝於此執著故與拈情雖四句功德勝過七寶布施之功若以真空理上算來無有一法可得不如有人於寂靜處受持一婆婆訶功德速到彼岸也梵語娑婆訶此云速疾到彼岸矣無為福勝分第十一經須菩提如恆河中至而此福德勝前福德注曰此分經文佛欲顯無為福勝故先以恆河沙數等恆河問之云須菩提如恆河中所有沙數如是沙等恆河乃至寧為多不此恆河者正云殑伽河此翻云從天堂來周圍四十里佛多近此以取為喻蓋因衆人而所常見故取為譬喻也然佛以此恆河沙數等恆河問於須菩提寧為多不欲使先悟此沙之多數然後以持經之四句比之猶多故乃問之也須菩提領解佛義答云甚多世尊但諸恆河尚多無數何況其沙意云以恆河中沙數一沙即為一河是諸河中各有其沙河尚無數何況其沙也佛乃復告當機須菩提我今實言告汝若有男子女人以七寶滿爾所恆河沙數三千世界以用布施得福多不佛乃重顯無為之福勝有為之福也前第八分中以大千世界七寶布施之福問之此分以恆河沙數大千世界七寶布施之福問之云得福多不佛意重顯持經是無為福倍倍轉勝也須菩提答之云甚多世尊佛告須菩提若男子女人於此經中乃至受持四句偈等為他人説而此福德勝前福德佛意受持此經四句之偈即自見性得證菩提又為他人講演解説教人見性成無上道永出輪回高超三界所以勝過前來以恆河沙數七寶布施之福蓋謂有相福德未出三界也智者頌曰恆河數甚多沙數更難量舉沙齊七寶能持布施漿有相皆為幻徒言智慧強若論四句偈此福永為長滿積恆沙七寶周回布施三千福德分明因果不昧能宣四句之偈勝前萬倍之功用真智以照愚如急流而勇退且道退後如何前四句牒經文之義也以滿積恆河沙世界七寶布施於人此但受人天之福未出有漏修有漏因感有漏果故乃福德分明因果不昧先標喻文後以法合也後四句顯受持此經於人宣説四句之偈功德勝前七寶布施功德萬倍之多也用真智者此行容持經功德勝之所以此言持經以顯真智當人自性也照破愚惑如明來暗㓔智起惑亡故云照愚也如急流勇退者喻衆生心內雜思妄惑如急流之水相似若是行人大智現前妄惑勇退也且道退後者此是科家自徵問義向下伸答是也象踏恆沙徹底過大千沙界百雜碎此二句答上問之義也教中有兔馬象三獸渡河之喻兔喻聲聞浮水而過馬喻緣覺入水而過象喻菩薩徹恆河底而過河喻真空之理三人雖悟一理見有深淺此金剛經窮諸法底蘊若大乘菩薩用真智以照愚如急流而勇退直得諸法皆空大千粉碎可謂一人發真歸源十方虗空悉皆消殞也重增七寶滿恆沙如棄甜桃覓苦瓜豁悟真空元不壞百千三昧總虗花此四句總是拈情也前二句以世界七寶布施於人是有為福不能見性如棄甜桃覓苦瓜相似後二句直指本源若是行人受持此經悟真空理元來不壞此真空者即實相真空不同斷滅之空即指色相之上當體全空故云真空也此理無成無壞故云不壞也傅大士頌曰有物先天地無形本寂寥能為萬象主不逐四時凋若能悟此一段真空就是百千三昧也是空中之花三昧只為遣有今既悟真空一切有為事法決定無有也可謂大千沙界海中漚一切聖賢如電拂百歲光陰撚指間奔馳不定片時間煩君點撿形骸看多少英雄去不還起句歎光陰迅速如撚指間便過也二句歎每日奔波不定無有片時之間也後二句令人省會向自己形骸之上檢點看多少英雄一去不還也傅大士頌曰精魄隨陰路遊魂入死關只聞千萬去未見一人還寶馬空嘶立庭花永絶攀早求無上道應免四方山勢至悲光絶點埃塵塵剎剎現如來真心量與觀音等接引衆生歸去來前二句頌二菩薩光明各照千佛世界其中人民有急難恐怖官詞苦楚一切惡事逼迫一心歸命光照之處悉皆解脫也勢至者言菩薩有大勢力拔濟衆生但有稱名禮拜菩薩即至其前故云勢至也絶點埃者讚菩薩悲光熾盛之極一切衆生肉眼仗菩薩光即得徹見十方世界塵中之剎剎中有佛於衆生説法也古德云高超淨土捨娑婆一步歸來快樂多常寂光中都坐斷塵塵剎剎是彌陀後二句美此菩薩心量行願與觀世音菩薩無二無別隨逐彌陀化主接引衆生同歸淨土也尊重正教誰敢輕慢塔廟在身邊人人本有箇箇皆然此科昭明太子判此一段經文為尊重正教分第十二以此經所在之處則為有佛若有弟子持誦此經即為三寶俱在感得天人供養尊重持經之人故云尊重正教也誰敢輕慢者此言三寶既在天人尚重誰敢輕而不信慢而不敬也塔廟在身邊者乃科家分明指出此塔在人身邊不可遠尋也故經云隨説此經乃至四句偈等當知此處一切世間天人阿修羅皆應供養如佛塔廟若是經典所在之處則為有佛言其般若之智是佛法身舍利故云塔廟在身邊也人人本有者言此塔廟既在當人身邊人人本具不從外得故云本有不假修成本來自然故云箇箇皆然者耳金剛寶藏體自周圓若還信受拈來自檢看此是科家分明指示上云塔廟在身人人本有今乃教人受持此個金剛寶藏周遍法界圓褁十方頭頭顯現法法全彰眼見耳聞無非寶藏故云體自周圓也若還信受等者科家意云我今如此分明指示汝若信受此法爾試拈來自家檢點看是也不是者哉起坐皆尊重常親塔廟前如如元不動處處得安然前二句牒經文義云若是經典所在之處則為有佛如佛塔廟若是有人受持此經於四威儀中常自尊重保守如親在塔廟之前相似塔廟者唐梵兼舉梵語塔波唐言廟冢又云藏佛舍利謂之塔供佛形像謂之廟也後二句消歸於理而得自在若是行人不隨境轉其心如如不動於四威儀中安然自在也尊重正教分第十二經復次須菩提隨説是經至則為有佛若尊重弟子注曰此分經文名尊重正教分以般若是諸佛母能出生佛果菩提一切諸法但能持誦四句之偈乃感天人尊重供養故云尊重正教也佛於是再呼須菩提云此經隨其所在之處若有人受持讀誦為人演説乃至一四句偈則其功德利益甚深廣大當知此處感得天人阿修羅皆應供養如佛塔廟即為有佛以般若是如來法身舍利經云佛告藥王言若經卷所住之處皆應起七寶塔極令高廣嚴飾不須復安舍利此中已有如來全身若有人得見此塔禮拜供養當知是人皆近阿耨菩提是也何況有人盡能受持者上云持四句之功如佛真身舍利寶塔在於此處何況有人盡能具足受持讀誦此經全文當知此人即能成就無上佛果菩提第一希有之法也若是經典所在之處者佛意云此般若經典即法寶也則為有佛即佛寶也尊重弟子即僧寶也故云經典所在之處即三寶共居也尊重弟子者又因經勝故當尊重學居師後故稱弟解從師生故稱子也傅大士頌曰恆沙為比量分為六種多持經取四句七寶詎能過法門遊歷處供養感修羅經中稱最勝尊重似佛陀慈愍三根隨説乃人天敬仰受持四句皆應如塔廟尊崇常行無念之心實為希有之法如何是最上第一句此文牒經中之義也佛説此般若經以慈愍之心隨三種根器説三乘教法又隨説者若有行人隨其所在之處解説此經或受持讀誦但以四句乃感天人敬仰如塔廟尊崇似佛與大弟子現在之説也常行無念之心者若是行人常行無念即心離四相境絶六塵以無著之心讀誦講演實為成就最上第一希有微妙之法也最上第一者乃是科家徵問之義經云最上第一希有之法故問云如何為第一句下文伸答而顯露也非但我今獨達了恆沙諸佛體皆同此二句答上之辭也科家以永嘉證道之文比此中第一句之義此理非但我今獨自達了至於恆沙諸佛所證一體皆同也此乃分明指示果能如是之人親證實到此理方得如是受用可謂十方薄伽梵一路涅槃門説處隨宜不滯空勸持四句為流通天龍覆護尊如塔功德無邊讚莫窮此四句牒經之義也經云隨説是經乃至四句偈等科家意云若是行人隨其所在之處隨順機宜觀根逗教而説四句之偈令聞法者不滯偏空直取中道佛果菩提復勸行人受持四句流通無盡也天龍覆護者若有人受持四句流通之處感得天龍覆護尊敬供養如佛塔廟功德無邊讚揚無有窮盡也百歲光陰老盡人青山緑水至如今開眸認取來生路莫學愚頑錯用心前二句歎人生百歲七十者希言百歲光陰為人壽老盡之處此歎人壽不長命不久留也唯有青山緑水古今長在純陽云惟有兩般長不改青山依舊水長流開眸認取來生路者科家勉人山水雖長劫盡崩枯唯有本來真性萬古常存無去無來無生無滅故云開眸認取來生路也又叮嚀云莫學愚頑錯用心意云莫學愚癡之人迷而不省頑而不信只管錯用心機廣置田園多修宅舍古德云眼視仙莊境色幽前人田土後人收後人收得休歡喜還有收人在後頭若如此省悟必不錯用其心也念佛臨終見寶臺寶幡寶蓋滿空排彌陀勢至觀音等合掌相隨歸去來此四句明念佛之人有此效驗若是行人從初發心念佛直至臨終更不退志乃見七寶金臺自至又有寶幡寶蓋滿空排布彌陀勢至觀音三聖垂光接引此念佛人合掌相隨同歸淨土如法受持誰敢謾他須菩提意如何我今為汝一一言破此科昭明太子判此一段經文為如法受持分第十三以須菩提雖聞前來種種深義而未知經名何等云何受持流布故乃請問經名佛答是經名為金剛般若波羅蜜汝當奉持又恐於般若上而生執著故云即非般若以顯法性本空不可取著復於般若無有所説方為如法受持也誰敢謾他者科家意云既是法無所説般若非名如此受持者誰敢謾他也須菩提意如何者此分經文佛問須菩提總有三箇於意云何之問初問如來有所説法不二問世界所有微塵是為多不三問可以三十二相見如來不下文伸出所以也我我為汝一一言破者此明佛以三次問於意云何乃告須菩提云諸微塵如來説非微塵是名微塵如來説世界非世界是名世界故云一一言破也白雲散處月照禪河文殊不遠休巡山土坡上二句科經文云須菩提不以三十二相見如來法身故云白雲散處也月照禪河者既不著相見法身即是真空實相無相可觀如月照禪河光水一體也下二句科經中以恆河沙身命布施不如受持此經四句偈等其福甚多今云文殊不遠者以文殊表智喻此經四句偈即是當人本有真智能趣菩提無漏果也故杜順祖師送弟子遊五臺山偈曰遊子漫波波臺山禮土坡文殊只這是何更覓彌陀故云文殊不遠休巡山土坡也如法謹受持福勝等須彌白雲消散盡明月始光輝前二句頌經文之義也如法者科家意云若是行人不執般若之名不著有法可説方是如法受持稱理而修其福勝過須彌山之高廣以持經是無為福能成勝果故云福勝等須彌也後二句以白雲消散盡喻經文云不著有法可説不著有世界微塵不著三十二相故如白雲消散盡也明月始光輝者既於一切法不生執著獨顯實相真理如明月當空性天朗耀故云明月始光輝也如法受持分第十三經爾時須菩提白佛言至世尊如來無所説注曰此分經文名如法受持也以須菩提既聞此經實為希有之法未知此經以何為名所以白佛當何名此經我等云何受持流布佛乃答之云是經名為金剛般若波羅蜜以是名字汝當奉持如是答者佛意謂前所問答種種義理不過安住降伏能斷能空總是金剛般若波羅蜜之義一經大體一題盡矣此約俗諦之説故有此名也以是名字汝當奉持佛乃叮嚀尊奉行持也所以者何者佛自徵問以何所以也佛又呼須菩提云佛説般若波羅蜜即非般若波羅蜜意云我所説者對機之談如來恐人生斷滅見不得已而強安其名也可謂恐人生斷見權且立虗名若約真諦之義妙明本性湛若太虗體既尚無何名之有故云即非般若波羅蜜也佛於是再呼須菩提於意云何如來有所説法不佛恐須菩提聞佛説此經名疑法有説故乃問云如來有所説法不須菩提即會佛義答云如來無所説意云佛雖有説隨順俗諦故有是説若約真諦實無所説是名真説故云無所説也故下經云若有人言如來有所説法即為謗佛是也傅大士頌曰名中無有義義上復無名金剛喻真智能破惡堅貞若別波羅岸入理出迷情智人心自覺愚者外求聲經須菩提於意云何至為他人説其福甚多注曰佛於此再告當機須菩提云於汝心意如何此三千大千世界所有微塵是為多不問之須菩提領解佛義答云甚多故稱世尊也佛又呼須菩提言諸微塵等此一節大意由前來以滿恆河沙數三千世界七寶布施得福而來謂前寶施得福雖多不離性執貪等煩惱染因有為福報未出有漏故佛以大千世界微塵為喻塵界乃無情之物無記所攝不生貪等煩惱染因返顯前來寶施是煩惱染因以能成就煩惱果報況持説此經是遠離煩惱因能趣菩提果而豈不勝耶又云非微塵非世界者以非貪等煩惱塵界染因也是名微塵是名世界者乃是無記微塵世界也以無記猶無情謂不起善惡等情念也佛又告須菩提言於意云何可以三十二相見如來不意云以我色身三十二相見如來法身不須菩提即會佛義答云不也世尊不可以三十二相見如來意云寶施感者三十二相即應身佛也持經所感者即無相法身佛也故云不可以相見如來也何以故者佛自徵問以何意故不以三十二相見如來佛自答云如來説三十二相者是如來應身也即是非相者是如來法身也是名三十二相者以應身即是法身以法身全是應身亦不妨説三十二相也此言寶施之福縱能成佛但是應身之相不及受持演説功德能成無相法身也佛又呼須菩提云若有善男子善女人以恆河沙等身命布施者此言前文以七寶布施為外財也今乃以身命布施為內財也縱捨身命布施而不見佛性於理無益也若復有人於此經中乃至受持四句偈等為他人説其福甚多者此顯持經倍勝財施之福能見性成佛證無為果出生一切菩提法也傅大士頌曰施命如沙數人天業轉深既掩菩提相能障涅槃心猿猴探水月蘭𦿆拾花針愛河浮更沒苦海出還沉又頌曰經中稱四句應當不離身愚人看似夢智者見唯真法性無前後無中非故新蘊空無實相憑何見有人大覺尊本來不立一字而直指人心須菩提無端特請標名而強生枝節縱使析微塵如世界無相可求施身命等河沙無法可説且道奉持箇什麼咄此節之文明佛出世只是於人傳心本來不立一字昔佛將入涅槃時文殊請佛再轉法輪佛言吾四十九年未道著一字以佛言雖有説正顯無説嘗云始從鹿野苑終至跋提河於其二中間未曾説一字故云不立一字直指人心也須菩提無端者乃科家顯手眼把住説話意云言如來無所説法而今無端却又請標名題所以強生枝節如鉢盂上安柄可謂虗空無面目何用巧粧眉也縱使析微塵如世界者乃牒經類釋也即佛告須菩提諸微塵如來説非微塵是名微塵以類下句如來説世界非世界是名世界故云如世界也無相可求者以世界之相即衆塵所積之相今云析一微塵為七分極微塵又析一極微塵為七分極鄰虗塵以鄰虗塵實虗空性更不可析以同虗空故既同虗空了不可得豈能成就世界耶既不能成就世界故云無塵相可求也施身命等河沙者科家意云經中施河沙身命不如説四句法直饒你施身命等河沙求其説法亦不可得此言至理超名相之階真智出思議之外言語道斷心行處滅故云無法可説也且道奉持者科家令人審察若是有相有説可言一箇奉持既云無相可求無法可説且道如何奉持耶可謂直饒眼似流星未免口如楄簷也金剛寶劒倚天寒外道邪魔俱腦裂此二句所顯無受持之義也科家以金剛王寶劒喻般若智此智之外更無片事可得除一心之外更無有法可傳可受也如寶劒光寒羣魔膽碎所謂大丈夫秉慧劒般若鋒兮金剛焰非但空摧外道心早曾落却天魔膽是也箇裏本無元字腳空中誰敢強安名等間點出金剛眼照破魔王八萬城前二句頌經中之義也言般若無名真空無相所以科家當陽顯示不隱絲毫故云箇裏本無一字所説真空理上誰敢安名可謂有名呼不得無位可安排也後二句若是行人於般若真智直下會得如等間點出金剛正眼此金剛眼即當人本有之智眼斯眼若開能破一切衆生八萬四千塵勞煩惱之惑故心經云照見五蘊皆空度一切苦厄所以照破魔王八萬城也百歲光陰不自驚老來何物作前程只憑經卷三千藏莫把虗華過一生前二句歎人生在世只有百歲光陰從朝至暮惟貪名利不肯自驚光陰有限世數無多一旦老來欲將何物而作前程路費如行路客先辨資糧不遭飢餓之苦喻人修道必免三途之難古德云三分光陰二早過靈臺一點不揩磨貪生逐日區區去喚不回頭爭奈何似此之人亦是前程未辨也後二句頌辨前程所以要令行人向日用間不可唐喪光陰虗延歲月須是精勤六念謹守一心誦三藏之玄文究五乘之奧義故云只憑經卷三千藏也莫把虗華過一生者乃科家誡勉行人莫認三界虗華以為實有可惜一生空過後悔難追可謂迷誦千經只是少悟來一念也須多故經云一切有為法如夢幻泡影如露亦如電應作如是觀般若現前無罣礙橫身宇宙莫疑猜虗空拶破難藏覆大道分明歸去來初二句明三界之法從一般若出生今云般若現前諸法悉空即是般若故云無有礙可謂山河及大地全露法王身也橫身宇宙者言此般若既無罣礙所以橫身宇宙充滿太虗可謂竪窮三際橫遍十方故云莫疑猜也後二句言般若大用現前將十方虗空悉皆消殞也大道分明者謂般若現前山河大地明暗色空無纖毫可得古人云浮生易過休空過大道難明要講明故云大道分明歸去來也

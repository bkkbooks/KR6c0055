body:
  text: 姚秦三藏法師鳩摩羅什譯隆興府百福院宗鏡禪師述曹洞正宗嗣祖沙門覺連重集昔梁武帝請傅大士講經大士揮案一聲便乃下座如斯洪範千古分明不吝弘慈當機辨著噫大士揮尺講經猶是曲垂方便美則甚美了則未了若論最上頓宗直是不通凡聖以金剛王寶劒盡情掃蕩無餘一任渠明來暗來四方八面來普教他休去歇去一念萬年去雖然如是且道末後一句誰堪奉行咄此一節科家引證真空實相中凡聖皆空梁大通五年有義烏雙林大士者姓傅氏名翕法號善惠年十六納劉氏女妙光為室生二子名普建普願嘗有西域沙門嵩頭陀者見大士曰吾與汝毗婆尸佛所同發誓願今兜率宮衣鉢現在何日當歸因命臨水觀其影見圓光寶蓋大士笑謂之曰爐鞴之所多鈍鐵良醫之門足病人度生為急何思彼樂乎居無幾常見釋迦金粟定光三如來放光襲其身大士喜曰吾得首楞嚴三昧即捨田宅及賣妻子得錢五萬以設法會遂於松山之頂因雙檮樹創寺而居故名雙林日則營作夜則行道一日梁武帝請志公講金剛經公曰貧道不能講市中有賣魚翁號傅大士能講此經帝詔大士於壽光殿講金剛經大士升座即於案上揮桉一聲便乃下座志公曰陛下會麼帝曰不會公曰大士講經已竟此即凡聖情忘離言之道也如斯洪範等者指大士揮案處可為千古規範分明顯示不言之道乃是不吝弘慈悲心太甚正是當機覿面與人辨出一著子真理也噫者乃科家歎辭有縱奪之意似大士前來揮尺講經雖是不涉言詮當面顯理猶是今時門頭曲垂方便如唐宣宗問弘辨法師曰何為方便對曰隱實覆相權巧門戶被接中下之人曲施誘進謂之方便設為上根利智言之所謂正直捨方便但説無上道乃至祖師門中玄言密語正案傍提忘功絶謂亦是方便之迹帝乃然也美則甚美者乃科家先縱後奪之意似大士如此揮案直顯無言之道甚是美妙於理恰好爭奈升座揮案乃是起模畫樣未出建化之門而未了也故芙蓉楷上堂曰才升此座已涉塵勞更乃凝眸自彰瑕玷別傳一句勾賊破家不失本宗狐狸戀窟所以道真如凡聖皆是夢言佛及衆生並為剩語到這裡回光返照撒手承當未免寒蟬抱枯枝泣盡不回頭也若論最上頓宗等者乃科家顯示最上一乘圓頓宗旨直是不通凡聖古德云威音王未曉彌勒豈惺惺以金剛王寶劒者寶劒喻理中凡聖絲毫之情不容故云盡情掃蕩無餘以般若真心外了無片事可得也故紹悟語曰最初一步十方世界現全身最後一言一微塵中深鎖斷有時拈起如倚天長劒光耀乾坤有時放下似大冶紅爐飛過片雪乃至即此涅槃妙心金剛王寶劒敢問大衆作麼生得到這般田地如人上山各自努力也盡情掃蕩無餘者古頌金剛寶劒最威雄一喝能摧萬仞峰遍界乾坤皆失色須彌倒卓半空中一任渠明來暗來等者乃科家伸出掃蕩之義昔鎮州普化和尚於州中行化或城市或冢間振鈴一聲曰明頭來明頭打暗頭來暗頭打四方八面來旋風打虗空來連架打一日臨濟令僧捉住曰不恁麼來時如何師拓開云明日大悲院裏赴齋似此説話豈不是明暗相參通身顯露也普教他休去歇去等者此正明金剛王寶劒掃蕩無餘之義乃是忘功罷業一了百當以斯前來金剛寶劒譬最上頓宗掃蕩無餘喻不通凡聖所以科家普教行人凡聖之念一齊休去歇去所謂不慕諸聖不重己靈上無諸佛可成下無衆生可度直得一念即是萬年萬年即是一念可謂十世古今始終不離於當念無邊剎海自他不隔於毫端明斯一箇真心含褁十虗也雖然如是者結前之義既云休去歇去掃除凡聖且道此經末後佛説不取於相如如不動言句誰堪奉行乃是重審之意咄者科家要人於末後一句上直下承當向下伸答露也直得虗空悉消殞天龍八部遍流通此二句答上末後一句流通之義既是不取於相如如不動總是一箇真理更無虗空可得所以悉皆消殞楞嚴經云一人發真歸源十方虗空悉皆消殞也流通者有二種一理二事理者即末一句如如不動之理勝天王所問般若經云若能發明般若真理如來與天王授記而流通斯道須菩提岩中晏坐帝釋天雨花讚歎尊者問曰何故雨花讚歎帝云我聞尊者善説般若尊者曰吾於般若無説帝云尊者無説我亦無聞無説無聞乃真般若事者以此金剛般若經功德甚深讀者獲益所以天上人間龍宮海藏在在處處八部守護鬼神欽崇是故流通天上人間普遍微塵剎海也空生疊疊窮迷妄大覺重重説偈言末後了然超百億明如杲日耀乾坤初句明善現疊疊請問始從第二分中總問菩薩云何發阿耨多羅三藐三菩提心應云何住云何降伏其心乃至經末而有九重請問祇是深窮迷妄根源故云窮迷妄也次句明大覺世尊答須菩提而重重徵問展轉召告總有三十重問答然而説偈者共有七處即佛説若有人受持四句偈等之言自第八分中説四句偈第十一分中説四句偈第十二分中説四句偈第十三分中説四句偈第二十四分中説四句偈第二十六分中説四句偈第三十二分中説四句偈除十二分中四句偈此偈在處尊如佛塔除二十六分中四句偈以頌執著相好即成邪見其餘五處四句之偈正是校量持經功德倍勝之義故云大覺重重説偈也後二句言末後了然超百億者牒經中義明佛末後道箇不取於相如如不動若人如此受持讀誦為人演説其福則超過無量阿僧祇三千世界七寶布施功德故云超百億也後總結云此一卷金剛經世尊與須菩提如此問答單顯實相真空我今又以科文解釋分明顯示其理猶如杲日當天乾坤普照故云明如杲日耀乾坤也直截根源説與君了無些子涉情塵奈何蹉過西來意猶道休將境示人前二句明世尊末後所説之法只此不取於相如如不動可謂直截根源不曾牽枝引蔓囊藏被蓋分明與諸人説出併無絲毫涉於情塵也後二句引證佛與汝等直指甚是分明汝善不會蹉過如來妙意正如猶道休將境示人相似昔僧問趙州曰如何是祖師西來意州云庭前柏樹子僧曰和尚莫將境示人州云吾不將境示人僧復曰如何是西來意州云庭前柏樹子此僧不會却問廣教曰某甲問西來意趙州道庭前柏樹子他只將境示某甲教云我不辭與汝道汝還信得及麼僧曰爭敢不信教云汝試問我僧曰如何是西來意教云簷頭水滴聲歷其僧悟入遂述偈曰簷頭水滴分明歷歷打破乾坤當下心息更不疑也極樂家鄉甚妙哉無諸憂苦樂常諧因談果海圓音徹時禮金容歸去來前二句言西方極樂世界境妙無諸衆苦所以楊無為曰唯是淨更無諸苦蓮苞托質無生苦也寒暑不侵無老苦也身離分段無病苦也壽命無量無死苦也無父母妻子無愛別離苦也上善人聚無怨憎苦也華裓香食珍寶受用無求不得苦也無諸憂苦可謂真樂也後二句言西方人勝此土凡夫既生彼國時時見佛聞法即證無生遂得補處因談果海者即彌陀因中發四十八種願果上不捨因門而接引凡夫往生即得聞法瞻禮金容可謂圓修圓證之行人也金剛般若六度根源內外最牢堅三千大千萬古流傳此科金剛般若經後題以金剛般若之智為六度之根源乃至一切萬行皆因般若真智成立故五度如盲般若如導所以布施無般若惟得一世榮後世受餘殃持戒無般若暫生上欲界還墮泥犁中忍辱無般若報得端正形不證寂滅忍精進無般若徒興生滅功不趣真常果禪定無般若但行欲界禪不如金剛定萬善無般若空成有漏因不契無為果也內外牢堅者以此般若既為六度根源則內之六根外之六塵無非般若智用故云內外最堅也三千大千等者以斯金剛般若經非為此土流通而萬億四天下皆悉流通故云萬古流傳也雙林默語祖祖重宣開六悟入衆生大有緣雙林默語等者以此道唯可以心傳不立於文字故世尊拈華而妙心傳與迦葉謂之默契真心自迦葉已來祖祖相傳重宣此道至於一花五葉千花競秀潛通後進直接上根故有瞬目揚眉擎拳竪指或行棒喝竪拂拈捶或持叉張弓輥裘舞笏或拽石搬土打鼓吹毛或一默一言一呼一笑乃至種種方便皆是親切為人於動靜中顯示無言之道也開示悟入等者以宗教隱顯雖殊同一開示其理而行人各各悟入之處皆不異也溫陵曰開者破無明之封蔀示者指所迷之真體悟者豁然洞視入者深造自得也又曰開即道慧智示即道種智悟即一切智入即一切種智也衆生既悟此智豈非大有因緣也説破無生話決定往西方彌陀極樂國常聞般若香前二句科家意云我以此經科儀如斯開示講演分明可謂説破無生之話也若有行人信解受持讀誦演説見聞隨喜永除四相獨顯一真決定往生西方極樂世界也後二句言彌陀國中受用境界既見彌陀常聞般若微妙之法故般若是諸佛母出生自性彌陀所以生淨土者祇聞佛功德香不聞二乘之香入簷蔔林惟聞簷蔔香不聞餘香故優曇曰一句彌陀自主張更無一法可思量明明徑指歸家路優鉢華開遍界香觀之為言內心覺照其在般若心經則首云觀自在菩薩行深般若波羅蜜多時照見五蘊皆空在此經則終以如是觀如發菩提心者印證諸法空義學者勿以肉眼觀之而會之則為親參黃面矣凡諸聞者莫不頓然開悟無量歡喜信而受之奉而行之且道信受奉行箇甚麼此科經中應作如是觀之義故觀之為言者即訓釋之言也觀之一字訓為內心覺照之義此之覺照即今經末云應作如是觀即是圓融三觀也其在般若心經者其者指法之辭指此觀之一字即在般若心經甚詳所言心者玄奘大師云若歷事備陳言過二十萬頌若撮其樞要理盡一十四行心顯要妙所歸者六百卷之中心故云歸也蓋以彼心經例此金剛經亦六百卷之中心也則首云觀自在菩薩者即指能觀之行人觀者即觀照之智慧也自在者即無拘無滯謂之自在以菩薩運權實無礙之智照空色融通之境冥神心於真空所不能滯及耳目於聲色所不能礙故云自在菩薩也行深般若波羅蜜多時者明菩薩所觀之境所行之行也深即簡別義非二乘之淺行即菩薩甚深之般若能觀之觀智時者即菩薩超觀之時也照見五蘊皆空者此菩薩以深般若能觀之智照見五蘊所觀之境也色蘊者即五根六塵最粗受想行者此三蘊為心所識蘊為心王此之四蘊最極微細難斷難空今言五蘊皆空即法空也然大乘菩薩先觀法空而能依之我任運自空即人空也在此經等者明所修之觀智以此金剛經中之妙觀例彼心經中之覺照也如發菩提心者明菩薩所發之大心也此金剛經中發菩提心者即彼心經中觀自在菩薩乃至云依般若故得阿耨菩提是也印證諸法空義者明所空諸法也謂此二經皆是大般若經所攝之部分以斯二經校之既部分同則觀照亦同發大心亦同所空諸法亦同所以印證諸法皆同然法空義者宗鏡云一者三輪體空檀波羅蜜實相也二者罪性本空尸波羅蜜實相也三者三心安忍羼波羅蜜實相也四者勤修善法精波羅蜜實相也五者心不亂味禪波羅蜜實相也六者非境非智智波羅蜜實相也以擴而充之萬法無非實相真空故云印證諸法空義也學者勿以肉眼觀之等者乃科家誡行人不可以肉眼觀之凡意會之謂隔紙膜不能見外物隔皮膚不能見五臟既有此礙豈能照見諸法皆空也似前二經之中菩薩皆以般若智慧為眼亦名爍迦羅金剛堅固正眼照窮諸法無非真空學者若能如斯觀之則為親參黃面世尊以法空即是見佛也凡諸聞者莫不頓然開悟等者凡一切行人若以智眼觀諸法空則頓然明了自性便能信受奉行方是親見如來親聞法要親自流通天上人間利澤羣生也且道信受奉行箇甚麼者此是科家手眼徵問行人如前來要人信受奉行端的奉行個甚麼道理而下文伸答也觸目對揚真般若山河全露法王身此二句答上之辭若解信受奉行即是般若真心信之故觸目見色對揚般若所以青青翠竹總是真如黃花無非般若大地山河全露法王之身此明諸法依真而起法法全是真心可謂溪聲常瀉空王偈山色全彰古佛心五千來字妙難量八百餘家解謾詳珍重諸人休外覓回光直下自承當前二句明金剛經始末經題三十二分字數共計五千一百七十五字及昭明科目二百五十七字總該五千四百三十二字故云五千來字妙難量者以此金經深含妙理人難測量也八百餘家者當時譯經潤文雖有八百之人不曾詳細解明與人指出故云解謾詳也後二句指出妙難量之義所以珍重諸人須要消歸自己故休外覓要人回光返照見自本心直下承當不離動靜於一切見聞覺知處明了無疑是為直下承當也鬼神稽首聽經聲妙悟圓通萬法明從此諸人如會得這回更不問前程前二句以此經獨顯真空頓除色相故鬼神稽首聽之無不獲益悉得妙悟圓通萬法皆明也後二句科家指示行人若於此經直下會得般若真智勝過鬼神異類而得直成佛果故云這回不必問前程也人身得處最為難莫把浮生過等間須藉金剛三昧力直教打破死生關前二句歎人身難得如須彌山輥芥投針相似故最為難也既知人身難得今已得之須要生難遭想不可虗度光陰空延歲月也後二句科家指示行人須借金剛三昧定力斷除無始已來俱生無明一切煩惱方得出離生死古德云百年只在暫時間莫把光陰當等間努力修行成佛易今生錯過出頭難無常忽到教誰替有債元來用自還若要不經閻老案祇須參透祖師關三十二分分分全真言下好惺惺四流浪息六國安寧此科三十二分之文言此一部金剛經從正宗中第二分善現請問云何應住云何降伏其心佛答發菩提心者應如是住如是降伏其心第三分中住中降伏第四方中修中降伏從第五分至末唯一降伏而斷二十七疑以該安住修行蓋二十七種疑妄已空真空妙道於斯明矣故分分皆是真如妙理至於字字皆是真如十方法界色色皆真故云分分全真也科家恐人於斯錯過故指示云雖是分分全真須要行人言下惺悟句前知歸便得四流浪息六國安寧言四流者即欲流有流無明流見流也六國者迷時於六根境內各有一類心心所法心識於自境中取捨未休如國有賊不得安靜今則因經證理達妄全真生死之流於是則息六根之賊於是則滅故得心王安寧也朝看暮轉楔抽釘春雷震嚮推倒望州亭此一節明此經雖是分分皆真須要行人二六時中孜孜切切常在於此得義忘言朝看暮轉方得分明了諸法空人空自殞二執自絶二障亦忘二空真如於斯明矣故喻拔楔抽釘也春雷震嚮等者前云言下惺惺不昧即得四流浪息六國安寧此又喻春雷震嚮推倒州亭以古志書云十里一亭百里一跕今或七十里八十里亦為一跕也而行路之人一程望一程一跕望一跕而進之以此而比於修行人進道階級也所言推倒者欲使行人忘却階級不歷修證不涉途程歸家穩坐所謂眼中撥盡黃金屑觸處縱橫鳥道玄見色非干色聞聲不是聲色聲不礙處親到法王城前二句要令行人於聲色中返聞自性返見真理眼雖見色心非干色耳雖聽聲意不著聲古德云祇此見聞非見聞更無聲色可呈君箇中若了全無事體用何妨分不分後二句果能聲色不礙即得親到法王之城深入真如之理六根門頭縱橫自在所謂回光返照便歸來廓達靈光無向背般若無盡藏真言經納謨薄伽伐帝鉢剌若至三蜜栗知佛社曳娑訶佛言如是真言是諸佛母能誦持者一切罪滅常見諸佛得宿命智所聞正法總持不忘疾證無上正等菩提今同善衆共閲最上乘經慶幸今辰佛事時當滿散普集良因莊嚴會首之福田成就無窮之善果此事且止試問諸人這一場公案作麼生施行還會得麼拈起則佛不破展開則法界難藏若能直下承當管取本來具足雖然如是猶涉途程且道即今兩手分付又作麼生首一節乃科主撫安在會衆善人等同臨眼見耳聞共閲金經般若乃最上大乘教如來為發大乘者説也次節慶幸今辰佛事等者科家意云此金剛經千生罕遇萬劫難逢今建道場同共披閲科判講演豈非慶幸今辰佛事時當滿散等者乃是科判此經之時正當圓滿將散所以普集良因普令見聞隨喜受持讀誦講演開示俱獲良因無盡功德也莊嚴會首等者以前來科判講演無盡功德先當回向會首之福田言會首者如來説法三百餘會皆有會首華嚴七處九會各有會首今經以善現為會首而以般若轉教菩薩各各授記作佛而善現蒙佛授記號名相如來自他皆成菩提利莫大焉故云成就無窮之善果今之會首因果亦然此事且止等者科家意云上來科判回向等事且止向下自彰手眼審問大衆這二場公案作麼生施行試問此理如何施設還會得麼要人急須著眼下文發明此理拈起則佛不破者以此理沒蹤迹斷消息三光猶未照五眼尚難窺展開則法界難藏者以此理逼塞乾坤充滿法界所謂法法不隱藏古今常顯露山河及大地全露法王身若能直下承當等者科家誡勉行人我今拈此公案當面直指汝等諸人若能直下承當此理管取本來具足人人本有個個不無在聖不增在凡不減不從千聖借豈向萬機求是汝本有之道也雖然如是等者乃科家拈情吾今拈提公案猶涉途程所以洞山守初曰若論此事放行則曹溪路上月白風清把住則少室峰前雲收霧倦如斯話會已涉言詮六祖云祇此不立兩字早是文墨道個單傳直指已落曲垂經云但凡言説皆屬方便且道即今兩手分付等者即今兩手分付恐抄録者誤之應是不涉途程一句又作麼生此是科家徵問向下伸答是也言言見諦言非有句句超宗句本無此二句答上不涉途程之義此明道本無言借言顯道行人若能言言見諦則不見有言而唯見真理可謂得義忘言得魚忘筌也下句理借文句發明行人若能句句超宗於理無住不見有句無句而唯見中和之道也川老頌曰有相有求皆是妄無形無見墮偏枯堂堂密密何曾間一道寒光爍太虗超字恐録者而訛當作朝字智者再詳金剛本體湛然虗把斷牢關一物無若要山僧通線路諸人收取護身符上二句頌金剛經後題言此經中所詮之理乃是真如本體清淨妙性湛然空虗也既是湛然空虗於真如體上了無一物所以把斷牢關不通凡聖故般若如太阿劍觸之則喪身失命似大火聚燎之則燒破面門十方無壁落四面亦無門初自五蘊終至無上菩提中間無有一法不空故云一物無也下二句科家意云我如斯頌若有人問把斷牢關一物無處請師通一線路我向他道若要山僧通達一線之路汝等諸人當收護身之符即指金剛經中所詮真理若能會得乃是脫生死法出世之良方也閻王本是平等君不愛民財祇取人陰司若用錢打當貧者先亡富者存此四句明地府十王乃是菩薩化現所以至公無私外現威惡之相內懷慈愍之心既是菩薩豈愛錢財打當故稱平等君也觀佛三昧經云化閻羅大王告勑獄中癡人昔造五逆十惡命終生此阿鼻汝今應當發菩提心歸投三寶將諸鬼等稱南無佛承佛恩力尋即命終生四天中生彼天已發菩提心故知閻羅王等皆大菩薩所以教化地獄既是菩薩豈愛財耶夫論作罪之人命終之後牛頭獄卒録其精神在閻羅王前辨核是非當爾之時一切冤對皆來證據不可以錢財寶貨囑託求脫杳杳冥冥恩赦無期於是閻羅王切齒訶責將付地獄歷無窮劫求出莫由此事不遠不關他人正是我身自作自受父子雖親一旦對至無代受者可謂明明公道終難隱暗暗私情到了知古德云盡説修行不在遲今生還有後生期三途一報五千劫出明頭來是幾時西方極樂景幽深寶網光騰百萬尋菩薩為鄰談妙旨聲聞作伴演圓音前二句言西方景致幽深佛言阿彌陀佛剎中復有無量寶網彌覆其剎皆以金銀珍珠百千雜寶奇妙莊嚴周匝四面垂以寶鈴光色晃耀有百萬尋盡極嚴麗亦有自然德風徐動不寒不暑柔軟溫和不速不遲吹諸寶樹及諸寶鈴演發無量微妙法音流布萬種清雅德香其有聞者塵勞垢習自然不生風觸其身皆得快樂也後二句謂西方世界諸大菩薩聲聞之衆既皆浴已或在地上講經者誦經者説經者授經者或虗空中講經者誦經者説經者授經者有得須陀洹者乃至阿羅漢者得不退地菩薩莫不欣然適意而悅得與諸上善人俱會一處與菩薩為鄰聲聞作伴同談妙旨共演圓音良緣衆等聊聽些箇般若大摩訶行住坐臥不離這箇此科大摩訶般若經題言良者善也緣者指講演聽受之緣也衆者即在會四衆之行人也聊聽些箇者科家誡勉衆等諦實而聽此大摩訶般若即真空大智慧目性分中本有真經一向塵埋迷而不知吾今勸汝諦實聽信也行住坐臥等者此大般若真如妙性只在諸人行住坐臥四威儀中動靜不離也大人云一切心中有法王行住坐臥露堂堂聲求色見空勞攘笑倒東村孟八郎人人本具非我非他諸人薦取今生休蹉過此一節呈前般若大智既是坐臥不離豈非人人本具自性圓明故非我非他也古德云無相家風本現成人人心地發光明豁開自己神通藏受用無窮出世人諸人薦取者科家要人不可蹉過此理既是當人本具應須直下薦取故云今生休蹉過可謂此身不向今生度更待何時度此身摩訶空最大最大是摩訶般若波羅蜜撒手見彌陀此節明摩訶般若心經之題上二句明摩訶最大以此摩訶真空最大者言心真如門中示摩訶衍體即是體大乃諸佛衆生之心也即此最大是摩訶者牒上最大之義言心生滅門中示摩訶衍相於自體相用中體大也然於一心法中兩言其體大者蓋以般若智之大彌綸法界細入微塵縱脫凡證聖而妙體凝常雖入死出生而真心不變大包無外細入無內故云空最大也下二句明般若最大功能以此大般若是能空之大智世出世間是所空之相法故色相無邊般若無際此中祇言般若而不云相者何耶舉能空顯所空也即生滅門中三大之相大也斯般若大智若有行人於四威儀中頓在目前即得超出生死愛河直到菩提彼岸撒手見自性彌陀舉步遊寂光淨土此是生滅門中三大之用大也今言彌陀者即本覺清淨真如乃自性佛也優曇頌曰高超淨土勝娑婆一步歸來快活多常寂光中都坐斷塵塵剎剎見彌陀摩訶般若波羅蜜多心經此經大般若經分所攝故玄奘嘗云若歷事備陳言過二十萬頌若撮其樞要理盡一十四行心顯要妙所歸者乃六百卷之中心故云心經也夫欲了最上大乘須具金剛正眼看釋迦老與須菩提顯大機施大用聚須彌山王等七寶碎大千沙界若微塵盡僧祇劫布施將來獨最上乘無法可得直得人天膽喪魔外心寒俱能捨命承當依舊白雲萬里此是科家開示行人夫欲了最上大乘金剛經者此經乃大乘終實之教即般若大慧也須具金剛堅固爍迦羅之正眼照窮諸法體空盡其底蘊無不明了方才了此大乘之道也看釋迦老與須菩提等者明善現有九重請問而如來以三十重問答以斷二十七疑皆是顯大機大用也聚須彌山王等七寶者牒前二十四分中若三千大千世界所有諸須彌山王如是等七寶聚有人持用布施不如此經四句偈為人演説其福勝彼也碎大千沙界若微塵者牒前三十分中若善男子善女人以三千大千世界碎為微塵是微塵衆寧為多否也盡僧祇劫布施將來者牒前三十二分中若有人以滿無量阿僧祇世界七寶持用布施不如為人演説四句之功也獨最上乘無法可得者牒前如來與善現問答顯出大機大用以世界七寶布施祇得有為之福未離生死獨最上乘無法可得者牒前發菩提心菩薩為人演説四句之偈不取於相如如不動即是無法可得心無所染故勝前功德無量也直得人天膽喪等者此明無法可得之理勝前布施之功乃是最上大乘之道非人天小機天魔外道所及故云膽喪心寒也俱能捨命承當者科家教人與最上一乘捨命承當也昔鄧隱峰推車次馬祖搌兩足在路上坐峰云請祖收足祖曰已搌不縮峰云已進不退峰乃推車輾損祖腳祖歸法堂手執斧曰適來輾損老僧腳底僧出來峰便出來於祖前引頸受刃祖擲斧子如此捨命承當真大丈夫也依舊白雲萬里者乃科家先縱後奪若能於此大乘之道捨命承當還有個承當底心在所以科主道個白雲萬里以此理但有執著遠之遠矣古人云百丈有三訣喫茶珍重歇直下便承當敢保君未徹所以解此經者八百餘家頌此經者不滿屈指蓋古人錯答一字尚墮野狐謬誦此經應入地獄宗鏡自惟不入地獄何由拯濟羣生既能為法忘軀豈避彌天逆罪橫按寶劍重説偈言摧涅槃心滅正法眼掃除知見截斷命根堪報不報之恩用酬難酬之德所以者呈前起後之辭科家意云於最上乘直下承當尚是於理轉遠況今解此經者譯人有八百餘家皆是循行數墨逐句尋言豈非遠乎頌此經者不滿屈指者言此般若經當時翻譯場中有八百人解會其義者雖多若論著書成頌者少故不滿屈指者也以滿其指者有五不滿者三人而已即傅大士川老科主是也蓋古人錯答一字等者乃科家設問難之辭古人者指前百丈錯答學人一字墮野狐身五百生蓋以道眼未明證性未圓見處偏枯依文解義而謬執邪解僻説聖意故於問答之時不免有錯也謬頌此經等者有等之人自恃天性明敏善通文義採取佛祖宗教語言加以文彩效顰而作緝成部卷安置名題流傳於世若無道德戒行發明見諦之處皆成謬説壞亂正法謂之誑談般若瞎衆生眼入阿鼻獄吞噉鐵丸無有出期也我今科判此經只恐凡情淺識以思惟心測度如來不思議智有所差訛招罪於己故引錯答謬頌而問焉宗鏡自惟不入地獄等者此是科主自答難辭我若不入地獄何由拯濟羣生涅槃經云佛告迦葉菩薩復入三途拔其苦惱一切趣中脫未脫者度未度者也既能為法忌軀等者科家意云我今既弘大法必然不顧形軀豈避彌天五逆之罪也昔提婆達多推山壓佛出佛身血拳打華色比丘尼眼出破和合僧三逆重罪入無間獄佛告阿難言提婆與汝性均天倫汝應問安阿難承命向阿鼻獄問訊云汝安樂否答曰我雖在地獄如三禪天樂佛又令問還出地獄否答曰我待世尊來此獄中我便出獄阿難云佛是三界大師豈有入地獄分提曰佛既無入地獄分我豈有出地獄時蓋謂提婆大權示現為化衆生也橫按寶劒重説偈言者科家權衡在手顯大機大用以寶劒喻般若大智能空聖解執情重為説偈此下文即偈也摧涅槃心滅正法眼者科家以金剛寶劒將如來所傳涅槃妙心正法眼藏盡情摧滅又言如來知見信解亦併掃除祇得截斷命根不存凡聖六祖謂智常偈曰不見一法存無見大似浮雲遮日面不知一法守空知還如太虗生閃電此之知見瞥然興錯認何曾解方便汝當一念忽知非自己靈光常顯現堪報不報之恩等者科家意謂我以無切用智掃除聖解之情堪報我佛未報之恩用酬佛祖難酬之德所以説法度生者滿佛之願報佛之恩也四十九年成露布五千餘卷盡言詮妙明一句威音外折角泥牛雪裏眠前二句明佛出世説法四十九年談經三百餘會而有三乘五教皆是隨機所説故成露布如天子不封之書也共有五千餘卷其中盡是言詮以文字是能詮之教體真如是所詮之理性故云言詮也後二句顯妙明真心一句貝葉收不盡超過威音之外以此心正如折角泥牛雪裏而眠此明尊貴人全居那畔正位一色也此四句頌乃是僧問百岩如何是教岩曰貝葉收不盡所以丹霞頌此四句也阿彌陀佛色光輝白毫宛轉五須彌頂上旋螺青絲髮三十二種相巍巍此四句頌佛相好光明欲令行人起觀思惟若能一一觀想分明即得上品上生親得見佛觀經云無量壽佛身如百千萬億夜魔天金色光明高六十萬億那由他由旬白毫右旋如五須彌山高然佛青蓮目如四大海毛孔光如一須彌山圓光如百億三千大千世界大八萬四千相好具足勝過一切諸佛相好故云種相巍巍也銷唱金經滿散緣回施今辰福無邊合會衆等齊修證見聞熏種已周圓前二句科家意云我今銷釋演唱科判此一卷金剛經圓滿將散功德因緣祇以四句偈回施今辰衆等勝過河沙七寶布施百千萬億倍功德何況全此一經功德豈可窮盡故云福無邊也後二句科家普勸合會衆等修進意云若有行人欲要修證者此一經中雖有三十二分二十七疑而其中唯住修降伏是修證之緊要也果能或念佛或參禪祇是先要降伏妄心而後修無住之行安住大乘菩提心故以斯大乘金剛種子願今見者聞者熏此種子納在八識田中已為成佛之種故云周圓也道場圓滿不可思議人人用心機銷唱金經佛聖遍知上祝皇王聖壽萬歲法界有情同生極樂國科家以此經三十二分次第宣揚科判演唱已周故云圓滿斯金剛般若經稱性之談故云不可思議亦勸進修人人當可於不思議法用心也機者弩牙也即心之妙用故云心機也銷唱金經佛聖遍知者科家望佛證明也意云我今銷釋演唱此金剛經望佛聖遍知冥加守護蓋以此經一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出乃是諸佛守護之經故銷唱時佛聖遍知也上祝皇王聖壽萬歲者此經有無盡之功德祝延聖壽無疆畿永固可謂四海謳歌共享殷湯之世八方鼓腹同歡堯舜之年法界有情等者以此經無盡功德願十法界中有情同生極樂淨土也南無一乘宗無量義真空妙有金剛般若經南無者歸敬之辭一乘宗者前云為發最上乘者説故知此經是一乘所攝科家剖判將終即歸依一乘大道也此一乘者含無量妙義恆沙性德上文云一切諸佛及諸佛阿耨多羅三藐三菩提法皆從此經出故云無量義也真空妙有者無量義經云顯示一事一理一動一靜之中莫不具無量義五蘊即涅槃妙有即真空也涅槃即五蘊真空即妙有也四大六根六塵乃至無上菩提例之可知證一乘道具無量義二諦融通皆是般若智力也故知此金剛經能詮之文理皆是真空妙有也伏願經聲琅琅上徹穹蒼梵語玲玲下通幽府伏願者隱伏也即心中所含之事願即希慕仰望之辭經聲琅琅者荀子曰崑崙山有琅玕樹類琉璃而五色擊之聲美今願此誦經之聲上徹於穹蒼以春為蒼天其色蒼蒼然即天之色相也梵語玲玲者乃梵天之語即經聲也玲玲者大玄經云玲瓏也擊之聲美願此誦經之聲下通幽府其中多有罪苦衆生承斯銷釋良緣普願經聲至處同息苦離苦得樂超登彼岸也下文伸出息苦之所以也一願刀山落刃二願劒樹鋒摧三願爐炭收焰四願江河浪息此四願願地獄道中四苦永息也前二願落刃鋒摧者慧燈云刃力刀山誰人鍛煉華含德水非彼開敷善因終值善緣惡行難逃惡境辨果知因見未識本施般若脫刀山之苦寫金經痊劒樹之瘡也後二句收焰浪息者古德云陰陽有至水火無情行善則焰消爐冷修德則海宴河清由嗔恚心故遭爐炭之焚燒因欺瞞意故陷波濤之沒溺憑佛力救鑊湯之沸煮仗經功離波浪之漂沉也針喉餓鬼永絶飢虗鱗甲羽毛莫相食噉惡星變怪掃出天門異獸靈魑潛藏地穴針喉餓鬼者此願鬼道中有九種餓鬼霑恩離苦也此明慳貪者千生常受飢虗障施者萬切恆遭火焰慧燈論曰蹈雲霞而飲甘露非他所授臥煙𦦨而噉膿血皆自所招罪福升沉纖毫不忒慳吝珍鎈易粗食以供僧報常噉糞障遮施利墮針喉蒙佛力果得生天也鱗甲羽毛者此願傍生道中霑恩離互相食噉之苦也所以佛印曰鱗甲羽毛諸品類衆生與佛心無二祇為當初錯用心致使今生頭角異楞嚴經云人死為羊羊死為人傳曰狗死為人人死為狗昔趙文若一念佛名使所殺生而盡得超升令五釘釘體因思痛苦當懷恐懼也惡星變怪者此願天上息一切怪異之禎也楞嚴經云此娑婆世界有八萬四千變怪惡星作種種形出現世時能生衆生種種災疫承佛威力仗經功能咎徵殄滅也異獸靈魑者此願人間妖怪永息也昔唐蜀白衛嶺多虎豹光化有韋秀才選調巴南宰常念金剛經赴任至泥溪遇一女人挈二子同秀才登山行人呌譟見女子乃赤色大蟲二小虎隨後逡巡與韋分路而去韋終不覺蓋持經之力也又有隋僧法崇篤志經論尤精法華至湘州鹿山山精化為夫人詣寺請戒因捨所居山為寺潛處別山而去此亦持經之力故感異獸靈魑潛藏地穴可謂念金剛感赤虎而衛形引路誦妙法使山精而捨地移居囚徒禁繫願降天恩疾病纏身早逢良藥盲者聾者願見願聞跛者啞者能行能語懷孕婦人子母團圓證客遠行早還家國貧窮下賤惡業衆生誤殺故傷一切冤尤並皆銷釋金剛威力洗滌身心般若威光照臨寶座舉足下足皆是佛地此是科家普願人間種種苦難仗此金剛般若威光利益功德悉皆消滅初囚徒者昔唐時僧神晏被人告停劫賊繫縛獄中惟精誠誦經月餘忽於夜間滿獄有金光枷鎖自脫遂蒙恩宥故云願降天恩也二疾病者昔唐時強伯達世傳惡疾二百年矣伯達才冠便患風癩父母以為不可療送入山中其父褁糧置伯達於岩下而去忽有僧過見傷謂曰汝念金剛經內四句偈或脫此苦伯達受教念之數日其瘡稍乾前僧復至授青草一握曰可以洗瘡以煎湯洗浴身體潔然皆無瘡故云早逢良藥也可謂放光照獄蒙皇恩以免刑誦偈除災遇善古而施藥三盲者昔唐時江陵有力昌子名僧護因父誤傷聽經神蟒冤訴陰府托夢於妻寫經超度神蟒無錢寫經賣子與蜀客母得錢寫經回向留一卷自誦幾三十年願求子母重見母因憶子雙目失明隨處乞食後僧護回至江陵修齋追薦父母母因乞食子母相見遂焚香云果有孝心舐目雙明以水漱口以舌舐目母眼雙明平復如故故云盲者得見也四啞者昔有一人室內誦金剛經隔壁有一惡人憎惡毀謗後感音啞之報其人追悔曰因我謗經感斯惡報自今懺過發善讚經夜感須菩提告曰汝因毀謗般若招報如是令其出舌以刀割之此人即能言語次後出家入山修道故云啞者能語也可謂堅志無疲俾盲目而復得清明至誠不倦使失音而還能語話五子母圍圓者昔宋時有清信女王氏身懷六甲二十八箇月不能分娩恐母子難全命僧印施金剛經千卷飯僧千員至夜夢一金剛以杵指腹疼痛覺已忽生二男王氏既得子母雙全不勝欣慶至年六十一歲無疾而終故云子母團圓可謂金剛神力令子母以團圓般若功勛使兒娘而得見六征夫還家者昔唐時有褚西倫因亂被羌充軍行營一鎮河北經涉九年家中莫知消息其妻為夫出錢寫金剛經每寫一字合掌念一聲佛其夜夫在陳交戰忽遇風雨不知所適惟見一道大光猶如火引尋光信步備涉平川即得至家夫妻相見遂開經函視經猶濕故云早還家國也七唐時有一富商常誦金剛經每以經卷自隨客販外國宿於海島衆商取財害之以繩而繫盛一大籠加之巨石並經卷沉於海衆商平明發船而去其海島乃有僧院其夕寺僧聞念金剛經在於海底僧乃異之命善泅者入水訪之見一老人在籠中讀經仍撁挽而上僧問其故老人云被殺沉於水不知是籠中忽覺身處宮殿常有人送食安樂自在蓋誦金剛經之靈驗遂投寺出家可謂征夫九載得經光而引路還家商客一誠感僧力而挽籠出水貧窮下賤等者即前能淨業障分中若為人輕賤是人先世罪業應墮惡道以今世人輕故先世罪業即為消滅亦得阿耨菩提也故殺誤傷者可謂承般若之殊勳復還魂而重增壽算又能仗金剛之妙力解冤結而遂得重生並皆消釋者總結上文之義也金剛威力洗滌身心般若威光照臨寶座此四句明金剛般若威光加被在會之衆身心清淨無諸病苦災禍不生又祈道場法會寶座勿使外魔𢬶擾也舉足下足皆是佛地者以金剛般若之力令諸在會之衆舉足下足皆是佛地之受用所以法華經云佛子住此地則是佛受用常在於其中經行及坐臥更願七祖先亡離苦生天地獄罪苦悉皆解脫乃科家以斯金剛般若之力普願各人七祖先亡俱霑利益也初一節謂離苦生天者即宋時任觀察寫能詮之大教免錢棒之臨身夢所生之父母生忉利之天宮也次一節罪苦解脫者即宋時明州王氏閻羅賜座誦金經地獄心酸一時停勑命還魂精勤念佛臨終淨土得親登也以此不盡功德上報四恩下資三有法界有情齊登正覺科家意云我今以此科判講演金剛般若不盡功德上報天地蓋載之恩日月照臨之恩皇王水土之恩父母生育之恩故云四恩也復以般若不盡功德下資三有而欲有色有無色有中即三界因果未忘故屬於有也法界有情等者乃總回向科主欲令十法界有情承斯般若威光齊登正覺者也川老頌云如飢得食渴得漿病得瘥熱得涼貧人得寶嬰兒見娘飄舟到岸孤客還鄉旱逢甘澤國有忠良四夷拱手八表來降頭頭總是物物全彰古今凡聖地獄天堂東西南北不用思量剎塵沙界諸羣品盡入金剛大道場此是冶父川老之頌總二十句乃明金剛般若大智世出世法無不周遍此頌乃是慶幸讚美之辭我今得遇般若金經如飢餐香積之美飯似渴飲甘露之瓊漿病逢善見藥王頓然痊瘥熱遇月愛之光忽爾清涼貧人獲如意之神珠嬰兒見般若之親娘慈舟載四生而直到彼岸導師接九品而徑往蓮亦如久旱忽逢甘雨他鄉偶遇故知國有忠良萬朝賀四夷者乃邊外之夷人也以中國衣冠正統代代相承謂之中國此中國四望極邊謂之四夷上國正統四夷來貢故云拱手八表即八方邊國而臨時歲皆進表章於中國謂之來降可謂堯舜有德四海來賓湯武施仁八方拱手此喻衆生得此般若之法則四弘八正無不顯揚也復以頭頭總是真如智物物全彰古佛心古今凡聖皆同體地獄天堂總一真東西南北長安道不用思量見本人科家仍發願云願此一佛剎微塵恆河數羣品有情俱明般若金剛智體故云同證金剛大道場也三塗永息常時苦六趣休隨汩沒因恆沙含識悟真如一切有情登彼岸此四句科主普同回向我今科判金剛般若功勳願地獄中刀塗火塗血塗此三塗霑恩而永息其苦也復願天趣人趣阿修羅趣地獄趣餓鬼趣畜生趣最初趣往是因次趣已到為果一切衆生而入六趣受種種身今願六趣休隨汩沒也後二句回向願此恆沙含識有情悉悟真如妙果同入究竟實際故云登彼岸也乃至虗空世界盡衆生及業煩惱盡如是四法廣無邊願今回向亦如是此是科家廣大回向亦如普賢之行乃以非喻而喻廣大回向無盡之義以虗空界盡衆生界盡衆生業盡衆生煩惱盡我此回向無有窮盡念念相續無有間斷身語意業無有疲厭如是四法若無窮盡願今道場之中所有功德回向亦無有窮盡也銷釋金剛科儀會要注解後跋於戲我教金剛科儀者即宗鏡禪師所作也以般若乃大乘教為菩薩説顯一乘之奧旨為萬法之淵源論不空之真空見無相之實相了明虗妄即夢玄泡影而可知推其根原於我人衆壽而可見誠佛祖傳心之祕要實菩薩轉教之真宗也今宗鏡者宋時人也智識雄邁行解圓融字該三藏之文理證一真之妙依金剛經三十二分之全文科判一經之大義提綱要旨明般若之根原偈頌宣揚示真如之妙理如標月指見月忘標了知心月孤圓方信光含萬像俾真言而洞徹令祕義以昭融智愚皆獲菩提垢淨通為般若自宋逮今見聞受持家諭戶曉也豫因戊申而抵南海遊禮普陀駐錫吳門而方外友敬愚許公所蓄先師科儀注頌示豫鏤板流行豫謂金臺有達桂二師注解已刻辭義玄奧實起後學膏肓之疾其奈文義廣略未得折中平昔以此為嘆公欲不忘先師之意豈可搶卒為之須請具眼者校正重集方為盡善即命淡齋張公齎幣之京同豫禮請少室山宗主大方連公之重集及徵賓山吳公統録而完畢矣擬欲鋟梓用傳永久欲符先師付囑之願常寂光中令生歡喜也倘諸方學道之士忽於科注之文盡心披玩情妄消除發生智慧光明照見本有面目以斯殊因祈舜日與佛日同輝冀金輪共法輪並轉也時在皇明嘉靖歲次辛亥中秋望日勑賜智化寺後學沙門螢菴道燈頓首謹識跋後卍云卷十銷釋金剛科儀會要原文會入于注解中故不再録

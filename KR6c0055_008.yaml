body:
  text: 姚秦三藏法師鳩摩羅什譯隆興府百福院宗鏡禪師述曹洞正宗嗣祖沙門覺連重集不受不貪知足常足無罪亦無福隨緣過日切忌分訴昭明太子判此一段經文為不受不貪分第二十八蓋佛說以菩薩不受福德乃三界有漏果報則不應受故云不受又以所作福德不應貪著乃是出世無漏果報雖受而不貪著故云不貪故立此名為不受不貪也知足常足者既不受有漏福德即是知足既不貪著無漏果報即是常足佛告獅子吼言少欲者不求不取知足者得少之時心不悔恨故云知足常足也無罪亦無福者明此菩薩知一切法無我得成於忍所作福德不應貪著即無福德可受既是無福可受即無罪可受以了人法二執罪福性空也隨緣過日者釋呈上文知足常足以此菩薩不受福德又不貪著只是隨緣過日龍潭信曰任性逍遙隨緣放曠但盡凡情別無聖解所以道飲隨緣過便休知身倘寄若浮漚自從識破娘生面水牯元來却是牛切忌分訴者亦是釋呈無罪亦無福而此菩薩既不貪著於罪福之中無有分別取捨之心則所修功德即成無漏清淨果報故云切忌分訴也千家一鉢衲子活路雖無一物與衆生增福千家一鉢者釋呈上文隨緣過日之衲僧家除三衣一鉢之外分寸不蓄著糞掃衣餐腐爛食不立烟爨依法求乞可謂一鉢千家飯孤身萬里遊即衲子之活路也故佛成道至於涅槃皆依樹下三衣一鉢隨緣乞食古德云有箇安樂法傳從諸聖賢但能依佛訓何用置莊田饑則托鉢乞困來伸腳眠絲毫念不起受用福無邊雖無一物者美上隨緣過日之衲僧雖是身貧無有一物能與有情衆生而為福田所以淨名曰施者無一物可施受者無一物可受而為福田謂此真空妙道施受與物皆不可得溫陵曰普門之中本無施受所謂三輪體空也不覺塵緣起貪愛轉見深若得回光照當生即不生前二句顯示無明最初生起之相此屬生門也因無明熟習晦昧故名不覺也塵即所緣之六塵緣即能緣之六根以第六意識能緣三世獨影境故起能緣之識塵即所緣之父母為現量境於六根發起六識了別成種無明為根後起染著便要貪取因貪生愛潤業受生故於貪愛為生死根本以此相續無有窮盡故云貪愛轉見深也後二句若得回光照者此名不受不貪即還滅門也顯此無明非實有體如夢中人夢時非無及至於醒了無所得但能不逐六塵外境其餘十一支悉皆空寂而回光返照本來面目無缺無餘故於當生即是不生也所以般若經最勝天王白佛言菩薩於無生法而見有生佛言諸法無滅是故無生若行深般若實知無明生十一支法若斷無明十一支皆盡如人身若斷命則隨滅邪見外道為求解脫斷欲斷死不知斷生也生即無明妄念若法無生即無有滅譬如有人塊擲獅子獅逐人而塊自滅菩薩亦爾但斷其生而死自滅若塊擲犬犬惟逐塊不知逐人塊終不息外道亦爾不知斷生終不離死以菩薩深知諸法生滅故無生死也不受不貪分第二十八經菩提若菩薩以滿恆河沙至是故說不受福德注曰此分名為不受不貪也因前分中菩薩行施雖了福德性空尚有所受之義故佛告云若菩薩以滿恆河沙等世界七寶持用布施此述前分中菩薩即第八分善現云菩薩了福德性空如來說福德多至第十九分善現亦云以福德無故如來說福德多此二布施是菩薩功德蓋了有為布施性空故也佛又云若復有人知一切法無我得成於忍等者顯此中菩薩以有漏果報則不應受無漏果報雖受而不取著又知一切法空亦無我執故獲無生法忍所以勝前菩薩也反顯菩薩心有所著所感之福則成有漏心若離著即成無漏故云若復有人知一切法無我得成於忍以法中無我人二執俱空故獲無生法忍所以勝前菩薩所得功德也佛復再告須菩提言何故此中菩薩勝前菩薩以諸菩薩不受福德故不受有漏福報所以勝前菩薩也於是須菩提復白佛言世尊云何菩薩不受福德以須菩提又疑云菩薩既不受福報云何能獲無生法忍也佛答須菩提言菩薩所作福德不應貪著是故說不受福德意云不受福德者以有漏果報則不應受無漏果報雖受而不取著故得法忍故云菩薩所作福德不應貪著也天台智者頌曰布施有為相三生却被吞七寶多行慧那知捨六根但離諸有欲旋棄愛情恩若得無貪相應到法王門有求有苦八風五欲交煎無著無貪三明六通自在便恁麼去水邊林下月冷風清不恁麼去橋斷路窮別通消息還委悉麼有求有苦者牒經中以恆河沙七寶持用布施惟求福報雖獲福報而報盡還入三途故有苦也而現世被八風五欲交煎亦是苦也八風者即利衰毀譽稱譏苦樂也五欲者即財色名食睡謂之五愛欲也因八風五欲交煎逼迫溺愛不明泛濫營求也十誦律云盜心有九一者乞憐狀取二者現威儀取三者稱善知識取四者以法伏人取五者設巧計取六者以錢出息取七者軟語取八者不與強取九者與而復取皆犯盜心必入三途豈非苦也無著無貪者牒經中若復有人知一切法無我得成於忍雖作無漏果報亦不貪著故得法忍即不著相乃得三明六通不被生死所繫得大自在也佛告獅子吼言著能相生癡癡故能生愛愛故繫縛繫縛故受生生故有死死故無常也不著相者則不生癡不生癡故則無有愛無有愛故則無繫縛無繫縛故則不受生不受生故則無有死無有死故則名涅槃真常也如是則豈非三明六通自在耶三明者一天眼智明三乘諸佛於天勝妙得彼天眼也二宿命智明佛於三世境界無有不知不同二乘也三漏盡智明證見道時遠離四漏不同二乘所證也六通者一神境通震動十方變一為多變多為一等此即身如意通也二天耳通過人天耳如實能聞種種音聲也三他心通能知十方諸有情類心心所法也四宿命通能知十方有情心日年處名姓死生自他等事也五天眼通能見十方有情非情色係死生善惡等報也六漏盡通能知十方有情自他漏盡不盡等也故云三明六通自在也便恁麼去者呈上之義於無著無貪處便恁麼去則向水邊林下優游自在凡聖情忘不可住著此是無作無為境界可謂觀月色以逍遙聽泉聲而自在所以佛慈云參禪之法別無奇特祇要命根斷絶疑情頓脫屏却諸緣痛著精彩七穿八穴百了千當向水邊林下長養聖胎然後出世利生猶未出建化玄門之事也不恁麼去者此是科家手眼別行一路於無著無貪處更進一步故云不恁麼去不守無為境界謂之向上一路千聖不遊所以橋斷路窮不容履踐也橋者乃江河渡人之方便也路者乃入王城之徑路也以喻教中進道之方有大小乘從初發心至成正覺始以五品觀行三種資糧四加行各有通途津濟之橋梁路即五十五位真菩提路也今科家意謂不恁麼去者以此理本來現成不因修得故不用此資糧之行不行此菩提之路所以橋斷路窮也別通消息者此理不從千聖借豈向萬機求在聖不增在凡不減祇要行人於行住坐臥出不隨應入不居空外不尋枝內不住定撤開金鎖打破玄關也還委悉麼者乃科家徵問之義我前來如此說話你還知麼下文伸答是也老僧笑指猿啼處更有靈踪在上方此二句答上橋斷路窮別通消息之義也言此理既是本來現成不假修證所以橋斷路窮超出方便別有一段奇特處今科家要人向人境交參猿啼之處領會但能於聞聲見色當人不昧返聞自性返見真理即聲色上顯露真心故云更有靈踪在上方所以永明曰孤猿呌落中秋月野客吟殘半夜燈此境此時誰會得白雲深處坐禪僧數行梵字雲中鴈一曲無生澗底琴德勝河沙渾不用清風明月是知音前二句是科家顯露無字真經不落紙墨故云數行梵字如雲中鴻鴈次序排空無有造作以喻大乘圓融境界雲騰鳥飛塵說剎說無不宣演此經可謂風柯月渚盡演真如烟靄雲林咸宣妙法又以一曲無生如澗水之聲皆為琴韻水流風動悉演摩訶白雲為蓋流泉作琴也後二句科家意謂此金剛般若若有受持讀誦為人解說者只以四句功德勝過恆河沙數寶施之功德若以無字真經無生之曲雲鳥飛騰水流風動情與無情皆悉共演所以受持功德雖勝於此法界理中渾然不用也唯有清風明月始是知音之者於無情說法無生琴韻方堪聽受知音賞鑒也春來秋去幾時休堪嘆衆生又白頭東廓郊中多古墓北邙山下有骷髏前二句嘆光陰似箭日月如梭春去秋來催人易老故云堪嘆衆生又白頭慈明禪師云昨日作嬰孩今朝年已老浮生夢幻身人命久難保天堂并地獄皆由心所造南山北嶺松北嶺南山草一雨潤無邊根苗壯枯稿五湖參學人但問虗空討死脫夏天衫生著冬月襖分明無事人特地生煩惱後二句嘆死亡也有子孫者新墳古墓無子孫者野棄尸骸梵天琦云富謂無貧日貪思有富年由來人作鬼枉用紙為錢白骨深泥下青苔古墓前虗空猶可料生死莫知邊白侍文章世間稀尚求兜率厭輪回我今奉勸文章士念佛西方歸去來前二句引古為例侍郎姓白名居易乃唐時人贈尚書左僕射善文章晚節向佛施所居宅為香山寺自號香山居士經月不食葷嘗述讚曰十方世界天上天下我今盡知無如佛者巍巍堂堂為天人師故我禮足讚嘆歸依由是會昌初有客舟遭風漂至一大山有一道士曰此蓬萊山一院鎖鑰甚固曰此白樂天所居在中國未來耳樂天聞之為詩曰吾學真空不學仙恐君此語是虗傳海山不是吾歸處歸即須歸兜率天嘗立願曰吾勸一百八人同為一志結上生會行念慈氏名坐想慈氏容願當來世必生兜率晚歲風痺捨俸祿三十萬命工人杜宗鏡𦘕西方極樂世界一部高九尺廣丈三尺中彌陀左觀音右勢至人天瞻仰眷屬圍繞花鳥池樹栴檀莊嚴弟子居易焚香稽首跪於佛前發願云願此禮念功德回施一切衆生一切衆生有如我老者如我病者離苦得樂斷惡修善隨願往生青蓮華上重說偈曰極樂世界清淨土無諸惡道及衆苦願如我身老病者同生無量壽佛所即儼然而化故云尚求兜率厭輪回也後二句是科家舉例勸今文章之士皆效白侍郎厭世念佛同歸西方淨土也威儀寂靜塔丈心路不用巧分訴行住坐臥無盡無餘此科昭明太子判此一段經文為威儀寂靜分言威儀者即行住坐臥四威儀中是佛應身也寂靜者即佛法身也以如來法身無所從來亦無所去故立此名也塔丈心路者釋呈上義或塔丈二字恐書者誤之應作曷仗然有疑惑者謂如來昔行菩薩道時不受福報云何至果有去來相使諸衆生供養獲福如此疑惑正是心路意識分別故佛告之云如來威儀應用示有動作而法身之體如如不動故云寂靜蓋如來法應之身隱顯度生非三乘聖賢而可測量故云曷仗心路可謂非思量處識情難測真如法界無自無他也不用巧分訴者既法身之理在威儀之中豈仗心路測量不用分別去來之相故云不用巧分訴也行住坐臥無盡無餘者以行住坐臥釋下威儀也無盡無餘者釋上寂靜也以法身之理既不仗心路分別於四威儀中無缺無餘可謂放去虗空包不住收來不見一毫踪無邊妙用神通事盡在尋常動用中無所從來亦無所去若人會得全不費工夫無所從來亦無所去者此科佛謂須菩提若有人言如來若來若去若坐若臥是人不解我所說義何以故如來者無所從來亦無所去故名如來此明法身無去來之相也若人會得者總結前來如此說話若是行人會得法身無去無來只在威儀動靜之中彰顯其實省力可謂即石名山真省力離波求水實應難蓋離色身外無法身離法身外無色身永嘉云無明實性即佛性幻化空身即法身故云全不費工夫也人人具四大我見萬法空行住并坐臥來去與真同初句明一切衆生各有身相乃是地水火風四大以受想行識五蘊假合而成與如來三十二相八十種好應身四大名同故云人人具四大次句明如來雖具四大有行住坐臥與衆生應用不同故云我見萬法空我見者即執著義以能見者是我所見者是萬法能見之我既無所見萬法自空人法既空法身寂靜也末二句明如來既了萬法皆空證法身理雖有應身相好但為度生而現故於行住坐臥四威儀中或來或去無不與真皆同若明此旨洞達其源方知動靜施為經行坐臥頭頭合道念念歸宗那裏不是平等一真法界故云來去與真同也威儀寂靜分第二十九經須菩提若有人言至亦無所去故名如來注曰此分佛乃招告須菩提以三稱如來者皆顯法身真性佛也佛云若有人言如來若來若去若坐若臥是人不解我所說義者意云若以來去坐臥行容法身者則是有相故不解如來所說義也以真佛無相常住寂滅本無來去動靜可以行容今佛現有來去坐臥者乃如來應身為化衆生故所以慈氏云是福德應報為化諸衆生自然如是業諸佛現十方故也何以故者佛自徵問何故不解我所說義乎乃自答云我所謂如來者顯法性真佛也以真佛無相亦無來去法身普遍如如不動偈云去來化身佛如如常不動故無所從來亦無所去故名如來也放光般若經云如者一無有二以謂法性空故如來者法空義也以法空故而無有來亦無有去智者禪師頌曰如來何所來修因幾劫功斷除人我見方用達真宗見相不求相身空法亦空往來無所著來去盡皆通坐臥經行本自無來無去威儀不動寂然非靜非搖初一節文牒經義也如來應身有來去之相為化衆生其法身無為本無來去所以肇法師云解極會如體無方所明即應之真也從真界起水月頓呈明即真之應也次一節文亦牒經義威儀者顯應身若來若去若坐若臥即俗諦也不動者顯法身無所從來亦無所去即真諦也寂然非動非搖者雙遮二邊顯中道者也要解如來所說義否此一句是科家著力為人處審問行人解佛深義而下文答出也隨緣赴感靡不周而恆處此菩提座此二句答上問義也此文出華嚴經如來現相品一切勝音菩薩而說頌曰佛身充滿於法界普現一切如來前隨緣赴感靡不周而恆處此菩提座科家借後二句顯如來應身隨緣赴感無處不周其法身寂然未離本座可謂處一座而十方俱現演一音而沙界齊聞也巍巍不動法中王那有獼猴跳六窗笑指真空無面目連雲推月下千江前二句頌經義也明如來者無所從來亦無所去顯法身不動那逐根塵故喻獼猴不跳六窗也今言法中王者起信論云法身者自體有大智慧光明遍照法界真實識知自性清淨心常樂我淨清涼不變自在不動是明如來法身於諸法中得大自在故名法中王行人若悟此理六根門頭放光動地獼猴安然六窗閴寂也後二句科家直指法身無相至理無形有何面目古德云通身無向背遍界絶形踪科家末後盡力提持所以連雲推月齊下千江境智不分人法一體可謂混淪無內外和融上下平蘆花影裏一骷髏半臥黃沙半土丘骷髏但有心頭氣爭名奪利幾時休初二句嘆人死尸骸送於郊外骷髏遍地縱橫日炙風吹狼籍穢惡醜不可觀盡大地人悉皆如此所謂昔時要笑紅顏翻成灰燼今日荒園白骨變作泥推也末二句歎此骷髏今朝如此零落昔年三寸氣在自恃豪強爭名奪利無有休息丹霞先生詩云自待烟霞物外求何須谷口傲扁舟三皇社稷今何在五帝山河總是休無限豪傑埋土冢幾多文武臥荒丘在生祇管爭名利更不回頭向早修漢末殘唐甚苦哉人心上下極相乖貪婪虗僞那堪說亂世如麻歸去來此四句科家歎時世澆薄人心乖戾言漢末者即吳魏劉三國後有五胡及十六國各霸為王也殘唐者有十國十王皆僭僞之主今言甚苦哉者悲夫時者澆漓之世人者浮薄之流所謂貪婪虗僞不可稱說乃是科主痛切之言故深嗟之末句亂世如麻者言說主多則亂兵戈遍地男罷耕鋤女罷機織率土之民十亡八九古詩云世亂兵荒殺氣紛美人抱子入宮門寧干壯士揮戈手不負男兒結髮恩玉貌花顏何處是形骸血跡至今存吾來傷感前朝事為吊禾川烈女魂歸去來者科家意云似此世亂如麻不如念佛歸去早離穢土徑達淨若是五逆十惡之人臨命終時勸令念佛承佛願力生於下品華中受樂猶若天宮故乃相勸亂世如麻歸去來也一合相理不在分別處處任宣說九年面壁斬釘截鐵此科昭明太子判此一段經文為一合相理分以須菩提答佛若是徵塵衆實有者若世界實有者此二節文以顯界塵無性以喻法應無有一異之性以顯圓融一合相理故立斯名也不在分別者上所謂一合相理塵界一異不可分別故須菩提答云非微塵非世界非一合相者名為一合相遣除一合相理故云不在分別也處處任宣說者以一合相理豈有言說世俗諦中為化衆生故有分別言說所以處處任宣說也九年面壁者此一節釋呈上文不在分別言謂達磨九年面壁大有徑挺不近人情不涉言詮單明真性直顯第一義諦實具斬釘截鐵之手段神光三拜花開時節分明點破稱錘原是鐵此一節呈前不在分別之義昔達磨初祖在少林面壁一日謂門人曰時將至矣吾欲返西竺汝各言所得時道副云如我所見不執文字相不離文字相而為道用祖曰汝得吾皮也尼總持云如我所見如慶喜見阿閦佛國一見更不在見祖曰汝得吾肉也道育云四大本空五蘊非有而我見處無一法可得祖曰汝得吾骨也慧可禮拜依位而立祖曰汝得吾髓也復曰昔如來正法眼藏涅槃妙心付與迦葉展轉至吾今付與汝偈曰吾本來茲土傳法度迷情一花開五葉結果自然成今科家言神光三拜領言外旨是他時節因緣正與一合相理無二無別也分明點破者此節呈前達磨面壁神光三拜分明顯露不言之道恰似稱錘原來是鐵也三千界微塵俱來一念心如來一合相推倒大虗空前二句牒經之義也以三千界微塵者舉能喻之界塵兼所喻之法應也長水謂界塵法應皆是我法所緣之境此境俱不離能緣一念之心所以三界唯心萬法唯識故云俱來一念心也如來一合相者此二句亦牒經義結歸圓融不二之理既云一合相理即是不見虗空唯見真如所謂除真心外無片事可得故云推倒太虗空也一合相理分第三十經須菩提若善男子善女人至須菩提言甚多世尊注曰此一分文義因前來二十九分中應身有去來是異法身無去來是一佛恐善現有一異之見故此分中設喻問之先舉世界微塵一異斷疑次舉言說我法離見且初釋文總有三科一操界塵一異以顯無性二釋微塵以喻應身無有異性三釋世界以喻法身無有一性今且先標塵界為喻故佛問云以三千界碎為微塵是微塵衆寧為多否此喻界塵一異以顯無性今言世界者喻法身也微塵者喻應身也世界是一也微塵是異也碎界為塵界無一性以喻從法起應法無一性即異破一也聚塵為界塵無異性以喻應空即法應無異性即一破異也此互破者雙遮顯中即非一非異也故偈云去來化身佛法身常不動於是法界中非一亦非異經何以故若是微塵衆至則非微塵衆是名微塵衆此節經義即第二科釋微塵喻應身無異性也何以故者徵前甚多微塵之義若是微塵衆實有者佛則不說是微塵衆此言佛不說者意顯塵體本空故以喻如來應身雖具足相好而體實非真故偈曰應化非真佛亦非說法者是也所以者何者徵釋前文界塵也佛說微塵衆者牒前佛說碎為微塵也若知碎世界作微塵微塵全是世界則塵無實性故云則非微塵也以離性計而說微塵故曰是名微塵也經世尊如來所說三千大千至則非世界是名世界此節經義言如來所說三千世界者牒前以三千世界也若知合塵為世界世界全是微塵則世界無實性故曰則非世界也以離性計而說世界故曰是名世界也所以塵無別塵全界為塵以喻應無別應全法起應也界無別界聚塵成界以喻法無別法全應即法此是雙照顯中道也經何以故若世界實有者至非一合相是名一合相此節經義即第三科釋世界以喻法身無一性也何以故者徵前世界也若世界實有者則是一合相此以一合相理返顯世界非是實有則知一合相理乃是界塵法應圓融無礙之理明矣故偈云世界作微塵此喻是彼義也如來說一合相者以界塵法應皆具足名相即俗諦也則非一合相者以界塵法應雖具名相其性本空即真諦也是名一合相者以法身能一能異非一非異圓融無礙即中諦也經須菩提一合相者至但凡夫之人貪著其事此節經義言一合相理不可說者意云若言法身是一恐聞者定執為一則不可說若說應身是異而聞者便執為異則不可說若謂法身非一聞之者又執為非一則不可說若言應身非異而聞者又執為非異則不可說此一合相理亦不可思議但凡夫不了自生貪著耳傅大士頌曰界塵何一異報應亦同然非因亦非果誰後復誰先事中通一合理上兩俱捐欲達無生路應當識本源以世界碎如微塵慈尊喻巧於玄要立權名談其實相凡夫意絶於貪求初一節牒經義明如來設教為化衆生說種種法恐諸衆生未得通曉圓融之道故引種種譬喻令人易解今此經中以界塵喻法應者故云巧也所以聚塵成界碎界為塵喻全法起應全應即法巧之甚也玄要者玄妙總要也然此一喻總該世出世之八義也能喻界塵有非一非異能一能異之四義法應亦有非一非異能一能異之四義如此八義一喻明矣豈非玄妙總要者乎次一節亦牒經義明佛說四十九年法有三乘五教正眼觀來都是權也只是談其一乘實相真空實際之中道箇能一能異非一非異者皆世數而矣真空之中皆無此說淨名曰法身無為不墮諸數使諸凡夫悉知如來法應之身尚是權立之假名而實不可得況我凡夫色身識心及所有諸法豈是實乎故使凡夫貪著之心自然息矣與麼會得返本還源背塵合覺不與麼會慈同諸佛悲合衆生總不與麼此是科家誡勉行人也始一節文謂與麼會得者意云法應之身既屬名數尚不可得況我色身識心及所緣諸法皆即虗妄實不可得故使凡夫意絶貪求自然返本還源背塵合覺也次一節文謂不與麼會者乃科家拈情要行人不在返本還源背塵合覺處著腳須要入纏垂手和光同塵也正同觀音大士初獲圓通得二種殊勝一者上與諸佛同一慈力二者下與衆生同一悲仰而入十法界現三十二應說法利生也總不與麼者斯一節文是科家將上二法一齊掃除與麼不與麼總拈向一邊直顯頓宗即心之道上不見諸佛可成下不見衆生可度而向下伸答是也巨靈擡手無多子分破華山千萬重此二句答上總不與麼之義也謂不住一真法界諸佛衆生了無所有如巨靈神大用現前以斧劈開華嶽也言巨靈者乃太華山之神巨靈即乃名也因母昔有染緣之業受罪於斯山底巨靈欲救母罪力所不能後入華山西恭禮鏡月峰光照禪師處拜告曰吾母受罪於此山未出今欲請師求救師即書一唵字與神斧上於是持斧于山頂用斧一劈山即兩開其母承斯總持神呪之力即生忉利天巨靈求道三年立化於華山之頂後為金剛密跡大神也所以云劈開華嶽連天色放出黃河至海聲一段生涯六不收從前萬法盡非儔輕輕劈破三千界直得恆河水逆流前二句謂一段生涯指般若真空而言也六不收者此理以六根六塵六識收他不得即我空之義也從前萬法者科家意謂此般若真空就是從前第二分中至此三十分以文字總持雖說無量玄妙之法到此行容不出比類不及故云非儔即法空之義也後二句牒經義以法身之妙用輕輕劈破三千世界碎為微塵直得塵塵即毗盧境界法法具常住真心所以法應不分界塵無礙同歸圓融廣大之理也直得黃河水逆流者既是碎界作塵聚塵成界以喻法身即應全應即法直得大地平沉虗空粉碎心外無法獨顯真空故云水逆流也九曲黃河直指君分明全不涉途程不知白日青天裏開眼許多迷路人始二句明昔有僧問石霜圓曰如何是南源境霜云黃河九曲水出崑崙僧又問曰如何是境中人霜云流水人不顧斫手望扶桑乃科家引古人以九曲黃河直指於君分明說出水之源頭出自崑崙此喻世尊大慈雖設種種言教方便譬喻如黃河九曲大意直指般若真源澤機潤物故不涉途程當央顯露也末二句科家嗟嘆錯過者多明世尊雖是分明直指般若真源長安大道爭奈衆生不能履踐如白日青天開眼迷路也東晉遠公曾結社遺民房翥總奇才淵明入會多耽飲今晚休杯歸去來此四句科家誡人識破幻境同歸淨土也東晉遠公者師諱慧遠鴈門樓煩人今河東代州是也姓賈氏生於石趙二十四歲聽道安法師講般若經大悟於孝武帝大元九年至廬山以杖卓地曰有泉則住起杖水隨杖出遂居之所居之處有潭一日忽水涸遂成平地無何雷電風雨天地陡暗山川震動久而暗霽其地四方平坦潔淨並無草木又一日如前雷電風雨俱作次日忽見棟梁椽柱斧鑿皆淨已成規矩積而成𧂐師與江東太守奏準建寺畢請題曰東林寺殿名神運於中立彌陀像建白蓮社共集十八大賢同修淨業師三十年跡不下山初十一年間三覩聖像而不令人知後十九年七月晦夕從定起忽見阿彌陀佛身滿虗空圓光之中有諸化佛觀音勢至侍立左右佛言我以本願力故來安慰汝汝七日後當生我國又見佛陀耶舍慧持曇順在佛之側前揖曰師志在吾前何來之遲也既知時至謂其徒曰吾始居此三覩聖像今復再見吾生淨土決矣於義熙十二年八月六日示衆曰遺尸於松林下言訖而逝晉時劉程之字仲思號遺民彭城人楚莊王之後妙善老莊通百氏少孤事母以孝聞自負其志不干時俗初解褐為參軍謝安劉裕嘉其賢相推薦皆力辭性好佛理乃與雷次宗周續之宗炳張銓畢之等同來廬山遠公謂曰諸君之來豈宜忘淨土之遊乎程之乃鑱石為誓文以志其事遂於西林澗北別立禪房養道安貧精研玄理兼持禁戒宗張等咸仰嘆之嘗貽書關中與什肇揚確經義著念佛三昧詩以見專誦坐禪之意始涉半載即於定中見佛光照地皆作金色居十五年於正念佛中見阿彌陀佛玉毫光照垂手慰接程之曰安得如來為我摩頂覆我以衣俄爾佛為摩頂引袈裟以披之他日念佛又見人入七寶池蓮華青白其水湛湛有人項有圓光胸出卍字指池水曰八功德水汝可飲之程之飲水甘美及覺異香發於毛孔乃自謂曰吾淨土之緣至矣復請僧轉法華經近數百遍後時廬阜請僧畢集程之對像焚香再拜祝之曰我以釋迦遺教知有阿彌陀佛此香先當供養釋迦牟尼如來次供阿彌陀佛復以妙法蓮華經所以得生淨土由此經功德願令一切有情俱生淨土即與衆別臥床上面西合掌而化矣晉時房翥暴死入冥府見王王曰據汝薄中曾勸一人念佛已得生淨土君承斯福亦令得生淨土翥曰尚誦金剛經萬卷併禮五臺故未欲往生王曰誦經禮拜故為好事不如且生淨土翥良久王知其志不可奪乃放還人間所謂三軍可奪其帥也匹夫不可奪其志也晉時陶潛字淵明事如前已引居士居柴桑時與廬山相近同陸修靜常來訪遠公遠愛其曠達招之入社潛性嗜酒謂若許飲則住遠許之潛入山久而無酒攢眉而去曾著搜神記多載佛靈驗事也知見不生返照還源本性離言詮見聞覺知無正無偏無垢無淨無缺無圓此科昭明太子判此一段經文為知見不生分蓋須菩提下以四相見佛乃許之於一切法如是知如是見如是信解不生法相故立斯名為知見不生也返照還源者此明奢摩陀定也以定力故能除人法二執雙顯人法二空理故云返照還源也本性離言詮者此明毗婆舍那慧也以慧力故能開演藏乘說出種種法門導利羣生雖演諸法了文性空得真解脫故云本性離言詮也見聞覺知等者明三摩鉢提即中道觀也前文單明定慧此中定慧雙融見聞者即如是見乃慧也覺知者即如是知乃定也總言見聞覺知者雙照顯中道也無正無偏等者雙遮顯中道也今科家教令行人不可偏局尋常日用之中於見聞覺知處不可執著根塵境上不可離了根塵而別有性所以無正即不住寂寂之中無偏即不住惺惺之上無垢即不隨掉舉無淨即不沉無記無缺無圓者出三諦之外三觀圓融也無缺即三觀一心三諦一境也無圓即一體圓融無礙三諦歷然乃是一乘深入之法門也靈光浩浩杲日正當天此二句法喻雙明三諦圓融之處也乃至釋迦出世達磨西來都顯此一段靈光如杲日麗天無處不照所以玄沙云盡大地情與無情森羅萬象一切諸法悉在我這光明裏自在受用故云靈光浩浩杲日正當天也知見度衆生衆生亦復盲如來非法相方到涅槃城上二句牒經義謂地前菩薩加行方便位中有能所分別知見度生非但菩薩著相則所度衆生亦著四相也如云若菩薩有我相人相衆生相壽者相即非菩薩斯言能度菩薩既有四相所度衆生亦有四相故云衆生亦復盲也下二句亦牒經義明如來斷分別見不著法相謂非法相者不生法相也此非法相即勝諦中不容他物離性離相不屬因緣乃寂滅坦實之體故云方到涅槃城也知見不生分第三十一經須菩提若人言佛說至我見人見衆生見壽者見注曰此分經文明離我法二見因前三十分中界塵法應皆是我法所緣之境令知不實今破能緣我法見心見心乃是凡夫所起虗妄分別茲今拈却令忘分別即入聖位也且初離我見者有真我之見有妄我之見妄我之見者乃虗妄分別衆生見也真我之見者遠離執著即如來見也既離執著示有我見人見衆生見壽者見者此不見中而示有見也在迷衆生以為如來實有四見故云不解如來所說義也是故佛以四見審問善現是人解我所說義否善現解佛問義答云是人不解如來所說義也何以故者善現自徵前義是人何故不解如來所說義以善現既解如來所說之義即知四見皆非虗妄分別是真我之見故云是名我見人見衆生見壽者見也長水曰佛說我見等非寶我人等見是假名我人等見衆生不解謂之實有也經須菩提發阿耨多羅三藐至即非法相是名法相上文已離我見此文却離法見亦是總結降伏安住正行也前第二分中善現初問發菩提心者云何應住云何降伏其心如來答應如是住如是降伏其心故今結云發菩提心者於一切法應如是知見信解此結前應如是住大乘知見也不生法相者即不於諸法取著此結前降伏其妄心也此明如來說要令衆生發菩提心修行契理是故善現聞佛所說之法即解其義故佛叮嚀發菩提心者於一切法應如是知見信解不生法相也須菩提所言法相等者佛乃招告善現重徵上義謂所言法相者知見信解皆是法相既有法相數量之名即屬俗諦也如來說即非法相者以三方便中無分別之心故云即非法相即真諦也是名法相者以三方便中分別心空入無分別之理非俗非真離性離相故云是名法相即中道諦也若著知見信解難契如來妙義悟無我人壽命還同陽焰空花楞嚴云知見立知即無明本知見無見斯即涅槃祇如法相不生時還信解麼若著知見信解等者此一節謂發菩提心者於一切法取著知見信解則有分別既有分別則成法見既有法見則不能證無分別之理所以難契如來妙義也本科中言若著見聞覺知恐謄刻者誤矣悟無我人壽命等者此一節明善現悟佛問義世尊雖說我人等四見是如來真我也非同凡夫實有妄我也既非凡夫我見則知佛之示現假名我也如同陽焰空花皆不可得也楞嚴云知見等者此引經文釋呈上義若著知見信解難契如來妙義此明法見存而迷理也知見無見等者亦呈上文悟無我人壽命還同陽焰空花此明我見空而不實也祇如法相不生等者乃是科家手眼徵問行人明前發菩提心人於一切法上不起分別之念佛印云如是知見信解即今法相不生還信解麼科家要人於知見信解無分別之智此三皆空且道還信解麼下文出其所以也大千世界海中漚一切聖賢如電拂此二句明法相不生之義也依報正報了不可得此明人境如漚如電誰起知見分別所謂百千世界猶如空華亂起亂滅故云大千沙界海中漚也一切聖賢者上明法見已空此明人見不存於實相中非唯三賢十聖皆空縱是佛之境界亦空故云一切聖賢如電拂也法空非我道非親樹倒藤枯笑轉新風掃止啼黃葉盡千林全體露天真首句牒經義即經中一離法見也然有三種發菩提心者不分別也二於一切法亦不分別也三於方便門知見信解故離於法見即法空也非我者即第一義離我見也此之我見即能緣我法之見心此之見心乃是所起分別之念此念亦空故云非我也道非親者即經中不生法相此法不生是無分別之理此理亦遣故云非親乃破執情也次句引宗證明此世尊道應如是知如是見如是信解不生法相於樹倒藤枯笑轉新一般也昔疏山到溈山便問承師之言有句無句如藤倚樹忽然樹倒藤枯句歸何處溈山呵呵大笑疏山曰某甲四千里賣布單來參和尚何得相弄溈喚侍者取錢還這上座遂囑云向後有獨眼龍為子點破去在後到明昭舉前話昭云溈山可謂頭正尾正祇是不遇知音疏便問樹倒藤枯句歸何處昭云更使溈山笑轉新疏於言下有省乃云溈山元來笑裏有刀也末二句明佛說三藏十二部諸祖千七百葛藤盡是止啼黃葉為化衆生暫止其妄念及到理極玄微之處皆用不著所以世尊祇得拈花迦葉祇得微笑今此經中謂發菩提心者於一切法應如是知見信解不生法相正是風掃止啼黃葉盡處千林全體獨露天真可謂皮膚脫落盡唯有一真實朝日忙忙暮日忙衆生何不早思量人如春夢終須短命若風燈豈久長前二句嗟嘆世事無窮奔忙不定勸人省悟急早修行也後二句喻人命不能長久今日雖安明朝未保如春夢而短似風燈無常故石屋詩云風檣來往塞官塘站馬如飛日夜忙冒寵貪榮謀仕宦爭名奪利作經商人間富貴一時樂地獄辛酸萬劫長古往今來無藥治如何不早去修行春夢短者如黃粱一夢古云珊瑚枕上片時間遊盡江南數千里淨土緣生稱本懷一靈更不墮胞胎法身解脫俱齊等瞥地回頭歸去來初句謂淨土所生之緣隨心所欲九品池中即得稱心而生既生欲往十方國土供佛隨心即往或衣或食即得隨心而至故曰稱本懷也淨土詩云一朵蓮含一聖胎一生功就一華開稱身瓔珞隨心現盈器酥酡逐念來金殿有光吞日月玉樓無地著塵埃法王為我談真諦直得虗空笑滿腮次句言此土衆生所生之緣有三緣會合十月懷胎種種之苦不得隨心所以科家誡勉行人一靈真性直往蓮胎托質休更入母胞胎也末二句謂此土行人果能生在淨土即得三德俱備故云法身解脫俱齊等與佛無殊既是如斯妙處此土衆生何不瞥然急早回頭萬緣一齊放下晝夜專念南無阿彌陀佛歸淨土去也應化非真如露如電有為法不牢堅住相布施果報人天此科昭明太子判此一段經文為應化非真分蓋不取於相又一切有為如夢如幻故立此名為應化非真也如露如電者明佛現應化之身示同生滅亦屬有為無常之法虗假不實故以六喻而譬之如露者以喻妄身念念遷㓔生滅無常似草上之露日出則晞也如電者以喻現在所念之法剎那不住猶如電光既屬有為豈有牢堅了此不堅方證真常也住相布施者此明經中以滿無量阿僧祗世界七寶持用布施蓋是有為果報只在人間天上受福而已也持經四句入聖超凡頻頻轉念金剛體最堅上二句明持經即無為福而得成佛謂四句者即一切有為法如夢幻泡影如露亦如電應作如是觀以此經即化身佛所說蓋化身佛說法離言說相而無取著弘經行人亦能離著故功德無量所以入聖超凡故演說之福勝彼無量阿僧祇布施也下二句乃科家誡勉後學但凡持誦須要以圓融妙觀專住一心觀三諦理不可循行數墨轉益見知其猶春禽晝啼秋蟲夜鳴風氣所使終無意謂也今言頻頻轉念者要人孜孜切切正念不忘一念萬年萬年一念斯一念非紙墨文字而可詮注乃無字真經金剛妙體水火難壞故云最堅也昔東印土國王請二十七祖般若多羅齊王問云何不看經祖曰貧道入息不居陰界出息不涉衆緣常轉如是經百千萬億卷此即頻頻轉念之意也玄沙亦云仁者在甚麼處汝今欲得出他五蘊身田但識汝祕密金剛體古人道圓成正遍遍周沙界乃至大地山河十方國土明暗色空等無非是汝金剛體也演說四句偈六度已為初縱橫無罣礙般若自如如初一句即是為人宣演解說一切有為法等四句之偈也次句言六度者即布施持戒忍辱精進禪定智慧以布施度慳貪以持戒度破戒以忍辱度嗔恚以精進度懈怠以禪定度散亂以智慧度愚癡故云六度也已為初者以布施為五度之首布施有二種一財施二法施今科家言為人演說四句偈等即法施故云為五度之初也末二句科家意要為人演說四句偈以為法施欲令行人均修萬行成就四心六度圓融縱橫無礙了一切法體空不可得者獨顯般若如如理也應化非真分第三十二經須菩提若有人至如露亦如電應作如是觀注曰此分之義由前十七分中佛告善現發菩提心者無能度所度之念至二十六分二十七分重誡執著相好俱空則成斷滅及二十八分但以相好修福德故而不取著即證法身謂有漏不受無漏受而不著也二十九分應身有去來法身無去來乃至三十分如來以碎界作塵喻法應二身能一能異非一非異三十一分於一切法不生法相故此分經文而有三節初節以無量阿僧祇世界七寶持用布施此是假喻校量二節若有善男子善女人發菩提心者乃至其福勝彼此明持說福勝三節從云何為人演說等此釋福勝所以也前以七寶布施但得有漏因果人天受福而已福盡還墜此以發菩提心者持於此經四句偈等直下明了般若真智即得見性成佛復兼受持讀誦為人演說亦令見性所以功德轉勝又況此經乃是化佛所說以為經教之主受持演說是弘經之人所弘之經既是化佛稱性所說離言說相故功德無量弘經之人亦能離言說相所以其福勝彼也云何為人演說者佛自問云如何為人演說乃自答云不取於相如如不動意云為人演說若能不以生滅心行說實相法則稱真理不取於相唯顯真如故此即心如境如故曰如如蓋以心境皆真如是法身不動也何以故者佛自徵起上文何故為人演說不取於相如如不動佛恐或者疑云既言為人演說則諸佛如來常在世間為衆生說法何故言如來入般涅槃耶以涅槃即是不動無為之義今涅槃寂靜與說法喧動動靜相返云何兩存恐有此疑故說偈以釋其疑也此偈謂一切有為法者即一切世間依正染淨生滅之法以佛生人中示同生滅亦屬有為無常之法無常之法虗假不實故以夢幻泡影露電六喻而喻之既知無常虗假不實無非真常之道也應作如是觀者觀即般若妙智蓋般若具空假中三觀也以斯妙智觀一切有為法有依正染淨等無量差別此即假觀觀俗諦也以斯妙智觀一切有為法皆生滅無常如夢幻泡影露電此即空觀觀真諦也以斯妙智觀一切有為法即真即俗非空非有此即中觀觀第一義諦也能如此觀一切有為法具足圓融三觀三諦者以能觀既是妙智即一心三觀也所觀無非妙境即一境三諦也能達此義而如來法身常在世間豈有滅也言入滅者乃應身耳故舉喻以顯無常令人易曉故曰應作如是觀也亦云一經始末皆稱如是者始云應如是住如是降伏其心中間節節云如是主此又云如是觀者論乃釋云妙智正觀故知妙智實一經之宗也從第三分至此正宗分已竟經佛說是經已長老須菩提至皆大歡喜信受奉行此節經文即流通分也流通者如水之不壅塞喻流通般若利益羣生使聞經而出離苦海令聽法而必證菩提天親偈曰佛說希有總持法不可稱量深句義從尊者聞及廣說回此福德施羣生經初但言與大比丘衆今經末兼言四衆八部顯前說經之始此八部亦在會也聞佛所說皆大歡喜者文殊請問經云歡喜奉行有三種義一說者清淨不為取著利養所染故二所說法清淨以如實知法體說理如理說事如事故三得果清淨起信解行得無漏果故三種既皆清淨孰不歡喜奉行者哉傅大士頌曰如星翳燈幻皆為喻無常漏識修因果誰言得久長危脆同泡露如雲影電光饒經八萬劫終是落空亡施七寶滿僧祇福有求而即妄持此經演四句德雖勝而非真晏坐水月道場成就空華佛事度幻化之含識證寂滅之菩提凡情聖解俱空生死涅槃如夢初節施七寶等者牒經中喻以七寶布施惟在人天受福即屬有求而即是妄未離有為故須遣也二節持此經等者乃是科家拈情以受持演說四句之偈福德雖勝而福德非真以執著無為亦須遣矣所以云真不立妄本空有無俱遣不空空是也宴坐水月道場等者此文呈前非真之義指示行人以般若真空之中受持演說皆是不真所以宴坐道場即同水中之月持經演說成就佛事猶如空裏之華總言不實之義也永明壽云建立水月道場莊嚴性空世界羅列幻化供具禮拜影現法會施為谷嚮度門修習空華萬行是也度幻化之含識等者此文亦呈前非真之義以為人演說只要度脫衆生既是幻化不實云何度之所證菩提既是寂滅寂滅理中無取證故佛告清淨慧言於實相中實無菩薩及與衆生何以故菩薩衆生皆是幻化幻化滅故無取證者永明壽曰常遊如幻法門出入無礙觀門降伏鏡像魔軍大作夢中佛事廣度如化含識同證寂滅菩提也凡情聖解俱空等者乃是科家手眼拈人執情我前來如此說話將凡情聖解俱要拈了以生死涅槃猶如夢事所以封慧上堂曰未升座前大地人成佛已畢更有何法可說更有何生可利況菩提煩惱本自寂然生死涅槃猶如作夢施設門庭誑惑初機方便門開羅紋結角於衲僧面前皆成幻惑且道衲僧有甚長處卓杖一下曰孤根自有擎天勢不比尋常曲彔枝真如元云凡見聖見春雲掣電真說妄說空華水月翻憶長髭見石頭解道紅爐一點雪

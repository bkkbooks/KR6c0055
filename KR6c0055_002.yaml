body:
  text: 姚泰三藏法師鳩摩羅什譯隆興府百福院宗鏡禪師述曹洞正宗嗣祖沙門覺連重集野狐尚聽百丈法洪州百丈懷海禪師福州長樂人也得法於馬祖每上堂有一老人聽法隨衆散去一日衆退唯老人不去師問汝是何人老人曰某非人也乃野狐耳先於過去迦葉佛時曾住此山集衆演法有學人問大修行人還落因果也無某對曰不落因果遂五百生墮野狐身今請和尚代一轉語破疑解脫野狐身師曰汝試問來老人曰大修行人還落因果也無師拈轉曰不昧因果老人於言下大悟方知不落因果是撥無斷見不昧因果是隨流得妙所以惺悟作禮曰某已脫野狐身住在山後乞師依亡僧殯送師令維那白推告衆云食後送亡僧大衆聚議一衆咸安涅槃堂亦無病人何故如是師領大衆至山後岩以杖挑出一死野狐乃依法火葬埋矣螺螄猶護金剛經唐時所有待制船至漢江阻風波濤洶湧滿船驚怖急將平昔持誦金剛經一卷拋棄江中遂得風恬浪靜待制曰深憶此經受持年遠不樂經涉兩月方到鎮江見船尾後百步而有一袍似裘之狀出沒無時衆人疑慮待制令一漁人取來乃螺螄輥成一團剖而外濕內乾待制用手分開視之即是所持之經毫髮無損待制驚喜拜而頂受歎曰漢水會於九江至南徐有數千里舟船往來豈有數目然未聞所持之經自彼至此螺螄一見而不捨其為名耶利耶財耶色耶將必脫輪回免死生者也嗚呼萬物之中最靈者人也有畢竟不聞是經有聞而不見見而不信信而為名利所繫而後信者不若螺螄也十千游魚聞佛號化為天子金光明經佛告菩提樹神昔流水長者於天自在光王國內治衆生病苦已長者妻名水肩藏有二子一名水滿二名水藏長者與二子到一大澤中見枯涸無水魚將死至生大悲心時有樹神示現半身語長者言此魚可憐汝可與水長者曰魚有幾何答言此魚十千日曝水少將入死門長者繞池經行魚隨視長者尋取樹枝覆於池上用作陰涼四面覓水忽見一河名曰水生長者悲喜至大王所具拜告王說如上事王令自選有力大象二十頭於其城中復借皮囊至河䭾水速到池邊瀉水而滿選一力大之象令子白於祖父家中所用之食悉已運至池邊安置池內長者依教所說高聲稱念南無寶髻如來應供等十號及唱十二因緣以此之故十千游魚聞法得食化生忉利皆為天子各悟前因悉來酬謝十千天子各持瓔珞至於長者之家以十千天妙瓔珞置於頭邊十千瓔珞安於足邊左脅右脅亦然又雨四華作天音樂早旦王問羣臣昨夜何故有如此瑞羣臣對曰說如上因詔令長者問如上緣長者奏王恐十千魚而得生天待臣至池驗魚死活復來奏王遂到池邊見魚悉死多有四華遍滿池中還白大王是十千游魚定生忉利天王聞歡喜長者欣然佛告大衆此長者我身也長子即羅睺羅次子即阿難樹神即今善女天也十千游魚即今十千天子是也五百蝙蝠聽法音總作聖賢昔佛正法之時有五百蝙蝠穴於枯樹時有商人附火樹下常有道人誦阿毗達磨論故走火燒其樹五百蝙蝠貪聽法音被火焚斃次夕見五百人來禮拜曰向蒙法力今脫惡報皆生人中悉皆聰慧棄家學道俱登聖果其後迦尼色迦與脅尊者招集五百賢聖於迦濕彌羅國作毗婆論其五百賢聖即五百蝙蝠因識宿命遂共作論以酬法力之恩也蟒聞懺以生天昔梁武帝后郗氏國母薨後數月帝追悼之晝則匆匆不樂宵乃耿耿不𥧌聞外有聲視之乃一蟒耳睒睛呀口以向於帝帝大驚謂曰朕宮嚴謹爾必崇也蟒作人言曰蟒則昔日郗氏妾以生存嫉妬六宮其性慘毒害人多矣故罪謫蠎之身無食充口無窟安身苦不可勝鱗甲小蟲唼嚙肌肉猶似錐刀帝聞已嗚呼感嘆忽爾潛去帝次日大集沙門問其所由寶志公曰若非禮佛懺悔莫能救濟遂採藏經集成十卷依法禮懺乃聞宮中異香許久忽見雲上有一天人容儀美麗謂帝曰吾蟒後身蒙帝法力生忉利天也再三致謝言訖而隱不現也龍聽法而悟道龍者乃龍女也於時下方多寶世尊所從菩薩名曰智積白多寶佛言當還本土釋迦佛告智積曰且待須臾此有菩薩名文殊師利可與相見論說妙法可還本土爾時文殊與無量三乘之衆從海湧出來詣靈山智積言仁者於海宮中說何法要文殊答曰唯說妙法華經智積言頗有衆生修行此經速得佛否文殊言有娑竭羅龍王女年始八歲智慧利根善知衆生諸根行業得陀羅尼諸佛法藏悉能受持深入禪定了達諸法於剎那頃發菩提心得不退轉慈念衆生猶如一子智積言我見釋迦如來於三千大千世界乃至無有如芥子許不是佛捨身命處而求佛道不信此女於須臾頃而得成佛爾時龍女有一寶珠奉上於佛佛即受之龍女謂智積菩薩尊者舍利弗言我獻寶珠世尊納受是事疾否答言甚疾龍女言以汝神力觀我成佛復速於此當時衆會皆見龍女忽然之間變成男子具菩薩行即往南方無垢世界坐寶蓮華成等正覺號曰華仙如來也彼物尚能領悟況人何不回心此是結前之義也彼之異類一聞妙法尚能領悟得道而況我等為人其性最靈何不回轉心華向道也或有埋頭喫飯而空過一生乃是科家伸後人之病也或有一等緇白雖居釋教門中不修如來戒定慧只是狥俗而打閧埋頭喫飯度日而已警䇿云可惜一生空過後悔難追教理未嘗措懷玄道無因契悟豈不哀哉也或有錯路修行而不省這意此一節廣伸禪病也雖在禪門學道不得明師指教偶遇偏見之師授與邪法錯路而修不省大道也所以永明云或起殊勝知解而好肉剜瘡或住本性清淨而執藥成病或尋文探義而飲客水或守靜閒居而坐法塵或認昭昭靈靈而為自己或認著識神而為本來人長沙禪師頌學道之人不識真只為從前認識神無量劫來生死本癡人喚作本來人此明真理之中但起毫𨤲執著之見即是錯路而修也豈識菩提覺性箇箇圓成爭知般若善根人人具足乃是結前埋頭喫飯錯路修行之義也斯二種人豈識菩提人人具足哉豈識者即爭知也菩提覺性者即般若善根也個個圓成者即人人具足也文之異而義同矣莫問大隱小隱若明此一段太事大隱亦可小隱亦可若不明者大隱小隱總是徒勞也大隱者居塵不染對境無心不欣聖位不重己靈如是之人方可大隱也若是初心行人須居小隱所以白樂天云大隱居朝市小隱入丘樊丘樊大冷落朝市大囂喧不如作小隱隱作留司官休別在家出家佛讚淨名云雖為白衣奉持沙門清淨律儀雖處居家不著三界示有妻子常修梵行雖有眷屬常樂遠離也麻谷南泉謁徑山路逢一婆子乃問徑山路向甚麼處去婆云驀直去谷云前頭水深過得否婆答不濕腳谷云上岸稻好下岸稻怯婆曰總被螃蟹喫了也然此婆子論作在家人說話何得能奉律儀修梵行善知過河不濕腳螃蟹喫了稻雖有在家模樣不可作在家人論也不拘僧俗而只要辨心心者有四其一肉團心五臟中是也其二賴耶心能分別是也其三緣慮心能緣外境是也其四堅實心即本覺菩提心是也此心聖凡本具所以云只要辨心也昔有一僧參米胡路逢一婆子僧問婆子有眷屬否婆曰有僧云在甚麼處婆曰山河大地若草若木皆是眷屬僧云莫作師姑否婆曰汝見我是甚麼人僧云俗人婆曰汝不是僧僧云汝莫混濫佛法好婆曰我不曾混濫佛法僧云汝恁麼說話豈不是混濫佛法婆云你是男子我是女人豈曾混濫似這婆子如此說話雖是俗人此心已辨了也本無男女而何須著相此明般若真智外幻境緣空也若以識見分別有差別相若以實智觀之諸法泄然豈分男女之異哉本無男女者且如淨名室中有一天女散華此女即法身大士現身也華至諸菩薩身邊即皆墮落以菩薩惑習永斷所以墮落也華至二乘身上便著不墮以二乘人惑習未盡所以便著也女言結習盡者華不著身未盡者華乃著身也女又曰我止此室十二年來祇聞佛功德香不聞二乘之香舍利弗言汝何不轉女成男天女曰我從十二年來求女人相了不可得當何所轉此明一切諸法無有定相譬如幻師化作男女等相幻無實體當何所轉即時天女以神通力令舍利弗化為天女身女自化身為舍利弗而問舍利弗言汝何不轉女身成男子舍利弗以女相答言我今不知何故變為女身耶天女曰汝今能轉此身一切女身悉當能轉如舍利弗非女而現女身一切女人亦復如是雖現女身而非女也是故佛說一切諸法非男非女即時天女還攝神力令舍利弗身還復如故天女問舍利弗言女身色相今何所在舍利弗言無在無不在天女曰一切諸法亦復如是無在無不在也可謂本無男女也以神力故變自身為舍利弗變男相作女身到這裡任是天眼龍睛他不著所謂千手大悲難摸𢱢爍迦羅眼無門是以科家道本無男女而何須著相者也未明人妄分三教了得底同悟一心此明三教所顯者皆是一個道理也未明此道妄分有三劉謐先生曰嘗觀中國有三教者自伏羲氏畫八卦而儒教始於此也自老子說道德經而道教始於此也自漢明帝夢金人而佛教始於此也於是中國而有三教之序也未明人者各執己見互相是非了得底者原無二也大抵儒以正設教道以尊設教釋以大設教觀其好生惡殺則同一仁也視人猶己則同一公也懲忿窒欲禁過防非則同一操修也雷霆衆聵日月羣盲則同一化風也由粗迹而論則天下之理不過善惡二途而三教之意無非要人去惡遷善所以為善者降祥為惡者受殃古德云天下無二道聖賢無兩心此言同悟一心者心能作佛心能作衆生心作天堂心作地獄心異則千差兢起心平則法界坦然若了諸法皆空無非一心實相故云同悟一心也若能返照回光皆得見性成佛乃結前之義也在家出家僧俗男女俱無實體若能返照不逐假相五蘊根塵然後回光自悟本者之性故結云皆得見性成佛也又況人身易失佛法難逢此下之文歎人身容易失美大法難逢也易失者身如朝霜曉露倐忽即無岸樹井藤豈能長久難逢者罕遇也大法難逢龜值木勝緣罕遇芥投針譬如優曇華實為希有也華嚴經云寧地獄中多劫受苦常要見佛聞法不願離三途而生無佛法處矣欲超六道之周流唯有一乘之徑捷此勉行人欲超六道須仗一乘也六道者即天人修羅地獄餓鬼畜生是也欲要超越六道免逐周流者唯有一乘是為捷徑之法門也一乘者顯般若真空也所謂真不立妄本空有無俱遣不空空即中道一乘乃為徑捷哉須求正見莫信邪師乃科家指示後人欲究一乘須得明師指教方才無咎也正見者直顯中道不落二邊也邪師者不體正道妄傳邪法也圓悟禪師示衆云嗟見末法之流拍盲野狐種族自不曾夢見祖師之道妄傳達磨以胎息傳人謂之傳法救迷情以至妄引從上年高宗師如安國師趙州之類皆行此氣得道及誇初祖隻履西歸普化空棺而去皆謂此術有驗遂至渾身解脫謂之形神俱妙而去愚人厚愛此者怕臘月三十日慞惶兢傳歸真之法除夜望影喚主人翁以卜日月聽樓頭鼓驗玉池水覘眼光以為脫生死法此真誑唬閭閻揑僞造窠貽高人𠷣鄙復有一種邪見之徒假託初祖達磨行此胎息說趙州十二時別歌龐居士轉河車頌互指授密傳行持以圖長年及全身脫去或希三五百壽殊不知真妄想愛見也本是善因返招惡果不覺墮在荒草而豪傑俊穎之士高談大辨之人往往而信之是為邪師也古德云歸空邪妄誑愚癡運氣施功透頂皮揑目生華稱佛現糊窗傳法怕人知通風定與三千棒泄漏親遭八百鎚莫學這般男女輩生逢王難死阿鼻悟了方是入頭行得始能脫俗既是正見修行直須以悟為期徹法源底了悟真智方是入頭處也脫俗者既悟此理須要稱理而修如說而行始能脫得俗諦之生死也永嘉云爭似無為實相門一超直入如來地也步步踏著實地頭頭頂掛虗空此明行人既悟此理了死脫生不離日用尋常故行時腳踏實地頭上頂掛虗空不離喫飯穿衣總是西來妙意可謂念念釋迦出世步步彌勒下生分別現文殊之心動止運普賢之行也用時則萬境全彰放下則一塵不立修行之人到此田地能應衆緣不隨諸有萬境全彰一貫之理可謂法法不隱藏古今常顯露山河及大地全露法王身也一塵不立者若是收來一念元空諸緣不昧古德云實際理地不受一塵萬行門中不捨一法超生死不相關之地了鬼神不破之機此明行人修行之驗也果能於諸法中得大自在便能超越生死鬼神難拘古人道若論此事離心意識參出聖凡路頭學千聖難測量五眼窺不見故云生死不相關鬼神不破也是凡是聖而同箇路頭或冤或親而共一鼻孔此明向上一事凡聖同途冤親一體故云一箇路頭一箇鼻孔也傅大士曰衆生與南無殊大智不異於愚何須身外求寶身田自有明珠正道邪道不二了知凡聖同途迷悟本無差別涅槃生死一如究竟萬緣空寂推求意想清虗無有一法可得倏然自入無餘如斯實悟尚滯半途如斯者乃指法之辭也斯者此也指前來如此真實領悟猶是第二頭說話也喚作途路之談未得到家故云半途也休沉向上三玄要了末後一著休沉者乃科家與後人拈情休認前來悟處皆是三玄邊事不可執著也三玄者體中玄句中玄玄中玄此三玄因機而說未是聲前之道故云休沉向上三玄也末後一著者言當人動靜一著子超出語言玄妙似世尊拈華迦葉微笑以目前見理分明謂之末後一著又如達磨安心神光覓心了不可得亦謂末後一著此是明佛明祖末後一著也若論行人末後之事平生所作行業要在臨終捨命之際一念於理相當洞明真性安然脫去者此是行人末後一著故云休沉向上三玄要了末後一著也且道即今喚那箇做末後一著此是審察之辭急要行人著意參詳向下露矣青山低處見天闊紅藕開時聞水香此二句明宗發揚末後一著也若是行人向見天闊處聞水香時見聞不昧此理豈不是末後一著所謂三平禪師頌云見聞知覺本非因當體虗玄絶妄真見相不生癡愛業洞然全是釋迦身此是末後句之榜樣者哉棄却瓢囊擊碎琴如今不戀汞中金自從一見黃龍後始覺從前錯用心此四句元是洞賓見黃龍悟道之偈科家取來與行人拈情解疑言洞賓已得神仙而參黃龍發明真性始知仙道未出三界縱活千歲不免沉淪所以棄却瓢囊汞金不戀自知從前所學仙法錯用而矣此述神仙與天齊壽點鐵成金尚問道而歸禪何況尋常生死凡夫豈可錯過者也始知生死是無常莫道先從老者亡大限到來無定準後生年少也隄防此是舉前之義者既明自性真心方知生死無常也前二句警䇿行人後二句行容上義生死無常者始自生之少壯老必形容遷改病疾摧殘死即氣絶神往故云無常莫道先從老者亡矣不可定謂老者先亡少者後亡若是大限到來就是後生難逃死苦故云莫待老來方學道孤墳多是少年人富貴貧窮各有由宿緣分定莫剛求不曾下得春時種空守荒田望有秋此四句偈是如如居士勸在家人種福田頌前二句是法後二句是喻各有由者富貴貧窮各有分定大藏經通偈云欲知前世因今生受者是欲知後世果今生修者是取以目前觀之人生貧富貴賤壽夭榮枯種種不同無非宿業所踐如前生布施恩惠於人今生富貴前生慳貪障人布施今生貧窮前生殺生害命今生壽夭前生不殺今生壽長古德云富貴貧窮各有緣身遭危厄總由天功勳運退翻為罪善行時衰返作愆祿少非千愚共魯家豪不在智和賢古來貴賤皆由命萬事無過聽自然不曾下種者猶如春無所種秋無所收前世不曾種福今生豈能得福故云空守荒田望有秋此言人生在世須要廣種福田種瓜得瓜種豆得豆故曰春種一粒粟秋收萬顆子人生為善惡果報亦如此修唎修唎摩訶修唎此科淨口業真言向下十句之文是科家所立提綱於每科經文之前安立南嘉孩之辭提舉經義而不亂也普供養我牟尼此科普供養真言普供十方三世一切諸佛然後供養我牟尼者即本師釋迦牟尼佛是矣將欲誦經先安土地此科安土地真言凡欲讀誦此經必先安慰土地以求加護也金剛菩薩永護壇儀此科八金剛四菩薩也壇儀者即壇場軌儀也准千手千眼觀自在菩薩儀軌經說今以金剛為外護菩薩為內護如此則外魔不能侵內魔不能起以斯內外俱淨可謂修習誦持也云何梵畢發願謹受持此科發願文稽首三界尊歸命十方佛我今發弘願持此金剛經然後作云何梵請佛說法矣一相元無垢體性離塵緣專心持四句且要誦真言此四句乃科家復於每段經文之前安此四句以為要旨如衣有領而衣則順故曰要旨也前二句頌理有何修而不修持與不持也所謂一相者無相之相名為一相直指法身真理元無煩惱垢染故云體性離塵緣也後二句者既是受持此經須當先念真言斯真言者是諸佛而密用之心印持之則功德難量誦之則現生獲益故須誦念也金剛經啓請若有人受持金剛經者先須至心念淨口業真言然後啓請八金剛四菩薩名號所在之處常當擁護此明行人凡欲誦經祈求加護者哉淨口業真言修唎修唎摩訶修唎修修唎薩婆訶誦此真言者一切口業悉皆清淨不誦真言以恆河水漱亦不淨也安土地真言南無三滿哆母䭾喃唵度嚕度嚕地尾薩婆訶此言土地者即堅牢地神也凡有三寶建立道場誦經坐禪講解之處此堅牢地神稟報上天常來擁護故乃誦此真言也普供養真言唵誐誐曩三婆嚩襪日囉斛此明行人念真言時運心作觀想此所供之物用淨法界嚂字真言及以吉祥手印加持二十一遍以為清淨法食自然周遍法界手印者以右手大拇指與無名指相捻餘三指皆捨散次念變食真言娜謨薩縛怛他㜸多縛盧枳帝唵三婆囉三婆囉吽行人念此真言或三遍七遍或二十一遍由此真言之力其所供物自然變成種種諸天餘肴膳皆有五種色香上味一一如須彌山後念此普供養真言承斯真言之力自然普供十方法界故云此食色香味上供十方佛中奉諸賢聖下及六道品等施無差別隨感皆飽滿請八金剛奉請青除災金剛奉請辟毒金剛奉請黃隨求金剛奉請白淨水金剛奉請赤聲火金剛奉請定除災金剛奉請紫賢金剛奉請大神金剛青除災金剛者即青色金剛能消災厄也辟毒金剛者能降伏一切惡毒鬼神及惡龍獸損害一切有情也黃隨求金剛者即黃色金剛能令一切所求皆得遂意為求遷官延壽福德聰明錢財妻子伏藏寶珠仙藥神通等也白淨水金剛者即白色金剛能清濁水為除惡業重罪煩惱等種種災難官事口舌鬼魅所著惡星淩逼等也赤聲火金剛者即紅色金剛為求賢聖加護天龍歡喜說法辨才言音清雅也定除災金剛者即碧色金剛能除諸毒灾障即彼出世間法欲速滿足福德智慧也紫賢金剛者為求聖賢位皆得遂意也大神金剛者為求廣大神通亦得遂意者哉請四菩薩奉請金剛眷菩薩奉請金剛索菩薩奉請金剛愛菩薩奉請金剛語菩薩金剛眷者此菩薩有廣大眷屬也金剛索者此菩薩手持罥索能縛魔魅也金剛愛者此菩薩能慈愛有情無不度脫也金剛語者此菩薩能以軟語勸化衆生也發願文發願者教中有行願二途如云有行無願行必茫然有願無行願為虗設須假行願相稱方得無咎故乃發願也稽首三界尊歸命十方佛我今發弘願持此金剛經上報四重恩下濟三途苦若有見聞者悉發菩提心盡此一報身同生極樂國此節之文未及誦經先須發願所謂三界尊十方佛者先禮釋迦一佛次禮十方諸佛也發願持經者先發四弘誓願後乃受持此經也上報四恩下濟三途者此明發願所以將此歸佛誦經功德用報四重之恩普濟三途之苦也見聞發心者以今發願持經是自利之義也見聞發心是利他之義也盡此報身同生極樂者斯即總伸回向凡有誦持見聞讀誦從此世界報身命盡神識定生極樂國也云何梵梵者梵語唐言淨也即梵天離欲空居清淨之義也世界始成之際劫初之時光音天人來生人間所出音聲還是梵音宛轉曲折之音古時都講維那於此八句請法師講說也云何得長壽金剛不壞身復以何因緣得大堅固力云何於此經究竟到彼岸願佛開微密廣為衆生說長壽不壞者即第一請問也此文出大般若經長壽品佛告迦葉言欲得長壽者應當護念一切衆生同一子想生大慈悲喜捨授不殺戒以是因緣則得壽命無量也金剛不壞身文出金剛品佛言如來身者是常住金剛不壞身也復以何因緣得大堅固力者即第二請問也佛言我於往昔以護法因緣今得成就金剛堅固不壞之身也云何於此經究竟到彼岸者即第三請問也文出名字功德品佛言若有人聞大般涅槃經典依教修習能斷煩惱及諸魔魅不墮惡趣故到彼岸也願佛開微密廣為衆生說者即第四請問也文出四相品開微密者即口密謂請佛廣為衆生說法矣開經偈無上甚深微妙法百千萬劫難遭遇我今見聞得受持願解如來真實義前二句讚美妙法難遇難遭也無上者出世之因獨為最上更無過此者也甚深者不同世間之法泛常浮淺易遇易知此出世之法深奧而難遇難解微妙而難測難思可謂萬劫難逢龜值木千生罕遇芥投針後二句慶幸發願我今得遇斯經如貧得寶似渴逢漿願解者即希募仰望之義願要曉解如來真實之理也恭聞法身無相非相可觀至理絶言非言所及此下之文是科家所立以長行為略釋也法身無相者即法身無為不墮諸數故云無相雖言無相不同斷滅之無一向全無也此即無相之相名為實相故云非相可觀如云三光猶未照五眼尚難窺至理絶言者至者是揀別之義不同對事之理而有名相言說名是言之路相是心之路法身至理既無名相故乃絶言也如云言語道斷心行處滅是矣蓋以因興四願果滿三身酬願現身彰言化物前節明理中絶言忘相此節明事上四願三身科家意謂蓋以我釋迦佛於因地中興起四願即四弘誓願也經歷三大阿僧祇劫方成佛果乃感三身也三身者即法報化是也佛初成道乃現三身一毗盧遮那即清淨法身也二盧舍那即圓滿報身也三釋迦牟尼即千百億化身也又化身所被之機優劣不同故能被之化身復有三者一大化身現千丈被大乘四加行等菩薩也二小化身現丈六被三資糧位菩薩與二乘凡夫也三隨類化身即三根普被六趣皆霑如為拘尸羅長者現三尺身是也酬願現身者酬昔因中之願故現三身須假彰顯言教化生利物物雖性分本有必假明師指示故曰譬如暗中寶無燈不可見佛法無人說雖慧莫能了也我釋迦聖主利物情深愍娑婆流浪之鄉讚嚴土常樂之界前文總顯諸佛出世皆因四願而現三身也此獨言釋迦居此穢土以利物情深故處娑婆梵語娑婆唐言堪忍此五濁惡世有種種苦一切衆生甘心忍受不生厭離故云堪忍如水之東流波浪之相接去而不返滅而復生佛愍此苦諄諄勸導也讚嚴土者如大彌陀經而釋迦如來廣說殊妙奇特之事又說四十八種清淨大願十方恆河沙數諸佛讚歎阿彌陀佛不可思議功德又小彌陀經中六方諸佛出廣長舌說誠實言汝等當信是稱讚不可思議功德也嚴者莊嚴也其土之中宅宇宮殿樓閣池流華樹等悉以無量雜寶百千種香而合成之此是一種莊嚴其餘莊嚴亦有無量常樂者無央數劫常受快樂故云讚嚴土常樂之界也國名極樂佛號彌陀四十八願弘深百萬行門廣大小彌陀經云爾時佛告長老舍利弗從是西方過十萬億佛土有世界名曰極樂其土有佛號阿彌陀今現在說法舍利弗彼土何故名為極樂其國衆生無有衆苦但受諸樂故名極樂也四十八願者願有通別二願前來四願諸佛共發為通願也此則別願如藥師佛十二上願亦別願也今四十八願者無量壽經云過去久遠劫前有佛出世名曰錠光乃至五十三佛名世自在王佛其佛廣為法藏比丘說二百一十億佛剎莊嚴之事而法藏比丘聞已皆悉覩見遂取諸剎中無量無邊莊嚴中最上微妙清淨殊特莊嚴總為四十八種而成四十八種大願此願則總二百一十億佛剎莊嚴也百萬行門廣大者爾時法藏比丘發是願已是故入三摩地經歷阿僧祇劫行菩薩行故云廣大者矣雙明真化應接高低地前地上皆生是聖是凡俱往雙明者明真應身化應身即勝應劣應也應接者有能應所應能接所接高低普應也地前地上皆生者佛告彌勒云此界有七百二十億不退轉地菩薩往生彼剎次如彌勒者皆當作佛及修習少功德者不可勝計皆當往生也聖凡俱往者意云不但地前地上菩薩往生乃至四聖六凡俱同往生彼剎也彌陀緣願於是彰焉淨土真詮由斯顯矣彌陀緣願者緣即因緣是彌陀於世自在王佛所初聞法出家等因緣也願者即四十八種大願也於是者即指法之辭指經中所說彰然而明顯然而著矣所謂真詮者即實有之說故曰真詮者矣經來自久久缺宣傳奉報佛恩當明經旨乃是科家指金剛經自漢唐而來故曰自久雖有注釋偈頌者未有結歸指示安養故云久缺宣傳也奉報佛恩者此是科主致斯科文略顯淨土法門者只是用報釋迦如來開導之恩也當明經旨者以行人雖達此法門之高勝必須當要發明經中旨趣此是自問下文自答者也透關妙達如來境及第高登本分鄉此二句乃是結類前義之辭也科家意云佛祖言教只明唯心淨土本性彌陀行人不明自己靈光透過語言文字故云關也若得根塵頓脫靈光獨耀西方東土淨穢何殊室地荊棘本來不異此謂妙達如來境也及第者如禹門三級浪魚跳過者成龍而去謂之及第以此比類將來須要行人妙達佛心單明自性也本分者自性分中本有之極樂故云本分鄉也佛在靈山莫遠求靈山只在汝心頭人人有箇靈山塔好去靈山塔下修此四句是科家當面拈出本有之靈山本有之佛性要人莫向外求遠指佛在靈山近指佛及靈山總在汝心是謂心佛不二也人人有者乃科家廣為開示不但一人獨有此佛此山乃至四生六道人人皆具也好去靈山塔下修者要人努力勤修向五蘊身中識取無位真人也下文而顯勤修之驗矣外道天魔皆拱手梵王帝釋為呈祥願今合會諸男女同證金剛大道場此四句明行人識得自心是佛於二六時中行住坐臥心心念念對境無情好也是佛惡也是佛若能如是感得外道天魔拱手歸降梵王帝釋呈祥獻瑞所謂天龍恭敬神鬼欽崇願今合會者行人既有如斯利益普令合會男女衆等同證心佛不二法門金剛般若大智故云同證金剛大道場也早起忙忙直到昏不愁生死只愁貧饒君使盡千條計直至無常不稱心此四句明一切衆生貪染無厭法句經云舍衛國中有一婆羅門自造前雅後堂涼臺溫室老年八十猶自經營佛觀老人不久命終佛生憐愍令其聞法存沒皆益遂往其家慰問老翁得無勞倦復問此何房室老翁答曰前雅待客又問此何所安答曰後堂自處東西廂房男女大小財物僕使居之夏上凉臺冬潛溫室唯此距陽此含未了佛言久聞宿德思遲談講吾有要偈存亡利益特來勸勉答曰欲得暇隙後日再來共相論之再三止佛佛即回去未遠老翁自授屋椽椽落翁頭而死一家啼哭佛言愚之甚也死在目前尚不回心何由出離生死故云直至無常不稱心也科主引經之義比類一切羣生從早旦至昏夜不念生死只愁貧窮使心用計直至無常不稱其心矣般若大教六百餘卷佛如來金口宣此一節乃提綱之文義發明八部般若共六百有二卷總二十萬偈頌唯一般若大智演說八十一科獨顯真空之理也佛金口宣者其餘六百卷多有佛勑聲聞人轉教菩薩所說此一卷金剛經是佛親口自說故云佛如來金口宣哉六朝翻譯東土流傳六朝翻譯者言此一卷金剛經歷六朝翻譯也一姚秦三藏鳩摩羅什於弘始五年在長安草堂寺譯成十五紙名金剛般若波羅蜜也二元魏菩提流支三藏於天平二年在洛陽譯成十四紙亦名金剛般若波羅蜜也三陳朝真諦三藏於太康元年在金陵郡譯成十四紙名金剛斷割般若波羅蜜也四隋笈多開皇十年於洛陽譯成十六紙亦名金剛斷割般若波羅蜜也五唐玄奘法師於貞觀二十二年在玉華宮譯成十八紙名能斷金剛般若波羅蜜也六唐義淨於證聖二年在佛授記寺譯成十二紙亦名能斷金剛般若波羅蜜也故云六朝翻譯也翻者翻梵言成華言故曰翻也譯者以彼之有譯此之無故曰譯也東土者以西天指此國為東土也譯出此經傳於天下教法通行故謂流傳也頻頻持誦四句真詮無為福勝果報利人天此文明此經流通之處若有行人殷勤持誦只以四句之偈乃是無為之福所得功德世世生生常在人間天上受用無盡故云無為福勝果報利人天也此經中凡五處以七寶布施功德皆不及四句之福布施是有漏持經是無漏故云無為福勝也稽首三界主大孝釋迦尊纍劫報親恩積因成正覺稽首者周禮有九品此即一也稽者以首至地稽留少時如臣拜君之禮也大孝者呈上句兼讚詞云大孝釋迦之尊也轉句行容大孝之因佛於無量劫中在四生十二類處處行孝如闍提割肉供親睒子侍盲父母鸚鵡銜穀等之大孝至於成佛迦維省父忉利寧親舉愛道之床足擔淨飯之金棺謂纍劫報恩也結句乃大孝之果矣茲以纍劫孝行之因今感成佛之果儒謂孝乃百行之先釋謂孝為萬行之本故云積因成正覺也此經乃大乘教菩薩摩訶薩人之所修此經者指此金剛經乃大乘終實之教也大以揀小為義乘以運載得名也大乘有二種一大乘始教但說諸法皆空未盡大乘法理故名為始以始入大乘也又五時中第三方等大乘方正平等三根普被四教並明故二大乘終教說如來藏隨緣成阿賴耶識緣起無性一切皆如定性二乘無性闡提悉當成佛方盡大乘至極之說故名為終又名實教以稱實理故名為實此般若經即五教中終實教攝也菩薩者即地前地上菩薩也地前菩薩修大乘始教之法地上菩薩修大乘終實教之法也教中道菩薩清涼月常遊畢竟空衆生心水湛菩提影現中般若為六波羅蜜之最勝者也所以名為般若波羅蜜以施戒忍進禪智之六度唯智般若波羅蜜為總也如有女人端正巨富若無夫主所守護者易為惡人之所凌辱布施等五度亦復如是若無般若威力之所攝持易為魔壞故云最勝者也所以者因此智度為六度之主故立此般若波羅蜜以為題名也故下經云如來為發大乘者說為發最上乘者說引經之義證此釋成上文此經乃為大乘菩薩人所修而說也為發最上乘者釋成上文般若為最勝佛為最上乘圓頓教菩薩人而說也以此佛說大般若經有六百卷凡一十六會此經乃第五百七十七卷給孤獨園第二處第九會說也乃是科家敘佛說此般若卷數處所會名如斯來例明白者矣所以道昔日如來金口演至今拈起又重新所以道者是科家自謂既是佛說般若我所以科文又道也昔日者明佛在給孤獨園說此般若金口親談至今者自佛說經之後至大宋第十四帝理宗淳祐二年立此科儀如佛在世重宣一遍相似故云至今拈起又重新者也此經佛說數千年無量人天得受傳憶得古人曾解道更須會取未聞前前二句明此經自佛說此經以來至宋淳祐間三千二百二十餘年故云數千年詣我大明嘉靖四千年有餘此經受持傳寫或人我天而有無量無邊傳之不盡故云流通天上人間普遍微塵剎海也後二句顯衲僧境界憶得古人者言此經人人有一卷經莫向外求要人聲前領旨句外明宗故永明云若欲研究佛乘披尋寶藏一一消歸自己言言冥合真心但莫執義上之文隨語中生解只須探詮下之旨契會本宗則無師之智現前天真之道不昧矣人間陽壽真難得一寸光陰一寸金莫待老來方學道孤墳盡是少年人此四句偈歎世無常也初句嘆光陰易度壽不久留次句勉人過一寸光陰如一寸金相似須要貴重覺照不可空消歲月虗喪光陰不見古人道尺璧非寶寸陰是競三句意謂修行不在老少生死豈在朝夕古德云一盞孤燈照夜臺上床脫了襪和鞋三魂七魄夢中去未委明朝來不來結句說出生死不揀年少所以孤墳多是少年人也在家菩薩智非常閙市叢中作道場心地若能無罣礙高山平地總西方起句言在家之人行菩薩六度者是有智之人如維摩龐居士是也故如如居士曰身不出家心出家者教中謂之菩薩所謂在欲行禪知見力火中生蓮終不壞般若經云菩薩俱有妻子眷屬而修菩薩行或有菩薩先受五欲而後厭捨勤修梵行或有菩薩方便善巧為欲成熟諸有情故示受五欲而實無染著次句呈上義言非常人智之所以要行人向閙市叢中為修道之場可謂是非海裡安身荊棘林中著腳後二句是科家分明指示徹底掀翻若心地於諸緣無染於萬境無情了無罣礙或隱高山或居平地總是西方淨土所謂淨土周沙界云何獨指西心心常不昧處處是阿彌故曰高山平地總西方金剛般若體如如翠竹黃華滿路途八百餘家呈妙手大家依樣𦘕葫蘆初句言謂智之大體即是真如蓋真如體上自有本智能知動靜也次句指出真如智體遍在一切色非色處所謂青青翠竹總是真如黃華無非般若三句言八百餘家者羅什門下有八百學徒秦主勑僧等八百沙門咨受什旨翻譯經論三百八十卷八百人中有四聖道生僧肇道融僧睿又有十哲加曇影慧嚴慧觀僧道常道標於弘始五年在草堂寺譯出此經故云八百餘家所言呈妙手者美八百家善通華梵單譯重翻度語潤文依經繩墨文義精明皆合佛意故褒云妙手也結句言依樣𦘕葫蘆者是貶也謂八百人雖皆妙手總是依經解義如依樣𦘕葫蘆相似科家要人向如來所說經文之外薦取本有之智且道何者是本有之智金剛般若體如如翠竹黃華滿路途是矣金剛般若人人本具割斷智為初白雲散處一輪顯露前文總判六百卷般若此文別判此經題目金剛般若波羅蜜經八字故以法喻雙彰指歸當人也割斷智為初者約喻義以為名以金剛鋒利故能斷一切喻般若智最利能斷煩惱即六譯中第三真諦第四笈多同譯為斷割第五玄奘第六義淨同譯為能斷也白雲散處者前文言金剛般若是體割斷為用此二句言用之功效故喻雲散月出妄盡真顯耳影落千江無來無去諸人薦取凡聖一同居呈前妄盡真顯如雲散月孤此文喻若水澄月映來去無情水不曾天上邀月來沉於水月不曾天上而來投於水底如云心如皎月連天淨性寂寒潭徹底清所以無來無去也後二句是科家分明指示我前來如此法喻分明說出此理汝諸人何不薦取去方知凡聖一體事理無別故云一同居也摩訶大法王無短亦無長本來非皂白隨處現青黃摩訶大者乃華梵兼舉也法王者指般若智為王於一切法自在內不為根識所埋外不為塵境所惑故云自在此心王之體無長短之相無皂白之色也隨處現青黃者此之心王雖無色相內含三類種子遇境逢緣而能變現根身器界之法故云隨處現青黃也經金剛般若波羅蜜經此經以法喻名題金剛是喻般若是法也金剛者金中精堅者也剛生金中百煉不銷取此堅利能斷壞萬物也梵語般若唐言智慧性體虗融照用自在能斷絶貪嗔癡煩惱一切顛倒之見也梵語波羅蜜唐言到彼岸不著諸相得證涅槃即到彼岸若著諸相輪回生死即是此岸欲至彼岸須憑般若也經者徑也此經乃見性成佛之徑路也宗鏡云只這一卷經六道含靈一切性中皆悉具足宗鏡二字以古金剛注文元是如如居士顏丙所注經題之文只這一卷經六道含靈乃至明了自性是也從免逐輪回不為六根六塵乃至心華發明在甚麼處此之一段是宗鏡所說之文乃科家善能點化裁長補短續成一段文義祇是於人發明自性也只這一卷經者不但六道具足乃至情與無情悉皆具足華嚴經云有一大經卷量等三千界在一微塵中一切塵亦然也優曇老祖頌曰一卷真經念處真言言流出盡黃金幾多紙上尋文義錯過西來佛祖心是也蓋為受身之後妄為六根六塵埋沒此一段靈光終日冥冥不知不覺此是科家自伸問答之辭曰既是此經具足如何不似聖人放光動地故答蓋為受身之後妄被根塵埋沒妄者非真實之有也心經云是故空中無色無受想行識無眼耳鼻舌身意無色聲香味觸法此明般若體上既無根塵故云妄為六根六塵埋沒古人道可惜無價之寶隱在陰入之坑何日得靈光獨耀逈脫根塵去也終日冥冥者言此衆生雖具此經背覺合塵迷己逐物故云不覺不知也故我佛生慈悲心願救一切衆生齊超苦海共證菩提故者所以也因衆生本具此段光明迷惑不知所以佛興四無量心慈能與樂悲能拔苦願救一切衆生起四弘誓願化五乘衆生也苦海者以生死苦無邊故喻如海故我佛出世種種言教普令齊超苦海共證菩提之道也所以在舍衛國為說是經所以者結前也為說者生後也茲因前來衆生以本有之經埋沒不知所以為說此經發明本有之智也大意只是為人解粘去縛直下明了自性免逐輪回不為六根六塵所惑大意者明佛說此金剛經大端主意要人解去我人衆生四相及於我所直下明了真空之性超出輪回不被根塵所惑也粘縛者衆生認我則六根粘湛妄認我所則六塵拴縛我尚空無根塵何有我法兩空故云解粘去縛也我粘既解法縛既去自性既明輪回自免六根六塵自然不能所惑也若人具上根上智不撥自轉是胸中自有此經此是科家勉勵行人也若是上根之人不撥自轉者靈機活落不勞指撥不假佛祖言教向自己胸中拈出此經可謂不從千聖借豈向萬機求如云一生慵懶作憎重祇便輕他家學事業余持一卷經無心裝標軸來去省人擎應病則說藥方便度衆生但自心無事何處不惺惺斯亦胸中自有此經也且將置三十二分於空間無用之地亦不是過乃是科家與人拈情也恐人向此經上作活計故將此三十二分置於空間之地亦不是過欲使行人離言說捨筌直下薦取本有真經矣如或未然且聽山野與汝打葛藤去也此是科家先奪後縱也未然者如或未薦本有之經且聽山野與汝鋪舒梗槩注解分明如云若有中流之士未能頓超且於教法留心溫尋貝葉精搜義理傳唱敷揚報佛恩德故云打葛藤去也凡有語言文字謂之葛藤也夫金剛經者自性堅固萬劫不壞況金性堅剛也金剛者標喻也以自性堅固萬劫不壞故比況金性堅剛引喻論云帝釋金剛寶能滅阿修羅智碎煩惱山能壞亦如是般若者智慧也梵語般若唐言智慧是故如來以智慧力鑿人我山以智慧因取煩惱礦以智慧火煉成佛性也波羅蜜者登波岸義也梵語波羅蜜唐言到彼岸迷則此岸悟則彼岸者矣見性得度即登彼岸未得度者即是此岸此乃解釋登彼岸之義也若見自性度生死流登涅槃之岸也經者徑也我佛若不開箇徑路後代兒孫又向甚麼處進步諸家解釋經之一字以貫攝常法四字注解今科家以徑之義而釋經者引喻指示如遠行人依徑路而進則無顛險迷錯此比修道行人依經中般若智而修則得成佛故云我佛若不開箇徑路後代兒孫向甚麼處進步也且道這一步又如何進撒手懸崖下分身萬象中頭頭元是道法法現真容看取下文提綱此一著語分明指示要人著眼薦取此經深旨無相為宗顯妄明真此是科家將此經深旨從頭解釋以無相為宗即無住也以明真為用顯妄體本空真理自顯也此經深旨者即所詮真理不屬有為故云無相顯妄者不言斷妄明真却云顯妄明真者蓋妄即真故如波即水不必離波求水故云顯妄明真也提綱要旨劒鋒微露掃萬法之本空提綱要旨者以般若真空為此經提綱緊要之旨如網有綱繩衆目不亂也劒鋒者喻般若大智慧劒能斷衆生我人壽者四相掃除凡夫二乘人法執情故云掃萬法之本空也心華發明照五蘊之非有心華者心喻理華喻身人人本具此心被五陰身蓋覆所以不明此心今以此經般若智照破五蘊非有顯出真心之體故經云觀自在菩薩行深般若波羅蜜多時照見五蘊皆空度一切苦厄是也直得雲收雨霽海湛空澄雲收者喻人空理也呈上照五蘊之非有而空我執之情也雨霽者唯顯一色晴空譬般若智顯也海湛者喻法空理也言大海波浪以喻諸法今言海湛者波浪息矣喻諸法皆空則法執破矣故上文云掃萬法之本空也空澄者海既澄清十方虗空現於海中空海不分虗融湛寂上下交映朗然無別此是人法兩空混元之體相也快登般若慈舟直到菩提彼岸此是科家誡勉修進之義快者速疾也慈航者喻般若智為慈航也菩提彼岸者喻本覺真心也要人登般若之舟而出生死苦海直到涅槃之彼岸矣且道心華發明在甚麼處乃是科家徵審前義之辭前文以般若智掃除萬法心華發明照破五蘊此云發明之後向甚麼處安身立命此是問義要人著眼太湖三萬六千頃月在波心說向誰此是科家伸答上文之義分明指示安身處唯要學人自惺也志書云五湖者一太湖二謝陽湖三洞庭湖四丹陽湖五官亭湖又名彭蠡澤今鄱陽湖是也太湖周五百里有三萬六千頃水面長八百餘里只見日月出沒水上故云月在波心也說向誰者喻上文心華發明向甚麼處到此言語道斷心行處滅也如云月到天心處風來水面時一般清意味料得少人知法王權實令雙行電捲風馳海嶽傾霹𮦷一聲雲散盡到家元不涉途程法王者言佛於諸法自在謂之王也出現世間說權實教以權智能說法以實智能證理非權無以說法非實無以證理前二十年言權教後二十年言般若權實並進故云令雙行也電捲者明佛說般若時直顯真空掃除萬法如電捲風馳海竭山碎也霹𮦷一聲者喻般若現前心外無法如雲散長空心月獨朗唯一真智無證無修本來具足所以到家元不涉途程也西方淨土人人有不假修持已現前諸上善人如見性阿彌陀佛便同肩前二句言淨土唯心不從外得人人皆有不待修持自然現前所以淨名云心淨即佛土淨是也後二句言自性彌陀若能見得不離動用故傅大士云夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不曾離如身影相似欲知佛去處只這語聲是無始無明幻色迷夢魂生死幾千回一條直路超三界但念彌陀歸去來無明者乃十二因緣之首此流轉門也無始者言最初無明不覺生三細境界為緣長六粗自無明緣行行緣識識緣名色已來名為幻色是無明所幻之色既有一迷執之為我便有我所因我所故起惑造業受種種身過去因現在果現在因未來果相續不斷死了生生了死如夢中作夢相似不知幾千回只在三界無因得出故科家慈悲太切指出方便之門故云一條直路超三界無曲繞也此法門名為橫出三界但有信願念佛決定往生故云但念彌陀歸去來也釋音爰音原為也於也握音嶽帙音直小槖也書衣也蔀音部草名鐫音鎸鑽也尖錐也愔音因安和㒵悅㒵㲲音毛布鑿音作穿也篡音沮類也又鑽上聲茞音臣草名也碩音石天也懇音墾悲也誠也信也涘音士水涯也肘音帚臂節也閬音浪苑音遠養禽獸園也挨音矮推也拶音雜逼也瞥音撇目也剩音勝不啻也誵音肴言不恭謹也訛音囮謬也舛也綟音利刎音吻割也矜勤經二音潺音說湲流㒵髑音獨婁頭也髏音婁髑婁也瑗音願玉名也滯音致凝也淹也筋音斤肉之力疲音皮乏也勞也鑊音活鼎也娛音魚樂也掣音徹挽也汾音焚隰音習下濕也啖音淡鱠音貴魚膾細切肉也蕚音鄂花鄂也庖音袍縻音迷牛迷也絆音辨羈也鱉音別俗鱉也音卓鳥食也音掉撤音摺剝也陂音𢍉澤鄣也池也雱音滂雪盛㒵譴音缺謫問也責也廄音救馬舍也笟音罩篱也脅音協身左右腋下也誕音旦大也天子生曰降旦餌音二食也餅也糕也齡音零鄂音惡口中上惡也詰音乞治也問罪也軾音式車前𨋩又兵車也姬音基皇帝居其水以為姓偉音葦訐音結攻人之陰私也牾音悟相觸也逆也蕃音煩茲也息也又音番屏也躡音聶踐也笻音窮竹名為杖皴音逡皵也皹音軍足折裂也弭音米息也忘也止也葦音委葭也諡音示謙行之號又音益笑㒵裰音鐸補鐸被衣裳也塢音五村五也袴音褲衣也亦作逶音威迱也行㒵迤音以邐也又音移嵐音蘊大風也湫音啾水多又音秋涸音霍水竭也盡也襁音講褓負兒衣也織縷為之廣八寸長二尺以負兒於背二也褓音保小兒衣也轍音褶車行迹也洶音凶蝙音編蝠亦名蠟䘃亦名仙鼠又名服翼蝠音幅蝙也斃音被仆也斃也止也敗也壞也薨音轟王逝也悼音到懼也儀禮云七一曰悼也唼音雜嚙音交齧也緇音支黑色也謐音密靜也倐音束光動也捷音節閭音廬貽音移玄也音癡𭌯音縛襪音襪嚂音爛娜音那上聲美㒵謨音模議謀也肴音肴饌也㜸音業妖也又姓也罥音絹佳也係取也隙音乞壁孔也裂也門也睿音泣明也聖也智也與睿同音略利也鄱音婆豫章有鄱陽縣蟸音離旬傳有谷離主谷又音鹿距音巨雞距也酢醋昨二音誄音畾纍也萇音長詩曰隰有長楚蔓生如桃囮音由奩音連香車也衠音迍真也正也諄音衠誡衠正也

body:
  text: 姚秦三藏法師鳩摩羅什譯隆興府百福院宗鏡禪師述曹洞正宗嗣祖沙門覺連重集淨心行善休教點污此法離凡愚是法平等萬法皆如此科昭明太子判此一段經文為淨心行善分第二十三蓋以無我人等四相修一切善法即得菩提故以為名也休教點污者既無四相點污名為淨心所修之行自然清淨方得菩提也此法離凡愚者以明此經是離凡夫小乘愚法聲聞之教以此聲聞雖無我執之情愚於法執之病故教離也是法平等者此科是法平等無有高下是名菩提以此真理在聖不增故曰無高在凡不減故曰無下所以平等也萬法皆如者既云凡聖平等高下不分一切萬法皆如如理故云萬法皆如也青山緑水與我何殊金生麗水蟾光滿太虗此是科家發明前來萬法皆如之義故指青山緑水是無情法於我自性本來不殊所以云情與無情共一體處處皆同真法界昔僧問慧濟和尚曰如何是祖師西來意濟云青山緑水僧曰未來時還有意也無濟云高底高低底低頌曰迷悟親疏總不干絲毫動處便多端烏鴉緑緑原非染白牯馴馴豈用看得理任從骸骨碎窮源須到骷髏乾青山緑水無窮意多少禪流被境瞞金生麗水者在益州永昌郡其水出金也蟾有傳云蟾蜍似蝦䗫而祇三足也張衡云羿妻請西王母不死藥竊之奔月中為蟾蜍壽八千歲頭上有角頷下有丹書八字科家借此二事以顯情與無情雖是一體不可瞞預混濫喻如麗水一星金流沙混不得又譬此理不混分明如蟾光月色塞滿太虗無有留礙任運而轉古德云夜半金烏升碧漢天明玉兔上青峰欲窮一點靈明處力在隨緣不住中淨心平等行無下亦無高善法非善法何須口叨叨前二句牒經之義也心無四相故名淨心是法平等無有高下修一切善法即得阿耨菩提故云平等行無下亦無高也後二句既離四相而修故名善法也復遣執著故曰即非善法也法既無法說亦無說故云何須口叨叨矣淨心行善分第二十三經復次須菩提是法平等至即非善法是名善法注曰此節經文名淨心行善分也佛於此重復次第招告須菩提言是法平等無有高下是名阿耨菩提者意云明此法身菩提在六道意內亦不曾減下在諸佛心中亦不曾增高是名平等無上菩提也以無我無人無衆生無壽者佛意云所以名為菩提者以真性中本來平等故無我人四相是名菩提也修一切善法者若離四相而修善法於一切事無染無著於一切境不動不搖於一切法無取無捨於一切時當行方便隨順衆生普令歡喜皆悟菩提真性此即名為修一切善法即得阿耨菩提也佛又呼須菩提云所言善法者牒上修一切善法即俗諦也如來說即非善法者佛欲遣去執著善法之跡即真諦也是名善法者以真俗無礙即菩提無漏之法乃中道也此答前今問義菩提無得今以正助修善乃成正覺答之正謂離四相成正覺即正因佛性也助謂修善法成正覺即緣因佛性也達妄即真亦名助道也傅大士頌曰水陸同真際飛行體一如法中何彼此理上豈親踈自他分別遣高下執情除了斯平等性咸共入無餘法無高下故諸佛心內衆生時時成道相離我人故衆生心內諸佛念念證真所以道念佛不礙參禪參禪不礙念佛至於念而無念參而不參洞明本地風光了達唯心淨土溪山雖異雲月皆同那裏不是平等之法要知縱橫無礙處麼法無高下者牒經之義也下文解釋以諸佛所證菩提之心凡聖平等無有高下悉皆具足所以九法界衆生總在諸佛心內所含以衆生所具之心與諸佛所證菩提本來無別諸佛成道即衆生成道以衆生不曾在諸佛心外故時時成道此乃心佛衆生同一體也相離我人者亦牒經義以衆生既離我人四相即得阿耨菩提所以下文解釋衆生所證之心即是諸佛所證法界真心此心四聖六凡均秉同賦故諸佛總在衆生所證心內所含以衆生心諸佛心本來無別諸佛證真即衆生證真以諸佛不在衆生所證心外故云念念證真此乃衆生所證之心與諸佛之心同一體也清涼曰諸佛心內衆生新新作佛衆生心內諸佛念念證真也所以道念佛不礙參禪者以念佛法門開十六種觀門而修即思惟修要在行人收視返聽專注一境觀佛相好不得雜想方契唯心淨土自性彌陀也參禪者梵語禪那此云靜慮以此心寧靜能除思慮亦思惟修要令行人單提一念屏却諸緣外不見山河內不執五蘊十方世界獨顯一真心也以此念佛參禪名雖有殊校其用心皆是一也故云念佛不礙參禪參禪不礙念佛優曇頌曰參禪念佛本來同看破分明總是空功到自然全體現春來依舊百花紅至於念而無念參而不參者呈前參禪念佛只要除妄妄盡即真雖終日念佛此真何曾有念雖終日參禪此理何曾有參以此真心離於參念也古德云念佛先須念自心自心無念絶追尋若言有佛有心念笑倒南無觀世音洞明本地風光者呈前不念不參之義若是參禪洞明本地風光得見本來面目即是參而不參之效驗所謂渡河須用筏到岸不須船也若是念佛了達唯心淨土得見自性彌陀即是念而無念之效驗可謂自家一箇彌陀佛見了何須用念頭也溪山雖異者以溪水有湖海江河淮濟之異山有五嶽泰嶺之別雖山水各異雲月皆同但有水處悉皆現月但有山處無不起雲所以道有水皆含月無山不帶雲以此溪山喻如參禪念佛名雖有異雲月喻如念佛參禪見理皆同也那裏不是平等之法者乃科家總結上文參禪念佛不相妨礙之義既是雲月皆同處處普現此理凡聖平等有情無情法法皆具故云那裏不是平等之法古人道教演三乘佛所宣禪分五派祖師傳教明性海歸真理禪唱宗風達本源會得禪宗須合教但明教旨自通禪禪教兩般都拈却萬里無雲一樣天要知縱橫不礙處者是科家徵問要人著眼知道參禪念佛見理不礙性於諸法平等下文伸答顯露也處處緑楊堪繫馬家家有路透長安此二句答上文不礙之義分明指出隨流得妙如處處緑楊堪可繫馬家家有路皆透長安此喻一切諸法普彰此理古德云月到梧桐上風來楊柳邊夜深人復靜此境與誰言可謂頭頭顯現物物全彰東西南北豈用思量所以道處處菩提路門門古佛家山華似錦水如藍莫問前三與後三心境廓然忘彼此大千沙界總包含前二句引宗喻如是法平等無有高下此言法身真理如山花似錦湛水如藍皆是顯揚此道可謂山河草木揚真諦風月樓臺演妙音也莫問前三與後三者科家分明指示既是諸法顯理何必更問前三後三之義昔無著禪師遊五臺至中臺之下荒僻野處文殊化一古寺接他歇息文殊便問近離甚處著云南方殊曰南方佛法如何住持著云末法比丘少奉戒律殊曰有多少衆著云或三百或五百無著却問文殊此間佛法如何住持文殊曰凡聖同居龍蛇混雜著云有多少衆殊曰前三三後三三無著不契却坐喫茶文殊舉起玻璃盞子曰南方還有這箇否著云無殊曰尋常將什麼喫茶著無語至天明辭去文殊令均提童子送出門首無著問童子云適來汝師道前三三後三三是多少數童子召云大德著應諾童子云是多少數著罔措又問此是何寺童子指金剛窟後面著回首視化寺童子悉隱不見唯存空谷所以雪竇頌曰千峰盤屈色如藍誰謂文殊是對談堪笑清涼多少衆前三三與後三三科家意謂既是山花似錦一草一木無非文殊無著又問前三三後三三是多少蓋不明凡聖同居龍蛇混雜之道故云莫問前三三與後三三此責無著錯過文殊也後二句顯此法身無有高下之義心境廓然者若了此心平等心無凡聖之執境無高下之見所以忘彼忘此事理圓融能所俱泯方知心包太虗量周沙界故云大千沙界總包含口裏叨叨念彌陀心頭人我似干戈其心若不從頭改磕破骷髏當得麼前二句科家意謂如今目前之人雖是喫齊念佛其實人我之心未除雖終日念佛不明念佛之性然有念佛之名而無念道之實外相雖善內心實惡故云心頭人我似干戈佛告獅子吼菩薩云念佛參禪有身寂靜心不寂靜者或有比丘靜處坐禪遠離四衆心常積習貪嗔癡是名身寂靜心不寂靜也心寂靜身不寂靜者或有比丘親近四衆國王大臣而常斷絶貪嗔癡是名心寂靜身不寂靜也身心寂靜者即諸佛菩薩也身心俱不寂靜者即一切凡夫也雖然口裏念佛其心之內人我干戈而不息也後二句科家誡勉學人雖是念佛須要斷妄明真其心若不從頭改惡遷善掃除人我縱然磕破骷髏禮佛念佛終不得見性亦有我人之心也世上愚人無智慧唯知愛欲及貪財何如一筆都鉤斷好念彌陀歸去來始初二句言衆生愚迷無有智慧唯知愛欲貪財心上不生智曰愚意內不發慧曰癡情染五欲曰愛執著財寶曰貪故云唯知愛欲及貪財也末後二句科家誡勉離貪若是念佛行人而看不破財欲二事現世皆為枷鎖纏縛過去必入三途受苦故教將此惡業因緣一筆鉤斷專心念佛願生淨土歸去來也福智無比二法周圓塵沙結良緣功行纍劫果滿因圓此科昭明太子判此一段經文名為福智無比分第二十四蓋以三千世界七寶布施為福不及持經四句之福此福無比以持經顯般若之智成就佛果斯智無比故立名也二法周圓者以福智二法周圓成兩足尊此名自利也塵沙結良緣者既是二法周圓自利得成佛果然後分身百億入於塵沙世界教化衆生廣結良緣此名利他也功行纍劫者呈前福智既已周圓而又自他俱利則知功行同佛三祇劫盡果滿因圓即同佛之用也智燭普照一月當天圓明朗朗無心鑒大千智燭普照者既具福智二法即同佛用教化衆生如智燭之明能除黑暗似月當天高低普照此是平等之義即平等性智也一月者能除諸暗為世光明即成所作智也圓明者明之又明故名圓明即妙觀察智也無心鑒大千者此是佛果已證三身四智無功用地以無心利物即大圓鏡智也般若真空性福慧兩雙修四句無為法持念片時周前二句牒經之義般若者即智也性即理也以如理智能斷煩惱得證法身即慧也其餘五度行檀即福也若復有人以七寶布施為福能持此經為慧若人福慧雙修受持四句無為之法直下明了自性即得成佛故云持念片時周以總持般若一念即具足三身也福智無比分第二十四經須菩提若三千大千至乃至算數譬喻所不能及注曰此節經文名福智無比分因須菩提前來聞佛所說修一切善法即得阿耨菩提故起疑云今佛所說善法是無記性豈得菩提耶佛恐有疑故乃斷之云若復有人以三千大千世界中諸須彌山皆七寶聚以用布施校之持說四句之福勝前七寶布施百千萬億分所不能及故其福無比也又諸佛所說法雖屬名句文身似無記性而以四句般若之智了名句文身皆悉體空即無漏善法非無記性成菩提因其福德勝此智無比也慈民偈曰雖言無記法而說是彼因是故一法寶勝無量真寶此說之義非唯是菩提因亦由前來諸義勝故所以四句倍勝也又以七寶布施所得功德皆為住相不出有為終須退墮不如受持般若四句之偈所得功德無有住相得證無為成就佛果故勝前功德百千萬億乃至不可以算數譬喻所及也傅大士頌曰施寶如沙數唯成有漏因不如無我觀了妄乃名真欲證無生忍要假離貪嗔人法知無我逍遙出六塵福等三千施須彌之七寶經持四句耀智海之明珠能令識浪澄清頓使義天開朗弘慈普濟廣利無邊夜半正明還在何處福等三千者牒經之義經云若人以三千大千世界諸須彌山七寶之聚布施所得之福故云福等三千也經持四句者亦牒經義經云若人以此般若乃至四句受持為他人說勝前之福如耀海之明珠以般若大智猶如大海廣無不容深無不納世出世法無不包羅又如明珠十方俱照般若之光亦復如是一切諸法無不照明故云受持四句功德勝也能令識浪澄清者呈前受持般若四句功驗喻如明珠能清濁水也若是行人以般若智現前能令八識心海波浪澄清頓使第一義天普現開朗映徹所以云浩浩三藏不可窮淵深七浪境為風此言第八識為海前七識為浪被無始以來習氣境風鼓動心海故有波浪今此般若神珠投人心海變濁為清了妄即真方成智海亦名薩婆若海此第八識至八地菩薩方捨此識始得澄清所以轉八識成四智可謂大圓無垢同時發普照十方塵剎中復以般若智珠照諸法空第一義天朗然開現也弘慈普濟者前是自利此是利他復以弘慈運四無量心酬四弘誓願普濟衆生故云廣利無邊也夜半正明者玄中銘云夜半者子時也彼時黑白未分借為正位正明者即子時正午月明表正不坐正夜裏虗明借為偏也科家意謂夜半正明還在何處者欲顯入𢌅垂手曲為今時下文伸答露也三身四智體中圓八解六通心地印此二句是答上文之辭三身者即法報化三身也四智者即成所作智妙觀察智平等性智大圓鏡智也體中圓者以法相宗中所說轉八識為四智束四智為三身轉前五識為成所作智轉第六識心王為妙觀察智轉第七識為平等性智轉第八識為大圓鏡智也束四智為三身者以成所作智為報身以妙觀察平等性二智為化身以大圓鏡智為法身此三身雖有三名體中無異故云體中圓即一體之中圓具三身四智如摩尼寶有圓滿相有光明用隨方現色相也八解者即八解脫也六通者即六神通也雖有八解六通不離一心顯現皆從法界真心一體印出也寶聚山王算莫窮還如仰箭射虗空洞明四句超三際絶勝僧祇萬倍功前二句牒經義以須彌山王七寶布施得福雖是無窮未離三界故住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得來生不如意以天福盡還入三途也後二句以持經四句洞明般若一念頓超過去未來現在三際又勝過三大阿僧祇劫修證萬倍之功也所以道一念頓超空劫外元來不許老胡知一毛頭上為拈花笑倒傍邊老作家要問相逢端的意摩尼達哩吽癹吒前二句是科家手眼把住說話昔古德示衆云世尊於靈山會上拈金色優波羅花示衆唯迦葉破顏微笑老僧於一毛頭上拈出一朵金色優波羅華汝等諸人還見得麼故云一毛頭上為拈華也笑倒傍邊老作家者科家意謂似你這等示衆喚作承機接嚮倣效成風爭奈知音者哂故云笑倒傍邊老作家也後二句科家拈轉話頭別行一路我不向世尊拈花處作活計你要問賓主相逢端的之理我只將一箇寶樓閣真言答之摩尼達哩吽癹吒豈不是相逢處所顯端的之意宗門所說不貴語親只圖眼正所以拈來無不是用處莫生疑也佛言我於無量俱胝百千劫雖行苦行不得菩提才聞此陀羅尼故加行相應便成正覺決定無疑善住陀羅尼經云若人聞此呪受持乃至聞名或手觸之或身佩之或眼見或書寫於紙帛壁上者五逆四重謗佛毀法乃至屠膾盲聾貧窮魔外邪見惡心悉皆殄滅若聞名字受持者定證無上菩提世間國王大臣等皆悉歡喜供養見世具衆功德離世衆苦毒藥刀杖水火惡獸不能為害無諸惡病睡安覺安臨命終時心不散亂諸佛現前隨意往生諸佛國土每於晨朝念百八遍若至十萬遍見十方一切如來二十萬遍見一切佛土一百萬遍見一切佛灌頂成就菩提此乃教中所說之義也我憶彌陀如父母彌陀觀我似嬰孩心心念念常無間父子相隨歸去來大勢至菩薩云我憶往昔恆沙劫中有佛名無量光十二如來相繼一劫最後佛名超日月光彼佛教我念佛三昧十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開我本因地以念佛心入無生忍古德云佛憶衆生勝母親衆生憶佛合天真子無逃逝歸來也兩個分明是一人也心心念念常無間者優曇曰若復有人決欲往生專持一念歷歷明明祇此一念是我本師祇此一念即是化佛祇此一念是破地獄之猛將祇此一念是斬羣邪之寶劒祇此一念是開黑暗之明燈祇此一念是渡苦海之大船祇此一念是出生死之良方祇此一念是超三界之徑路祇此一念是本性之彌陀祇此一念是唯心之淨土安樂也如此念病苦也如此念生也如是念死也如是念故云心心念念常無間斷父子相隨同歸淨土蓋以彌陀如父衆生似子若父子同體決定往生也化無所化機分小大空生莫疑猜四生六道去住還來梁昭明判此一段經文為化無所化分第二十五以佛無能度之心亦不見有可度之機如經云實無衆生如來度者故立此名為化無所化也機分小大者以心有二執即名小乘如經云凡夫之人以為有我即我執也以心無二執即名大乘如經云如來說有我者即是真我故云機分小大也空生莫疑猜者此科佛招須菩提汝等勿謂如來作是念我當度衆生須菩提莫作是念實無衆生如來度者此言於真法界中平等無二凡聖一如無能度所度故云空生莫疑猜也四生六道去住還來者以因有我故起惑造業所以妄分四生六道衆生假名五陰實法去來不住輪回不息如車碾道似蟻循環者也回光返照面目明白疑心頓歇江霞遍九垓此文呈前之義前云四生六道雖有去來之動作皆不離法界真心行人若能一念回光返照不逐相見不隨境轉心無能所所以得見本來面目即真我也又以疑心頓絶能所兩忘一道神光普天匝地十方法界唯心所現故云紅霞遍九垓也大乘深奧理解悟有多般實我實無我仔細好生觀初句言一真法界凡聖平等四聖六凡均稟同賦故云深奧也次句言凡聖雖是平等爭奈解悟而有多種不同六凡迷之不解故流轉六道二乘悟之執著偏空菩薩深悟中道執著中道已上之人同悟一箇真空實相各見所解階級不等如三獸渡河深淺各異故云解悟有多般也後二句言實我者即如來真我也實無我者即凡夫妄我也仔細好生觀者乃是科家叮嚀之意要人於二我之中仔細參詳觀看不可錯過也化無所化分第二十五經須菩提於意云何至如來說則非凡夫是名凡夫注曰此分名化無所化佛恐須菩提起疑聞佛前云是法平等無有高下云何如來却度衆生此是錯解故佛止云汝等勿謂如來作是念我當度衆生實無有衆生如來度者慈氏偈云平等真法界佛不度衆生以名共彼陰不離於法界論釋曰名即衆生假名陰即五陰實法也此假名實法皆即法界故云不離於法界既即法界凡聖一如豈有衆生可度故云佛不度衆生以一切衆生本來是佛所以心佛及衆生是三無差別故也若有衆生如來度者如來則有我人衆生壽者意云如來若謂我為能度之佛衆生為所度之機此則著於四相也反顯如來心無能所永離四相非度而度度而非度也佛又云如來說有我者即佛之真我也則非有我者以佛無有妄我也而凡夫之人以為有我者以凡夫之我是我執也佛復云凡夫者如來說則非凡夫論釋云非凡夫者即非生也謂即不生聖人之法也魏釋經云即毛道凡夫也謂行人之心不定猶如輕毛隨風東西故名毛道無著云小兒凡夫也以癡如小兒故也天台智者頌曰衆生修因果果熟自然圓法船自然渡何必要人牽恰似捕魚者得魚忘却筌若道如來度從來度幾船無我無人衆生自成正覺不生不滅如來說非凡夫雖然箇事分明爭奈當機蹉過此明如來心無我人四相即無能度也以衆生自成正覺本來是佛即無所度也不生不滅者言此理亘古常存本不生滅故如來說非凡夫即不生聖法故言其即心是佛本來具足故云非凡夫也雖然箇事分明者科家意謂雖然上文說的此箇道理真妄分明聖凡平等皆具一真法界爭奈衆生迷真逐妄背覺合塵於日用動靜之中當機錯過猶如持珠乞丐懷寶迷也昔有僧問翠巖云還丹一粒點鐵成金至理一言轉凡成聖學人上來請師一點師云不點僧云為什麼不點師云恐汝落凡聖且道不落凡聖底人具什麼眼此僧問處乃借事顯理謂之倘不發問先家履踐無期得入所以借道門之義而問也昔真人謂道光曰金丹者乃先天真一之氣非後天渣滓也此之一氣恍惚杳冥視之不見聽之不聞摶之不得謂之一氣蓋最初仙家用九還七返之工夫煉就金丹之大藥此謂之內丹若人服得一粒即抽胎換骨飛身輕舉白晝升天可為仙也借此以喻禪門佛祖所說至理之言微妙心體行人於言下會得即能轉凡為聖立地成佛如瓶中養鵝一呼便出壁上高僧一呼便應皆是至理一言轉凡成聖之樣子也此僧又問學人上來請師一點乞望指教開示可謂自無安身處未免告他人師云不點者此是不答而答分明指示無言之道不容開口也僧云為什麼不點者此僧當頭錯過不領其旨所以夜來丹鳳冲霄漢失曉樵人逐鴈羣師云恐汝落凡聖者此是落草之談重重指示也且道不落凡聖底人具什麼眼者乃科家發明上義審問行人於斯著眼下文伸答是也直饒聖解凡情盡開眼依前在夢中此二句答上之辭要行人超出凡聖別作生涯意云直饒聖解凡情俱盡依舊夢中作夢大槩要人不許住著凡聖復將不住之心亦須掃除方得脫灑自在可謂迷悟到頭俱莫戀眼中金屑亦難留到岸從來不用船坦然大道透長安了知元不因他悟面目分明總一般此四句頌上經義實無有衆生如來度者以衆生本來具足天真之理踞涅槃岸入不死鄉豈假如來度之故云到岸從來不用船也次句以大道坦然無修無證人人有分箇箇圓成故云大道透長安可謂處處長安道門門古佛家三句衆生既具此道了知元來不因佛出而悟此理也結句以佛於衆生本來一體故云面目分明總一般所以道心佛及衆生是三無差別前三三與後三三擬議思量總不堪饒汝識情俱絶斷三生九劫更重參初句前三三後三三者上文已載昔無著文入五臺山華嚴寺金剛窟遇一老翁牽牛而行邀文入寺翁喚均提童子應聲而出迎翁縱牛引文升堂文見堂宇皆耀金色翁乃踞床指繡墩命無著坐翁問曰近離甚處文曰南方來曰南方佛法如何住持文曰末法比丘少奉戒律曰多少衆文曰或三百或五百文却問此間佛法如何住持曰龍蛇混雜凡聖同居文曰多少衆曰前三三後三三翁喚童子致茶并酥酪文納其味心意豁然翁拈起玻璃盞問南方還有這箇麼文曰無曰將甚麼喫茶文無對見日色晚遂問翁言投一宿得否翁曰汝有執心在不得宿文曰某甲無執心翁曰汝曾受戒否文曰受戒久矣曰汝無執心何用受戒文辭退翁令童子相送文問童子前三三後三三是多少子召大德文應子曰是多少文復問此為何處曰金剛窟般若寺也文悽然悟彼叟即文殊也不可再見即稽首童子願乞一言為別子云面上無嗔是供養口裏無嗔吐妙香心裏無嗔是真寶無垢無染是真常童子言訖與寺俱隱但見五色雲中文殊乘金色獅子雲中往來忽然白雲從東來覆之不見也明昭頌曰廓周沙界勝伽藍滿目文殊是對談言下不知開佛眼回頭只見翠山巖科家引此問答發明此中不落凡聖之義昔文殊道前三三後三三與無著分明指出當人分上一箇道理要人不落心思言議直下會得但涉思量擬度於理即不堪也縱汝離心意識情量俱絶於聲前領旨句外明宗亦不許認著更須三生九劫再參始得相應也白髮雙親齒漸衰勤供甘旨莫遲回試學昔日能仁氏奉事尊堂歸去來前二句乃科家勸人奉孝行容老年之相其間所用老年之飲食衣服為子者或在家出家則勤供甘美之食出外則即回早轉所以論語云父母在堂不可遠遊遊必有方欲至某處不可過了時限若過限回來則遲恐致父母生憂故菩薩勸孝偈曰堂上有佛二尊懊惱時人不識不用金彩莊成非是檀香雕刻祇看現世爹娘便是釋迦彌勒若能供養得他何用別作功德不因父母所生且道你身何得母娘十月懷胎多少辛勤勞役及其坐草之時性命懸絲危厄須臾子母相見慙愧冤家解釋不論是男是女明珠寶珍憐惜何期長大成人全無孝義禮節問著瞋目努睛應對如同抵敵父母彈指嗟吁惆悵雙雙淚滴君還如此為人休問前程消息我見不孝之人虗空雷公霹𮦷折罰現世貧窮伶俜不度朝夕勸君省定晨昏竭力和顏悅色若要鳳髓龍肝須得為他求覓有無欵曲披陳不可言前阻逆在世甘旨無虧死後不須追憶君能如此用心天地神明佑翼若不富起有家定須高官顯職後二句指示行人效佛行孝故乃試學昔日能仁者昔佛因地中在於雪山為鸚鵡鳥父母皆盲常取好果先奉父母時有一田主初種穀時而發願言所種之穀要與一切衆生共噉鸚鵡子已知田主先有施心故常取之以供父母餘諸衆鳥箋穗滿地主見如斯瞋心生惱設羅捕之鸚鵡被網語主言主先發好心故敢未取今何見捕主曰取穀為誰鳥曰有盲父母以穀奉之主聞憐曰自今已後常於此取畜生尚爾孝養父母豈況人耶佛言鳥者我身是也主者舍利弗是也父母梵王摩耶是也由曠劫以來孝養父母故今成佛知恩報恩得大涅槃非但人道中報父母之恩於禽獸內亦報其恩也末句奉事尊堂者乃科家勉勵後人如佛奉事尊堂亦得成佛故云歸去來也法身非相不在心懷絶中間與內外聲色見我未出輪胎昭明太子判此一段經文為法身非相分第二十六以佛說若以色見我以音聲求我是人行邪道不能見如來即不能見法身如來故立此名法身非相也不在心懷者此科須菩提白佛言如我解佛所說義不應以三十二相觀如來悟此法身不屬眼見耳聞亦乃心不可思言不可議故云不在心懷也絶中間與內外者既悟法身絶其中間六識而內六根外六塵亦皆體空故云絶中間與內外所以論引偈云惟見色聞聲是人不知佛以真如法界非是識境故也聲色見我未出輪胎者若以音聲色相見佛此相即是應身不是法身無為之理未免輪回生死以有相有為者是輪回生死之脴胎故云未出輪胎也若離聲色難見如來徒勞遠覓文殊在五臺此是科家手眼顯出已見恐人離聲色處認著若離音聲色相難見如來法身要人即聲色就是法身所以相好亦從法身中流出若見相好即見法身如來長水曰此一分約假成真故以不離相好而見法身也徒勞遠覓者此顯文殊大智即聞聲見色者是不必遠覓五臺日用之中何曾離却昔無著問善財曰我欲見文殊何者即是財曰汝才發一念清淨心即是著曰我發一念心清淨為甚麼不見文殊財曰汝一念心清淨就是文殊何須更覓文殊故云徒勞遠覓也有相即無相無相亦非真兩處俱不立一體是方親前二句以須菩提領佛問義即答云如是如是以三十二相觀如來法身意云若見相好即見法身故云有相即無相也次句無相亦非真者以須菩提次答佛問如我解佛所說義不應以三十二相觀如來法身悟法身非相可見故云無相亦非真也後二句以真法界中有相及無相二法俱不可立唯如如之體方是親切處故云一體是方親可謂二邊俱不立中道坦然平法身非相分第二十六經須菩提於意云何至是人行邪道不能見如來注曰此分之義以須菩提聞前第十七疑中云法身不應以色身諸相見之佛恐有疑故發此問云可以三十二相觀如來不佛意謂三十二相者即應身也觀如來者即法身如來也此明佛之問義可於應身相好中觀見如來法身否以此而問也須菩提領解問義故答云如是如是以三十二相觀如來意云見三十二相即見法身故云如是如是可謂法身遍在一切處一切衆生及國土也佛恐須菩提於應身中取著而不達法體虗玄故復以輪王即如來遣疑以輪王與佛相好皆同然以王相因福而生煩惱未斷佛相從法身所現無明永除故凡聖不同心體各異也須菩提深解法體於是白佛云如我解佛所說義不應以三十二相觀如來意云不可以相觀法身悟法身非相見也爾時世尊見須菩提深契法體故說偈證之若以色見我者色即三十二相我即法身真我汝不可以眼見我之法身何以故法身無色相故不可以色見也以音聲求我者即佛說法之音故佛法身不可以耳聞也聲色者即識心所緣之塵境若以聲色見聞我之法身者是人行邪道不能見如來以如來法身者非色非聲無形無狀不可以智知不可以識識在凡不減在聖不增看時不見悟時全彰傅大士頌曰涅槃含四德唯我契真常齊名八自在獨我最靈長非聲非色相心識豈能量看時不可見悟理即形彰妙相莊嚴聖王相即如來相法身周遍如來身異聖王身若向這裏見得徹去鷺倚雪巢兔棲月殿其或未然此文牒經義略釋如來報應之身即三十二種妙相萬德莊嚴也轉輪聖王外貌端嚴亦具三十二相所以即如來相與佛則同也若論佛之法身周遍十方世界而不離此座身遍塵剎佛身充滿於法界普現一切衆生前所以異於聖王然以輪王不明佛性未出生死但享福有時而盡故長水云佛相從法身所現王相以福因而出凡聖雲泥相同體異也若向這裏見得徹去者此是科家審問行人若向如來身與聖王身或同或異見得明白通徹而去如鷺倚雪巢兔棲月殿即遠觀似同近覩則異以鷺雪兔殿則同動靜而有差別喻輪王與佛相好雖同而輪王與佛體用各異可謂雪裏鷺鷥飛起見柳中鸚鵡語方知其或未然者科家意謂果能於如來聖王處分辨不出未能見徹故云其或未然也石火已揮天外去癡人猶看月邊星此二句是科家答上未然之義迷理逐事認妄為真無擇法眼其實點他不能分辨輪王與佛色相雖同其佛法身妙用與輪王實異故喻石火已揮天外去而癡人不知猶看月邊星是火此罰錯認聖王相為如來相故云癡人猶看月邊星可謂三汲浪高魚化龍癡人猶戽夜塘水公案現成重審問愛情翻欵錯承當不應聲色行邪道結罪無因見法王此頌牒上經義略釋前二句公案者普應國師云所謂公案者乃喻乎公府案牘法之所在而王道之亂治焉實係公府也言公者即聖賢一轍天下同途之至理也案者乃記聖賢為理之正文也所以有天下者未嘗無公府有公府者未嘗無案牘書文蓋欲取以為法而斷天下之不正也公案行則理法用理法用則天下正天下正則王道治矣夫佛之教法祖之機緣亦目之曰公案蓋非一人之臆見乃會諸聖靈源契合妙旨三世十方百千開士同稟之至理也故謂之公案今言現成公案者即經文佛告須菩提於意云何可以三十二相觀如來不須菩提言如是如是以三十二相觀如來此之答者即相好中觀如來法身所謂之現成公案也重審問者佛言須菩提若以三十二相觀如來者轉輪聖王則是如來此謂之重審問也愛情翻欵錯承當者初須菩提愛情執著應身相好即是法身而被如來以輪王喻之而難問是須菩提翻其前欵自謂錯解承當相好以為法身而却云不以三十二相觀如來蓋自招呈錯認故云愛情翻欵錯承當也後二句不應聲色行邪道者即經文佛說偈言若以色見我以音聲求我是人行邪道不能見如來結罪無因見法王者科家意謂若以色相音聲見佛法身者即是邪見行於邪道招結煩惱罪業之因無由見佛法身故云結罪無因見法王也九年面壁自知非不若抽身隻履歸莫道少林消息斷白雲依舊擁柴扉前二句明達磨九年面壁顯示無言之道獨露真常之旨尚自知非不若抽身西歸為妙正如須菩提翻欵自招錯認相好以為法身一般故云不若抽身隻履歸也後二句莫道少林消息斷者科家誡勉行人莫道達磨隻履西歸此土少林斷絶消息無有斯道但看白雲靉靆淥水彎環獨掩柴扉達磨宴坐何曾去也若論這箇消息自古至今山河大地情與無情皆無間斷微妙之理故天寧楷禪師頌曰一法元無萬法空箇中那許悟圓通將謂少林消息斷桃花依舊笑春風三界忙忙何日省六塵擾擾幾時休西方一路超生死齊念彌陀到地頭前二句歎此娑婆有三界六道一切衆生於斯往來不息輪回生死何日省悟復被六塵色香味觸之法煩擾造罪無邊何時休息所以道朝也忙來暮也忙心猿意馬甚顛狂六門深鎖牢拴間烈焰光中便得凉後二句讚美西方世界乃出三界六道輪回生死之大路故云西方一路超生死也汝諸人但肯齊心念此一聲阿彌陀佛皆得到於地頭同生西方淨土蓮胎化生也無斷無滅自古長存不滅更不生山河成壞這箇安寧昭明太子判此一段經文為無斷無滅分第二十七蓋佛說發阿耨多羅三藐三菩提心者於法不說斷滅相佛意不以相好觀如來者但令行人離取著之相不同小乘斷滅之見非謂諸佛菩薩不從相好福德而成欲以應身而修福德故云無斷欲以智慧而證真身故云無滅故立名為無斷無滅也自古長存者既是此理無有斷滅可謂自古長存也不滅更不生者上明如來所證菩提不從福德而致是則菩薩所修福德欲成菩提之因亦不能克果耳佛意為斷此疑告曰莫作是念如來不以具足相而得菩提具足相耶福德相也蓋大乘所修福德之因所得福德之果但離取著之心大乘方便經云佛言一實境界者謂衆生心體從本已來不生不滅乃至諸佛心菩薩心二乘心凡夫心皆不生不滅真如相故是名常作心故云不滅更不生也下文引喻證之山河成壞者此顯不滅不生之理世界有成住壞空此菩提真心本無生無滅無成無壞故云這箇安寧法華經云衆生見劫盡大火所燒時我此土安隱天人常充滿又云常在靈鷲山及餘諸住處溫陵曰安隱者即實報莊嚴土亦云法性土也靈山者即己靈也非形非器故劫火莫能燒亘古亘今常住不滅於斯明得而穢土即淨土也無來無去耀古騰今人人本具鍮石不換金此義呈前不生不滅之理非但無有成壞亦無過去未來現在三世之易雖無三世之易亦不曾離却三世故云耀古騰今也所以大方等大集經云於一法不生二相是名不來不去不住以不住故乃至無有作者無有愛者故云無來無去也人人本具者結上不生不滅之理雖人人本具此道在當人分上與佛無二若不以相好而修福德則所發菩提心即成斷滅此似鍮石也若用相好而修福德但不取著即是真智喻如真金若執本具不修相好福德終不得證如來法身故云鍮石不換金也不生亦不滅無斷亦無常常樂并我淨非不好商量此四句顯無生無滅之理也前二句科家意謂生滅斷常亦名四相生滅屬凡夫見斷常屬外道見四皆本空即離四相也華嚴疏云生之無生真性湛然無生之生業果宛然是知若即念存有念即是常見離生求無生即是斷見皆是不達實相無生無滅之理若證了無生則無生無不生也豈定執有生無生之二見乎若悟此無生之理四相皆除也後二句常樂并我淨者既離上來四相正好商量涅槃四德所謂凡夫迷自法身遍計五蘊是常是樂是我是淨故佛令衆生修無常苦空無我不淨以破之而衆生依佛修無常苦空等以證二乘尚迷真常真樂真我真淨故佛破其所執云常計無常樂計無苦我計無我淨計不淨故又破其二乘四倒之見而復示云常是法身義樂是涅槃義我是佛義淨是法義然諸佛世尊實有無量無邊之德唯此四德盡皆該之也無斷無滅分第二十七經須菩提汝若作是念至於法不說斷滅相注曰此分名無斷無滅之義也以須菩提聞佛前來不以三十二相觀如來法身恐有此疑所以就疑問之云汝若作是念如來不以具足相故得阿耨多羅三藐三菩提者此敘須菩提之疑念云不以具足相得菩提正是所毀之相也佛又招告須菩提莫作是念如來不以具足相故得菩提者誡其勿疑重牒所毀之相也佛復謂須菩提云汝若作是念發阿耨菩提心者說諸法斷滅汝意謂既不以具足相而修福德則所發菩提之心即成斷滅之過故佛仍言莫作是念此是重重誡勉勿疑也佛又云何以故者佛自徵問上義以何意故莫作是念下文出其所以云發阿耨菩提心者於法不說斷滅相蓋大乘菩薩所修福德之因所得福德之果皆用具足相而修福德以證佛果但不取著相好故即真智慧也有智慧故即是真身有福德故即是應身所以於法不說斷滅相也智者禪師頌曰相相非有相具足相無憑法法生妙法空空體不同斷滅不斷滅知覺悟深宗若無人我念方知是至公相非具而本具常自莊嚴法雖傳而不傳何曾斷滅昔世尊於靈山會上人天衆前云吾有清淨法眼涅槃妙心付囑飲光廣令傳化且道當時傳箇甚麼初一節謂相非具者因前云相好非法身故須菩提一向執著不以具足相得菩提故云相非具足此即斷滅之謂也而本具者如來用具足相而修福德但不取著相好即真智慧方證菩提故不屬斷滅也華嚴經云雖知諸佛法身本性無身而以相好莊嚴其身也而本具者智慧真身也莊嚴者福德應身也論云具足福德莊嚴者應身也智慧莊嚴者真身也法雖傳而不傳者以佛佛授受祖祖相傳然於實際理中本無一法所傳其理雖無所傳然以性分之中聖凡均稟皆悉具足故云何曾斷滅也下文伸出無傳之義昔世尊於靈山會上等者此明佛在靈山末後拈花之事文出梵天王請問決疑經此中多說帝王之事隱而不載因梵天王獻金色優波羅華世尊拈起示衆人天罔知唯有迦葉破顏微笑深悟此理出於言外故佛付囑曰吾有清淨法眼涅槃妙心實相無相微妙正法今付飲光汝善護持廣令傳化者科家引此證明上來法無斷滅亘古長存無有所傳也且道當時傳箇甚麼者乃是徵問前義佛與迦葉有何所傳向下伸答是也青蓮目顧人天衆金色頭陀獨破顏此二句答上之義也顯示不傳而傳豈有斷滅所以拈花微笑之處默識心通何曾斷滅也一燈能續百千燈心印光通法令行千聖不傳吹不滅聯輝列焰轉分明始初一句以喻明教外別傳之旨猶如一燈續百千燈燈燈相續然之不盡也次句心印光通者正顯教外別傳之道以西天四七東土二三至五派已來佛祖相承以心印心代代相傳遍十方國流布無窮此法門名無盡燈若一菩薩開導百千衆生令發菩提之心於菩薩道亦不滅盡隨所說法而自增益一切善法是名無盡燈謂之法令能行也昔黃龍南親行此令十方諸佛無敢違者歷代祖師一切聖賢無敢越者無量法門一切妙義天下老和尚舌頭始終一印無敢異者異則且置印在甚麼處非僧非俗無偏無黨兵隨印轉將逐符行所謂世尊拈花迦葉微笑達磨面壁二祖安心見花靈雲疑情盡淨擊竹香嚴頓忘所知盤山肉案頭豁悟彌勒魚市裏接人誠所謂顛沛造次必於是經行坐臥在其中既有如是奇特更有如是光輝既有如是廣大亦有如是周遍汝等諸人因甚却有迷悟還知麼幸無偏照處剛有不明時後二句呈前之義顯此道千聖不傳諸祖不說喻如一燈然百千燈其光無盡故云吹不滅以無傳之傳至今不盡所以聯芳列焰轉更分明可謂自從少室聯芳後五葉花開直至今一點靈光塞太虗也非禪教也非儒打成一片誰人會具眼還他大丈夫起句明一點靈光塞滿太虗輝天鑑地大安曰汝等諸人各各自有無價大寶一點靈光從眼門放光照見山河大地耳門放光領采一切音聲如是六門晝夜常放光明亦名放光三昧汝等不少各自珍重故云塞太虗次句也非禪教也非儒者明斯一點靈光三教無別同稟一心傅大士曰道冠儒履釋袈裟合會三家作一家識得箇中消息意優曇元是白蓮華可謂多生悟覺非千衲一點靈明不在燈後二句雖具靈光打成一片不分三教能有幾人會得須是具眼高流行得之者方到不分之地古德云也要看經也讀書尊僧尊道亦尊儒徽宗敬道心偏向武帝欽僧性見殊秦始坑儒儒豈滅昌黎謗佛佛何除大明治世仁慈主三教同歸總一如故云具眼還他大丈夫也天樂簫韶花雨飛他方遊歷聖初回如雲海衆相迎接目擊金容歸去來前二句顯示西方境致天樂常嚮天花常雨彌陀經云彼佛國土常作天樂黃金為地晝夜六時雨天曼陀羅華也他方遊歷者以彼國菩薩欲以上妙之物供養十方無央數佛於一剎那頃遍禮十方諸佛聖賢自然在於佛前供養而供養畢回來還似初時故云初回也經云其土衆生常以清旦各以衣裓盛衆妙花供養他方十萬億佛即於食時還到本國飯食經行也後二句言此土念佛之人發三種心修三種行臨命終時正念直往彌陀觀音勢至無數化佛百千聲聞無量諸天清淨海衆如雲而至迎接行人坐金剛臺如彈指頃往生彼國得生上品親見彌陀授記作佛故云目擊金容歸去來

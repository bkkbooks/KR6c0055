body:
  text: 姚秦三藏法師鳩摩羅什譯隆興府百福院宗鏡禪師述曹洞正宗嗣祖沙門覺連重集離相寂滅誰為分別有口也難説五百世中割截支節此科昭明太子判此一段經文名離相寂滅分第十四以佛説離一切相發菩提心即是聞此經典離我人等四相即名諸佛證寂滅理因此立名為離相寂滅也誰為分別者既是離相寂滅即是離人法二執之相是名寂滅實相既無人執之見又有甚麼分別之情所以𪢬圇無內外和融上下平也有口也難説者既説寂滅之理心空四相必離人執即無分別心離法相離法執有何所説故云有口也難説所謂言語道斷心行處滅也五百世中者此文伸出上義離相寂滅所以也誰為分別者無人執也有口也難説者無法執也因無二執故菩薩能行忍如佛昔為歌利王割截身體非此一世無有二執於五百世中為忍辱仙人皆無二執故能行忍所以割截支節也而無一念妄生虗説成道證果雲散家家月而無一念妄生虗説者此明如來是真語者實語者如語者不誑語者不異語者意云如來非但五百世中行此難行難忍苦行之事又於無量劫來而無一念誑妄言説此顯佛語皆是真實而無虗妄又言佛説衆生有樂決定受樂佛説衆生有苦決定受苦如云日可冷月可熱衆魔不能壞真説善維經云諸婆羅門因共立制不與佛食若與佛食者罰金錢五百文時佛入城乞食人皆閉門空鉢而出有一女人以破器盛臭潘澱出門棄之見佛空鉢此女即生信心欲興供養思此臭食恐未肯取佛知彼意即受其施而授記言十五劫中天上人間受福快樂不墮惡道後得男身出家學道成辟支佛諸婆羅門云佛為食故妄語如此佛即出舌覆面上至髮際語婆羅門言汝見諸經書中頗有此舌作妄語不婆羅門禮佛悔過以此較之佛無妄語故有長舌之相也成道證果者謂佛從五百世中已離人法二執及一切相如此修進今得成道證果現十法界身隨類説法如雲散長空家家有月此顯處一座而十方俱現演一音而沙界齊聞故云雲散家家月廣智大師曰雲散家家月情蠲處處彰無依無用處便是法中王離相即非説古今常寂滅而無一念心任汝分支節離相者離我人衆生壽者之四相也即非説者既離四相更有何法可説故云即非説也古今常寂滅者既無四相於法無説亘古亘今不遷不變唯一實相之理故云常寂滅也而無一念心者言如來既無人法二執雖被他人節節支解而不起一念之心我被汝割截我之身分了無一念分別計執若有一念分別彼我之心則有嗔恨生焉既無嗔恨人法皆空即證無生法忍故云任汝分支節永嘉曰我師得見然燈佛多劫曾為忍辱仙離相寂滅分第十四經爾時須菩提聞説是經至離一切諸相即名諸佛注曰此節經文名為離相寂滅分也以須菩提聞説此經深解義趣者深解前來施捨身命所成之福不如受持演説四句之勝今聞此經感傷深恩遂悲泣流涕讚言希有自謂從昔以來雖得慧眼理證人空未聞此經甚深之義又云若人得聞此經信心清淨則生實相者意謂得聞是經即信般若不信諸法是謂信心清淨心既清淨實相生焉故云則生實相或者問永明曰何等名為諸法實相答曰所謂諸法畢竟空無所有以是無有者名為諸法實相也當知是人成就第一希有功德者意云此人得聞是經證實相理成就法身功德故謂第一希有也須菩提又稱世尊是實相者即是非相是故如來説名實相者所謂實相無相即是非相如太虗空無一形相正如水中鹽味色裏膠青決定是有不見其形實相亦爾故云是故如來説名實相也須菩提又云我今得聞如是經典信解受持不足為難乃至若當來世者意云我今值佛得聞是經不以為難而未來衆生得聞是法信解受持是為希有信解受持者心無狐疑曰信曉了義理曰解欽承不慢曰受佩服不厭曰持未來衆生如斯信解受持實為希有也又云何以故此人無我相等者此言須菩提徵問前義以何意故得聞是經實為希有者斯人依此經修不起我人衆生壽者四相也所以者何以無我相即是非相非相者即實相也離一切相即成正覺故云即名諸佛也無著云此人無我相等顯示無人取之執也我相即是非相者顯示無法取之執也離一切相者顯示無空空相之執也當知是人離相清淨解悟三空不著二邊不處中道一切無住契合實相究竟涅槃即名諸佛也傅大士曰空生聞妙理如蓬植在麻凡流信此法同火出蓮華恐人生斷見大聖預開遮如能離諸相定入法王家經佛告須菩提如是如是至無衆生相無壽者相佛云如是如是者乃允許之辭也長水曰從爾時須菩提聞説是經下至離一切相即名諸佛皆是空生之言於中大意有其六種一聞法悲泣二信心生實相三對彰難易四明無我人五法執兼亡六盡成佛故如斯皆是誠諦之言故佛印云如是如是也又云若人得聞是經不驚不怖不畏是人甚為希有者以大乘之法難信難解此人若聞經中無我人等四相不驚聞諸法空不怖聞空空不畏當知是人實為希有也又云何以故須菩提如來説第一波羅蜜等者佛自徵問以何意故此人聞法不生驚怖甚為希有故告須菩提言如來説第一波羅蜜以顯因中最勝前云是人聞經信解般若即為第一希有因聞般若即生實相希有之法此法無與等者故名第一若悟非相於法無著即達彼岸以俗諦中利益衆生故説第一波羅蜜也了悟人法俱空即無生死可度亦無彼岸可到以真諦中法性本空故又説非第一波羅蜜也又恐人執著二邊以第一義中離俗離真即事即理故云是名第一波羅蜜也又云忍辱波羅蜜如來説非忍辱波羅蜜是名忍辱波羅蜜者忍辱者六度之中第三是也安受曰忍毀害曰辱故云忍辱也前云捨身命之福報是生死之苦因不及持説之福此之忍行捨身命不成苦因者何耶蓋此之行忍能達諸法無我到於彼岸故云忍辱波羅蜜也如來説非忍辱波羅蜜者即遣執著以俗諦中若能行忍辱之行忍於能忍此名執著若以真諦之中了能行之行皆不可得故云非也是名忍辱波羅蜜者此一句後人妄添姑且解之若是行人不住能忍之行將不住之心亦乃不存方為忍辱波羅蜜也佛又云如我昔為歌利王割截身體者佛自引昔以證今也如是忍行我昔曾行故引歌利之事而證之梵語歌利此云極惡王謂如來因地修行證初地菩薩修忍辱行在於山中宴坐遇歌利王出城遊獵王乃至山困倦憩息睡醒不見左右彩女遂親入山見彼衆妃彩女圍繞禮拜仙人王乃大怒問曰云何恣情觀我女色仙人曰於諸女色實無貪著王曰云何見色不貪仙人曰專心持戒王曰何名持戒仙人曰忍辱即是持戒王乃將刀割仙人耳鼻手足問曰痛否仙人曰不痛王亦節節支解問曰痛否仙人曰實不痛其時輔相大臣諫曰彼之大士逢此患苦顏色欣然無所搖勤奈何大王如此加害王遂休止爾時王者即憍陳如是也仙人者即釋迦是也以仙人行忍辱行雖被加害略無嗔恨蓋能了達我人衆生壽者四相皆空也又云何以故者此是重徵上義佛意云以何意故無我人相也佛自云我於往昔節節支解時若有我人四相應生嗔恨返顯前義無有四相則無嗔恨也佛再告須菩提云又念過去於五百世作忍辱仙人於爾所世無我等者佛自引過去五百世中作忍辱仙以證歌利王事自明行忍非止一世也故舉五百世中能忍之迹以顯佛無妄説前不云乎而無一念妄生虗説以佛行忍行非唯無苦亦乃有樂所言樂者以心離四相二執皆空證無生法忍也傅大士頌曰暴虐唯無道時稱歌利王逢君出遊獵仙人橫被傷頻經五百世前後極時長承仙忍辱力今乃證真常經是故須菩提至皆得成就無量無邊功德是故須菩提菩薩應離一切相發菩提心是故者結前起後之辭也結前纍世行忍住忍辱仙以無我人得成菩提今得成佛故令發菩提心菩薩應離一切相發無上菩提大道也不住色相生心等者言發菩提心菩薩不住色聲香味觸法六塵即是離一切相也應生無所住心者言此菩薩心無所住即能住菩提也若心有住者此菩薩若心於法有住則非住菩提佛道矣是故佛説菩薩心不應住色布施是故者結前菩薩所行六度皆是無相布施其福量等法界不可窮盡以色為六塵之首施為六度之初故云不應住色布施也佛又告須菩提言菩薩為利益一切衆生故應如是布施者此菩薩如是行施為利羣生悉皆行無相布施也如來説一切諸相即是非相等者此言如來自説遣執著也六祖曰如來説我人等一切諸相皆無實體畢竟破壞非真實有即是非相也一切衆生盡是假名若離妄心即無衆生可得故云即非衆生也集解云一切諸相者即是法境也即是非相者顯法空也一切衆生者即是人境也即非衆生者顯人空也因此菩薩離一切相故云二執皆空也佛又呼須菩提如來是真語等者言如來所得菩提妙果如理而證離於言説何故纍稱持説功德勝於布施等福耶然佛於無所證而證於無可説而説所證所説無不當理恐善現未達此義故仍告云如來是真語者真語者即佛説菩提法也實語者即説小乘法也如語者即説大乘法也不異語者即説授記事也不誑語者即不誑衆生也如來所説五種之語悉是真實無有虗妄故壽命童子經云日月星辰可墜地山石從地可飛空海水淵深可令枯佛語決定無虗妄是也佛又告須菩提如來所得法此法無實無虗者如來自證云我所證之法本離言説故云無實對機有説故云無虗也佛又呼須菩提云若菩薩心住於法而行布施如人入暗即無所見者此明菩薩行施乃教化衆生也若住於法而行布施不達三輪體空名為住法布施若教衆生住著於法無由得見真性故喻如人入暗則無所見也若菩薩行於布施不著於法若達三輪體若離名了達依正皆不可得全體真空實相如斯義趣前云一恆河沙數身命布施功德不及受持四句偈等為他人説其福甚多善現既聞此義故感悟悲流雨淚也仙人垂慈弘忍等者言如來最初因他作忍辱仙於五百世中行忍辱行以了人法二空故得無生法忍雖被歌利王割截身體如雪刃謾斬虗空相似謂此菩薩了達此身如空也如是印可其詞者言佛印證許可須菩提前來所言於理切當故云如是如是印許能離一切諸相也意云此人無我人四相是人空也我相即是非相是法空也離一切相即名諸佛是空空也故云能離一切諸相也未審感悟處等者此是科家徵問前義且道須菩提感悟之理有何奇特處下文伸答顯露也豁開慧眼明如日返照微塵世界空此二句乃答上文之義也以須菩提聞説般若豁開慧眼證無我人四相空一切法如杲日當空百歲光陰石火光回頭何不早思量無常相請宜推托免向閻君論短長前二句歎人生百歲光陰迅速如石火之光不可久留也奉勸諸人何不回頭急早思量此身既是不久何不急早念佛求生淨土捨不堅身證真常身也後二句誡勉行人若依念佛法門出離生死苦海得生極樂世界縱有無常相請當可推托不能拘喚免入閻君之手豈可更論短長可謂了鬼神不破之機超生死不相干之地真樂真常真淨土寶池寶樹寶華開無寒無暑無凋變歸去來兮歸去來此四句明指西方境界也以彼阿彌陀佛剎中之人壽命皆無央數劫一生遂補佛位同證一常樂我淨即真淨土也不遷不變是名真常無二死苦是名真樂八大自在是名真我煩惱滅盡是名真淨土也有七寶池七重行樹四色蓮華無冬寒夏暑春榮秋凋之變如斯快樂之處普勸諸人何不早離穢土徑往蓮優曇頌曰一心念佛自相安冷眼常將世境看會得目前真淨土此心更不涉多端持經功德福多難比三時喻不齊住相布施終須有退此科昭明太子判此一段經文為持經功德分第十五以持經功德勝過三時布施功德故以此為名也福多難比者言三時捨恆河沙身命布施功德福報雖多是人天福未能見性難比持經功德以受持此經為人解説即能見性成佛也三時喻不齊者牒經文義明經中初日分即寅卯辰時也中日分者即巳午未時也後日分者即申酉戌時也有人如是一日三時捨無量身經無量劫而行布施不如聞經生信福德之勝何況書寫受持讀誦為人解説展轉勝彼百千萬億倍故云三時喻不齊也住相布施者言三時捨身命布施不達三輪體空但得人天之福終須有退以未明真性心生住著故有退也無漏智慧頓證菩提花開花㓔日東月落西此科須菩提若有人受持此經為人解説皆得成就不可思議功德如是人等即為荷擔阿耨菩提此言無漏智慧者即是般若無漏智慧不漏落二執二障之中故名無漏清淨智慧永明云我法皆空故契玄旨以我空故煩惱障斷以法空故所執障消煩惱障斷證真解脫所執障消獲大菩提然後行滿因門心冥果海故云無漏智慧也頓證菩提者言能持此經見無漏智則為荷擔阿耨菩提故云頓證菩提也花開花㓔者此是科家分明梧示既明無漏智慧頓證菩提以布施持經如花開花㓔日東月落西相似其無漏智如樹常存豈有開㓔如天本淨豈有日月明暗故云花開花㓔日東月落西也可謂雲去雲來天本淨花開花㓔樹常存此經功德勝誰人解受持寒山逢拾得拍手笑微微此四句以顯此經是大乘教須得大乘人方可受持經云若復有人聞此經典信心不逆其福勝彼三時布施之功又明此經是何等人能解受持下句指出寒山即文殊拾得即普賢此二菩薩方堪受持也以此二人相逢之際拍手而笑方顯離言之道不落文字真空無相之理也持經功德分第十五經須菩提若有善男子善女人至為發最上乘者説注曰此分名為持經功德也於是佛乃招告須菩提言若有男子女人一日三時以恆河沙等身命布施如是無量百千萬億劫以身布施者只得人間天上之福受盡此福還復墮落也若復有人聞此經典信心不逆其福勝彼者佛意云若人暫聞此經信心歸敬所獲之福勝前捨身命之福以此經深明實相人法二空所以勝也何況書寫受持讀誦為人解説其福倍倍轉勝也傅大士頌曰衆生及壽者蘊上假虗名如龜毛不實似兔角無形捨身由妄質施命為迷情詳論福與智不及受持經告須菩提以要言之是經有不可思議等功德者佛意云以此經捷要言之此經顯般若智體不可以心思言議豈可稱量則其功德廣大無邊非凡情所能測也如來為發大乘者説為發最上乘者説者意云此經所談乃真空實相之道非樂小法者所可得聞故曰為發大乘菩薩心者乃説此經通指行門三教即通別圓三等之人為發最上乘者説者單指圓教之人也經若有人能受持讀誦至以諸華香而散其處只得人空未得法空而有四相所在故於此經不堪聽受讀誦講演豈能擔荷無上菩提以斯之人愛樂小法不信大乘最上法也佛又呼須菩提云在在處處若有此經等者斯言所在之處若有此般若經一切天人皆應供養當知此處即為是塔以般若經是如來法身舍利寶塔故感天人恭敬作禮以諸華香而散其處凡有受持此經即如佛塔一切天人即以華香而散持經之處供養此人可謂一人辨心諸天辨供是也傅大士頌曰遍計於先了圓成證此時須乘無礙慧方便勸人持此經所在處寶塔未曾離法身常在內諸天共歸依布施千萬億劫之身福深於海為發最上大乘者説擔重如山慶快撩起便行且請依前放下何故此文乃牒經中之義也經云一日三時捨恆河沙數身命布施經千萬億劫所得福德如海之深廣言所獲之福甚多也為發最上者牒經中義經云若復有人聞説此經信心不逆所得功德如山之高大豈一人而擔荷也慶快撩起者此亦牒經之義慶者喜也快者暢也亦是拈情科家意云若是大乘之人聞説此經領荷如來最上之法暢然喜慶直下承當般若之智匪從人得云者慶快撩起便行也且請依前放下者科家恐人執著又與拈了也上云擔荷便行者似有一物在故且請放下這一物方是脫灑也昔有嚴陽尊者問趙州一物不將來時如何州云放下著嚴陽曰一物也無放下甚麼州云不放下擔著去嚴陽豁然大悟也何故者乃科家審問放下之義也大力量人元不動等間抹過上頭關此二句是科家答上文之義也若是大力量人不向佛祖語言上解義不去擔荷菩提只於自己腳跟下承當可謂離心意識參出凡聖路頭學以般若智人人本具不從千聖借豈向萬機求故云等間抹過上頭關也倒握吹毛掃異蹤頓令心地盡開通鋒鋩獨露毗盧頂凡聖齊教列下風此四句頌上文大力量人不動之義也以金剛寶劒比喻此理科家意謂這箇大力量人以金剛王寶劒掃除佛祖玄妙剪去異見邪蹤狐疑淨盡纖芥不存頓使各人心地開朗法性融通不容取捨聖凡那許欣經厭施總是不平之義盡教掃除頓令二際平等事理一如故云盡開通也下二句伸出開通之義梵語毗盧此云遍一切處即是鋒鋩獨露以喻此理遍在一切有情無情色非色處之上正恁麼時不見有四聖六凡之別故云凡聖立下風也可謂掃除佛祖見截斷聖凡情也百歲光陰燭在風誰人心與佛心同修行速往西方去足下蓮華步步生前二句歎此娑婆世界衆生壽命短促喻如風中之燭朝夕難保比況生死無常也誰人心與佛心同者以此界人心惟好造惡不修十善唯佛一人慈心無量故云誰人心與佛心同也後二句言衆生但肯依佛教法專心持念彌陀聖號即得往生西方淨土蓮華化生面禮彌陀親蒙授記行時以蓮華襯足住時於菩薩為伴證不退位即與佛心同為一體故云足下蓮華步步生也十念圓成一念回三心果滿九蓮開塵勞念佛同時去歸去來兮歸去來十念者即十氣念佛也一念者即臨終一念也若有行人盡此平生信向西方每日十氣稱念阿彌陀佛圓滿成就臨命終時於一念頃即得往生極樂世界故云十念圓成一念回也三心者謂深心至誠心回向發願心且此三心當得上品上生也蓮開即上品上生也其餘者有七日開者有四十九日開者有經八萬劫開者故云九蓮開也塵勞念佛者即在家念佛之人若能忙裏偷間專心念佛皆得同時生西方去故云歸去來兮歸去來古德云彌陀甚易念淨土甚易生但能誠一念俱登上品中能淨業障塵體雙亡五百億難量恆沙諸佛承事供養此科昭明太子判此一段經文為能淨業障分第十六蓋謂此人今生若為人輕賤是人先世罪業今被輕賤有犯不校常行般若觀罪即消滅故立此名為能淨業障也塵體雙亡者此科能持此經先世罪業即為消滅當得菩提也斯言塵者即八萬塵勞煩惱也體者以無明為體能生塵勞煩惱今以持經般若智力能滅罪業則得菩提故云塵體雙亡也八百億難量等者此科佛曾於然燈佛前得值八百四千萬億那由他諸佛悉皆供養承事無空過者也而今成道萬法齊彰圓明果滿春來日漸長乃是科家言佛今成道因供養諸佛功德方成道果始得萬法齊彰隨機應物可謂處一座而十方俱現演一音而法界齊聞也圓明果滿等者此言佛今成道即三祇果滿萬行周圓得究竟果也春來日漸長者此一句顯本分家風若是行人能持此經所得功德比供養諸佛功德即勝百千萬億分之福以持經能見性成佛所以得福最勝如春來日長大地自然之道可謂春到洞庭南北岸鳥啼西嶺月生東業障本來無心差轉見殊若悟三空理何處不如如此四句牒經中之義也前二句言經中為人輕賤先世罪業以此罪業真心之上本來無有因心有差隨妄所造以真如不守自性忽起無明妄現根身器界三細六粗次第而生起惑造業故見差殊之相也後二句若悟三空者即經中能持此經罪即消滅得證菩提即悟人空法空人法俱空理也即悟三三空證實相智所以法法無非般若頭頭總是真如可謂乾坤盡是黃金國萬有全彰淨妙身能淨業障分第十六經復次須菩提若善男子至果報亦不可思議注曰佛呼須菩提云若人受持此經為人輕賤者是人前世曾作罪業當墮地獄餓鬼畜生阿修羅道永無出期以今生止被人輕賤而已大論云先世重罪應入地獄以行般若故現世輕受譬如重罪應死有勢力護則受鞭杖而已以今世人輕賤故者此人持經雖被輕賤不著我人常修觀智則前生罪業而為消滅當來之世成就菩提也傅大士頌曰先身有報障今日受持經暫被人輕賤轉重復還輕若了依他起能除遍計情常依般若觀何慮不圓成佛又呼須菩提云我念過去於無量阿僧祇劫於然燈佛前者梵語阿僧祇此云無數時梵語那由他此云萬萬數謂十億為一洛叉即百萬也十洛叉為一俱胝即千萬也十俱胝為一那由他即萬萬數也佛自念云經無數劫於然燈佛已前供養無數諸佛功德只是求福而已不若持此真經見自本性永離輪回是故供佛功德雖百千萬億分不及末世持經功德一分故以算數譬喻所不能及也末世之人徒知事佛而不知佛究竟之理盡在此經所以持説功德甚大昔梁武帝造寺布施供佛設齋請問達磨有何功德祖云實無功德帝曰何以無有功德祖云此但人天小果有漏之因帝曰如何是真功德祖云淨智妙圓體自空寂如是功德不以相求後人不了此義以供佛修福以為功德不知功德在法身中非在修福所求所求之福不及功德供佛不及持經也佛復云若人於後末世受持此經功德我若具説者佛意云於我末世持此經者上雖校量供無數佛功德不及持經一分功德猶是略説若更具説此經功德乃是大乘之法即本有智也或有人聞心即狂亂者恐有樂小法之人聞此大乘心則迷悶狐疑不信也以道大機小難臻其妙故生狐疑當知是經義者義即般若之智此般若智不可思議也果報亦不可思議者果報即所得功德也因般若智而悟真性其所得佛果菩提功德故不可思議也宿業緣墮惡道今人賤而罪即消供諸佛誦此經功德勝而喻莫及只如無著無相底還有果報也無宿業惡道者此科為人輕賤先世罪業應墮惡道今世人輕賤常持此經直下見性而罪即消滅也供佛誦經者此科佛曾於然燈佛前供養八百四千萬億那由他諸佛不及持經功德之勝而譬喻所不能及也只如無著無相者此顯真空無相無著之理無有誦經可以滅罪亦無供佛可以得果也還有果報者此是科家徵問之辭似此無相法身實無果報可得所以永嘉道無罪福無損益寂滅性中莫問覓比來塵鏡未曾磨今日分明須剖析下文伸答也妄心滅盡業還空直證菩提超等級此二句答上文之義也直如無著無相法身之理既無罪福豈有果報妄心滅盡罪業還空可謂罪性本空由心造心若滅時罪亦亡也直證菩提既罪性本空即是菩提不假施功用行斷惑明真直下見性超過五十二位修進階級者矣惡因誰住罪誰招真性如空不動搖擴劫無明俱蕩盡先天後地寂寥寥初句牒經中之義經云是人先世罪業應墮惡道科家意云惡業之因是誰造作受罪之果是誰招感若論法相宗説乃是無明妄惑六識施設而為能造八識含藏而為能招故云業果能招引滿牽也今科家不然雖有因果罪業招感分明猶如水上之波雖有動搖之相乃是境風妄起妄滅本無實體此真如之性如太虗空湛然清淨本不搖動也若以衲僧門下罪業本空因果非有可謂真不立妄本空有無俱遣不空空也後二句牒經之義以今世人輕賤故先世罪業則為消滅得證菩提科家意云若行人修般若觀受持此經將曠劫虗妄無明盡情掃蕩獨須般若真空猶如大虗本自空廓故云先天後地寂寥寥也百歲光陰似水流無窮無盡幾時休不如先證菩提路悉免輪回得自由前二句歎人生一世止是百歲之期死而復生生而復死喻如水流前後相續無有門斷故云無窮無盡幾時休也後二句勉人修進意云既是生死無窮行人須當修大乘法證菩提道若以小乘之法雖修人天因果九次第定乃是未出輪回不得自在不如先證大乘初發心時便成正覺不被生死纏縛不被塵勞染汙故云悉免輪回得自由歸去來兮歸去來一靈休更入胞胎化生花上身金色目擊金容歸去來初二句即科家慈心太煞分明指示言謂兩個歸去來者乃是説了又説恐人不信故故嚀再囑也一靈休更者此明一靈真性即中有身若去父母邊投胎時最初起憎愛二種心入胎中有七種不淨一種子不淨謂此淫欲身從貪愛煩惱無明種子而生也二受生不淨謂此身從父母赤白二滴和合識投其中也三住處不淨謂此身處母胎生臟之下熟臟之上而住胎十月也四食噉不淨謂在母胎中唯食母血餅也五初生不淨謂此身産時頭向陰門與血俱出臭穢狼籍如兩山相夾落草如活牛剝皮也六舉體不淨謂此身薄皮之內膿血遍一切處也七究竟不淨謂此身始自初生漸漸更改少而壯壯而復老老而復死胖脹爛壞骨肉縱橫狐狼食噉也以此色身有如是之苦故云一靈休更入胞胎也後二句科家指一條出生死路不入胞胎故指西方世界若人念佛於彼國土蓮華化生身如金色即得面見阿彌陀佛聞法受記證不退位故云目擊全容歸去來古德頌曰好念彌陀歸去來遙登九品托蓮胎華開親覩天真佛一段光明遍九垓究竟無我四大全空五蘊假立名通達萬法處處皆空此科昭明太子判此一段經文為究竟無我分第十七蓋佛説一切法無我等相言辭雖同其義則別以前來但問能住能降之法只是破情顯智所破之情即無我人等四相粗執所顯之智即般若之智自此之下忘智顯理破我人等四相細執恐菩薩將入證道謂我能安住我能降伏存此分別之心便是我也故下文云如來於然燈佛所若有法可得而證菩提即為有我無法可得無道可證是名無我又云若菩薩通達無我法者故立此名為究竟無我也四大全空者言此苦依身以地水火風四大和合而成五蘊虗積而有凡夫妄計假立為我此我若無四大五蘊亦空也通達萬法者此科如來實無有法得證菩提故得受然燈記又云如來者即諸法如意是故如來説一切法皆是佛法若菩薩通達無我法者即無我人四相之法如來説名真是菩薩故能於一切法處處皆空也上云四大五蘊全空為正報空即人空也此云通達萬法為依報空即法空也青山緑水雲起長空諸人薦取黃鸝啼曉風此是科家發明前來通達萬法處處皆空之義以青山緑水雲起長空那裡不是通達此理可謂山河草木揚真諦風月樓臺演妙音以目前明暗色空皆彰此道諸人薦取者此是科家慈心太切分明指出萬法之上聲色之中令人薦取似黃鸝啼處是聲也曉風是境也若是行人向聲色上會得見是何人聞是何物豈不是通達萬法可謂鐘鳴鼓響無非觀音入理之門柏短松長盡是毗盧一真境界昔古德誦法華經聞鶯啼有惺偈曰諸法從本來常自寂滅相春至百花香黃鶯啼柳上受記本無言真慈大覺宣四相非四相菩提果自鮮前二句牒經中之義佛自云我於然燈佛所實無有法得阿耨菩提方得授記故云授記本無言也此乃佛自宣説我若有法得菩提者然燈佛即不於我授記故云大覺宣也後二句亦牒經中之義若菩薩見有衆生可度有法可得菩提可證見有淨土可嚴皆有能所不達性空悉著四相也非四相者謂菩薩不見有一衆生實滅度者實無有法得阿耨菩提於真淨土即非莊嚴故無我人四相也菩提果自鮮者菩薩既不著四相於佛果菩提自然新鮮也可謂有無俱坐斷獨露一真空也究竟無我分第十七經爾時須菩提白佛言至多羅三藐三菩提心者注曰此分經文為究竟無我者以菩薩心無我人四相方契無法可得無菩提可證故名究竟無我也須菩提白佛言善男子善女人發阿耨菩提心云何應住降伏者以善現前來於第二分中初問此義至是復問者何耶然則問辭雖同其義則別蓋初之問義但問能住能降之法此之而問恐菩薩將入證道心有執著謂我能安住大乘我能降伏煩惱我能滅度衆生存此分別之心障却無住之道故重復此問故云云何應住云何降伏其心也佛告須菩提若善男子善女人發菩提心者當生如是心佛意云若人欲發無上菩提之心當生無著無住湛然清淨之心也我應滅度一切衆生等者佛了真空無相則能所俱寂雖度衆生已得滅度而不起能度衆生之一念亦不見所度之衆生故曰無一衆生實滅度者則能住能降之心自此滅矣方具四心言謂我應滅度一切衆生者即廣大心也滅度一切衆生已者即第一義心也而無有一衆生實滅度者即常心也既具常心自無四相即不顛倒心也何以故者佛自徵問以何意故菩薩無有衆生可度者以離四相故也意云若菩薩有我相等即非菩薩者此一節文義與前同但前來是破情顯智所破之情即無我人等四相粗執所顯之智即般若真智自此之下忘智顯理破我人等四相細執由此賢位漸入聖階故佛返顯菩薩心離四相雖終日度生而不見有一衆生可度也所以者何者此是重徵上義以何所以不見有生可度也佛乃再告須菩提言實無有法發阿耨菩提心者佛恐菩薩誤認當生如是心者以為真實是心亦非真性中本有故此説破亦為非實故云真空理中本來無相實無有法發阿耨多羅三藐三菩提心者蓋實際理地不受一塵一法不立何有於法也傅大士頌曰空生重請問無心為自身欲發菩提者當了現前因行悲疑似妄由智最言真度生權立我證理即無人經須菩提於意云何至如來者即諸法如義此節之文由前實無有法發菩提心者而來意謂無發心者則無菩薩云何釋迦於然燈佛所名曰善慧仙人布髮掩泥獻華於然燈佛行菩薩行得授記耶佛恐善現有此之疑故舉問之云須菩提於意云何如來於然燈佛所有法得阿耨菩提不須菩提答言不也世尊善現答義云如我解佛所説義者彼時善慧於然燈佛所實無有法所得菩提離諸分別取著因悟無法可得故得受記佛言如是如是者以善現既會法無所得佛許其説乃印證云如是如是而又返後告云須菩提實無有法得阿耨菩提欲令善現知法無得深契至理也偈曰菩提性本空云何説有得無説無得者是真菩提因佛復云若有法如來得阿耨多羅三藐三菩提者然燈佛則不與我授記乃至當作佛號釋迦牟尼者蓋如來所證妙果乃是心地法門實無所得之理離諸名相無有取著也今云受記者即無授記中而論授記此即無生之記也善慧以無所得心得無生智即無生記者也何以故者徵起之辭以何意故前云實無有法得菩提果故受然燈之記遂去疑云既無佛果豈有佛法耶下文釋答如來者即諸法如義如者即真如也不偽曰真不異曰如蓋了諸法皆如如理非虗非有不變不遷通徹三世橫亘十方此顯真如佛即真法體若有所得即非佛菩提也傅大士頌曰法性非因果如理不從因謂得然燈記寧知是舊身經若有人言如來得阿耨至如來説名真是菩薩此節經文乃是防難佛謂若有人難言既如來即諸法如義如是則為有佛實有法在何故前云實無有法可得佛果菩提故佛乃呼須菩提而自答云實無有一法佛得阿耨菩提蓋法性本具豈從外得也佛再招須菩提而告之曰如來所得阿耨菩提於是中無實無虗者以如來所得菩提忘情而證也無實者此理非有為相也無虗者即真如體也無著云虗實是有無斷常二邊此二俱遣中道自然契矣故云無實無虗是故如來説一切法者此是結前徵釋之義也因是之故如來説一切法結前如來者即諸法如義也皆是佛法者結前無實無虗之法也佛又呼須菩提所言一切法者即俗諦法也即非一切法者即真諦理也是故名一切法者即不住真俗中正之道也然此真如非別有法即一切色等諸法也此法離性離相即真如體故一切法皆是佛法也此真如體雖不離於諸法然於諸法亦不可取著故云即非一切法是名一切法永明云如來真如即一切法真如一切法真如即如來真如也佛仍呼須菩提言譬如人身長大意云上説如來所證真如之體遍一切處可謂長大又恐善現起長大之見故佛重設喻徵之曰譬如人身長大以世俗諦中故有大小之問豈非真實為大乃虗名為大身而矣須菩提答之云世尊如來説人身長大者善現因喻有悟答曰非大身以真諦之中無大無小故云即非大身也是名大身者以真俗不二有無互顯即第一義法身也佛又告須菩提菩薩亦如是此如是者乃指上之辭以菩薩若住是言我當滅度無量衆生者此菩薩心有執著自言我能滅盡煩惱能度衆生而有四相亦有能所即非菩薩也何以故者徵起上義佛謂須菩提言以菩薩實無有法可得心離四相而不見有一衆生可度達一切法悉皆空寂本來不生不見有生死不見有涅槃故云實無有法名為菩薩也是故佛説一切法無我無人無衆生無壽者是故者結上文之義乃謂實無有法名為菩薩此菩薩已離四相雖云滅度一切衆生而無有一衆生實滅度者以真空無相實無有法故佛説一切法無有四相其所顯者真空無相法也佛又呼須菩提云若菩薩作是言我當莊嚴佛土是不名菩薩佛意云若是菩薩修行六度欲去莊嚴佛土見有淨土可嚴此人未離四相即是法執不達法空是不名菩薩也言佛土者即心土也以佛土無相如何莊嚴若有莊嚴即四相未除是凡夫見也何以故如來説莊嚴佛土者即非莊嚴是名莊嚴者佛意云以何意故莊嚴佛土如來復以離相無為即莊嚴佛土又以佛土本來清淨何假莊嚴故云即非莊嚴也今云莊嚴佛土者以俗諦中可説莊嚴也即非莊嚴者以真諦中何莊嚴之有也是名莊嚴者以第一義中嚴而非嚴無嚴而嚴真俗雙顯即中道莊嚴也佛又呼須菩提若菩薩通達無我法者如來説名真是菩薩此節雙結上義無我即無人執無法即無法執以法界混然身土平等向無佛道可成無衆生可度故云通達無我法者二執既無二空之理自然顯矣既具二空即真菩薩也傅大士頌曰人與法相待二相本來如法空人是妄人空法亦除人法兩俱實受記可非虗一切皆如幻誰言得有無妄盡還真衆生何曾滅度法空無我菩提本自圓成直饒遇然燈印證而不疑已隔來世況釋迦重審而方悟轉涉途程且道不涉途程底人腳跟還點地麼初一節文牒經中之義也以須菩提問安住降伏佛答云菩薩發阿耨菩提心者當生如是心降伏煩惱諸妄安住大乘真理妄心既盡真空自顯故云妄盡還真也衆生何曾滅度者亦牒經義以菩薩既滅妄心已離四相雖滅度一切衆生已而無有一衆生實滅度者了真空理中生死涅槃尚不可得能度所度衆生亦空故云衆生何曾滅度也法空無我者亦牒經義此菩薩已證法空人空之理通達無相之道以實無有法得證菩提故受然燈之記汝於來世作佛故云菩提本自圓成也直饒遇然燈印證不疑者此牒經義謂以實無有法得阿耨菩提是故然燈佛與我授記當得作佛號釋迦牟尼此是印證不疑之言也已隔來世者此是科家把住世尊料揀之義意謂雖是印證分明作佛爭奈已隔來世又過一生方得成佛若乃直下成佛早是遲了八刻更待來世轉沒交涉況釋迦重審而方悟者此牒經義因須菩提聞説實無有法得阿耨菩提故得授記作佛遂疑既無佛法豈有佛果耶故釋迦重審云何以故如來者即諸法如義是真佛真法也須菩提於此方悟諸法皆如如佛也轉涉途程者乃科家把住説話如斯悟去轉涉途程費力不少也且道不涉途程者是科家徵問之辭上云印證不疑已隔來世重審方悟轉涉途程即今不涉途程之人腳跟還點地麼此問要人直下承當不涉修證可謂迢迢空劫勿能收豈與塵機作寄留也丈夫自有衝天志不向如來行處行此二句乃答上文不涉途程腳跟點地之義也言丈夫者即本來人是大丈夫具衡天志不拘凡聖獨步千方得大自在故名丈夫也不向如來行處行者此言丈夫天然尊貴不假修持不隨他人腳跟所轉不受他家處分故云不向如來修進地位階級而行可謂相好巍巍大丈夫一生無智恰如愚從來佛祖猶難望地獄天堂豈可拘直指單傳密意深本來非佛亦非心分明不受然燈記自有靈光耀古今前二句發明大丈夫漢不向如來所悟所證處履踐也故科家云直指單傳密意深者以直指當人心體本來是佛單傳法印密意甚深非中下可知本來具足非佛非心原無名相可謂有名呼不得無位可安排也後二句言此道無説無傳故如來於然燈佛所因無法可得無菩提可證故得受記今云分明不受然燈記者以此理雖授記而無記可受自有一段靈光輝天鑑地耀古騰今古德云父母未生前凝然一相圓釋迦猶不會迦葉豈能傳故云自有靈光耀古今也百歲光陰一夢中老來不與舊時同衆生好似風無定搖落桃花滿地紅前二句歎一切衆生時光雖有百年猶如一夢相似而四大形骸漸有改變以童顏貌壯乃至老耄故云老來不與舊時同也後二句以衆生從生至死喻如之風無有定止或是東風而便西風喻似衆生恰見朱顏緑鬢不久白髮滿頭也搖落桃花者喻如人生似花開人死如花㓔此警生死無常覺悟早修也謂電光易滅石火難留落花無返樹之期去水絶歸源之日人之生滅事可同然萬法皆空何不悟矣故云搖落桃花滿地紅也不知誰解巧安排捏聚依前又放開莫謂如來成斷滅一聲遠續一聲來此四句元是川老禪師頌二十七分無斷無滅之義科家借來發明此分經文也初句問云此真如理不知誰解巧安排意云人有機謀巧妙能所見識善能造作謂之安排也次句呈上安排之義引公案之文證明昔睦州和尚示衆云裂開也在我捏聚也在我時有僧問曰如何是裂開州云三九二十七菩提涅槃真如解脫即心即佛我且恁麼道汝又作麼生僧曰某甲不與麼州云盞子落地楪子成八片僧問如何是捏聚州乃斂手而坐川老借此之義述成四句意謂睦州用處雙眼圓明這邊那邊應用不缺有巧妙之智也如實際理地不受一塵無法可得無佛可成無記可受也正放開時似今時門頭不捨一法有法可得有佛可成有記可受也三句以須菩提聞佛前來於然燈佛所以無法可得無菩提可證故得受記善現疑云既説於法無得於道無證即是無有佛法如何過去諸佛因聞法悟道耶今言實無有法豈非佛果成其斷滅也佛答云如來者即諸法如義故不成斷滅矣故云莫謂如來成斷滅者此是與人拈情莫説如來無法可得無果可證無生可度無土可嚴如同捏聚了無一物謂之斷滅此本有法身之理遍一切處無時不現無處不周如同裂開法法全彰而豈有斷滅也可謂法身遍在一切處一切衆生及國土三世悉在無有餘亦無形相而可取也一聲還續一聲來者呈上無斷滅之義如空谷應聲相似空谷無聲呼之即應以喻此理無有斷滅故云一聲還續一聲來也

body:
  text: 姚秦三藏法師鳩摩羅什譯隆興府百福院宗鏡禪師述曹洞正宗嗣祖沙門覺連重集銷釋金剛者以喻釋喻名題也金剛乃經題之喻銷釋乃科題之喻金剛喻般若之堅利能破煩惱銷釋喻科文之解判能分事理銷者煎銷也釋者解釋也如金在鑛須假紅爐鉗鎚鍛煉鑛去金存方為真寶使用自在一切眾生本有佛性亦復如是金喻眾生佛性鑛喻無明煩惱眾生佛性隱在五蘊身中被煩惱鑛重重封蔀愚鈍眾生不覺不知本有真性甘處貧窮虗受輪轉是故佛祖出世假設言教修證權立地位階級以智慧為爐以三昧為火以斷妄為鎚碎五蘊山破煩惱鑛顯真金性煉成法身至寶普濟貧窮眾生各獲性寶得大受用是故我佛最初成道歎云奇哉奇哉一切眾生皆具如來智慧德相但以妄相執著而不證得我當教以正道令其永離妄想執著自於身中得見如來廣大智慧與佛無異也科儀者科者斷也禾得斗而知其數經得科而義自明儀者法也佛說此經為一切眾生斷妄明真之法今科家將此經中文義事理復取三教聖人語言合為一體科判以成篇章故立科儀以為題名大意欲令眾生知本有性在日用間但能見聞不昧虗徹靈通六根門頭放光動地也會要註解者會取諸家捷要之註安於每段經科之下謂之註解貴使文義易曉豈敢胸臆自作但集述前古之成文撮為卷帙用圖不朽之意也卷者言舒卷有規也看則展舒不看則卷收故云卷也第者次第也一者首也為眾卷之首也盖聞漢朝感夢白馬西來摩騰彰漢化之初時此敘教法初來之義也盖聞者乃發文之端也亦謙詞耳言其不能詳細而知祇是一盖麤聞而述也漢即國號也然有西東二漢之別今言漢者即東漢孝明顯宗皇帝乃光武第四子朝即朝廷也是天子所居殿庭而人臣朝覲之處也感夢者敘教法初來之時帝為能感佛為所感感應道交結而成夢也白馬西來者即永平七年帝寢南宮夢金人丈六項佩圓光胸題萬字飛行殿庭去來無礙指其帝曰立教旦集羣臣令占所夢時有通人傅毅奏曰臣按周書異記云周昭王二十四年歲次甲寅四月八日子時分有五色祥光貫太微宮中然後徧於四方作青紅色爾時山川宮殿普皆震動江河泉井泛漲流溢時王問臣所以有太史蘇由對曰此是西方有大聖人生焉已後千年教法流於此土王令鐫石立在南郊天祠之前以年記之至今一千七十餘年陛下所夢者將必是乎帝信以為然即遣定遠將軍秦景中郎將蔡愔愽士王遵等一十八人使往西域訪求佛道至天竺臨境大月支國遇摩騰竺法蘭二梵僧併優填王第四以白㲲𦘕釋迦像一軸四十二章經十住斷結經佛本生經法海藏經佛本行經共六十萬言䭾於白馬相伴東還八年乙丑蔡愔等達於洛陽摩騰入闕献經像帝大悅館於鴻臚寺法蘭復兼行化而後至十年丁卯勑於洛陽城西立白馬寺以居之以白馬䭾經遂名白馬寺此土三寶自此為始也下結云摩騰彰漢化之初時彰者明也化者教也今以佛之音聲為教化之體也此言化之初時即是教化初來之時也羅什感秦宗之代典明明佛日照破昏衢朗朗慧燈至今不滅教之興也其在斯焉此明般若初興之始也梵語羅什此云童壽雖童稚之年而有耆宿之德故云童壽感秦宗之代典者秦即前秦國號宗者主也亦崇敬之義也代即時代也典即墳典也又秦有四秦此正當前秦符堅主建元十三年正月太史奏曰有德星現於外國野分當有大智德人入輔中國爾時襄陽趙王國中時人稱道安法師為一聖人習鑿齒半聖人也符堅以十萬兵攻襄陽遂得二人謂左右曰吾以十萬雄師祇得一箇半聖人耳左右問誰曰安一人習半人也安聞之因言進曰丘慈有羅什法師善解大小宗乘愽通三藏堅默識之建元十八年遣呂光率兵十萬四伐丘慈謂光曰朕聞西域有鳩摩羅什深解法相善曉陰陽朕甚思之賢哲者國之大寶若克丘慈速迎還國光軍未至什謂丘慈王白純曰有敵兵從東方來勿抗其鋒光兵至純遂交戰光破丘慈殺純立純弟白鎮為王光與什東迴至涼州聞堅已被姚萇所害光僭號關外年稱大安在位一十八年而卒光之子紹及纂併卒光之姪呂隆為王姚萇卒子姚興立弘始三年三月有連理樹生於朝庭前道遙園中葱變為茞香草五月遣隴西公碩德舉兵西伐呂隆軍大敗九月隆上表歸降方得迎什入關十二月二十日至長安待以國師之禮選諸方有才智沙門八百中有四聖十哲同譯經三百八十卷此經弘始五年於長安草堂寺譯出華言故云羅什感秦宗之代典明明佛日等者此二句雙歎上文讚美此經如日之明以照晝如燈之明以照夜昏衢者喻五陰煩惱之執情障隱本有之佛日遮蔽本有之慧燈所以沉淪七趣似長夜昏衢不知不覺也至今不滅者自佛說此般若大教從漢秦兩代傳來至于大宋理宗淳祐間大興流布故云至今不滅也教之興也者總結釋迦佛一代教法興崇流通也其在斯焉者乃為指法之辭斯者此也教之大興在此漢秦兩代之時故云其在斯焉者也末法之代至于今日某甲恭白十方賢聖現坐道場此歎慶歸祈之辭也歎則生逢末運慶則欽遇斯經歸投祈禱希欲冥加也佛一代時教有正像末三運之別正法一千年像法一千年末法一萬年此言末法者正當後五百歲佛滅後二千五百年時乃是科主歎而自慶意云正當末法惡世之中今日得逢斯典猶浮木盲龜之值針鋒纖芥之投不為輕忽小事也雖自知自解又恐來者難能故制科文解釋欲使學者覩科文而明經旨如暗逢燈也將欲為文亦恐凡情淺解至理難臻故祈三寶冥加密助故曰恭白十方也某甲科主自稱也恭者敬也白者陳也此即三業虔誠也十方賢聖即橫論現坐道場即竪論道場者即十方三世賢聖成道說法之場也本師釋迦牟尼佛文殊普賢二大菩薩即歸此土三寶也盖佛為佛寶菩薩為僧寶法寶含在其間本師者科主懇切之稱亦名本師本體模範也體効佛之遺範故云本師梵語釋迦牟尼此云能仁寂默乃圓應之號也梵語文殊此云妙德亦名妙吉祥也普賢者德無不徧曰普祐上利下曰賢菩薩者略梵語具云菩提薩埵此云覺有情也有生皆有情菩薩有情中之覺耳佛有覺性而無情也菩薩亦未免有情故云上求佛果下化眾生即自利利他之號也滿空聖眾一切神祇有天眼者天眼遙觀有天耳者天耳遙聞他心宿住聖心玄鑒慈愍故慈愍故大慈愍故此總祈一切聖眾運五通而鑒照起四量以冥加天眼等者即五通也聖心即神境通玄鑑喻也慈能與樂悲能拔苦喜能慶悅捨能平等盖慈內含四無量心也三稱者誠之切也不言漏盡通者此乃神聖眾也唯佛具六通如上皆具五通也信禮常住三寶信者重也誠也禮者體也信而無禮心必不實禮而無信意必不誠二者具足可為誠實之禮也常住者簡別之義不同前來十方此土三寶此即自性常住清淨法身佛寶也此性有覺照義法寶也此性有和合義僧寶也寶者貴重之義即實相一體常住三寶也歸命十方一切佛歸命十方一切法歸命十方一切僧法輪常轉度眾生此是重重祈禱不盡讚揚也歸投請命希求加護故云歸命又命者為一身之總也今言歸命者總含三業恭敬尊重讚歎之禮也十方一切總該橫竪佛者略梵語具云佛陀此云覺也即自覺覺他覺行圓滿也法者軌持義即軌持自性令物生解也僧者略梵語具云僧伽此云眾和合兼舉云和合僧也法輪度眾生者乃科主祈希三寶不泯四弘恒居三界利濟有情同證無為共成正覺故云度眾生也夫金剛般若能開解脫之門玉偈波羅善入菩提之路此一卷金剛般若經是開解脫之門入菩提之路門有出入義路有往來義喻此經為入理門戶之道路也解脫即斷果菩提即智果皆二轉依號也玉偈波羅者即讚美之義讚美此經能詮之文如眾德之王難見難聞難逢難遇故云善入菩提之路矣行行而非空非有句句而無去無來總美此經能詮之文行行句句非空非有無去無來其中所詮之義不同前來初教所說心無境有境無心有之謂此經純談妙有實相真空顯揚般若根本真智又非空不同無因非有不同邪因無去不屬過去無來不屬未來故不落有無二邊去來三際真可謂斥相泯心談空之教也金剛經說三十二分分分而功德難量須菩提聞四句妙偈偈偈而殊因莫測此這一卷金剛經原為佛說後昭明太子科為三十二分故云分分也功德難量者修進曰功見性曰德若有行人依此修進即得見性成佛故云難量也梵語須菩提此云善吉亦名空生也聞四句者自第八分中佛告須菩提若人以滿三千大千世界七寶以用布施得福雖多不如有人以此四句偈為他人說其福勝彼已下共有七處說偈故云偈偈也以此推之乃字字句句有殊勝之功德不測之因果故云殊因莫測也四句者古今論四句偈不一各執己見初無定論今但依銅記云天親菩薩昇兜率宮請益彌勒如何是四句偈彌勒答云無我相無人相無眾生相無壽者相是也書寫讀誦當生華藏之天為人演說定達涅槃之路著簡曰書傳本曰寫對本曰讀背本曰誦若有人依此經如法修行當生華藏世界海極樂淨土中盖華藏天為總舉文之巧也此華藏世界無邊妙華香水海中有不可說佛剎微塵數大蓮華一一華開有微塵數香水海每一海中有一蓮華寶光明剎種一一種有二十重每重二十佛剎微塵數世界圍繞故云華藏也天者自然也清淨也意云願書寫讀誦聽聞者決定至於涅槃故曰定達也般若乃菩提佛母信心即功德道源長養聖胎出生妙法梵語般若唐言智慧內則指於本覺真心外則指於斯經妙旨下顯機云信心即功德道源雖有內智外教要在於信信則菩提果成教法流通故云信為道源功德母長養一切諸善根也依此教修長養成聖之胚胎出生無上之妙法也大抵看經通義問道窮源啟淨信心具擇法眼分句讀貫通之理明問酬辯論之文心心無間理全彰念念不忘文自現上一節文言教之功能此一節文言機之作用雖然此經能長養聖胎出生妙法大端主意還要看經之人通達經中所詮義理如或義理不明者應須愽問先知指示其道窮究其源此聞慧也然後啟清淨之信心淨心者即經中信心清淨即生實相之心此思慧也亦要行人具擇法眼擇法眼者即正智之眼也擇即揀擇此勉行人須用智眼揀去人我無明身邊等見擇取中道無為真如之理分句逗者義盡為句義不盡為讀文為能詮理為所詮看經行人須要一一分別句讀短長義理通貫方得名為具眼之人然後可為造進行履也明問酬者即請問酬答也今此經自第二分中問云何應住等直至經終共有二十七處問酬辯論之文行人應須一一分明方得長養聖胎出生妙法也科家慈心太煞指示叮嚀故云心心無間理全彰念念不忘文自現念念者與前心心義同當換其文義即一也無間者不忘也亦但變其文耳即一念專注其心不容漏泄走作也如此則其文自現其理自彰正是以聖教為明鏡照見自心以自心為慧燈燭經幽旨也或問酧深妙而句義玄微詳究元因而略陳數段庶一問一答其文明若日星重辯重徵其義曉如白黑或者不定之辭或佛問須菩提答或須菩提問佛答此經總有二十七疑二十九問其間所問所答者句法淵深義理微妙使初機淺解者罔知其涯涘因此經文難曉故致科文釋而通之也故述功云詳究元因詳細也究考也元本也即是細詳考究其根本元因諸家之解釋撮略直指採集述陳以成數段科文也庶者使也使經中一問一答重辯重徵其文其義者其為指法之義指經得科而義如日星晝夜白黑兩分也文即能詮之文義即所詮之理也義隨文而文隨義左右逢源義者經義也文者科文也華嚴經云一即多而多即一文隨於義義隨文左右者如身之左右二肘不離本身珠走盤而盤走珠縱橫無礙珠者寶也物類相感志云閬苑浦出珠置盤中自轉也珠喻經義盤喻科文縱橫無礙亦即左右逢源意云此之文理玄妙冀行人翫味留心倘然一言之下心地開通便可謂拳中舊寶不假披沙倒駕無底空船逆遊涅槃法海庶不負佛祖之慈心也信解受持者洞明真性科家至此願云此法流通之處若有行人信敬曉解明白領納於心持之不捨即得洞明自己真性也見聞隨喜者咸悟菩提目覩曰見達耳曰聞隨即隨順喜即歡喜所謂此法流通之處若是行人見聞隨喜稱善讚美者咸悟菩提前一節洞明真性為因此一節咸悟菩提為果也流通天上人間普遍微塵剎海上一句從遠至近從色界頂天至閻浮提地人間天上悉皆流通此法也下一句從狹至廣無處不到曰普無處不周曰遍微塵者隙塵也剎海者浮幢佛剎也在於香水海中漂浮而住故云剎海明此大法從微塵至剎海悉皆周遍矣太虗無際法施何窮太虗即空之異名也以此為喻虗空無邊法施無邊科主意云此法處處流通無有窮盡此之法施一句一偈入於八識田中永為金剛種子萬劫不壞直至成佛故無窮也以斯般若功勛總報四恩三有以斯般若即指此經願今科文解釋般若功德利益用報四恩三有四恩者天地盖載日月照臨皇王水土父母生身也三有者欲有色有無色有也以三界因果不忘未離於有故云三有前節法施既無窮以此報恩亦無窮故云總報也觀夫空如來藏碎祖師關獨露真常無非般若觀夫者發語之辭也如來藏有三以配三諦三身也空如來藏即真諦法身也不空如來藏即俗諦報身也空不空如來藏即中道諦化身也關者門之橫木為關也宗以一千七百則因緣為祖師關故云欲透諸祖重關只須一一拶波今云空如來藏者直顯直諦法身聖凡兩忘真俗俱泯故云空如來藏也獨露真常者科家慈心太切分明指示此明真理之外了無片事可得故云無非般若也三心不動六喻全彰七寶校功四句倍勝上伸般若之功能此伸施財之所以三心者經云過去心未來心現在心皆不可得故云三心不動六喻者夢幻泡影露電也彰者明也七寶者金銀瑠璃硨磲碼碯珊瑚琥珀也校者比也經云以七寶滿三千大千世界布施功德比況此經見聞受持四句之功德百千萬億不及其一故云四句倍勝也若乃循行數墨轉益見知宗眼不明非為究竟上來歎教雖有如是之功要在行人用意若乃者指看經之人若不句句消歸自己言言冥合真心一向只管循行數墨只是轉增多見多知背却般若功能障塞真常妙用楞嚴經云知見立知即無明本知見無見斯即涅槃宗眼者宗即心宗眼即智眼心為一身之主宰萬法之根源心不妙悟多聞無益華嚴經云如人數他寶自無半錢分於法不修行多聞亦如是此勉行人若不如說而修洞見真諦者皆是非為究竟也嗚呼此是科家警歎之辭緊要行人珍重下乃法喻分明令人著眼也微宣奧旨石火電光密顯真機銀山鐵壁微宣奧旨者敘陳此經乃是微妙之法深奧之旨第一之說要令行人急須著眼故喻石中之火電內之光此理眨眼參差千萬里低頭思慮萬重關密顯真機者此經凡有二十九處言菩提心總是一箇真心故云密顯真機即真心之機靈妙莫測人難履踐喻如銀山鐵壁挨拶不入拈弄不得如蚊子上鐵牛相似難以咬嚼也瞥生異見滯在中途進步無門退身迷路此乃重重指示微細提携要人發起真知真見若是行人瞥生一念異見之情便於般若真智相違情存於境墮在中途未得到家故云進步無門退身迷路可謂無端起知見著相求菩提情存一念悟寧越昔時迷此理但起纖毫聖凡之見即是途路之說者也聊通一線俯為初機良馬見鞭追風千里矣此乃科家自伸己功亦是謙辭我今致此科文只是於行人聊通一線俯為初機豈敢達於上士也良馬見鞭者引喻比之若是上智未舉先知不言而會豈用剩殘之說古云若是金毛獅子子三千里外見誵訛不用開口動舌也彌陀如來上云俯為初機此言初機所以科家先舉能攝之佛次警所攝之機梵語彌陀此云無量壽乃樂之主也以彼佛光明無量照十方國無所障礙故曰阿彌陀其佛壽命無量無數故名無量壽也竊以幻身不久浮世非堅不久則形軀變異非堅則火宅無安竊以者偷竊之義不敢正言亦是謙辭也幻身者無而忽有曰幻眾法積聚曰身最初原無此身只因三緣假合而有成必有壞有必歸無故云不久浮世非堅者喻此色身如水上泡速起速滅故云非堅不久變異者言此身形不久變異也生則童顏少壯衰老病死故云變異也非堅無安者以喻三界為一火宅眾生業報皆處其中天有五衰人有八苦如眾火所逼有何安樂故云無安經云三界無安猶如火宅科家要人識幻身不久知法身長久火宅無安淨土長安也由是輪迴六趣幾時休遷轉四生何日盡若不念佛求出離畢竟無由得解脫由是者結前起後之辭由前云因有幻身封執為我便有我所起十使煩惱六十二見八十一品惑障由此我故而生六根所染六塵造無邊罪隨業受報六趣輪迴喻如車輪上下遷轉無有窮盡故云何日盡幾時休也六趣者即六道是也四生者即胎卵濕化是也以六趣四生為眾生所住之境界所遊之道路出入往來無有休息也若不念佛者科家與行人指條出路唯有念佛一門方得離六道出四生所以云若不念佛求出離畢竟無由得解脫也豈不忙然省悟火急脩持此乃科家勉人急早修持如救頭然也既是西方一路念佛法門為離六趣超出四生捷徑要路何不速疾省悟聞早修持故喻云如火燒頭速救猶遲故云火急也修持者要人修進持念六時精勤一心不亂觀想彌陀專持聖號臨命終時決定往生極樂世界見佛聞法受上品記故云修持石屋詩云世事紛紛無了期自家活計猛提撕落湯螃蠏人人見撲火飛蛾個個知病到始知身是苦死來唯有業相隨浮光幻影須臾事火急修行早是遲盡報為期誓生安養高超三界證真空逈出四流無苦趣此是科家勉人進修要在從始發心至生淨土為一期之限耳故云盡此一箇報身為一個修淨土期限故云盡報為期也誓生安養者誓即發願也安養者淨土也如云願以此功德乃至盡此一報身同生極樂國故云誓生安養也高超三界者言此念佛法門是橫出三界不同二乘斷九地惑證四果理歷五十五位階級乃是竪出三界也惑最難斷果最難證不如念佛法門不用斷惑不歷地位階級不須證果帶業往生故云高超三界也證真空者言此念佛法門不但只是超出三界又能證入真空實相之理故云證真空也逈出四流者即欲流有流無明流見流故云四流喻如長江之水古今不斷長流也無苦趣者既是念佛法門超出三界遠離四流得生極樂世界無有三惡道苦故云無苦趣也釋迦如來前一節舉能攝之彌陀此一節舉能折之釋迦二佛化生利物各專其門酧昔本願各居其土教化眾生也詳夫百年光景全在剎那四大幻身豈能長久詳夫者是發語之端也百年者自人壽八萬四千歲時為增劫之終又為減劫之始一百歲減一年減至人壽一百歲時有釋迦佛出興於世度脫眾生也此言百年光景即三萬六千日之光景即一百個四時八節之時景也剎那者佛言如壯力士持劒斬一綟絲一時速斷之頃有六十四之剎那也盖百年光景而被於剎那不住念念不停消磨盡矣故云全在剎那四大幻身者此身以地水火風四大而成幻化而有最初受胎之際識心投入赤白二滴如磁石吸鐵相似三緣和會方成此身生老病死終歸散滅故云豈能長久此一段文從詳夫百年下至青山低處止乃是如如居士勸發菩提心之文總有三大科其一顯六道輪迴之苦楚其二明三教聖賢之因緣其三廣示異轍同歸大道也每日塵勞汩汩終朝業識茫茫不知一性之圓明徒逞六根之貪欲此明眾生染緣之因也每日者從朝至暮也塵即六塵勞即勞擾業即六塵之業識牽引此心汩沒塵境眼被色牽耳隨聲轉等故喻流水之汩沒業海之茫茫故結云只因不識一性之圓明所以徒逞六根之貪欲不知元是一精明分為六和合經云塵為賊媒自劫家寶是也貪欲者吸引無盡曰貪五塵所好為欲也功名盖世無非大夢一場富貴驚人難免無常二字前一節歎時不常此一節歎身不久警其不識圓明之性徒逞貪欲之為乃是教勉除貪喻如黃糧大夢也無常者死之異名也爭人爭我到底成空誇會誇能畢竟非實爭人者爭兢彼此分別高低如楚覇王鴻溝為界自刎烏江到頭得失皆空徹底悉歸敗壞可謂試看漢陵併楚廟一般瀟洒月明中也誇會者矜誇手段見識超人華陀刮骨之妙韓侯埋伏之機臨終有苦難逃命盡無方可避故云畢竟非實也風火散時無老少溪山磨盡幾英雄此警生死不在老少也風火者地水火風也散時者即命盡之時也暖氣歸火動轉歸風潤濕歸水骨肉歸土不定老少而為常準故云莫待老來方學道孤墳多是少年人也溪山磨盡英雄者如漢有三傑英名盖世唐有十室雄烈絕倫而今空有虗名到底同歸下土故云日月無根天不老英雄盡被消磨了也綠𩯭未幾而白髮早侵賀者纔臨而弔者隨至綠𩯭未幾者少小則朱顏綠𩯭老耄則鶴髮雞皮故云暗送冷霜侵綠𩯭輕垂衰邁老形骸也賀吊者昨日誇官慶賀今朝命盡黃泉古德云畫虎雖成未點班百年夫婦一朝難歡情未動悲情動賀者纔臨弔者還玉燭堂前空寂寂紅羅帳裡淚潺潺從來未見夫郎面枉惹虗名滿世間故云賀者纔臨而吊者隨至也一包膿血長年苦戀恩情七尺髑髏恣意慳貪財寶此一節破貪色之迷令修五不淨觀古云皮包骨肉併膿血強作嬌嬈誑惑人千古英雄皆坐此百年同化一坑塵慳貪財寶者乃破貪財之執也淨土詩云皮包血肉骨纏筋顛倒凡夫認作身到此始知非是我從前金玉付他人故云七尺髑髏恣意慳貪財寶也出息難期入息今朝不保來朝愛河出沒幾時休火宅憂煎何日了此歎人命無常如風中燭一息不來即後世誰人保得此身堅雪峰云一盞孤燈照夜臺上床脫了襪和鞋三魂七魄夢中去未委明朝來不來愛河出沒者指前財色貪愛喻如一河一切痴迷眾生盡沒其中為生死本相續常劫無有出期故云幾時休也火宅者三界譬為一宅其中眾生而常止住天上五衰之火逼人間八苦之火迫因愛生貪貪而復嗔嗔而結業故喻如火逼迫憂煎也非一朝一夕經歷塵點劫數受苦無窮故云何日了也不願出離業網只言未有功夫閻羅王忽地來追崔相公豈容展限不願出離者此明眾生以苦為樂甘住其中不願出離也如網籠不能出離縱有良師善友勸修出世之因只言事業未辦不得閑暇工夫也梵語閻羅唐言諍息以罪人所造善惡因果注於簿中年月日時分明不容折詞諍論故云諍息忽地來追者以世人陽限壽命屬於陰司命盡之時閻君發帖拘喚故云來追崔相公者人曹官也掌冥司生死之簿未注生先注死故云豈容展限也即東漢時人姓崔名瑗字子玉後出任遷伋縣令時人歌曰天降聖明君賜我仁慈父後胡廣薦瑗遷濟北為相次後命終為泰山府君掌冥司之事也有云符到便行不容住滯之謂也回首家親都不見到頭業報自家當此明人死孤魂獨逝也回首者轉頭也不見者死生別路也既是生死路別家親豈能得見慈親孝子無復相隨到頭業報者平生每日為妻為子所造惡業唯是自家承當妻子不能相代古云縱使妻兒相惜無計留君假饒骨肉滿前有誰替汝所以自家當也鬼王獄卒一任欺凌劒樹刀山更無推抵鬼王乃陰府閻羅十王獄卒即牛頭馬面等卒也一任欺凌者阿含經云牛頭見受苦眾生惟恐不毒或問獄卒眾生受苦甚可悲愍何以無慈獄卒答云如此罪惡諸受苦者在世不尊君王不孝父母謗佛謗法謗諸賢聖罵辱六親輕慢師長造十惡業故受此苦罪畢脫免之時故我恒加勸諭此地獄中劇苦無量非可忍耐汝今得出更莫造罪今日幸脫俄頃復還令我筋力疲厭從劫至劫與其相對以是義故我於罪人無片慈心故加楚毒劒樹者經云有十八釰林地獄一一地獄縱廣五百由旬滿中釰樹一一釰樹高四十由旬枝葉刀釰令諸罪人上刀山者經云別有十八刀山地獄一一刀山高五百由旬盡以刀刃向上各高三尺有大羅叉驅諸罪人皆登此山割截脚足苦不可忍以前世時於山野中安施鎗刺傷害眾生故招斯罪也或攝沃焦石下或在鐵圍山間經云阿鼻地獄上衝大海沃焦山下大海水滴如車軸許成大鐵尖滿阿鼻城在此地下八十萬里有石名沃焦石廣八萬四千由旬厚二萬里下有一百三十六座地獄有八大地獄為主一斬活等或在銕圍者大銕圍山遶大千界高至三禪天中銕圍山遶中千世界高等二禪天小銕圍山遶小千世界量等初禪天盡在其中十六寒地獄十六熱地獄併在其中者也受鑊湯則萬死千生遭剉磕則一刀兩段阿含經云十六熱地獄中第六名銅鑊地獄大五百由旬獄卒努目捉罪人足倒投鑊中隨湯上下身爛骨現苦不可當求死不得求生無方從此鑊出復入彼鑊無有休止巧風吹活又入鑊中苦不可言遭剉磕下教化地獄經云有合山地獄合石地獄山石合來磕剉其身骨肉粉碎佛言前生斬害眾生為兩段者經云阿鼻地獄中七重釰林復有飛刀從空而來斫斷身體肢節頭首段段而壞乃生前殺生之報也饑吞熱鐵渴飲鎔銅前云十六地獄中第四饑餓地獄獄卒縛諸罪人仰臥地上以杓盛於洋銅熱汁灌入罪人口中從咽至腹洞徹下過無不焦爛苦不可當死而復活還又灌之晝夜三時有大銅鑊入閻王宮王見怖畏有大獄卒以鈎擗大王口以杓盛洋銅汁灌入王口無不焦爛事之了畢還與女受諸娛樂彼諸大臣亦復如是也十二時甘受苦辛五百劫不見頭影此明地獄時長也十二時者以人間一千六百年為他化自在天一晝夜他化自在天一千六百年為阿鼻地獄中一晝夜阿鼻地獄中十二時則人間六十小劫墮此獄中經五百劫方得出頭故云五百劫不見頭影也受足罪業復入輪迴此明地獄罪業受畢復入六道輪迴也罪者謂五逆十惡兼謗方等經之罪墮阿鼻獄中經八萬四千大劫罪畢復入寒氷獄中八千歲目無所見百千狐狼而共掣食命終之後又入畜生道五千萬歲罪畢復生人中盲聾瘖瘂貧窮下賤經五百身還入三途不言餓鬼者上饑吞熱銕等是也頓失舊時人身換却這迴皮袋此一節呈前復入輪迴之義也雖得人身而不修十善慈悲喜捨從此復造罪業又入三塗所謂頓失舊時人身換却這迴皮袋向下行容失人身換皮袋所以也披毛戴角鐵負鞍以肉供人用命還債此節呈前既失人身復為異類也披毛戴角者即牛馬等用力酧還也以肉供人者即雞猪等以命還債也唐時汾州孝義縣民姓路伯達永徽年中負欠同縣人錢一千文諱而不還遂共錢主於佛前盟誓我若昧公錢財願我身死與公家作牛錢主其心乃止路伯達死之二年錢主家牸牛生一牛犢額上生白毛為路伯達三字其子姪將錢五千求贖主不肯𠃔乃施與隰城縣啟福寺僧真如助造佛圖也凡有人見此事無不發心止惡遷善也生被刀砧之苦活遭湯火之灾此明以肉供人之事唐時晉江縣尉張縱好啖鱠魚偶死至冥府王曰我追張從汝何故將張縱來宜放迴還吏曰此人好食鱠罰他為魚七日王乃然之其吏引至河邊推縱入水化成小鯉魚七日長二尺餘忽有漁翁布網得之置水倉中有晉江王縣丞使人求魚漁翁以小鯉與之夫人嫌小更來索之遂將大魚奉之夫人對鏡梳粧袒褊一膊囑付庖人作鱠以待張縱友人御史李蕚庖人持刀削鱗已未及剪頭縱之本身遂活乃詣王縣丞宅握蕚手曰食鱠飽耶具如上說陰府罪罰為魚七日之事彼此驚歎此言殺生者現世受刀砧之報也活遭湯火之災者唐時內侍徐可範甞取活鱉鑿去其甲以熱油注而食之又用肥驢縻絆室內盆盛五味汁於前四面迫之以烈火待其渴飲五味汁盡宰而喫之後忽得疾見羣獸鳥食其肉痛苦萬狀覺冷忽思床下布火及熱油醋灌身又以網不久發熱身生瘡疱疼入骨中臨死為一束黑骨此亦殺生之報應故云活遭湯火之災也互積冤𠎝相食噉此謂呈前二事相殺害食噉也冤𠎝有二一者人中冤𠎝經云一切眾生從無始來冤對無量或於父母師長六親妻子兄弟姊妹等起諸冤結更相嫌恨是也二者畜生中冤𠎝經云一切眾生從無始來三毒十惡好殺禽獸斷牛羊等或殺害眾生噉食其肉或發撤陂池壅塞溝渠惱害水性恣意殺害相食噉冤對無量也那時追悔學道無因那時追悔者以前世惡冤對相纏也墮落三途隨類受報都不自由被業所牽追悔不及欲學妙道無因而得也宋時丞相王安石字介甫熈寧間行青苗法不善無益於人其子王雱為崇政殿說書陰為父佐務其青苗新法必行雱忽而卒公亦罷相晏閑中如一夢寐見一鬼使領雱荷銕枷號泣公前謂獲譴罪由行青苗法不善公問使者乞解脫使曰建寺齋僧可免由是捨宅為寺額曰保寧寺齋僧追薦冥福此文出言行錄矣何如直下承當莫待今生蹉過此是總結前文警勉要人省悟也前已既知在三途中無因學道何如今日直下承當古云此時若蹉過萬載卒難逢動靜元非物不墮有無中傅大士云夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲知佛去處只這語言是也釋迦文佛捨皇宮而直往雪山此下之文明直下承當所以也梵語釋迦唐言能文亦云能儒謂此娑婆世界以文字語言而為佛事聞其法者皆得開悟故云文佛也三祇果滿萬行功圓上辭兜率下降王宮與母摩耶右脇誕生具三十二相八十種好於是不樂王位志欲出家成無上道廣度眾生始遊四門遇老病死及見僧人心生厭離太子年方十九淨居天人統領天眾衛護出宮四王捧馬足及車匿騰空踰城而去行三由旬至䟦陀山林以室劒自割鬚髮淨居化作獵師身披袈裟太子將七寶衣貿之而著修九次第定知定非真棄之復入雪山六年苦行覩長庚星悟道正當此土周昭王四十九年己卯歲十二月初八日子時分也可謂棄金輪之寶位捨九五之皇宮不貪榮樂雪山苦行容鵲巢於頂上掛蛛網於眉間不離草座成等正覺乃是我佛出家教化眾生之樣子也居士龐公將家財而悉沉滄海唐時有襄州衡陽縣居士龐公名蘊字道玄家豪富貴積財滿室世本儒業少悟塵勞志求真諦恤念孤貧時有二商往借資財取財付訖無力荷行公以脚力送之至於樹下歇息嘆曰有慈悲心不知記往借人今可昧之言罷驢作人言吾往昔借公財物而昧今來為驢還債商聞大驚即將財帛送還公所公曰何忽而迴商曰公豈知其意吾欲昧之具述驢言因由所以送還吾恐後世亦然公於夜間至馬廐所默聽畜等互相酬還言論多少公回坐歎曰吾本濟人而不知返累如此吾所集者禍也吾以棄之福也寧可清貧度日不圖濁富虗名即將家財運集滿船送至漢陽江中沉而墜之其女靈昭編笟籬其子龐大哥種田園而度之時光也真武不統王位惟務修行玄帝啟云乃淨樂國王之太子即奎婁二星分野之下上應羣龍梵度天也王后名善勝夢吞太陽而孕十有四月降誕王宮於開皇元年建甲辰歲戊辰月甲寅日庚午時於母左脇降生瑞氣覆國天華散異香芬身寶光充滿國皆變金色降誕之後面滿月目鳳睛耳秋荷眉分八字唇若丹朱七歲愽通書史十五辭父出家志心念道恒常誓言不統王位惟務修行父王不𠃔密潛深山偶遇紫元真君授與無極玅道君曰汝擇山峰冲霄紫氣之上方乃居也太子越海東遊途逢一童授劒曰此方黑蛇毬角斷魔雄劒長七尺二寸闊四寸八分受已東行至均州之南名曰武當乃隱居也王思太子領兵五百追至武當入山渡水九次方見太子周圍㵎水泛漲不能行之五百人足忽然難舉相謂言太子願力使之然也同聲言曰迴國願從太子在此學道言已如故唯王泣而獨迴也太子居山有靈鴉報曉黑虎衛岩烏鴉喙赤順之者昌黑虎驅奸逆之者殃修之未契思欲下山至澗邊見老母而磨銕杵太子問曰磨杵何也老母答曰為作針耳子曰不亦難乎母曰功到自成有何難哉太子省其意也麓仙題曰碎礪功多粗者精聖師邀謁上天京我心匪石堅於石小器成而大道成遂迴途中折梅奇柳誓曰我若道成開花結果言畢至岩端坐感動美人時來顧看一日言曰吾乃羣仙特來試之言已飛去向所折者變為楖木梅實桃核杏形名曰楖梅其味酸甘能愈百病玉溪真人曰高真學道隱山時親折梅枝寄柳枝行滿功成應舉日花開子結試先知仙翁護境百邪遠聖果標名萬世垂服餌延齡除固疾志誠拜事福相隨由是功行已滿果然花開子結太子見七十二峰中一峰聳紫霄下庚子年丙戌月丙寅日清旦天華自落祥雲四合四方各三百里頭頂紫氣披松羅服五府龍君接上九霄朝參玉闕惟務修行者惟者獨也務者專也斷習曰修行則無住故云不統王位惟務修行也哉呂公既作神仙尚勤參請唐時呂公者姓呂名岩字洞賓別號純陽子文名呂岩真人京川河陽蒲板人也生於唐玄宗天寶年間世為顯官累舉進士不第乃休因遊華山遇鍾離權乃晉之郎官避亂學養命術將度純陽首以財試一日鍾呂偕行鍾拾一石以藥塗之即成黃金授與之曰前途路費呂問此仍壞否鍾曰若頻經火或五百年壞矣呂擲之曰他日誤人去在鍾後以色試之命呂入山採藥化一小廬美婦歡迎之曰夫故久矣今遇君子願不見棄婦欲執手而近呂以手托開云母人革囊穢於我矣言訖婦女不見即鍾離也於是授金丹之術及天仙劒法遂得遊行自在詩曰朝遊南嶽暮蒼梧袖裡青蛇膽氣麤三入岳陽人不識朗吟飛過洞庭湖始謁龍牙和尚呂問曰佛法大意云何牙與偈曰何事朝愁與暮愁少年不學老還羞明珠不是驪龍惜自是時人不解求因過鄂州黃龍山見紫氣盤旋有異人所止遂入值機禪師上堂師知有異人潛迹座下即厲聲曰眾有竊法者呂毅然問曰一粒粟中藏世界半升鐺內煑山川且道意旨如何師曰守屍鬼呂曰爭柰囊中有長生不死藥師曰饒經八萬劫終是落空亡呂不憤而去至夜飛劒脇之師前已知以法衣蒙頭坐於方丈劒遶數匝師用手指之劒即墮地呂以謝罪師因詰曰半升鐺內即不問如何是一粒粟中藏世界呂於言下有省乃述偈曰毀破葫囊折斷琴此生不向汞中尋今朝悟得黃龍法始覺從前枉用心文出仙苑遺事也蘇學士常親佛印蘇學士者姓蘇名軾字子瞻號東坡先生因謫黃州曰築坡而居號東坡也常親佛印者佛印即南康郡雲居山了元佛印字覺老饒州浮梁林氏子世本儒業幻歲出家寶積寺禮沙門日用為師試法華經受具遊廬山謁開先暹禪師得法之後年二十八先住江州承天後居廬山歸宗與黃州對岸於師酧酢章句及住金山寺東坡遷杭州太守復往來問道值佛印入室印云這裏無端明坐處坡云借和尚四大為座印云老僧有一問若答得與汝四大為座若答不得即輸腰間玉帶披即解帶置案上云請和尚問印云四大本空五陰非有端明向甚麼處坐坡無語印召侍者留下玉帶永鎮山門印以衲裙酬之坡賦二絕云病骨難堪玉帶圍鈍根仍落箭鋒機會當乞食歌姬院換得雲山舊衲衣又云此帶閱人如傳舍流傳到我亦悠哉錦袍錯落渾相稱乞與佯狂老萬回韓文公終禮大顛韓文公者姓韓名愈字退之諡文公為刑部侍郎也因唐憲宗元和己亥十四年正月帝遣中使杜英奇持香華往鳳翔府法雲寺護國真身塔所請釋迦文佛指骨入內帝御安福門迎拜留禁中供養三日五色光現百僚稱賀歷送諸寺釋部威儀太常長安萬年音樂旌幡皷吹偉盛殊特刑部侍郎韓愈上表陳諫引古言今稱帝壽國祚之不延永帝大怒以表示宰輔將抵以死裴度崔羣為解曰愈言訐牾罪之誠宜然非內懷至忠安能及此願少寬假以來諫諍帝曰愈言我奉佛太過猶可容之至謂東漢奉佛已後天子咸天促言何乖剌耶愈人臣狂妄敢爾於是戚里諸王舊臣皆為愈哀請遂貶潮州刺史愈到郡之初以表哀謝勸帝裒封泰山久而無報不樂聞郡有大顛禪師道德名重以書招之三招而大顛至顛之言論超勝留數十日或入定數日方起愈甚敬焉師辭去愈祀神海上及登靈山造師之廬問曰弟子軍州事繁省要處乞師一句師良久不顧公罔措時三平為侍者乃敲禪床一下師云作麼平云先以定動後以智拔公乃拜三平而謝曰和尚門風高峻愈於侍者處得箇入路自此以大顛為師也終禮大顛者始則毀佛終乃禮之後遷袁州刺史復造顛廬施衣二襲而請別曰愈也將去師矣幸聞一言卒以相諭顛曰吾聞易信人者必其守易改易譽人者必其謗易發子聞吾言而易信之矣庸知復聞他說不復以我為非哉遂不告之愈知其不可有聞乃去至袁州孟簡尚書知愈與大顛遊以書抵愈嘉其信嚮愈答簡書稱大顛頗聰明識道理實能外形骸以理自勝不為事物侵亂雖不盡解其語要且自胸中無滯礙因與之往還也文出韓子集裴公奪笏於石霜裴公者姓裴名休字公美河東濟源縣人也潭州石霜山慶諸禪師乃新塗陳氏之子出家後到溈山作米頭發明大事次住石霜山裴公來參師拈過裴公笏問公曰在天子手中為圭在公手裡為笏在老僧手內喚作甚麼休無對師曰乃留下笏在寺作山門中景致也房相問法於國一房相問法於國一者訛也原是崔趙公問弟子今欲出家得否師曰出家乃大丈夫事非將相之所能為公有省也師諱道欽蘇州崑山朱氏子始初業儒年二十八遇潤州鶴林素禪師勉剃落乃戒之曰汝乘流而行逢徑即止遂往南邁玄宗天寶三載抵臨安東北一山問樵者曰此徑山也乃駐錫焉其山有龍淵而龍王現身為人献其地與師乃成伽藍至代宗大曆三年詔至𨷂下帝親瞻禮帝謂忠國師曰朕欲賜欽師一名國師欣然奉詔乃賜號國一禪師後辭歸徑山至是十二月示疾說法而逝帝賜諡大覺禪師也妙善不招駙馬成佛無疑昔宣律師居終南靈感寺行道感天人給侍師問天曰吾聞觀音大士於娑婆大有因緣顯化何地最勝天曰菩薩示現無方而肉身降跡香山為勝師曰香山今在何處天曰嵩岳之南二百餘里三山並列中為香山即菩薩之地山之東北乃過去有王名妙莊嚴主夫人名寶德王無太子惟有三女長妙顏次妙音小妙善三女之中二女已配唯第三女進止容儀超然俗常服垢衣不華飾日止一食不茹葷辛齋戒修行無有退志王謂妙善曰汝今出幼當招駙馬妙善曰愛河浪闊苦海淵深豈貪一世之榮而沉多劫之苦志求出家修行學道王怒擯後花園絕其飲食令母苦勸而招駙馬妙善曰虗空有盡我願無窮王聞大怒詔白寺尼僧惠真領去寺內種菜設計勸勉回宮妙善曰豈不聞障人出家萬劫受芒汝等敢違佛門利益甘受三塗業報尼曰我奉王命非干我事妙善不𠃔堅欲出家尼奏王王大怒令軍圍寺盡斬尼眾火焚僧房公主被龍神攝在香山之下毫髮無損結菴而居草衣木食人莫知之已經三載時王因是毀寺殺僧罪業故感迦摩羅疾寢息不安醫治不瘥榜詔四方人治之時有異僧曰吾有神方可療王疾王曰汝有何藥僧曰用無嗔人手眼合藥服之即瘥王曰此藥難得僧曰不難今王國內西南有香山絕頂有一仙人修道行滿此人無嗔求之必與王令侍臣持香入山拜仙人曰君王有疾敢勞僊人求其手眼以救王命當令發心僊人聞已刀剜其兩目斷其雙手付與侍臣爾時大地悉皆震動侍臣迴國令僧合藥王乃服而病愈其王嚴駕至香山拜謝瞻禮王見僊人無有手眼身不完具王及夫人左右窺視深生哀念僊人形相頗類我女僊人曰我即妙善是也兒奉手眼上報父恩王聞之抱持大哭王曰朕乃無道使令我女受大苦痛僊人曰吾非苦痛我捨肉眼得金剛眼捨凡夫手得金色臂誓願不虗必得是果於是天地震動僊人乃現千手千眼大悲觀世音菩薩身相端嚴光明晃耀巍巍堂堂如星中月王於夫人合國人等皆發善心歸向三寶菩薩遂入三昧端然入滅矣六祖相遇客人聽經頓悟六祖大師者二字惠能也父姓盧母李氏誕生之時於貞觀十二年戊戌二月八日子時毫光騰空異香滿室黎明有二僧造謁謂師之父云夜光生兒專為安名可上惠下能也其父曰何名惠能答曰惠者以法惠施眾生能者能作佛事言畢而去進之不見也師不飲乳夜遇神人灌以甘露祖本貫范陽郡後流遷於嶺南新州為百姓其父早亡老母孤遺移來南海艱辛貧乏於市賣柴度日時有一客買柴使令送至客店收去能得錢却出門傍有一客誦金剛經能聞經云應無所住而生其心心即開悟後參五祖黃梅傳道出世曹溪故號為六祖也禪道若無況味聖賢何肯歸依況者比類之義又深也以禪道比類將來若無淵深之味而古今之聖賢何肯信向歸依者也華林感二虎隨身潭州華林善覺禪師常持錫杖夜出林麓七步一振錫一稱觀音名號觀察使裴休訪問之曰師還有侍者否師云有兩箇祇是不可見客裴曰在甚麼處師喚大空小空時二虎自庵後而出裴覩之而驚怖師語二虎云有客且去二虎哮吼而迴裴問師曰作何行業感得如此師乃良久會麼裴曰不會師云山僧常念觀世音菩薩投子有三鴉報曉舒州投子義青禪師李氏子而七齡詣妙相寺出家初習百法論後入洛中聽華嚴五載次講至諸林菩薩偈曰知一切法即心自性忽有省曰法離文字寧可講乎後參浮山圓鑑先夢得俊鷹畜之既覺而青至以為吉兆至一日問外道問佛不問有言不問無言世尊良久汝如何會青擬語山以手掩青口於是開悟拜起山曰汝妙悟玄微耶答設有妙悟也須吐却迷為登聖之梯杭悟是墮凡之坑阱初祖曰亦不除愚而就智亦不拋迷而從悟山以太陽皮履布裰付之初開山慈濟先有記曰吾塔若紅是吾再來也其後人而修師塔忽作瑪瑙色未幾青領院事投子山素無水住後一日㵎自泉生郡守賀云名再來泉也其有三鴉每至五更報曉人皆稱讚是師道德所感禪者日增道望日遠異苗蕃茂果符前讖者也李長者解經而天厨送食李長者諱通玄乃唐朝宗枝也太原東北人身長七尺餘形貌紫色眉長過目鬚𩯭如𦘕髮紺而旋螺唇紅而齒密衣大布縫掖之制戴樺皮冠腰不束帶足不躡履冬無皴皹之患夏無垢膩之侵博達古今洞精儒釋開元七年春賷新華嚴經曳笻自定襄至并部孟縣之西南同穎鄉大賢村高山奴家止於偏房中造疏演暢華嚴不出戶庭幾于三載高與隣里怪而不測每日食棗十枚栢葉餅一個餘無所須後移南谷馬家古佛堂側立一小土屋間處宴息棗餅亦然又賷其論併經往韓氏庄路逢一虎玄撫其背以所負經論搭虎脊背䭾往上龕中去虎弭耳前行其處無水老松去可百尺餘忽成池水深丈餘呼為長者泉室無脂燭每夜秉翰於口兩角出白色光尺餘俄有二女韶顏皆雅每日饋食一奩于土龕前玄食已撤器而去凡經五年論成四十卷連經總八十卷次決疑論四卷於開元十八三月十八入滅光照太虗斑鹿白鶴悲于塔邊也須菩提打坐而帝釋散華須菩提在岩中宴坐諸天雨華讚歎尊者尊者問曰空中雨華乃是何人云何讚歎天曰我是梵天敬重尊者善說般若者云我於般若未說一字汝云何讚歎天曰尊者無說我亦無聞是真般若尊者一日說法之次帝釋雨華尊者乃問此華從天得耶從地得耶從人得耶帝曰弗也者云從何而得帝乃舉手尊者云如是如是達磨執履西歸達磨者乃南天竺香至國王第三之子姓剎帝利本名菩提多羅也因二十七祖般若多羅至其國受父王供養得所施珠試其所言祖謂之曰汝於諸法已得通量夫達磨者通大之義也宜名菩提達磨磨問祖曰我既得法當往何國而作佛事祖曰汝雖得法未可遠遊且止南天竺國待吾滅後六十七載當往震旦設大法藥獲菩提者不可勝數直指上根慎勿速行衰於日下又汝到時南方勿住彼處唯好有為功德不見佛理汝縱到彼不可久留磨於是恭稟其教服勤左右垂四十年待祖順世演化本國爾後念震旦緣熟行化時至來辭於姪王為具大舟汎海東行三周寒暑達于南海時當此國梁普通元年九月二十一日也有廣州刺史蕭昂迎禮表聞武帝問答不契航葦渡江至少林面壁九年後得神光立雪斷臂傳授衣法磨知化緣事畢欲返西天於是入滅熊耳當梁大通二年十五日也建塔於定林寺魏遂以其喪告梁武帝贈寶帛以祭禮供養後三載魏使宋雲者奉使西域迴遇祖于葱嶺手擕隻履翩翩獨逝雲問祖何往答曰西天去雲至洛陽具說前事門人起壙隻履存焉時魏孝莊帝詔取遺履供養於少林寺梁武帝聞祖化跡親為製至唐代宗諡號圓覺大師塔曰空觀普化搖鈴騰去鎮州普化和尚不知何處人受秘傳心於盤山寶積禪師也唐咸通元年將示滅乃入市謂人曰乞我一箇直裰或與皮襖或與布衫皆不受振鐸而去臨濟令人送一棺師歎曰臨濟小廝兒饒舌便受之遂辭眾曰普化明日東門外迴也郡人相牽出城外師應聲曰今日不合青鳥乃曰明日南門外遷化人亦送之又曰明日向西門外方吉人送漸稀出已還返人意稍怠第四日自擎棺出北門外振鐸入棺而逝郡人奔走出城揭棺視之了無踪跡唯聞空中鐸聲漸遠莫測其由頌曰三界為旅亭四生為徑路生來似著衫死去如脫袴不歡亦不哭無新亦無故不拘造化成一切由吾作羅漢來參於仰山和尚仰山者乃羅漢稱為小釋迦再來也得法於溈山祐禪師號溈仰宗有九一六種圓相以為宗旨後有一梵僧來參仰曰問云還識字否山曰隨分僧乃右旋一匝云是甚麼字山於地上書箇十字僧又左旋一匝云是甚麼字山乃改十字作卍字僧畫一圓相以兩手托如修羅掌日月勢云是甚麼字山書圓相圍却卍字僧作婁至勢山曰如是如是汝善護持僧禮拜畢出門騰空而去時有一道者請問仰山云五日前問和尚還識字的僧是何處人山曰汝曾見否道者云正見出門騰空而去山曰此是西天羅漢故來探吾宗旨也嶽帝受戒於思大禪師思大者燈錄校證無有嶽帝受戒於思大禪師之文本是嵩嶽元𡋣禪師生伊闕李氏幼歲出家於高宗永淳年間受具戒於閒居寺習毗尼謁安國師頓悟玄旨遂結廬于嵩嶽之龐塢是年一日有異人即嵩嶽之神峩冠袴褶而至從者太多偉甚稱謁大師師覩其非常乃諭之曰善來仁者何為而至彼曰師寧識我耶師曰吾觀生佛等吾一目豈分別耶彼曰我此嶽神也能生死於人師安得一目我哉師曰吾本不生汝焉能死吾視身與空等視吾與汝等汝能壞空與汝乎苟能壞空及汝吾則不生不滅也汝尚不能如是又焉能生死耶嶽神稽首曰我亦聦明正直於餘神詎知師有廣大之智辯願受正戒令我度世師曰汝既乞戒即既戒也所以者何戒外無戒又何戒哉神曰此理也我聞茫昧特求師戒我為門下弟子師即設座秉爐正几曰付汝五戒若能奉持即應曰能不能曰否神曰謹受其教師曰汝能不婬乎神曰我亦娶也師曰非謂此也言無羅欲也神曰能師曰汝能不盜乎神曰何乏我矣焉有盜取哉師曰非謂此也言饗而福淫不供而禍善也神曰能師曰汝能不殺乎神曰實司其柄焉能不殺師曰非謂此也言有濫誤疑混也神曰能師曰汝能不妄乎神曰我正直焉有妄乎師曰非謂此也言先後不合天心也神曰能師曰汝能不飲酒乎神曰吾受祭奠焉能不飲師曰非謂此也言不得亂性也神曰能師曰如上是佛五戒也神即作禮辭去師乃門送而且觀之見儀衛逶迤如王者之壯嵐靄烟霞幢幡環珮淩空而隱沒矣徑山至今猶是龍王打供杭州徑山道欽禪師蘇州崑山朱氏子初服儒教也其年二十八遇素師師謂曰觀子神氣溫粹真法寶也求為弟子落髮素曰汝乘流而行遇徑即止師遂南行抵臨安見東北一山問樵者此是何山樵者曰徑山也乃駐錫焉西遇危峰之北石岩敷座有一老翁致敬曰願捨此居為師駐錫之所師同南進上至五峰之間有一大湫謂師曰吾若去時此湫當漲留一穴水幸勿填之我時常來言訖而隱於是雲霧晦冥風雨大作連夜不息及曉雨霽湫水盡涸漲沙遂平唯留一湫尚存謂之龍井師居之常有異人而來献供已而隱之每日如此盛知皆是龍王令人送供者哉雪峰往昔能使木人開山福建雪峰義存禪師泉州南安豐氏子師生而惡葷茹襁褓間聞鐘梵之聲見旛華必動容欣喜十二出家十七落髮師事慶玄律師初參德山玄鑑禪師問曰從上宗乘中事學人還有分也無山打一棒曰道甚麼師舉似岩頭曰我當時如桶底脫相似頭喝曰豈不聞從門入者不是家珍師曰他後如何即是他時一一從自己胸中流出始是盖天盖地師大悟曰始是鰲山成道也木人者即木毬也師凡喚僧必以木毬輥去彼僧自來若乞檀施附字於毬上毬徑至檀越家一一送施而來智門祚頌雪峰輥毬孰辨機一千五百幾人知眨起眉毛千萬里須是吾門獅子兒此皆已驗之因由切莫自生於退屈所謂結前之義比前來十餘之聖賢皆是以經効驗有如是之因感如是之果也切莫退屈者退者却去也屈者抝折也乃科家勸勉行人吝可自生退却屈抝也古德云彼既丈夫我亦爾不應自輕自謾而退屈者也

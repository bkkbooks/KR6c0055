body:
  text: 姚秦三藏法師鳩摩羅什譯隆興府百福院宗鏡禪師述曹洞正宗嗣祖沙門覺連重集法會因由斯謂標舉提綱科文釋義之辭乃依昭明太子所判謂之法會因由分第一言此説法之會皆因佛入城乞食之由也教起根源此四字就是解釋法會由因之義也法即教法會即人天衆會欲得教法興起必須會集人天因由即根源也如是法我佛宣此科如是我聞今言我佛宣者當爾之時佛將入滅阿難請問四事云經首當安何名佛言安如是我聞是佛親口自宣説也舍衛國中乞食為先此科一時佛在舍衛國與千二百五十人入舍衛大城乞食故云乞食為先矣次第乞已本處安然結跏趺坐終日默無言此科佛入城中次第乞食佛心平等不揀貧富令人均種福田也本處安然者此科還至本處飯食已訖結跏者此科收衣鉢洗足已敷座而坐即敷尼師壇而坐也終日者佛乃無言入定也前乞食以資色身壽命此入定以資法身慧命又乞食令他種福説法令他覺悟是利他之道入定乃返本還源自受法樂是利己之道也金剛般若智箇箇體如然白雲消散盡明月一輪圓起句是法喻齊彰乃唐梵雙舉呈句明般若之智人人本具也白雲消散者以般若智照破五蘊能空四相猶如白雲消散盡而顯明月當空也姚秦三藏法師鳩摩羅什譯姚秦者即後秦姚氏也三藏者即經律論三藏也法師者傳譯弘通之人也鳩摩羅什者略梵語具云鳩摩羅琰耆婆此云童壽謂童年有老成之德什者以斯法師深通此方文字華梵兼舉故稱羅什譯者翻梵語成華言也法會因由分第一經如是我聞一時佛在舍衛國至洗足已敷座而坐注曰如是者指法之辭也如是之法我從佛聞一時者説此般若之時也舍衛者即波斯匿王所居之國也祇樹者祇即匿王之太子祇陀名也樹是祇陀所施故云祇樹也給孤者有一長者名須達拿常施孤獨貧窮故云給孤獨也園者惟祇陀太子有園長者欲買建寺太子戲曰若布金滿園我當賣之須達運金布八十頃園而滿是太子不受其金同建精舍請佛説法故曰祇樹給孤獨園也大比丘者言得道之深乃菩薩阿羅漢之類也千二百五十人者優樓頻螺等五百人那提三百人伽耶二百人舍利弗一百人目犍連一百人耶舍長者五十人故云千二百五十人俱也爾時者彼時也佛為三界之尊故為世尊食時者正當午前將行乞食之時也著衣持鉢者著僧伽之衣即二十五條大衣也持鉢而持四天王所獻之鉢也入城者寺在城外故云入也乞食者佛是金輪王子尚自乞食為欲教化衆生捨離憍慢也又為後世比丘不積聚財寶也於其城中次第乞者如來慈悲不擇貧富平等普化也還至本處者乞食而歸也飯食已畢收衣鉢洗足者謂收起袈裟於鉢盂然後洗足以佛行則跣足住則必洗也敷座者乃敷設高座而坐入定也天台智者頌曰法身本非食應化亦如然為長人天福慈悲作福田收衣息勞慮洗足離塵緣欲證三空理加趺示入禪調御師親臨舍衛威動乾坤阿羅漢雲集祇園輝騰日月調御者十號之一也親臨者降臨赴感有威可畏有儀可則即正容悟物也梵語阿羅漢華言殺賊謂殺煩惱賊即千二百五十之衆如雲而來集於祗園各各神通變化光明洞達故云輝騰日月也入城持鉢良由悲愍貧窮洗足收衣正是宴安時節入城次第行乞是佛悲愍之心令其種福洗足者前入城行乞是利他之意也此收衣宴坐是利己之意也故云宴安時節也若向世尊未舉已前薦得猶且不堪開口已後承當自救不了此是科家以祖師門下之機單明向上一路若向世尊未舉已前會得可謂釋迦不出世四十九年説達磨不西來少林有妙訣於斯薦得猶且不堪若向世尊開口已後承當依文解義紙上鑽研思慮而知意解而會故云自救不了也宗鏡急為提撕早遲八刻何故科家意云我前來與諸人提持此事還是遲了一時也一時者八刻為一時又云晝夜十二時總一百刻每時八刻還有四刻在子午卯酉時中也何故者重審之辭也重審上義何故不堪何故不了又遲八刻者也良馬已隨鞭影去阿難依舊世尊前良馬者昔外道問佛不問有言不問無言世尊良久外道讚歎曰世尊大慈大悲開我迷雲令我得入乃作禮領會而去阿難白佛言外道得何道理稱讚而去佛言如世良馬見鞭影而行科家引此之義答之若向世尊未舉已前會得此理如外道向默領悟似良馬已隨鞭影去也若向世尊開口處承當此理如阿難依舊向世尊言上尋討也乞食歸來會給孤收衣敷座正安居真慈洪範超三界調御人天得自如前二句頌佛儀範後二句令人倣效悉獲利益真慈者讚佛也佛真三界之師四生之父若人倣效承襲乞食説法利生即得超出三界調伏御化一切人天一切有情皆成佛道得自如也西方寶號能宣演九品蓮臺必往生直下相逢休外覓何勞十萬八千程前二句依教而修若能專心持念彌陀聖號必得往生九品蓮臺也後二句消歸自己莫向外求直下相逢自性彌陀唯心淨土優曇云自性彌陀無別念佛行佛坐佛同眠自從這裡相逢後彈指高超八萬千百歲光陰瞬息回其身畢竟化為灰誰人肯向生前悟悟取無生歸去來前二句歎無常迅速身不久留如目睛一瞬氣息一出言百歲光陰剎那便過也其身畢竟者此身畢竟化為灰塵識心隨業牽去也後二句既是此身不久終歸變滅好向生前悟取此心不生不滅真常真樂故云悟取無生歸去來也善現啓請頓起疑心合掌問世尊云何應住降伏其心此科昭明太子判此一段經文為善現啓請分第二蓋善現請佛説法為衆決疑故立此名也頓起者言善現這一啓請即為當來有情衆生所以頓然而起疑心請問世尊而為決通也合掌者此科長老須菩提在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言希有世尊如來善護念諸菩薩善付囑諸菩薩也云何應住者此科世尊云善男子善女人發阿耨多羅三藐三菩提心云何應住云何降伏其心也佛教如是仔細分明氷消北岸無花休怨春此科佛言善男子善女人發阿耨多羅三藐三菩提心應如是住如是降伏其心佛答如是安住理中如是降伏煩惱説得仔細明白無有藏隱須菩提於此領解佛意故應云唯然世尊願樂欲聞也氷消北岸者此總科須菩提問安住降伏佛答如是住如是降伏如陽春一布萬物生輝氷消北岸花發南枝也無花休怨春者科家意云佛如此酬答太煞分明汝等後人不悟如來所説之旨似枯木無花蕉芽敗種莫怨春光不曾與你自恨無枝葉莫怨太陽偏也金剛般若智莫向外邊求空生來請問教起有因由前二句叮嚀切囑此般若智當人本具莫向外求後二句明須菩提這一問佛是為當來衆生起教之因由也善現啓請分第二經時長老須菩提在大衆中至唯然世尊願樂欲聞注曰長老者以德長年老也須菩提解空第一於此般若是當機人欲發起此經為衆請也從座起者請佛説法恭敬之儀也右膝著地者文殊問般若經云右是正道左是邪道今欲説般若正道用正去邪也諸佛希有者如優曇華三萬年開金華一次乃得一現耳善護念者為護念根熟菩薩記云根熟者三賢已上菩薩信根成熟永無退轉佛即護念也善付囑者為付囑根未熟菩薩記云十信菩薩信根未成熟故付者將小付大囑者囑大化小如此護念付囑即希有事也善男女者即未發大乘心之凡夫也阿耨多羅三藐三菩提者即發無上正等正覺心也云何應住降伏者須菩提意云雖發此心未知修何等觀降伏煩惱故發此二問一問衆生發無上心欲求般若云何可以安住諦理二問降伏惑心云何可以折攝散亂見思塵沙煩惱也善哉者佛深許須菩提所問奇妙故云善哉是佛讚歎須菩提能知我意善教諸人不起妄念也汝今諦聽者諦則諦審明白汝當了達聲塵本來不生勿逐語言詳審而聽應如是住者佛答須菩提既發菩提心應當安住諦理降伏惑心也唯然者乃須菩提領諾之辭也聞佛所答如是發心如是應住如是降伏即便領解故應之唯然也如夫子云參乎吾道一以貫之曾子聞之曰唯即應之速而無疑也願樂欲聞者蓋為衆生請問而發起此教也昔奇哉之善現讚希有之慈尊悲憐濁世衆生咨決菩提心要此是科家讚美須菩提奇哉昔日請佛説法讚歎希有如優曇華三萬年方始一現故云希有也悲憐衆生者是他善現慈愍之心為五濁惡世有情衆生咨請佛決通菩提心之總要故云奇哉也可謂一經正眼三藏絶詮千聖不傳諸祖不説一經正眼者即爍迦羅金剛堅固眼也明經中須菩提問發菩提心云何應住云何降伏佛答應如是住如是降伏單顯菩提心為金剛經正眼也三藏絶詮者似此菩提心三藏之文詮注不及故云絶詮也千聖不傳者呈上正眼絶詮之道可謂向上一路千聖不遊如云父母未生前凝然一相圓釋迦猶不會迦葉豈能傳如是降伏扁舟已過洞庭湖護念叮嚀何啻白雲千萬里科家意云此理既是三藏絶詮之道諸祖不傳之旨今日世尊説個如是降伏早是扁舟已過洞庭湖於理中去之遠矣護念叮嚀者科家云如來説個護念説個付囑不止白雲萬里而矣如云聲前一句口如眉佛祖從來總不知為甚麼如此此是科家重審上義因其扁舟已過白雲萬里下文伸答毗婆尸佛早留心直至而今不得妙言此菩提心自過去毗婆尸佛至釋迦牟尼佛以心傳心佛佛授受西天四七東土二三至今不斷謂之傳心端的此心有何傳受可謂少林九年垂一則語直至而今諸方賺舉故云不得妙也問處孤高答處深妙圓真淨不須尋瞥然如是知端的默契菩提大道心此四句頌經文之義也問處孤高者即須菩提所問云何應住今既發菩提心便要修菩提行然後成菩提道欲修此行未知以何諦安住即是又問欲修菩提行十使煩惱妄念之心於一剎那頃有九百生住異滅相續不斷以何等法降伏妄心如此二問其實孤高也答處深者佛答應如是住如是降伏其心乃全體顯露如即真如之理是即允許之辭三諦真如之理三諦融通應當稱理而修方才許是世尊答此兩個如是其實深也妙圓真淨者明問處甚深答處微妙顯密圓融真實清淨之道故云妙圓真淨也不須尋者指示行人向佛答處會取再不須別處尋求也瞥然如是者明須菩提向佛兩翻答處就知端的默識心通領其旨趣即得契合菩提大道也阿彌陀佛元無相遍界明明不覆藏文潞尚然修淨土東坡猶願往西方前二句明阿彌陀佛不住有為不住無為故云無相遍界明明者言彌陀法身周遍法界無有覆藏也後二句者引古勸今也文潞公姓文諱彥博守洛陽嘗致齋往龍華寺瞻禮聖像忽見像毀墮地略不加敬但瞻視而出傍有僧曰何不作禮曰像毀矣吾何禮乎僧曰先德道譬如官路土人取以為像智者知是土凡人謂像生後乃於行時還將像填路像本不生滅路亦無新故公聞之有省蓋悟無生之生幻相宛然生之無生真性湛然無生法忍自然契矣由是慕道專念彌陀期生淨土晨香夜坐未嘗少廢每發願曰願我常精進勤修一切善願我了心宗廣度諸含識每見一切人則勸念佛誓結十萬人緣同生淨土也如如居士讚曰知君膽氣大如天要結西方十萬緣不為一身求活計大家齊上渡頭船東坡者姓蘇名軾字子瞻號東坡居士宋元祐初除翰林遷內翰初參東林總禪師與論無情話有省遂獻投機偈曰溪聲盡是廣長舌山色無非清淨身夜來八萬四千偈他日如何舉似人公謫黃州又謫惠州仍被命遷儋州南行之日擕阿彌陀佛像一軸人問何故事答曰往生西方公據也時作者咸曰東坡篤信無疑實淨土之果人也母夫人程氏歿以簪珥遺物命工胡錫畫彌陀像自製贊曰佛以大圓覺充滿十方界我以顛倒想出沒生死中云何以一念得往生淨土我造無始業本從一念生既從一念生還從一念滅生滅滅盡處則我與佛同如投水海中如風中鼓橐雖有大聖智亦不能分別願我先父母及一切衆生在在為西方所遇皆極樂人人無量壽無去亦無來然先生云既以一念生還從一念滅生滅滅盡處則我與佛同此同金剛三昧經云因緣所生義是義滅非生滅諸生滅義是義非生滅然東坡四句與經符合可謂冥契佛心者矣才出胞胎又入胎聖人觀此慟悲哀幻身究竟無香潔打破畫瓶歸去來才出胞胎者五母子經云時一沙彌七歲出家得道自識宿命而笑曰故我一身令五母悲惱為第一母子時鄰家亦生小兒與我同年然我命短母見鄰子即悲惱為第二母子時天命早亡母若見人乳兒即為悲惱為第三母子時十歲而亡母見人兒類我食時即為悲惱為第四母子時少年先死母見同輩娶妻即為悲惱為第五母子時七歲出家我母憶念即為悲惱故云才出胞胎又入胎也聖人悲哀者見六道衆生妄念不止輪回不息故慟悲哀也幻身究竟者因幻化而成有七種不淨一種子不淨此淫欲身從無明貪愛煩惱為種子二愛生不淨此身從父母赤白滴和合托識其中三住處不淨此身處母胎生臟之下熟臟之上四食噉不淨在母胎中唯食母血五初生不淨此身産時與血俱出臭穢狼籍六舉體不淨此身薄皮之內膿血遍一切處七究竟不淨此身死後肨脹爛壞骨肉縱橫狐狼食噉也今言此身從生至究竟無有香潔所以大覺璉云屎尿渠膿血聚算來有甚風流處九孔常流不淨坑六門盡是狼籍鋪打破畫瓶者昔有一初果人托陰有昏不知宿命後納一妻房事無休夫出遠行素供一僧忽來問主在否曰不在僧欲回婦留齋向僧具訴上事僧曰但向他道汝須陀洹人太甚貪之如此三説夫聞之宿命即通遂乃愧乎從此止息晏坐不臥妻却怒恨曰厭汝頻繁孰言止息夫言汝不知道我知道了妻每問此夫必此答妻會父母共問此夫亦如此答夫以畫瓶令妻抱持云汝若能知此中何物吾便依汝妻遂愛惜如寶一時偶失足撲落地渾身糞穢妻甚嫌惡夫曰吾識破汝亦如畫瓶其妻省悟遂捨紅塵歸向佛道故云打破畫瓶歸去來也大乘正宗指示叮嚀空生意分明如是應住降伏其心此科昭明太子判此一段經文為大乘正宗分第三此經以菩提心是大乘中之正宗蓋佛教菩薩六度令一切衆生滅度故立此名指示叮嚀者言佛重重切囑之義前分言應如是住如是降伏此又言應如是降伏其心故云叮嚀也空生意分明者言須菩提蒙佛叮嚀其意開廓分明以大乘菩薩六度圓修三觀一體普令含識皆證菩提涅槃也如是應住者此科佛告須菩提諸菩薩摩訶薩應如是降伏其心此中不言安住單言降伏者既是降伏妄心必然安住大乘即是真心者也四生六道無我無人誰歸滅度拈來却在心此科經中所有一切衆生之類也四生者即胎卵濕化也六道者即天人阿修羅地獄鬼畜生也無我無人者此科如是滅度無量無邊衆生實無衆生得滅度者何以故須菩提若菩薩有我相人相衆生相壽者相即非菩薩科主意云既四生六道無我人等四相即是不顛倒心誰歸滅度了生佛一如即是常心故云拈來却在心即第一義心也故慈氏頌云廣大第一常其心不顛倒是也獨坐寂寥寥平地起波濤風來波浪起水漲見船高前二句言大乘正宗所顯涅槃妙心生佛具足本無滅度故世尊前來收衣宴坐故云獨坐寂寥寥也平地起波濤者因善現啓請世尊應機而酬云菩薩應如是降伏其心所有一切衆生之類我皆令入無餘涅槃即是平地起波濤也風來波浪起者科家意云波浪因風而起此大乘正宗涅槃妙心因問而有説也故云水漲見船高也大乘正宗分第三經佛告須菩提諸菩薩至衆生相壽者相即非菩薩注曰此言大乘正宗者以九類生悉入涅槃故為此經之宗也佛於此招告當機菩薩如是降伏其心者言降伏見思二惑塵沙煩惱之妄心也所有一切衆生之類者一切者是總標也衆生者是別列九類衆生也凡有生者皆謂之衆生上至諸天下自蠢動不免乎有生故云一切衆生也衆生雖無數無邊不過九種下文所言是也若卵生者如大而金翅鳥細而蟣虱是也若胎生者如大而獅象中而人者小而貓鼠是也若濕生者如魚鱉黿鼉以至水中極細蟲是也若化生者經云如上而天人下而地獄中而人間米麥果實等所生之蟲皆是也上四者謂欲界衆生也若有色者色謂色身謂初禪天至四禪天諸天人但有色身而無男女之形已絶情欲矣此之謂色界也若無色者謂無色界諸天人也此在四禪天之上唯有靈識而無色身故名無色界也若有想者此謂有想天諸天人也以天人唯有想念不復有色身故也自此以上皆謂之無色界也若無想者此謂無想天諸天人也在有想天之上此天人一念寂然不動故名無想天也若非有想若非無想者此謂非想非非想天諸天人也此天又在無想天之上其天人一念寂然不動故云非有想然不似木石而不能有想故云非無想此天於三界諸天為極高其壽為極長不止八萬劫而已我皆令入涅槃者我者佛自謂也如來指示三界九地衆生各有涅槃妙心令自悟入無餘涅槃而滅度者言滅盡習氣度生死海同證圓滿清淨涅槃也如是滅度乃至實無衆生得滅度者言九類生雖業果不同無非自業緣而生故實無此衆生也此菩薩發心化之而得涅槃實無一衆生入涅槃者以本無衆生故也言第一義中無生可度即真常心也若見可度即生滅心也良由一切衆生本來是佛何生可度可謂平等真法界佛不度衆生也何以故者明上實無衆生得滅度者所以也若菩薩有我相等者是佛招告當機如菩薩心存四相未能直下頓空即非菩薩以有能所故同於衆生者哉涅槃清淨盡令含識歸依四相俱忘實無衆生滅度如斯了悟便能脫死超生其或未然依舊迷封滯殼會麼涅槃者即圓滿清淨真常湛寂之理也佛令菩薩應如是降伏其心運以慈力令一切九類含識之衆生悉令歸向涅槃故云我皆令入涅槃也四相者即我人衆生壽者即四顛倒也今以大乘離四相四顛倒故云四相俱忘也四相既無無生可度無佛可成何滅度之有哉可謂隨順衆緣無罣礙涅槃生死等虗花也如斯了悟者科家意云行人如此了悟我人等四相無涅槃滅度之執豁然大悟便能超出二種生死證大涅槃也其或未然者其或於此四相不能了達依舊被無明之所封蔀生死胎殼之所纏縛也會麼者審察也如上所言會麼不會也生死涅槃本平等妄心盡處即菩提此二句是伸答上義也果能會得真常之道生死涅槃元無異體菩提妄想悉是假名可謂癡愛成解脫真源貪嗔運菩提大用妄想興而涅槃現塵勞起而佛道成也頂門具眼辨來端衆類何曾入涅槃絶後再蘇無一物了知生死不相干此四句頌經中之義也頂門具眼者言佛具爍迦羅金剛正眼能照一切諸法皆悉空寂以空寂故諸法平等能辨善現來例端由世尊付囑諸菩薩護念諸菩薩應如是住如是降伏此是辨來端之義也衆類何曾者世尊又於此理上指出一條活路云菩薩應如是降伏所有一切衆生令入涅槃又云實無衆生得滅度者故云衆類何曾入涅槃絶後再蘇者此明實無衆生得滅度者謂之絶後再蘇無有一物無涅槃可入無生死可出方是了知生死不相干之地可謂撒手到家人不識更無一物獻尊堂也七重寶樹人人有九品蓮花處處開不涉一程親見佛圓音時聽悟心懷此四句言唯心淨土本性彌陀也七重寶樹九品蓮花者即極樂世界之境也人人有處處開乃直指蓮而不遠只在當人也不涉一程者此明自性彌陀不離方寸唯心淨土豈向外求也圓音時聽者不但只是見佛又能時時聽法可謂松風澗水琅琅語盡是潮音與梵音此無情説法之義也擲却閻浮似草鞋更無一物可開懷靈明一點輝千古超日月光歸去來此四句頌歎世勸人也閻浮草鞋者言衆生貪著五欲等種種之樂如一隻破草鞋相似最為鄙賤五欲之中無有一物可作開懷為樂之法也靈明一點者此這一點靈明輝天鑑地耀古騰今全超威音之前獨步劫空之後可作開懷之法明超日月之光故云超日月光歸去來者也妙行無住日月分明本體離根塵四維上下朗耀無窮此科昭明太子判此一段經文為妙行無住分第四言菩薩所行之行於一切法心無住著故云妙行不即不離故曰無住也日月分明者呈上妙行無住已達三輪體空謂施者受者及所施物悉皆如空如此指示似日月光甚是分明也本體離根塵者此之妙行不住六塵不著六根內外根塵皆悉空寂故云本體離根塵也四維上下者此科菩薩不住相布施其福德不可思量所施之福稱理而周猶如虗空四維上下朗然明耀無窮無盡不可思量者矣世尊指教一一分明空生信受鶯來處處春此科世尊指教即指教菩薩無住相布施但應如所教住當依佛教行無所住必得悟入故云一一分明也空生信受者即領荷之辭菩薩既不住相布施不著六塵其福猶如虗空法法皆為布施塵塵盡是菩提故喻如鶯來處處皆春那裏不是發生之處所以云色自色兮聲自聲新鶯啼處柳煙輕門門有路通京國三島橫斜海月明也摩訶般若宗性相體皆同四生并六道盡在默然中摩訶般若者指此大般若智為宗也性相者即性相二宗於此般若事理雖殊同一法界真心故云體皆同也四生并六道者明四生六道從一法界真心變現而有十法界之異也故云盡在默然心體之內也妙行無住分第四經復次須菩提菩薩於法至菩薩但應如所教住注曰此分大意言菩薩行施於法不生執著謂之妙行於五塵等法其心不住謂之無住也復次者此乃敘經明佛再説也亦乃連前起後之辭耳於法應無所住者此明菩薩行布施之時皆應無住不見我為能施人不見他為受施者不見中間有物可施三輪體空謂之無相布施也何以故者此徵問之義佛答須菩提若菩薩不住相布施其福德不可思量又云東方虗空可思量不者佛乃引喻證法也四方四隅上下總為十方佛問十方虗空可思量不須菩提答不可思量佛所以借此虗空無邊喻所行布施稱理而周故所獲功德亦不可思量也佛又云菩薩但應如所教住者此誡勸菩薩當如佛所教而安住於大乘也傅大士頌曰若論無相施功德極難量行悲濟貧乏果報不須望凡夫情行劣初且略稱揚欲知檀狀貌如空遍十方住相布施猶日月之有窮不著六塵若虗空之無際自他俱利福德難量科家意云布施有二種有拙施有巧施此住相布施人天受福福盡還墜三途以有為之法必有窮盡如日月有出有沒故云有窮也謂之拙施可謂住相布施生天福猶如仰箭射虗空也不著六塵者此明不住六塵之相謂之巧施若十方虗空無有邊際不住相布施亦無邊際也自他俱利者此明菩薩無住明布施心無取著是自利亦是理觀也能行布施廣濟貧乏是利他亦是事觀也二事兼行故云福德難量也豁然運用靈通廓爾縱橫自在且道還有住著處麼運用靈通者明菩薩運用施度通於五度即戒忍進禪智故云靈通外則不著六塵內觀六度圓修故云廓爾縱橫自在也且道者科家徵問前義上來既是如此這裡還有住著處麼到頭霜夜月任運落前溪妙體本來無處所通身何更有蹤由此二句答前無住所也妙體者明此真心之體已絶色相之形謂之體妙從本已來元無處所有名呼不得無位可安排通身者明法身無相遍界絶蹤可謂通身無向背遍界不曾藏傅大士曰有物先天地無形本寂寥能為萬象主不逐四時凋運心檀度契真常福等虗空不可量無影樹頭花爛熳從他採獻法中王此四句頌經義也初句明菩薩行施以般若大智運一檀度攝後五度智度論云一念之中能行六般若波羅蜜故云契真常也福等虗空者果能六度圓修三諦齊運如空性無際施福無邊故云不可量也無影樹者無影樹喻真諦花爛熳喻俗諦也採獻法王者行人果能真俗併用此是大乘圓修之法從他採獻般若法王可謂法中王最高勝恆沙諸佛同共證者哉步步頭頭皆是道彌陀元不住西方法身遍滿三千界化佛權為十二光此四句是科家指示行人斯道不可心外別求步步踏著實地頭頭頂挂虗空皆是其道也彌陀者此明自性彌陀不在西方可謂一句彌陀有悟由西方不向外邊求頭頭盡是歸家路了了方知不用修法身遍滿者此理遍滿世界總是一箇法身何勞妄起知見分別淨穢也化佛者解難釋疑有難云既是一箇法身如何又有十二光佛名號故答意云雖有十二光佛不同亦是化佛權為也十二光佛者無量壽佛無量光佛無礙光佛無對光佛炎王光佛清淨光佛歡喜光佛智慧光佛不斷光佛難思光佛無稱光佛超日月光佛總是一佛所化也道過邙山古墓排淮陰功業事堪哀貧富貴賤皆如夢夢覺來時歸去來此四句偈嘆貴賤如夢也道過邙山者北邙山在河南洛陽皆前代天下官員命終皆葬於此新墳舊冢遍地排列行人路過此山嗟而自嘆似淮陰侯韓信功高天下位至王侯當得常在世間永享榮華則可何故今朝亦葬於此惟伴一堆土冢而矣故云事堪哀也後二句總嘆意云不獨韓信一人如此就是貧者上無片瓦根椽蓋覆下無卓錐之地容身富者家有四海之地寶有千庫之盈貴者三公之位萬鍾之祿賤者使作傭賃奉侍尊長雖貴賤差別不同總是一個無常大夢也歸去來者乃科家誡勉令人向夢中醒悟覺世浮花放下萬緣單提一念觀想彌陀同登淨土故云歸去來如理實見分明説破空生意如何此科昭明太子判此一段經文為如理實見分第五此言不以身相見佛者此名稱理之見理本無見以無見之見名為實見也分明説破者言佛説若見諸相非相即見如來是佛分明説破了矣不曾隱藏也空生意如何者此科佛問須菩提於意云何可以身相見如來不言前分中説無住相布施是成佛之因恐善現執著疑佛果是有為身相故佛問云可以三十二相身見如來法身不不者乃不定之辭也地水火風四大和合雲來雲去本更無他漚生漚滅元非一與多此科須菩提答佛之義世尊不可以身相得見如來何以故如來所説身相即非身相佛告須菩提凡所有相皆是虗妄若見諸相非相即見如來此言須菩提悟佛問義故答不可以身相見如來科家意云身相者地水火風和合而成故喻如雲去雲來漚生漚滅即是凡所有相皆是虗妄也本更無他者言法身無相元非一叉非異不墮於諸數即是若見諸相非相即見如來也可謂雲去雲來天本淨華開華謝樹常存如如真妙理湛湛自然觀圓明真實見隨處得安然言如如者即事即理故稱之為如如也真妙理者即法身無妄之理矣亦本覺真心即般若實相也湛湛自然觀者喻法身非相湛寂凝然萬境雖殊真心無異故云自然觀也圓明真實見者行人若能於佛所説凡所有相皆是虗妄若見諸相非相若能於此真實見得此理所以處處即得安然可謂淫房酒肆尋彌勒滿目青黃更是誰一切世法無非佛法一切煩惱總是菩提也如理實見分第五經須菩提於意云何至若見諸相非相即見如來注曰此分經義明稱理真實而見法身也因前分中以無相布施求成佛之因恐善現起疑執佛果有為身相認為法身佛乃呼須菩提而問之云可以三十二相見如來法身不須菩提悟佛問義故答云不也又白世尊云不可以身相得見如來須菩提意云色身即有相法身即無相今言身相者即地水火風假合而成也法身者即無形段相貌故答云不可以身相見也何以故者徵問前義言須菩提自問何故不可以身相見如來乃自答云如來所説身相非是真實應緣而現故云即非身相謂無有真實身相也佛告者是佛招告須菩提印可之義不但如來身相是虗妄乃至十法界諸相皆然故云凡所有相皆是虗妄若見諸相者佛恐須菩提聞説虗妄離相別求真佛故云若見諸相非相了相體本空即見如來可謂無明實性即佛性幻化空身即法身法身覺了無一物本元自性天真佛傅大士曰如來舉身相為順世間情恐人生斷見權且立虗名假言三十二八十也空聲有身非覺體無相乃真形金身顯煥巍巍海上孤峰妙相莊嚴皎皎星中圓月此科可以身相見如來之義也讚佛相好微妙莊嚴可謂身色如金山端嚴甚微妙如淨琉璃中內現真金相者矣然雖如是畢竟非真經云真非真恐迷我常不開演此科凡所有相皆是虗妄之義也科家意云然雖金身顯煥如此是應化之身約法身上畢竟非真也真非真恐迷者此言凡夫錯認八識為真理楞嚴經云陀那微細識習氣成瀑流真非真恐迷我常不開演論云阿陀那識甚深細一切種子如瀑流我於凡愚不開演只恐分別執為我溫陵曰梵語陀那華言執持謂執持根身種子起現行故即第八阿賴耶也含藏種子為習氣積生識浪為瀑流湛由是分結由是起也若以為真恐迷妄習而自誤以為非真恐迷自性而外求故權小教中不開演也且道意在於何此是科家徵問之義也既云身相非真畢竟如何即是下文伸答顯露而矣一月普現一切水一切水月一月攝此二句真妄不分心境一體也意云色身不離法身法身不離色身也一月普現者言一月喻法身一切水喻萬境故法身遍在一切境上優曇頌曰境智如如絶證修更無間事滯心頭情盡見除消息斷一輪明月挂中秋所以道以一統萬一月普現一切水會萬歸一一切水月一月攝報化非真了妄緣法身清淨廣無邊千江有水千江月萬里無雲萬里天此四句頌經義經云凡所有相皆是虗妄故云報化非真也問云既報化非真何必用耶答云雖分報化元一法身也因機有妄緣分別故有報化之應若了妄緣元一清淨法身何有分別之説也千江有水千江月者呈初一句機喻千江月喻法身有水此月皆現實非天上真月故云報化非真了妄緣也萬里無雲者呈第二句法身清淨廣無邊也人命無常呼吸間眼觀紅日落西山寶山歷盡空回首一失人身萬劫難前二句嘆人命不久留時不可待後二句引喻勉人不可錯過也人命無常者如朝存夕亡剎那異世故喻如紅日落山須臾便沒寶山歷盡者言人從無量劫得個人身如須彌山輥芥投針相似今此身喻如一座寶山有人於此寶山中若取寸草焚向爐中煙氣到處土木瓦石樓臺殿閣悉作黃金因名為寶山既是經過遊歷此山不可空手而歸若不取一草一葉歸家可謂癡人矣喻人不以此身修戒定慧不但空回又恐一失人身萬劫難復者也稽首彌陀真聖主身乘七寶紫金臺四十八願常無間攝受衆生歸去來前二句言能禮之機起觀觀所禮之佛故稽首而禮佛身相好寶座莊嚴佛身乘七寶金臺一一觀想分明瞻禮此名俗諦禮也後二句言四十八願者佛因中曾發此願攝受衆生佛為能攝機為所攝以佛因中發願故果上不捨因門願云若有衆生稱我名號禮我形像不生我國者我決不成佛故云因該果海果徹因源也正信希有一念無差心外休取法心若取法凡聖皆差此科昭明太子判此一段經文為正信希有分第六蓋如來滅後後五百歲信解受持此經者名為希有也一念無差者若能於一切法不信唯信般若名為正信名為希有故云一念無差也心外休取法者此言三界唯心萬法為識性宗云出真心外無片事可得又云未達境唯心起種種分別達境唯心已分別即不生若能如此豈肯心外求法也心若取法者言四聖六凡各有取著之執故雖一理所證有差若無取著有何差別此明若心取相則著我人若取法相亦著我人故云凡聖皆差也心若無念却被雲霞圓明一點春來樹樹華此科若取非法相即著我人衆生壽者行人若執著非法相一向執空都無一法名為無事界成斷滅空無乃無想天之種類故云即被雲霞也可謂不見一法存無見大似浮雲遮日面不知一法守空知還似太虗生閃電圓明一點者此科是故不應取法不應取非法之文言行人到此已破人法二執證二空之理不生偏見雙眼圓明圓則無不包容明則無不照徹若識得此一點圓明之心如春普至大地生輝故云圓明一點春來樹樹華也邪心俱蕩盡正信勿生疑念念無差別處處發真機邪心蕩盡者即前第四分中菩薩行施不著六塵第五分中無相見法身佛故名邪心俱蕩盡也正信者即此第六分中唯信般若名為正信於前無住布施無相見佛心不生疑故云勿生疑也念念無差者行人已證人法二空心無四相凡聖無差故乃念念無差處處真機發現矣正信希有分第六經須菩提白佛言世尊至如是言説章句生實信不注曰此分之名為正信希有分以須菩提聞前無住行施即是因深無相見佛即是果深既談因果切恐如來滅後末法惡世之中迷鈍衆生得聞如是言説章句心生疑惑不能生信故發此問望佛決疑令生實信者哉經佛告須菩提莫作是説至能生信心以此為實注曰莫作是説者言佛恐壞末世衆生實信之心故且告之以莫作是説我滅度後後五百歲即二千五百年後當末法惡世之時若有人修戒定慧三學者於此般若章句能生信心以此為實也經當知是人不於一佛二佛至無法相亦無非法相注曰當知是人者即指末世衆生能信此法不於一佛二佛等種諸善根必於無量諸佛所種諸善根也聞是章句乃至一念生信者言此衆生聞是大乘般若章句一念生淨信者信此般若能除煩惱能成出世功德如來以五眼六通悉知悉見是諸衆生得無量福德何以故者徵審前義是諸衆生無復我相等者此人已離四相人執證人空理也無法相亦無非法相者此人已破法執證法空理也既證人法二空方於般若生信者焉經何以故是諸衆生至即著我人衆生壽者此文返釋前義前來人法二空即能生信此即未離人法不能生信也若心取相等者心起妄念執著四相即是人執也若取法相非法相者執心外有法故著四相即是法執也此人於般若章句必不生信也經是故不應取法至法尚應捨何況非法注曰是故者總結上義以是之故不應取法是遣法執之情不應取非法是遣空執之情有無俱遣語默兩忘信心清淨也以是義故者乃指上文所言之義也佛常謂汝等比丘當知我之説法如船筏之譬喻未得渡河須借船筏既渡之後竟當捨却汝等比丘亦復如是未悟真性須借佛法既悟之後佛法當捨佛法向當捨去何況凡夫外道之法猶當捨去也傅大士頌曰渡河須用筏到岸不須船人法知無我悟理豈勞詮中流乃被溺誰論在二邊有無如取一即被汙心田因勝果勝信心明了無疑人空法空真性本來平等直饒名相雙泯取捨兩忘要且猶存筏見咦因勝者即前四分中無住行施不著六塵也果勝者即前五分中無相見佛也信心明了者即此六分中信此因勝果勝於般若章句明了無疑也人空者即無四相人執也法空者即無不取法相等之法執也真性平等者行人若能於一切諸法不著可謂了達諸法實性本來平等也名相雙泯者人執有人空名相法執有法空名相此二雙泯也取捨兩忘者取於善法捨於非法此二兩忘也要且猶存筏見者科家意謂佛説我之説法如筏之喻法尚應捨何況非法佛雖能所兩遣猶有遣遣之情尚存故云猶存筏見也咦此是科家當人不讓之義此喝掃蹤滅迹掃去世尊筏見可謂眼中撥去黃屑觸處縱橫鳥道玄也彈指已超生死海何須更覓渡人舟此二句答上文之辭也言世尊説法如筏之喻渡人科家把住猶存筏見此答出不存之意故云彈指已超生死海何須更覓渡人舟此是不涉修證不立階級不施一功成就楞嚴之夫定不披一字遍覽普眼之真經四句之義頓融百非之路杳絶也善根成熟信無疑取相求玄轉背馳一念頓超空劫外元來不許老胡知前二句依經解義也言此衆生於無量千萬佛所種諸善根薰習成熟今聞此經信解受持而心無疑惑也取相求玄者若是善根不具取著人空之名相法空之名相執著四相而欲求玄妙之理轉求轉遠轉逾背馳也後二句以衲僧巴鼻一念頓超空劫那畔無佛無祖那個道理不可心思不可言議故云不許老胡知可謂發迦不出世四十九年説達磨不西來少林有妙訣頻伽尚能知歸向孔猶聞得化生時節因緣休蹉過樓頭畫鼓恰初更前二句指出異類尚能念佛往生淨土也宋元祐間長沙郡人養鸜鵒鳥俗呼為八八兒偶見僧念阿彌陀佛隨口稱念旦暮不絶因與僧久之鳥亡僧具棺葬俄葬之處見青蓮華一枝掘出其根從鳥舌根中生出頌曰有一靈禽八八兒解隨僧口念阿彌死埋平地蓮花發我輩為人豈不知樂土本無三惡道禽聲渾是佛宣流當機未盡衆生界啼斷春風卒未休又頌鸚鵡頻伽繞樹鳴妙音和雅正堪聞殷勤不斷緣何事曲為勞生昧己靈後二句勸人不可蹉過時光也懈怠耕者經云有一耕夫見佛行過心中雖喜不去禮佛或謂何不禮佛乃曰耕田未竟種又未下若要見佛須待間暇佛告阿難佛難值遇懈怠如此斯人已蹉過六佛不得度者非但今日也科家意云有等不精進人正與此耕夫一般善人勸云何不念佛便推托云因衣食故終日忙忙未暇念佛科家道縱汝晝忙夜豈忙乎故云樓頭畫鼓恰初更此時間靜正好念佛若不肯念只是懶惰豈非蹉過者哉勢至觀音悲滿懷寶瓶楊柳灑三災誓隨淨土彌陀主接引衆生歸去來此四句菩薩悲心勸修淨土也大勢至菩薩乃於恆河沙劫前有佛名超日月光佛彼佛教我念佛三昧以念佛心得無生忍今於此界攝念佛人歸於淨土也觀世音菩薩者於無數恆河沙劫有佛出世名觀世音如來我於彼時發菩提心彼佛教我從聞思修入三摩地初於聞中入流亡所所入既寂動靜二相了然不生忽然超越世出世間今我身成三十二應入諸國土教化衆生彼佛授我觀世音號也悲滿懷者此二菩薩以四無量盈滿其懷普化懷生也寶瓶楊柳者是二菩薩之器用也三災者有大小不同大三災者至一大劫盡火燒初禪水淹二禪風刮三禪也小三災者至一小劫盡刀兵疫病飢饉也菩薩以不思議神力能以柳頭一滴之水遍灑三災故云紫竹嵒阿觀世音九蓮池畔現童真楊枝一點天甘露散作山河大地春又云慧日破諸暗能伏災風火後二句菩薩本願也悲華經云彌陀於恆河沙劫前有轉輪王名無諍念王有大臣名曰寶海而生一子出家成道號寶藏佛入定放光照十方國光中現無量淨穢國土王見是已發願云願我成佛時國中無三惡道皆真金色種種莊嚴佛告王言汝於西方過一恆河沙阿僧祇劫是時世界轉名安樂汝當作佛號無量壽如來第一太子不眴號觀世音第二太子尼摩號大勢至是以二大菩薩皆承往昔誓願依隨彌陀聖至而接引衆生往生淨土菩薩受記經云德藏菩薩句佛言觀世音大勢至二大士於何國土成等正覺佛言阿彌陀佛正法滅後觀世音成等正覺號普光功德山王如來彼佛國土號曰衆寶善集莊嚴入涅槃後得大勢即於其國成等正覺號善住功德寶王如來劫國教化皆悉無二此三聖同垂金臂接引衆生皆生淨土者矣無得無説誰為安名空生意分明如來所説無始無終無得無説者此科昭明太子判此一段經文為無得無説分第七蓋以須菩提答佛之問無有定法得阿耨菩提無有定法可説故名無得無説也誰為安名者此科佛問菩提有得耶佛法有説耶須菩提領解佛意即安箇名為無得無説也空生意分明者此科佛問須菩提於意云何如來得阿耨多羅三藐三菩提耶如來有所説法耶此問佛恐須菩提起疑云前説無相見佛如何樹下成道也無法可説何故四十九年説法也故發此問須菩提言如我解佛所説義無有定法得菩提無有定法可説此是空生意分明處也如來所説無始無終者此科佛問有得有説正顯無得無説之理故云無始無終也意云通三際而無始無終括十方而無邊無際乃清淨法身無為之理也雲生晚谷月照長空千法萬法皆從一法生此乃分明指出無得無説之理如雲生晚谷堪對暮雲歸未合遠山無限碧層層長空雲掃明月獨輝也千法萬法皆從一法者此科一切賢聖皆以無為法而有差別之義言四聖六凡十法界差別之法皆從一無為理而生可謂千途盡向於彼生萬法皆從於此出洞千古之淵源造萬像之模則取捨皆難得無心體自然本來常寂寂無説亦無傳此四句明經中無得無説之理故佛説得阿耨菩提則有取有捨所以難得也無心者言須菩提答佛之問無菩提可得無佛法可説故云無心體自然也後二句歎美之辭其實菩提之道本來寂寂無説無傳也可謂有口説不得無言心自明無得無説分第七經須菩提於意云何至皆以無為法而有差別注曰此分之義妨疑而問向説不可以身相見佛恐須菩提起疑云既非身相見佛云何釋迦樹下得道諸會説法耶此分佛順疑以問之言菩提有得而意顯無得也言佛法有説而意顯無説也故名無得無説分佛問須菩提於意云何如來得菩提耶如來有所説法耶須菩提言如我解佛所説義者言空生領解佛旨乃云第一義中無有定實之法可得無有定實之法可説奈以根器有利鈍學性有淺深隨機設教對病用藥但不執著自契中道豈有定法可説也何以故者徵問前義也如來所説菩提之法皆不可取即無得也不可説即無説也非法者此法為衆生而設非有真實之法故云非法也然亦假此法開悟衆生又不可全謂之非法故云非是非法也總釋上文無定法之義也所以者何者此乃釋呈上文不可取不可説非法非非法也意謂一切賢聖所證者即不可取不可説無為之理也而有差別者蓋於無為法得之淺者則為賢人若須陀洹之類是也於無為法得之深者則為聖人若佛與菩薩是也此所以有差別也傅大士頌曰菩提離言説從來無得人須依一空理當證法王身有心俱是妄無執乃名真若悟非非法逍遙出六塵得亦非説亦非能仁機輪電掣取不可捨不可空生舌本瀾翻且道無為法為甚麼有差別此文言菩提之道得也不是説也不是無有定法今世尊説箇菩提有得正顯無得説個佛法有説正顯無説可謂世尊説法之機輪如長空電掣相似東湧西沒無有定止也須菩提言如來所説法不可取不可説可謂舌本瀾翻如海口鼓浪航舌駕流相似所以舌上起風雷眉間藏血刃也且道無為者此是科家出手眼令人詳審既是一無為理如何又有差別也萬古碧潭空界月再三撈漉始應知此二句答上問辭明無為中有差別所以如萬古碧潭空界月相似月印澄潭光水不分看時似有取之則無愚者不知水中撈取枉費工夫徒勞無益以喻無為中差別之道理事難分心境不二欲言其有不見其形欲言其無聖以之靈也可謂昭昭於心目之間相不可覩晃晃於色塵之內理不可分也雲捲秋空月印潭寒光無際與誰談豁開透地通天眼大道分明不用參前二句言一色晴空明月獨朗喻菩提之道無得無説如心月孤圓光吞萬像光非照境境亦非存也後二句指示行人正恁麼時祇須著眼不可錯過若於此境此時豁開通天正眼豈非大道分明無得無説不用參詳也故寒山云吾心似秋月碧潭光皎潔無物堪比倫教我如何説西方勝境無明暗不比人間夜半深五鼓分明當子位一輪正滿對天心前二句言西方境界勝妙無有晝夜明暗以菩薩之人各有身光故不屬明暗也不比此娑婆國土人間有晝有夜也後二句行容無明無暗不比人間所以夜六時都與子時一般晝六時都與午時一般故云當子位也一輪正滿者言晝夜常明無有明暗也對天心者即午時者矣休插龍叉與鳳叉莫將胭粉汙唇腮法身清淨元無垢體露堂堂歸去來此四句單誡女人情好莊飾不知法身本淨也初二句言龍叉鳳叉頭上之莊飾脂粉面門之莊飾意云如此莊飾雖是美好要且不常辰莊午變少狀則老也可謂玉帶暫時華金叉非久飾張翁與鄭婆一去無消息後二句指出法身本淨不假莊飾亦無老少不遷不變不更不改描之不成畫之不就本來現成法身清淨元無垢染萬劫不壞千古常存故云體露堂堂歸去來也

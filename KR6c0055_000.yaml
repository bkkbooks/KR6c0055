body:
  text: 銷釋金剛科儀會要注解序夫以法身為道廣周沙界細入微塵非空非有無內無外悟之則為四聖迷之則為六凡是以釋迦覩長庚而見諦向鹿野苑室羅筏城祇園等處將以斯道而覺有情所以初談小教次演空宗八部般若次第宣説今此經者即大般若部分所攝始自善現伸請終以大覺答問以住斷降伏共斷二十七疑漸除二執頓入一乘也爰有宋宗鏡禪師者乃應真之一數也悲深智闊學海汪洋道徹離微辭雄理備撮玄機於掌握發妙義於言前語中玉轉珠向句裏釋天鑑地得遊戲之三昧具無礙之辨才鎔百煉之堅金琢三陳之美玉故將梁昭明所判三十二分金剛經依文衍義剖析精微乃立科儀發明經趣總有七種規模一提綱二要旨三長行四結類五頌經文六警世七結歸淨土或博採經論直注本經或廣引他宗申明旨趣掃除知解剪斷葛藤為人天之正轍作苦海之舟航者也自宋迄今四海盛行見聞讀誦者廣幽冥獲益者多若病者遇善見之醫王似貧者得如意之真寶今此會要注解乃因無盡燈公瞻禮普陀路過蘇州而處士許公敬愚等迎請出本師大寧所解科儀注頌意欲刊板流通而燈公止曰不可此科儀京都善果達法師先有集注文辭廣博卷已十軸後學罔窺涯涘次普恩桂法師繼踵前注集為説記二卷悉以刊刻雖然文理幽深間有宗趣事迹揀討未備也公欲金湯內教須請智者校正重集始可流行由是特令淡齋張公持帛千里而來請豫重集豫以此經乃大乘教被菩薩機宗鏡乃聖位不測之人方堪科注我輩凡情淺識豈敢當任斯事奈以既為佛子當報佛恩若不度法度生辜負先聖遺廕所以會取諸家捷要之注安於科儀本文之下貴圖經義通曉非敢胸臆強為祇是述成而已復命隱士吳公期號賓山薰毫繕録工已周完而寶坻縣紀陀信士孟準等助財壽梓以伸大寧先師遺志用廣其傳永圖不朽之意也願見聞披覽者升慧日於中天破昏衢於暗室九有悉蒙津濟三途咸獲菩提以此功勛祝一君之壽域報四重之恩庥仰佛日以增輝庶法輪而常轉矣時大明嘉靖三十年龍集辛亥四月佛誕之辰少室山嗣祖沙門覺連沐手焚香拜序銷釋金剛科儀會要注解十卷總目録第一卷銷釋金剛科儀卷起生於退屈止第二卷野狐尚聽百丈法起但念彌陀止第三卷法會因由分第一起體露堂堂止第四卷依法出生分第八起大道分明止第五卷離相寂滅第十四起一聲還續止第六卷一體同觀第十八起也則不如止第七卷淨心行善二十三起目擊金容止第八卷不受不貪二十八起涅槃如夢止第九卷梁武帝請傅大士起願今回向止第十卷總上九卷原文銷釋金剛科儀卷經科會要注解十卷大全總目録終

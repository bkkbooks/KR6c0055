body:
  text: 姚秦三藏法師鳩摩羅什譯隆興府百福院宗鏡禪師述曹洞正宗嗣祖沙門覺連重集一體同觀萬法無差凡聖共一家如來五眼照耀塵沙此科昭明太子判此一段經文為一體同觀分第十八以恆河沙世界國土中所有衆生若干種心如來以智眼悉見又云如來説諸心皆為非心者以如來智入衆生心既心差別即十法界同一真心也故立一體同觀之名也萬法無差者此言萬法總該十界依正之法如來以法眼觀一切諸法無非真空實相故無差別也如云若人欲識真空理心內真如還遍外情與無情共一體處處皆同真法界也凡聖共一家者言此四聖六凡染淨十界皆從真如妙道流出故云凡聖一家既共一家即是一體張拙秀才云光明寂照遍河沙凡聖含靈共一家也如來五眼者即肉眼天眼慧眼法眼佛眼也傅大士頌曰天眼通非礙肉眼礙非通法眼唯觀俗慧眼直緣空佛眼如千日照異體還同圓明法界內無處不含容此之五眼通該十界而優劣有殊如經所説五眼皆如來所具無非佛眼也照耀塵沙者如來以五眼悉見恆沙世界衆生之心也三心洞徹本性無涯春來日暖無樹不開華三心洞徹者言如來洞徹三心而不可得蓋三世之心過去已滅未來未至現在不住皆是虗妄生滅故求之不可得也唯有本來之性無有邊涯以妄心盡處即是真性一切諸法無不彰顯此心也春來日暖者此是科家分明指示一體同觀萬法無差之義如陽氣初回春來日暖柳塘花塢暖日和風三草二木暢茂調達春意無私乾坤普遍故云無樹不開華以喻如來具此五眼觀衆生心一體無差也如來具六通三心不可窮算沙無億數到此體皆同前二句牒經文之義六通者即前五眼之義文出般若經一神境通者能震動十方變一為多變多為一等此即身如意通也二天耳通者能過人天耳如實能聞種種音聲也三他心通者能知十方諸有情類心心所法也四宿命通者能知十方有情之心年月日時劫量處所名姓死生自他等事也五天眼通能見十方有情無情色像死生善惡等報漏盡通者能知十方有情自他漏盡不盡等也今云如來以六通觀恆沙世界衆生若干種心反三心皆不可得故不可窮也三心既空真心自顯也後二句亦牒經義指歸一體佛以六通悉見恆沙衆生之心即非真心故以算沙無數億世界衆生心佛悉了知一一體空絶十法界之相狀皆不可得無非真空實相故云到此體皆同也一體同觀分第十八經須菩提於意云何至如是世尊如來有佛眼此分名為一體同觀如來以五眼觀衆生妄心皆不可得無非實相故云一體也因須菩提聞佛前説菩薩不見彼是衆生可度不見我是菩薩為能化不見淨佛國土如是則不見諸法名為諸佛如來然則如來具足五眼豈都無所見耶此敘善現疑因下顯所斷也佛問須菩提如來有肉眼不須菩提答云如是世尊如是者領其問義如來有肉眼意云肉眼者見障內色名為肉眼也肉眼具五義一見粗不見細二見近不見遠三見明不見暗四見前不見後五見障內色不見障外色故五義也若是多生已種清淨善根凡夫具足宿命肉眼見百由旬二乘肉眼同凡夫見百由旬菩薩肉眼見三千世界佛之肉眼與菩薩同見三千世界又能見人中無數世界已上總肉眼也佛復問如來有天眼者於肉眼邊引清淨天眼見障外色名為天眼如阿那律是也若佛天眼能見諸佛所有細色淨名云唯佛世尊得真天眼照見恆沙佛土不以二相智論云凡夫天眼見一四天下小聲聞見小千界大聲聞見中千界阿那律見三千界緣覺小者見中千界大者見大千界菩薩天眼遠見一切世界已上總明天眼也佛仍云如來有慧眼者以根本智照真理故以能照真理故名慧眼也若二乘慧眼唯見生空菩薩慧眼俱見二空不能窮盡如來慧眼窮盡無餘已上總明慧眼也佛亦云如來有法眼者即後得智能説法度人也後得智者從根本智後方得其名能達俗明真名為法眼也華嚴鈔云二乘法眼但見無常苦空等諸法總相粗觀不能細觀若要不知根欲性殊非真法眼也菩薩法眼了知根欲性殊及一切法若總若別若粗若細無不窮盡也佛之法眼所知障盡無法不知無生不度故云法眼也佛又云如來有佛眼者前四在佛總明佛眼又見佛性圓極名為佛眼也涅槃云九地已前聞見佛性十地眼見佛性而未了了於自身中十分見一故知隔羅縠見月如來佛眼無不窮盡所以圓極淨勝無如佛眼也經須菩提於意云何如恆河中至未來心不可得佛問須菩提以一恆河中所有沙一沙對一恆河有如是沙等恆河實無量無邊之多又以諸恆河中所有沙數一沙對一佛世界此沙數世界實無量無邊不可説之多也又以沙數世界國土中所有衆生有若干種心如來悉知悉見以此則知佛眼所見爾所國土中衆生心念無量若干如來悉知以顯佛眼圓明了知纖毫無惑無不知見也佛又云何以故者徵問上義以何意故如來悉知若干種心也佛意云如來説諸心者即衆生若干種心有染有淨既有染淨之相即俗諦也非心者妄識本空妄心空處即真心是真諦也是名心者真心不滅不屬有無真俗二諦即第一義心也佛又云所以者何者徵釋上文非心之義也意云本覺不知隨妄流轉故有三世之念謂思念前事者為過去心過去已滅了不可得思念今事者為現在心現在無住了不可得思念後事者為未來心未來未至了不可得三世推求俱是虗妄皆不可得即非常住真心即為依也心虗妄心若一念有生滅心即成六十二種邪見九百種煩惱若悟無法無相平常真心即法體空寂不生不滅但起念時莫執莫斷不取不捨即三際無蹤一念圓具則生死涅槃平等無二妄心本空真心顯矣傅大士頌曰依他一念起俱為妄所行便分六十二九百亂縱橫過去滅無滅當來生不生常能作此觀真妄坦然平五眼悉圓明如揭日曜恆沙之世界三心不可得似撥火覓滄海之浮漚縱使窮諸玄辨竭世樞機到此總須茫然且道是何標格初一節文牒經之義衆生之心佛眼悉知悉見不獨佛眼圓明照十法界如來五眼一一圓明普照故舉喻云如揭日照恆沙之世界揭者高舉也如杲日升空高下俱照也如云佛眼如千日照異體還同所照之境雖多達境本空同歸真空實相也三心不可得者亦牒經義即過去心現在心未來心悉皆虗妄了不可得故舉喻云欲尋此妄心無有處所如撥大覓滄海之浮漚火中決定無水漚妄心定無形迹以顯妄念本空不可尋究也本淨偈曰見道方修道不見復何修道性如虗空虗空何所修遍觀修道者撥火覓浮漚但看弄傀儡線斷一時休也縱使窮諸玄辨者是科家發明此心至極之處難以開口三世諸佛話會不及歷代祖師忘鋒結舌一大藏教不曾談著一字千七百則公案未嘗動著絲毫故德山焚却鈔疏舉火云窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑遂乃焚之以此心言説不得所以到這裏總須茫然也且道是何標格者乃科家徵問之義此心以何標指格量向下顯露者哉直饒講得千經論也落禪家第二籌此二句答上問之義也以此心三世推尋了不可得所以三際求心心不有心不有故妄元無妄元無處即菩提生死涅槃本平等到此田地口欲談而詞喪心欲緣而慮忘故云直饒講得千經論也落禪家第二籌也昔德山宣鑑禪師精究律藏於性相諸經貫通旨趣嘗講金剛般若時謂之周金剛曾言同學曰一毫吞海海性無虧纖芥投針針鋒不動學與無學唯我知焉後聞南方禪道頗盛師意不平乃曰出家兒千生學佛威儀萬劫學佛細行尚不得成佛南方魔子敢言直指人心見性成佛我當摟其窟穴滅其種類以報佛恩遂擔青龍鈔疏出蜀至澧陽路上見一婆子因歇息買餅點心婆指擔云這個是甚麼文字師曰青龍鈔疏婆云講何經耶師曰金剛經婆云我有一問汝若答得吾施一齋若答不得別處去買婆問云金剛經道過去心不可得現在心不可得未來心不可得未審上人點那個心師無語婆云饒汝講得千經論一向臨機下口難遂指往參龍潭信禪師發明心地將所持青龍鈔疏併平昔所集文字以火焚之方知此心出言教外所以釋迦云吾四十九年未嘗説一字達磨曰直指本心本來是佛不立文字教外別傳使人不泥文字名相也心眼俱通法界周恆沙妙用沒蹤由雲收海湛天空闊明月蘆華一樣秋前二句牒經義以如來了三心不可得同一真心又以五眼照十法界同觀一體故以三心五眼體用雙彰能所圓融充遍法界無處不周無時不遍也恆沙妙用者言此心雖具足恆沙性德妙用真空體用周遍法界以實相妙理亦不可得故了然無有蹤由也後二句舉喻明宗顯上真心周遍理事不分之義喻如雲收顯一色晴空海湛印森羅萬象天空映水之澄海闊涵空之相故天水不分上下一體也明月蘆華者此言明白二字月即是明蘆華是白月與蘆華明白不分同為一色喻如心眼俱通周遍法界事理無礙故云明月蘆華一樣秋荒郊日落草風悲試問骷髏你是誰或是英雄豪傑漢回頭能有幾人知此歎世人生必有死死必葬於郊外行人往來至日落時四望無人惟聞草風悲聲此一句言境也次句是科家問義故云試問骷髏你是誰也後二句答上問義此等骷髏或是英雄豪傑如三齊王韓信神機大將似楚霸主項羽蓋世英名臨終未免無常命盡同歸下土也回頭能有幾人知者此言骷髏既死神識奔往不能回頭知他是何等人或富貴或貧窮古德云我道無你言有無常來都空手故云回頭能有幾人知也末法娑婆人苦災互相食噉惡如豺刀兵疫病遭飢饉厭離閻浮歸去來釋迦牟尼佛一代之教典其法有三正法一千年像法一千年人多解脫禪定多聞修福受諸快樂也末法一萬年以解脫禪定多聞修福俱無人多苦惱惟好鬪諍故云末法娑婆入苦災也互相食噉者呈前入苦災之義一切衆生造十惡業輪轉五道經百千劫於多生中互相殺害相食噉如人死為羊羊死為人是也刀兵疫病者呈前末法入苦災之由刀兵疫病飢饉即小三災也瑜伽論云末法將盡有三種小三災出現謂飢儉疫病刀兵也飢儉災者至人壽三十歲時方始建立當爾之時精妙飲食不可復得唯煎朽骨共為宴會若遇一粒稻麥粟稗等子重若摩尼寶珠藏置箱篋而護惜之因此飢儉有情之類亡沒殆盡此之儉災經七年七月七日方乃得過彼諸有情起下厭離由此因緣壽不退減儉災遂息也至於人壽二十歲時本起厭患今乃退捨爾時多有疫氣相續而生彼諸有情悉多殞沒如是病災經七月七日方乃得過彼諸有情起中厭離由此因緣壽量無減病災乃息又至人壽十歲時本起厭患令還退捨爾時有情展轉相見各起猛利殺害之心由此因緣隨執草木及以瓦石皆成刀劒更相殘害經一七日方乃得過復有三種最極衰損謂壽量衰損依止衰損資具衰損且壽量衰損者謂極至十歲依止衰損者謂其身量極至一磔或復一握資具衰損者唯以粟稗為食中第一以髮褐為衣中第一以錢為莊嚴中第一五種上味悉皆隱沒謂酥蜜甘蔗油鹽皆變其味爾時有情起上厭離不復退減又捨惡壽量增長善壽量由此因緣漸增至八萬四千歲如是二十減二十增合為四十中劫是時諸趣有情次第盡沒故結句意云何不念佛捨此之若出離三災生極樂國永無此苦也法界通化似有還無箇箇本無殊圓明一點無來無去此科昭明太子判此一段經文為法界通化分第十九蓋法界者即理事無礙法界也以布施福德無故事理圓融也既不住相所以變化有為之福通作無為之理故云法界通化也似有還無者此七寶布施因緣果報分明不昧故云似有於真空理上了福德無有故云還無猶如雲起虗空常存實有浮雲似有還無也箇箇本無殊者此句呈前以福德無故似有還無即真空理人人本具箇箇不無及十法界衆生均秉同賦下文行容無殊所以也圓明一點者此理既是箇箇無殊這點圓明無所從來亦無所去可謂真淨明妙虗徹靈通無去無來冥通三際卓然獨存者也搬柴運水好用工夫松稍月朗衣穿露寶珠此是科家慈心太煞分明指示圓明一點在日用間或搬柴或運水皆是神通妙用工夫石屋詩云古人為道入山中日用工夫在己躬添石墜腰舂白米擕鋤帶雨種青松擔泥拽石何妨道運水搬柴好用工軃懶借衣求食者莫來相伴老禪翁松稍月朗者乃科家借事顯理發明事理無礙之道可謂月篩松影高低樹日照池心上下天悟心云江月照松風吹永夜青霄更是誰霧露雲霞遮不得箇中猶道不知歸衣穿露寶珠者此引繫珠喻指示圓明一點譬如有人至親友家醉酒而臥時親友以無價寶珠繫於衣下其人不知甘受貧窮後至衣穿破壞露出此珠其人歡喜以此珠貿易所須得大富貴六道衆生亦復如是佛從塵點劫中而將此理指示不覺不知輪轉生死今乃遇佛開悟自性方得道果喻如事法體空真性自顯故云衣穿露寶珠也古德頌曰昔年衣裡曾繫珠今日云何不覺知後逢親友還指點猶如久病遇良醫珍寶滿盈剎福德等難量若到無福地方知滋味長初二句牒經義以七寶滿大千世界以用布施所得福德利益難量以是因緣得福甚多即佛事門中不捨一法也後二句亦牒經義以福德無故如來説得福德多以布施時心無執著希望福德此明無相施即無為福故云若到無福地方知滋味長即實際理地不受纖塵也法界通化分第十九經須菩提於意云何若有人滿至如來説得福德多注曰此節經文名法界通化分因須菩提疑上之心既有住著是為妄心顛倒以此妄心修諸福德亦是顛倒不明善法故佛斷疑問之捨大千真寶布施其福甚多若執著福德實有即為住相其福有盡故如來不説得福德多者此乃人天小果有漏之因終不免輪回畢竟有墮落所以不足為多也以福德無者以離相布施乃清淨無為稱性之福性如虗空其福無量若能施之人以佛智為本修布施行悉皆離相不見福為實有故如來説此人所得福德甚多天台智者頌曰三千大世界七寶滿其中有人持布施得福乃如風猶勝慳貪者未得達真宗終須四句偈知覺證全空布施因緣實人天有漏之果無為福德超凡聖通化之功噫有為雖偽棄之則功行不成無為雖真擬之則聖果難證且道不擬不棄時如何是聖諦第一義初一節牒經義若人以滿大千七寶布施因緣得人天福是有漏果福盡墮落也次一節言無為福勝者以布施之人心無住相了達三輪體空不執福德實有以福德無故所以變化有為之施成於無為之福是為無漏因果故能超凡聖通化之功也噫者嘆辭也有為雖偽者偽者假也以布施雖是有為假法不實以諸佛菩薩若非檀波羅蜜不能成就佛果菩提自利利他之功行所以六度之中以布施為首也無為雖真者以無為之道雖是真實人人本具如有行人執著無為心生擬度不肯依法修進則聖賢菩提妙果難以得證可謂法身非相瞻有相而見法身道果無修速勤修而成道果且道不擬不棄者乃科家徵問之義意云即今不擬無為依理而證不棄有為假施以行二法俱備如何是聖諦之理聖諦者即中道也此之問義要人即二邊而顯中道也達磨當機曾直指廓然元不識梁王此二句答上問頭如何是聖諦第一義此義梁武帝曾問達磨如何是聖諦第一義磨云廓然無聖帝曰對朕者誰磨云不識帝不契磨遂渡江至少林九年面壁也科家意云此聖諦之理達磨曾直指云廓然無聖以此理中聖名了不可得故云廓然元不識梁王非但梁王不識縱使從上諸佛諸祖也無他識處所以云從來共住不知名運用相將任麼行自古上賢猶不識造次凡流豈得明寶施寰中福倍常華開錦上最難量就中拶倒空王殿露柱燈籠盡放光初二句牒經義一法一喻也寶施寰中者以七寶滿三千界布施於人乃是有為之福也又云福倍常者雖行布施達福德無故了福性體空成無為之福故云福倍常也華開錦上此喻七寶布施如一段錦達此布施福德性空而不住相似錦上又添其華所以即有為施而成無為之理事理俱融真俗不二是故稱性福德最難量也後二句呈前之義以不住福德也空王殿即理也拶倒者即不住那邊之理也露柱燈籠即事也放光者以無情之物放光即事而能顯理也若是行人布施不住福德無為離相二邊不住中道不安所以道那邊不坐空王殿爭肯耘田向日輪郊園又是一翻春骷髏縱橫白似銀日炙風吹休懊惱骷髏總是利名人此四句歎人生浮世生死無常其中富貴貧窮貪名逐利皆是常情之事也起句言郊外園材又是一翻春光造化之境也次句謂人死葬於郊外骷髏縱橫如銀之白此言人死敗壞之相也三句此身既壞白骨猶存狼籍遍地又被風吹日炙科家勉云不須懊惱者生必有死成必有壞也結句言此骷髏悉是爭名奪利慳吝之人可謂人間富貴華間露紙上功名水上漚古德云名利數人皆作夢高強幾箇土中埋前思後想頻頻歎多少英雄去不回此頌娑婆衆生而有敗壞之苦後偈指歸淨土永無逼迫之苦也淨土永無三惡道寶方寂靜不輪回金繩界道經行處好念彌陀歸去來起句所謂淨土永無地獄餓鬼畜生三惡之道也次句寶方寂靜不輪回者此言清淨之義以彼國土無有女人又不經營衣食買賣交易所以寂靜也生彼國者唯住正念遠離諸根分別顛倒妄想即得壽命無量不受輪回故也三句又以彼國所行徑路皆是琉璃之地無有墻壁街巷故用黃金為繩以界道傍為經行處也末句科家意謂西方既無三惡之道亦無輪回之苦其國清淨快樂無窮故勉云好念彌陀歸去來所以優曇頌曰平生好結淨方緣懶把工夫去説禪一句彌陀無別念不教一箇喪黃泉離色離相無住無依法界普光輝無得無説無是無非無來無去無相無為此科昭明太子判此一段經文為離色離相分第二十蓋如果不應以具足色身見又不應以具足諸相見法身也此達三十二相了不可得即真空實相故離色離相為名也無住無依者因離色故即無住因離相故即無依既無住無依即真空之理也法界普光輝者此理既離色相盡十方遍法界總是一箇智境所現物物頭頭皆為一段光明故云法界普光輝也無得無説等者此科經文如來不應以具足色身見又不應以具足諸相見法身也以法身無有色相所以無得無説無是無非者此心不是有此心不是無以此心不屬二邊也無來無去者此心不屬未來不屬過去不屬現在即三際俱無故云無來無去也無相無為者以此心無有相狀無有作為不以諸相見澄潭月朗石人戴帽歸此二句乃科家發明離色離相之義以澄潭月朗喻如法身清淨明白一色如寒潭皎月靜夜鐘聲隨扣擊以成聲觸波瀾而不散也石人戴帽者宗門以石人表理無情識也戴帽歸者表無功用中能作功用此喻法身離相即色相而見法身至理絶言借微言而彰至理者哉知得如來意玄空不復尋具足非具足聲色兩分明前二句出如來本意佛意欲令衆生不可在色相上見如來若人達色相本空而不住著不妨色相全體即法身也既即色相全體即是法身不復離色相外別求玄空故云不復尋也後二句牒經義若人會得具足色身即非具足色身具足諸相即非具足諸相行人若向聲色兩處會得分明全體即是法身古德云一切聲是佛聲一切色是佛色所以溪聲常瀉空王偈山色全彰古佛身故云聲色兩分明也離色離相分第二十經須菩提於意云何至即非具足是名諸相具足注曰此節經文名離色離相分以須菩提聞佛前來所説如來者即諸法如義乃無為真如之佛又聞次前所説變化有為而成無為乃是無之法是故起疑云既是佛法無為云何佛身有八十種好三十二相而可見耶佛為斷此疑故有是問云佛可以具足色身見否善現領會佛義答云如來不應以具足色身見意云如來法身故非色身可見矣以法身離相離名絶於視聽之表也何以故者徵問之義以何意故法身非色身可見善現即云如來説具足色身者乃為衆生現身説法故云具足色身即俗諦也即非具足色身者以如來法身故非色身可見故云即非具足色身即真諦也是名具足色身者以法身未嘗離色身即俗也以色身未曾離法身即真也以真俗併顯即為中道故云是名具足色身也佛又問須菩提云如來可以具足諸相見法身否善現即解問義答云如來不應以具足諸相見意云如來法身亦非諸相可見也何以故者徵問之義以何意故法身不以相見即云如來説諸相具足者以如來為利衆生降迹人間現具足相為生説法即俗諦也即非具足者然則現相説法其體元空了不可得故云則非具足即真諦也是名諸相具足者以法身不離諸相而現即俗也以諸相不離法身而生即真也以真俗互顯雖相而無相雖説而無説即二邊顯中道故云是名諸相具足也有相有身如來莊嚴具足分賓分主空生解辨親疏直得賓主兩忘色相俱離如何是主中主此文牒經之義有相者即如來三十二莊嚴相也有身者即如來十八種好具足身也分賓者即如來具足色身具足諸相乃應身也分主者如來即非具足色身即非具足諸相乃法身也空生解辨親疏者以空生領解佛意向佛答云此法身不以色身見不以諸相見此是親切之處而言也又云如來具足色身具足諸相乃疏遠而論也此之賓主是為教中之説也若論衲僧門下實難湊泊非言可及如臨濟會下有二僧對面相顧齊下一喝有僧請問臨濟此一喝還有賓主也無濟答云賓主歷然也可謂一喝分賓主照用一時行此是極妙窮玄言辭路絶也直得賓主兩忘色相俱離者乃科家與人拈情令人離此二途別行一路賓主兩忘者以臨濟宗旨賓者事也主者理也直得事理兩忘也色相俱離者要人離了三十二相八十種好二俱不立也如何是主中主者此是科家要人直下承當主中之主即法身向上一著也君臣道合無回互認得分明不是渠此是科家答上之義君臣道合者即賓主不分也無回互者即事即理也認得分明不是渠者將此賓主事理直饒認得分明猶且不是不可認著可謂眼中撥盡黃金屑觸處縱橫鳥道玄昔僧問曹山五位君臣旨訣山云正位即屬空界本來無物偏位即屬色界有萬像形偏中正者捨事入理也正中偏者背理就事也兼帶者冥應衆緣不隨諸有非染非淨非心非偏故曰虗玄大道無著真宗從上先德推此一位最妙最玄要當詳審辨明也君為正位臣為偏位臣向君是偏中正君視臣是正中偏君臣道合是兼帶語也時有僧問曰如何是君山云如德尊寰宇高明朗太虗僧曰如何是臣山云靈機弘聖道真智利羣生僧曰如何是臣向君山云不墮諸異趣凝情望聖容僧曰如何是君視臣山云妙容雖不動光燭本無偏僧曰如何是君臣道合山云混然無內外和融上下平山又云以君臣偏正言者不欲犯中故臣稱君不敢斥言是也此吾法之宗要者哉端嚴相好紫金身正眼看來總不真要會問酬親的意蘊空無我亦無人前二句牒經之義也端嚴相好者即如來三十二相八十種好也紫金身者即如來妙色紫摩金身也雖是端嚴相好若以金剛爍迦羅堅固正眼看來總是不真非是清淨法身真如妙理此法身者三光猶未照五眼尚難窺如來相好之身者乃感報應化之身因修萬行而得非根本智故曰不真也後二句是科家分明指示審問行人若要會得佛與須菩提如斯問酬親切端的之意須是五蘊皆空四相非有亦要了盡能空之法方是人法兩忘始會問酬之義也圓音唱處響清清試聽金剛一卷經薦取衆生方外句稱錘是鐵太分明初二句言如來説法一音普應也圓音者以佛演談般若大法音聲嚮亮清徹要人向聞聲處會取即是此一卷經衆生隨類各得所解十方世界衆生悉皆得聞各解其義故云圓音也若有行人信受此法試聽此一卷金剛般若經其中所説實相般若自性法身四聖六凡依此而出即如來所證所説圓音之義實有不可思議微妙功德也故令試聽不可錯過也後二句科家慈心太煞分明説破直下薦取不可向色相文字上領會故叮嚀誡勉薦取方外之句即指此經般若大智人人有分又恐不知重為宣説稱錘是鐵太甚分明何曾隱諱迷人只知喚作稱錘忘却本身原來是鐵一切衆生妄認諸法不知諸法原是般若智慧而生故云稱錘是鐵太分明也陌下桃花春又開風吹殘杏雪飛垓紛紛落處誰人悟笑指靈雲歸去來此四句頌科家要人向見色處會取即是此理也前二句言陌桃花春又開者不但桃花開綻又被風吹殘杏其花飛處如雪相似紛紛亂落誰人悟得此花落時唯有靈雲一覩便知豁然大悟方知花有開謝樹木常存一切諸法亦復如是法有生滅性無生滅所以靈雲見桃花而悟道此乃見色明心就路還家故云笑指靈雲歸去來其文出傳燈録靈雲見桃花忽然大悟偈曰三十年來尋劒客幾回葉落又抽枝自從一見桃花後直至而今更不疑大溈曰從緣入者永無退失汝善護持玄沙云諦當甚諦當敢保老兄未徹在靈雲曰師兄還徹也未玄沙休去非説所説不在分別本性離言説此科昭明太子判此一段經文為非説所説分第二十一蓋佛謂須菩提言説法者無法可説是名説法故立此名也不在分別者言説法者是俗諦非説者是真諦今以非説所説乃二諦融通不分真俗之別故云不在分別也本性離言説者此科佛謂須菩提云若有人言如來有所説法則為謗佛不能解我所説故須菩提説法者無法可説是名説法也蓋本性空寂離諸相貌言詞相寂滅不可以言説故云本性離言説也潺潺緑水出廣長舌圓音落落無間無歇休將耳聽紅爐飛片雪此一節文呈前本性離言説之義乃顯無情善能説法也潺潺緑水出廣長舌者即無情説法以高山流水悉皆説法所以東坡看無情説法話有省偈曰溪聲便是廣長舌山色無非清淨身夜來八萬四千偈他日如何舉似人也圓音落落無間無歇者亦是無情説法之義乃明暗色空風動塵起山河草木圓音無間可謂塵説剎説熾然説三世十方一時説何曾間斷故云圓音落落無間無歇昔古德聞殿角鈴鳴而惺偈曰銅唇鐵舌太尖新樓閣懸來不記春言外百千三昧法因風説與箇中人也休將耳聽紅爐飛片雪者是科家將前無情所説之義八字打開兩手分付要人離心意識領會出凡聖路頭字故云休將耳聽也此理若將耳聽終難會眼裏聞聲方得知如紅爐飛片雪相似言此大冶紅爐豈容片雪飛過以喻至理豈能容得言説取捨意路分別所以非思量處識情難測真如法界無自無他此亦是紅爐不容片雪之義也潭州長髭曠禪師初參石頭和尚頭問從甚麼處來曠云嶺南來頭曰大庾嶺頭有鋪功德成就也未曠云成就久矣只欠點眼在頭曰莫要點麼曠云特請石頭垂下一足示之曠便作禮頭曰汝見甚麼便禮拜曠云某甲見處如紅爐上一點雪也我心本非有無心説向誰所説非所説為被上乘機起句我心本非有者以不著相好即是法身故云非有也次句既不取著即是無心若無有心向誰所説故云無心説向誰也後二句意云似此無言無相之道雖如來所説一代時教只為衆生不明此理故有所説若以真空理上元無一字故云非所説也如斯説與非説唯被大乘之機非小乘人而可擔荷故云為被上乘機也非説所説分第二十一經須菩提汝勿謂如來至如來説非衆生是名衆生注曰此分名為非説所説之義也佛因須菩提疑如來色身相好既不可得見如何為人説法耶為斷此疑故有是問云汝勿謂如來作是念我當有所説法莫作是念何以故者此是佛自徵問以何意故無法可説也若有人言如來有所説法等者意云如來悲願深重隨感而應於無説而説雖説而無説衆生不達此理謂佛有説是為謗佛不能解佛所説故以如來説法四十九年皆是應機而説於真空理中未嘗談著一字也所以諸法寂滅相不可以言宣若執佛有法可説即不解佛義也佛又告須菩提云説法者無法可説是名説法者佛意云前來有説則為謗佛今云説法者乃應機而説即俗諦也無法可説者以稱理而言即真諦也是名説法者今於無説中為生有説不妨稱性而説乃於有説而顯無説是名真説即中道也爾時慧命須菩提白佛言世尊爾時者當起問之時也慧命者以善現解空第一與般若空慧相應以慧為命故稱慧命也頗有衆生於未來世聞説是法生信心否者善現聞佛前云色身乃非身之身説法乃非説而説既身説俱妙恐聞者難信所以有此疑問故云生信心否也佛答須菩提之問彼非衆生者即凡夫衆生於此般若不能生信也非不衆生者即聖體衆生於此般若能生信解也又解云彼非衆生者非凡夫衆生即大乘之人能信無説中真説於般若智能生信解也非不衆生者正是凡夫衆生聞説此法豈能信解者哉存此二解智哲再詳也何以故者佛自徵問前義也佛又呼須菩提言衆生衆生者此牒前文彼非衆生非不衆生也如來説非衆生者牒前非是凡夫衆生是大乘人即聖體衆生能生信解也是名衆生者牒前是凡夫衆生豈能信解此法也如來無所説慈雲甘露灑濛濛慧命未嘗聞明月清風空寂寂正恁麼時且道是何境界如來無所説者即經云無法可説是名説法以無説之説乃為真説故喻如慈雲普覆甘露均霑所以慈雲遍布於十方甘露悉濛於大地也慧命未嘗聞者以須菩提聞佛所説領解深義雖説而無説乃為真説聞而無聞乃為真聞故喻如明月清風乾坤普照也所以淨名云夫説法者無説無示其聽法者無聞無得大品云聽如幻人聽説如幻人説無聽於無説是名真實法也正恁麼時者科家意云正當無説無聞且道是何境界此即徵問之義向下發明也欲得不招無間業莫謗如來正法輪科家意謂恐人聞佛説此圓頓法門無説無得疑而不信故此叮嚀誡勉當慎口業免墮三途故經云若有人言如來有所説法即為謗佛所以科家云欲得不招無間業莫謗如來正法輪以般若是諸佛之母即衆生之性有情無情從此而生故稱正法也永明壽云實相及般若三毒元無異若能信受者法利廣無邊若有謗般若罪過莫大焉現世受殃禍生身陷地獄也以此般若是世出世間凡聖之母猶如大地無物不從地生若謗般若則謗一切三寶佛地般若以十法界從般若中來若無般若威光實無一塵可立也今引謗此般若現世獲報者可誡後來不信者也唐時勾龍義閬州人長慶三年於郪縣傭力自給以邑人有疾乃往省之見寓金剛經毀謗斥而止之言便瘖啞醫不能愈五六年每聞鄰人念此經而自責曰我前謗此經故啞若能愈者終身敬奉每念經時倚壁聽之疑若念得純熟一日偶入寺中逢一老僧禮之僧問何事遂指口云啞僧以刀割舌下便能而言音與念經正如鄰人之聲久訪此僧不見忽於壁上見畫像須菩提曰此是割舌之僧也道本無言喚不醒藥因救病出金瓶可憐億萬人天衆依舊呆呆側耳聽此偈起句是法次句是喻科家意云其實大道之理本無言説六凡四聖悉皆具足衆生迷而不知所以世尊廣説諸經借有言説以顯無言之道而教化之有情衆生悉皆茫然而莫曉解故云喚不醒也藥因救病者譬如妙藥因人有病方出金瓶與之令服諸病皆愈佛説此法亦復如是因衆生有貪嗔癡病不識自性故有言説指示真性普令開悟除煩惱病故云藥因故病出金瓶也後二句可憐億萬者歎機不醒之義如世尊在靈山會上一日升座良久文殊白槌云諦觀法王法法王法如是世尊便下座此顯無言之道合會聽衆或人或天而有億萬之數悉皆不知也依舊呆呆者乃科家歎此聽衆都向世尊言語中尋討不能於言外薦取無聲之道所以喚之不醒故云依舊呆呆側耳聽也呆呆者即癡相之貌也鼓聲集衆下林泉莫學金剛問普賢高坐猊臺傳祕要妙通一指老僧禪前二句引宗門古德乃證無言之道昔高僧上堂云鼓聲才動大衆雲臻無限天機一時漏泄不辜正眼便合歸堂更待繁詞沉埋宗旨縱然釋迦不出世古今常自説達磨不西來少林有妙訣所以鐘鳴鼓嚮無非觀音入理之門柏短松長盡是毗盧一真境界故云鼓聲集衆下林泉此顯聞聲見色皆是其道也莫學金剛問普賢者此是科家拈情爾時世尊與諸天人説法已畢會中有金剛藏菩薩即從座起而白佛言世尊普賢菩薩廣大行門不可思議唯願世尊略為説之使諸菩薩依而行之佛言若説普賢行門經於塵劫説之不盡欲要得知汝入法界藏身三昧觀察方乃知之于時金剛藏菩薩入定周遍觀察普賢行門盡空遍界猶如微塵無量無邊不可説轉不可説行門微細猶如雨點莫能知之還從定出白佛讚歎普賢行門廣大窮之不盡不知邊際佛言普賢行願即諸佛行願之本唯佛與佛乃能知之況汝一人豈能窮乎故云莫學金剛問普賢返顯離言之道非言所及也後二句呈上無言之道逈超語言也高坐猊臺傳祕要者以善知識坐獅子座傳授心要不立文字即心是佛莫向外求故云傳祕要也妙通一指者即是傳祕要之義昔俱胝和尚凡有人問佛問祖問禪問道俱胝即以一指示之如是三十年只如此行再無他説此顯道本無言令人向竪指處會取即動用中顯道故云妙通一指老僧禪也有病有危終退墮不生不滅不輪回西方淨土常安樂無苦無憂歸去來前二句以淨穢兩土苦樂相校也有病有危者以此穢土人有八苦天有五衰人間天上福盡壽終退墮三途故云終退墮也不生不滅者以淨土之人無有生死得大涅槃壽命無央數劫一生即補佛位然後得入不生不滅涅槃故云不輪回也後二句言西方之快樂也以西方淨土凡所云為皆悉如意無三途八難之苦有百千無量之樂故云常安樂也又無貧窮之苦亦無衣食之憂黃金為地白玉成池四色蓮華萬億受用普勸諸上善人何不急早念佛同生淨土共證菩提故云無苦無憂歸去來也無法可得情識難量本體露堂堂包含法界相與無相此科昭明太子判此一段經文名為無法可得分第二十二蓋以佛於阿耨菩提無有少法可證可得故立此名也情識難量者既是菩提無法可得非凡夫二乘妄情妄識所可測量故云情識難量也本體露堂堂者科家恐人錯過分明説出無法可得之道本有之體顯露堂堂普天匝地無處不周無時不現所以遍法界而無外析鄰虗而無內也包含法界相與無相者此一段無法可得之理木體堂堂總統包含三種世門四種法界有相無相悉在其中所以道色虗空含法界端嚴具足威神大也行住坐臥仔細參詳知音勘破炎天降雪霜科家恐人於包含法界處深奧難明又別指一條活路却向四威儀中檢點此理不要放過故云行住坐臥仔細參詳蒲室頌曰行住坐臥絶隨緣日用何妨涉正偏無影樹頭風浩浩夜明簾外月涓涓也知音勘破者科家意云若是知音具眼者於包含時行住處校勘得破信得及便知道冷灰中豆𪹼枯樹上華開熱烘烘處還生津潤冷氷氷時恰要溫和便可指南作北顛拈倒用於諸法中得大自在也所以寒山詩云樂甚無為國逍遙不住家都緣山色好轉見世情賒六月炎天雪三冬嶺上華早來塵纍盡何處發根牙無為所得法得法何所持無有少法故三藐三菩提前二句牒經之問義云阿耨菩提為無所得耶意云既是無為無所得法云何所持也後二句亦牒經義佛答云乃至無有少法可得是名阿耨菩提意云既是無有少法可得豈有所持者矣既無得無持乃真菩提故云無有少法故三藐三菩提也無法可得分第二十二經須菩提白佛言至是名阿耨多羅三藐三菩提注曰此節經文名無法可得分以須菩提聞前第十三疑中如來實無有法得無上菩提受然燈記云何却有修證故疑而問之云佛得阿耨菩提為無所得耶佛答云如是如是此是如來允許善現之問又云我於無上菩提無有少法可得可證是名阿耨菩提謂性中無有少法可得無有所得則蕩然空寂不可以形相求不可以言説顯但説名為無上正等正覺而已也智者禪師頌曰諸佛大覺智覺性本無涯佛因有何得所得為無耶妙性難量比得理即無差執迷不悟者路錯幾河沙法無可得是名阿耨菩提道無可傳直指涅槃正眼只如得而無得傳而不傳畢竟是何宗旨首初一節牒經之義云乃至無有少法可得是名阿耨菩提也次一節引宗合教以從上佛祖不立文字即心是佛所以僧問德義禪師曰向上一路千聖不傳和尚還傳也無答云鐵丸驀口塞難得解吞人頌曰舉體露堂堂十方無罣礙千聖不能傳萬靈咸頂戴擬欲共商量開口百拶碎此即是直指涅槃妙心金剛正眼也只如得而無得者黃龍南禪師云大覺於然燈佛所無一法可得方證菩提而得受記作佛故云得而無得也傳而不傳者昔阿難請問迦葉尊者世尊傳金襴袈裟外別傳個什麼迦葉召云阿難阿難應諾迦葉云倒却門前剎竿著阿難於言下大悟方知此道只在當人分上本無傳受故迦葉云昔如來將般涅槃以正法眼付囑於我我今將隱於雞足山入定以待彌勒復將此法付囑與汝汝善傳持勿使斷絶而説偈曰法法本來法無法無非法何於一法中有法有不法阿難作禮故云傳而不傳也畢竟是何宗旨者此是科家徵問之義既是無得無傳畢竟是何宗旨下文伸答是也三賢尚未明斯旨十聖那能達此宗此二句答上問義以上無得無傳之道縱使三賢十聖不能明了通達也三賢者即住行向謂之三賢位也十聖者即十地菩薩謂之十聖位也今言未明未達此宗者以顯教外別傳之旨深奧難知地上菩薩尚然未達其他小聖轉更茫然也所以積行菩薩𭨃腮鱗於龍門上德聲聞杜視聽於嘉會也從來無説亦説傳才涉思惟便隔關語默離微俱掃盡寥寥獨坐古靈山前二句牒經之義經云無有少法可得此無得中豈有所説既是無説豈有所傳所以云千聖不傳諸祖不説故云無説無傳也才涉思惟者科家意云此無説無傳之道汝等諸人若是擬議思惟云既言無説今三藏之教豈非説乎歷代諸祖聯芳續焰豈非傳乎若如此見解便於此道隔千山萬水遠之遠矣故云隔關也後二句言語默離微者乃肇公離微體妙品之義即是出微入離二門以此道語則涉於微默則涉於離也科家意云若於此道不涉思惟超出語默離微之外方是無説無傳之道故云語默離微俱掃盡矣寥寥獨坐者若於語默離微處掃盡自然純清絶點纖塵不立毫髮不容淨盡無餘全歸威音那畔空劫已前更有何法可説可傳乎故云寥寥獨坐古靈山昔僧問明辨禪師曰語默涉離微如何道不犯師曰橫身三界外獨脫萬機前是也爐中裊裊試拈香普請天龍降道場功德無邊應有報莊嚴淨土事難量前二句事也科家意云欲求淨土必須建立壇場前來嚴淨之中已設供養祈禱三寶伸請了畢今復設爐然香其煙氣旋轉裊繞即柁曳貌以再拈香普請者所謂行人晝夜六時懺悔發願回向淨土燒種種香設種種供普請八部天龍俱降道場祈求加護欲使外魔不入內道可成也後二句理也言行人種種行道所獲功德無量無邊應報佛祖之恩莊嚴諸佛淨土其事實難可校量也六欲諸天具五衰三禪尚自有風災直饒修到非非想也則不如歸去來六欲諸天者此諸天人未離貪欲古德云四王切近忉利抱夜摩把手兜率笑他化自在眼相視此是六欲諸天報故曰六欲也婆沙論云總是十善八齋故得生天六欲諸天六種不同一者若持不殺之戒生四王天二者持不殺不盜之生忉利天三者持不殺不盜不邪淫生夜摩天四者持不殺不盜不邪淫不妄語不兩舌不惡口不綺語生兜率天五者不殺盜邪淫妄言兩舌惡口綺語兼持八戒生化樂天及他化自在天也六天受福各各不同福盡之時而有五種衰相現前謂一諸天嚴身具中出五種音聲善奏曲樂人所不及其命終時樂音不奏二諸天身光赫奕晝夜相照身無有影其命終時光昧影現三諸天膚體細滑入香池浴才出水時水不著體猶蓮華葉命將終時水便著體四諸天種種境界悉皆殊妙漂脫諸根如旋火輪不得暫住其命終時專著一境不能捨離五諸天身力強盛眼不瞬動其命終時身體虗弱眼便數動此是諸天五種衰相現前則知福盡墮落入於惡道故云六欲諸天具五衰也三禪有風災者長阿含經云此世界至壞劫時三災欲起此世間人皆行正法正見不倒悉修十善上求梵世地獄餓鬼畜生三途業盡來生人間聞此火災無有師法教之皆自然而修十善亦求上升梵世修羅亦求上升東西二洲例此皆然北洲聞知求生欲界天中修離欲故方生梵世若五逆十惡謗方等般若毀滅三寶墮阿鼻獄中罪未畢者以此娑婆地獄已壞轉置他方阿鼻獄中受罪此四大洲有情盡已萬億四天下皆同名為有情世間壞已如是亦經十九中劫次壞器世間然後四洲有七日出現天久不雨萬物枯竭泉源乾涸衆生業力盛故生大黑風吹令海水兩皆披分至於海底攝取阿鼻獄中日宮殿出人間草木凋落枯死萬物不生復生大黑風攝取第二日出時小小溝坑河渠泉源盡皆乾竭海水漸下七百由旬大黑風力攝取第三日出時四大河及阿耨達池悉皆乾竭海水漸漸下千由旬大黑風力攝取第四日出時四大海水下六千由旬大黑風力攝取第五日出時四大海水下七千由旬悉皆乾盡大黑風力攝取第六日出時地厚十六萬八千由旬悉皆煙出須彌及七金十寶等山上至六欲天下及諸大地獄皆悉盡滅大黑風力攝取第七日出時四天下六欲天盡是大火直至梵天以火燒壞經一中劫此一四天下如此則萬億四天下皆悉是火壞劫總經二十中劫此世界壞有其三種即水火風也壞者亦如前説如是七次火災後世界復成又被水壞至二禪天從極光天即生大雲降注大雨其器世界如水化鹽消鎔皆盡彼水自竭為一水災次復七火災度七火災還有一水災如是火災共經四十九翻水災滿至七次復經七火災後世界復成又被風災壞至三禪天其風之力吹散妙高須彌何況餘小山也第四禪天雖無外災此等有情生與殿生命盡殿隱如是器情世界而有成壞故云三禪尚自有風災也非非想者昔頭藍弗是舍利弗之先師於山林中坐禪有鳥鵲聲鳴不得入定移恆河邊坐禪魚鱉弄藻跳水作聲亦難入定遂生惡心嗔言發願云於未來世身入水中食於汝等身飛空中噉於汝等後得滅受想定生於非非想壽命八萬四千大劫禪定亦同受八萬四千劫定與壽命福報俱盡命終之後墮飛狸身身同狐狸傍生兩翅入水吞魚鱉蝦蟹飛噉空中鳥鵲之類此之禪定不出三界未免輪回可謂一念嗔心起八萬障門開也不如歸去來者若生淨土尚不聞婦女之聲名豈有三惡道之苦報壽命無量一生補處即證無生不受輪回故云也則不如歸去來也
